let REVCOGS_FILTER = { dateFrom: addDays(-30), dateTo: todayISO, store:'all', groupBy:'day' };
function renderRevenueCogsReport(){
  const f = REVCOGS_FILTER;
  let list = SALES.filter(s=>s.status==='completed' && s.date>=f.dateFrom && s.date<=f.dateTo);
  if(f.store!=='all') list = list.filter(s=>s.store===f.store);
  const refunds = SALES.filter(s=>s.status==='refunded' && s.refundOf && s.date>=f.dateFrom && s.date<=f.dateTo);

  // Group totals
  const groups = {};
  list.forEach(s=>{
    let key;
    if(f.groupBy==='day') key = s.date;
    else if(f.groupBy==='month') key = s.date.slice(0,7);
    else if(f.groupBy==='store') key = s.store;
    else if(f.groupBy==='category') key = '__per-cat__'; // handled differently
    if(f.groupBy==='category'){
      // Group by category — split each sale's items by cat
      s.items.forEach(it=>{
        const p = getProduct(it.pid);
        const cat = p ? getCategory(p.cat)?.name : 'Uncategorized';
        if(!groups[cat]) groups[cat] = { revenue:0, cogs:0, discount:0, tax:0, refunds:0, qty:0 };
        const fxMul = s.ccy==='MVR'?1:s.fxRate;
        groups[cat].revenue += it.lineNet * fxMul;
        groups[cat].cogs += it.lineCost * fxMul;
        groups[cat].tax += it.lineTax * fxMul;
        groups[cat].discount += (it.lineDiscount||0) * fxMul;
        groups[cat].qty += it.qty;
      });
      return;
    }
    if(!groups[key]) groups[key] = { revenue:0, cogs:0, discount:0, tax:0, refunds:0, qty:0 };
    const fxMul = s.ccy==='MVR'?1:s.fxRate;
    groups[key].revenue += s.subtotal * fxMul;
    groups[key].cogs += s.items.reduce((a,i)=>a+i.lineCost,0) * fxMul;
    groups[key].discount += s.discount * fxMul;
    groups[key].tax += s.tax * fxMul;
    groups[key].qty += s.items.reduce((a,i)=>a+i.qty,0);
  });
  if(f.groupBy!=='category'){
    refunds.forEach(s=>{
      let key;
      if(f.groupBy==='day') key = s.date;
      else if(f.groupBy==='month') key = s.date.slice(0,7);
      else if(f.groupBy==='store') key = s.store;
      if(groups[key]) groups[key].refunds += Math.abs(s.totalInBase);
    });
  }

  const totalRev = Object.values(groups).reduce((a,b)=>a+b.revenue,0);
  const totalCogs = Object.values(groups).reduce((a,b)=>a+b.cogs,0);
  const totalTax = Object.values(groups).reduce((a,b)=>a+b.tax,0);
  const totalDisc = Object.values(groups).reduce((a,b)=>a+b.discount,0);
  const totalRefunds = Object.values(groups).reduce((a,b)=>a+b.refunds,0);
  const grossProfit = totalRev - totalCogs;
  const margin = totalRev>0 ? (grossProfit/totalRev*100).toFixed(2) : 0;

  return `
    <div class="ph">
      <div><div class="pt">📒 Revenue & COGS Report</div><div class="ps">For accounts system / journal entry • ${f.dateFrom} to ${f.dateTo}</div></div>
      <div class="brow">
        <button class="btn" onclick="exportRevCogs('xlsx')">📊 Excel</button>
        <button class="btn" onclick="exportRevCogs('csv')">📥 CSV</button>
        <button class="btn btn-p" onclick="exportRevCogs('journal')">📓 Journal Entry XLSX</button>
      </div>
    </div>

    <div class="al al-i">
      <strong>Purpose:</strong> This report provides revenue, COGS, tax, discount, and refund figures for the period — formatted to be entered as journal entries into your accounts system (Tally, QuickBooks, Sage, Xero, etc.). Click "Journal Entry XLSX" for a debit/credit formatted export.
    </div>

    <div class="card">
      <div class="cb">
        <div class="fg4">
          <div class="fg"><label class="fl">Date From</label><input type="date" class="fi" value="${f.dateFrom}" oninput="REVCOGS_FILTER.dateFrom=this.value;renderMain()"></div>
          <div class="fg"><label class="fl">Date To</label><input type="date" class="fi" value="${f.dateTo}" oninput="REVCOGS_FILTER.dateTo=this.value;renderMain()"></div>
          <div class="fg"><label class="fl">Store</label>
            <select class="fs" onchange="REVCOGS_FILTER.store=this.value;renderMain()">
              <option value="all">All Stores</option>
              ${STORES.map(s=>`<option value="${s.code}" ${f.store===s.code?'selected':''}>${s.code}</option>`).join('')}
            </select>
          </div>
          <div class="fg"><label class="fl">Group By</label>
            <select class="fs" onchange="REVCOGS_FILTER.groupBy=this.value;renderMain()">
              <option value="day" ${f.groupBy==='day'?'selected':''}>Day</option>
              <option value="month" ${f.groupBy==='month'?'selected':''}>Month</option>
              <option value="store" ${f.groupBy==='store'?'selected':''}>Store</option>
              <option value="category" ${f.groupBy==='category'?'selected':''}>Category</option>
            </select>
          </div>
          <div class="fg" style="display:flex;align-items:flex-end;gap:6px">
            <button class="btn btn-sm" onclick="setRevCogsPeriod('thisMonth')">This Month</button>
            <button class="btn btn-sm" onclick="setRevCogsPeriod('lastMonth')">Last Month</button>
            <button class="btn btn-sm" onclick="setRevCogsPeriod('thisQuarter')">This Quarter</button>
          </div>
        </div>
      </div>
    </div>

    <div class="sgrid g4">
      <div class="sc bl"><div class="sl">Revenue (Net of Tax)</div><div class="sv">${fmtMoney(totalRev,'MVR')}</div><div class="ss">Sales account</div><div class="si">💹</div></div>
      <div class="sc rd"><div class="sl">COGS</div><div class="sv">${fmtMoney(totalCogs,'MVR')}</div><div class="ss">Cost account</div><div class="si">📦</div></div>
      <div class="sc gr"><div class="sl">Gross Profit</div><div class="sv">${fmtMoney(grossProfit,'MVR')}</div><div class="ss">${margin}% margin</div><div class="si">💎</div></div>
      <div class="sc te"><div class="sl">GST Output</div><div class="sv">${fmtMoney(totalTax,'MVR')}</div><div class="ss">GST payable</div><div class="si">📑</div></div>
    </div>

    <div class="card">
      <div class="ch"><div class="ct">Detailed Breakdown by ${f.groupBy.charAt(0).toUpperCase()+f.groupBy.slice(1)}</div></div>
      <div class="cb flush">
        <div class="tw"><table>
          <tr><th>${f.groupBy.charAt(0).toUpperCase()+f.groupBy.slice(1)}</th><th class="amt">Items</th><th class="amt">Revenue (Net)</th><th class="amt">COGS</th><th class="amt">Gross Profit</th><th class="amt">Margin %</th><th class="amt">Discounts</th><th class="amt">GST Output</th>${f.groupBy!=='category'?'<th class="amt">Refunds</th>':''}</tr>
          ${Object.entries(groups).sort((a,b)=>{
            if(['day','month'].includes(f.groupBy)) return b[0].localeCompare(a[0]);
            return b[1].revenue - a[1].revenue;
          }).map(([k,d])=>{
            const profit = d.revenue - d.cogs;
            const m = d.revenue>0 ? (profit/d.revenue*100).toFixed(1) : 0;
            return `<tr>
              <td><strong>${k}</strong></td>
              <td class="amt">${d.qty}</td>
              <td class="amt" style="color:var(--blue3);font-weight:700">${fmtMoney(d.revenue,'MVR')}</td>
              <td class="amt">${fmtMoney(d.cogs,'MVR')}</td>
              <td class="amt" style="color:var(--green);font-weight:700">${fmtMoney(profit,'MVR')}</td>
              <td class="amt" style="font-weight:700">${m}%</td>
              <td class="amt">${fmtMoney(d.discount,'MVR')}</td>
              <td class="amt">${fmtMoney(d.tax,'MVR')}</td>
              ${f.groupBy!=='category'?`<td class="amt" style="color:var(--red)">${fmtMoney(d.refunds,'MVR')}</td>`:''}
            </tr>`;
          }).join('')}
          <tr style="background:var(--blue2);font-weight:800">
            <td>TOTAL</td>
            <td class="amt">—</td>
            <td class="amt" style="color:var(--blue3);font-size:13px">${fmtMoney(totalRev,'MVR')}</td>
            <td class="amt">${fmtMoney(totalCogs,'MVR')}</td>
            <td class="amt" style="color:var(--green);font-size:13px">${fmtMoney(grossProfit,'MVR')}</td>
            <td class="amt">${margin}%</td>
            <td class="amt">${fmtMoney(totalDisc,'MVR')}</td>
            <td class="amt">${fmtMoney(totalTax,'MVR')}</td>
            ${f.groupBy!=='category'?`<td class="amt" style="color:var(--red)">${fmtMoney(totalRefunds,'MVR')}</td>`:''}
          </tr>
        </table></div>
      </div>
    </div>

    <div class="card">
      <div class="ch"><div class="ct">Suggested Journal Entry — Period Total</div></div>
      <div class="cb">
        <div class="al al-i" style="font-size:11px"><strong>Note:</strong> This is a sample double-entry journal in your home currency (MVR). Adjust account codes per your chart of accounts.</div>
        <div class="tw"><table>
          <tr><th>Account</th><th>Description</th><th class="amt">Debit (MVR)</th><th class="amt">Credit (MVR)</th></tr>
          <tr><td><span class="mono">1100</span> Cash / Bank / AR</td><td>Sales receipts (gross)</td><td class="amt">${fmtMoney(totalRev+totalTax-totalRefunds,'MVR')}</td><td class="amt">—</td></tr>
          <tr><td><span class="mono">5000</span> COGS</td><td>Cost of inventory sold</td><td class="amt">${fmtMoney(totalCogs,'MVR')}</td><td class="amt">—</td></tr>
          <tr><td><span class="mono">4000</span> Sales Revenue</td><td>Net sales for period</td><td class="amt">—</td><td class="amt" style="color:var(--blue3);font-weight:700">${fmtMoney(totalRev,'MVR')}</td></tr>
          <tr><td><span class="mono">2200</span> GST Output Payable</td><td>GST collected</td><td class="amt">—</td><td class="amt">${fmtMoney(totalTax,'MVR')}</td></tr>
          <tr><td><span class="mono">1300</span> Inventory</td><td>Inventory reduced</td><td class="amt">—</td><td class="amt">${fmtMoney(totalCogs,'MVR')}</td></tr>
          ${totalRefunds>0?`<tr><td><span class="mono">4100</span> Sales Returns</td><td>Refunds in period</td><td class="amt">${fmtMoney(totalRefunds,'MVR')}</td><td class="amt">—</td></tr>`:''}
          <tr style="background:var(--blue2);font-weight:800">
            <td colspan="2">BALANCE CHECK</td>
            <td class="amt">${fmtMoney(totalRev+totalTax-totalRefunds+totalCogs+(totalRefunds>0?totalRefunds:0),'MVR')}</td>
            <td class="amt">${fmtMoney(totalRev+totalTax+totalCogs,'MVR')}</td>
          </tr>
        </table></div>
      </div>
    </div>
  `;
}
function setRevCogsPeriod(p){
  const today = new Date();
  if(p==='thisMonth'){
    REVCOGS_FILTER.dateFrom = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-01`;
    REVCOGS_FILTER.dateTo = todayISO;
  } else if(p==='lastMonth'){
    const d = new Date(today.getFullYear(), today.getMonth()-1, 1);
    const last = new Date(today.getFullYear(), today.getMonth(), 0);
    REVCOGS_FILTER.dateFrom = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
    REVCOGS_FILTER.dateTo = `${last.getFullYear()}-${String(last.getMonth()+1).padStart(2,'0')}-${String(last.getDate()).padStart(2,'0')}`;
  } else if(p==='thisQuarter'){
    const q = Math.floor(today.getMonth()/3);
    REVCOGS_FILTER.dateFrom = `${today.getFullYear()}-${String(q*3+1).padStart(2,'0')}-01`;
    REVCOGS_FILTER.dateTo = todayISO;
  }
  renderMain();
}
function exportRevCogs(type){
  const f = REVCOGS_FILTER;
  let list = SALES.filter(s=>s.status==='completed' && s.date>=f.dateFrom && s.date<=f.dateTo);
  if(f.store!=='all') list = list.filter(s=>s.store===f.store);

  if(type==='journal'){
    // Build journal entry workbook
    const wb = XLSX.utils.book_new();

    // Sheet 1: Daily journal entries
    const dailyRows = [];
    const byDay = {};
    list.forEach(s=>{
      if(!byDay[s.date]) byDay[s.date] = { revenue:0, cogs:0, tax:0, discount:0 };
      const fxMul = s.ccy==='MVR'?1:s.fxRate;
      byDay[s.date].revenue += s.subtotal * fxMul;
      byDay[s.date].cogs += s.items.reduce((a,i)=>a+i.lineCost,0) * fxMul;
      byDay[s.date].tax += s.tax * fxMul;
      byDay[s.date].discount += s.discount * fxMul;
    });
    Object.entries(byDay).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([d,v])=>{
      dailyRows.push({ Date:d, 'JE#':`JE-${d.replace(/-/g,'')}`, Account:'1100', 'Account Name':'Cash / Bank / AR', Description:`POS sales for ${d}`, Debit:(v.revenue+v.tax).toFixed(2), Credit:'' });
      dailyRows.push({ Date:d, 'JE#':`JE-${d.replace(/-/g,'')}`, Account:'5000', 'Account Name':'COGS', Description:`Cost of goods sold ${d}`, Debit:v.cogs.toFixed(2), Credit:'' });
      dailyRows.push({ Date:d, 'JE#':`JE-${d.replace(/-/g,'')}`, Account:'4000', 'Account Name':'Sales Revenue', Description:`Net sales ${d}`, Debit:'', Credit:v.revenue.toFixed(2) });
      dailyRows.push({ Date:d, 'JE#':`JE-${d.replace(/-/g,'')}`, Account:'2200', 'Account Name':'GST Output Payable', Description:`GST collected ${d}`, Debit:'', Credit:v.tax.toFixed(2) });
      dailyRows.push({ Date:d, 'JE#':`JE-${d.replace(/-/g,'')}`, Account:'1300', 'Account Name':'Inventory', Description:`Inventory reduction ${d}`, Debit:'', Credit:v.cogs.toFixed(2) });
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dailyRows), 'Daily Journal Entries');

    // Sheet 2: Sales summary
    const summaryRows = list.map(s=>({
      Date:s.date, Time:s.time, 'Invoice#':s.invoiceNo, Store:s.store, Cashier:getUserName(s.cashier),
      Customer:getCustomer(s.customer).name, Items:s.items.length,
      Net:s.subtotal.toFixed(2), Discount:s.discount.toFixed(2), GST:s.tax.toFixed(2),
      Total:s.total.toFixed(2), Currency:s.ccy, 'Total MVR':s.totalInBase.toFixed(2),
      COGS:s.items.reduce((a,i)=>a+i.lineCost,0).toFixed(2),
      'Gross Profit':(s.subtotal - s.items.reduce((a,i)=>a+i.lineCost,0)).toFixed(2),
      'Payment Method':s.paymentMethod
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summaryRows), 'Sales Detail');

    XLSX.writeFile(wb, `revenue-cogs-journal-${f.dateFrom}-to-${f.dateTo}.xlsx`);
    toast('Journal entry XLSX exported');
    return;
  }

  // Standard CSV/XLSX
  const rows = list.map(s=>{
    const fxMul = s.ccy==='MVR'?1:s.fxRate;
    const cogs = s.items.reduce((a,i)=>a+i.lineCost,0);
    return {
      Date:s.date, 'Invoice':s.invoiceNo, Store:s.store,
      'Net Revenue (MVR)':(s.subtotal*fxMul).toFixed(2),
      'Discount (MVR)':(s.discount*fxMul).toFixed(2),
      'GST Output (MVR)':(s.tax*fxMul).toFixed(2),
      'Total (MVR)':s.totalInBase.toFixed(2),
      'COGS (MVR)':(cogs*fxMul).toFixed(2),
      'Gross Profit (MVR)':((s.subtotal-cogs)*fxMul).toFixed(2)
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Revenue & COGS');
  XLSX.writeFile(wb, `revenue-cogs-${f.dateFrom}-to-${f.dateTo}.${type}`);
  toast('Report exported');
}

// ═══════════════════════════════════════════════════════════════

let MIRA_OUT_FILTER = { period: getCurrentTaxPeriod() };

function getCurrentTaxPeriod(){
  // MIRA standard tax period - monthly. Format: YYYY-MM
  const d = new Date();
  // Use last completed month by default
  const last = new Date(d.getFullYear(), d.getMonth()-1, 1);
  return `${last.getFullYear()}-${String(last.getMonth()+1).padStart(2,'0')}`;
}
function getPeriodDates(period){
  const [y,m] = period.split('-').map(Number);
  const from = `${y}-${String(m).padStart(2,'0')}-01`;
  const last = new Date(y, m, 0);
  const to = `${y}-${String(m).padStart(2,'0')}-${String(last.getDate()).padStart(2,'0')}`;
  return { from, to };
}

function renderMiraOutputReport(){
  const f = MIRA_OUT_FILTER;
  const { from, to } = getPeriodDates(f.period);
  const list = SALES.filter(s=>s.status==='completed' && s.date>=from && s.date<=to);
  const refunds = SALES.filter(s=>s.status==='refunded' && s.refundOf && s.date>=from && s.date<=to);

  // Group by tax rate
  const byRate = {};
  list.forEach(s=>{
    const fxMul = s.ccy==='MVR'?1:s.fxRate;
    s.items.forEach(it=>{
      const r = it.taxRate||0;
      if(!byRate[r]) byRate[r] = { taxableSupplies:0, output:0, count:0 };
      byRate[r].taxableSupplies += (it.lineNet - (it.lineDiscount||0)) * fxMul;
      byRate[r].output += it.lineTax * fxMul;
      byRate[r].count += it.qty;
    });
  });

  // Refunds (negative)
  refunds.forEach(s=>{
    const fxMul = s.ccy==='MVR'?1:s.fxRate;
    s.items.forEach(it=>{
      const r = it.taxRate||0;
      if(!byRate[r]) byRate[r] = { taxableSupplies:0, output:0, count:0 };
      byRate[r].taxableSupplies -= (it.lineNet - (it.lineDiscount||0)) * fxMul;

  });

  const totalTaxable = Object.values(byRate).reduce((a,b)=>a+b.taxableSupplies,0);

  // Build month options (last 12 months)

    monthOpts.push({ value:v, label:d.toLocaleDateString('en-US',{year:'numeric',month:'long'}) });
  }

  return `

    <div class="sgrid g3">

function exportMiraOutput(format){
  const f = MIRA_OUT_FILTER;
  const { from, to } = getPeriodDates(f.period);
  const list = SALES.filter(s=>s.status==='completed' && s.date>=from && s.date<=to);
  const refunds = SALES.filter(s=>s.status==='refunded' && s.refundOf && s.date>=from && s.date<=to);

  const wb = XLSX.utils.book_new();

  // ═══════════════════════════════════════════════════════════════
  // Sheet 1: TaxInvoices (MIRA exact format)
  // Columns: Customer TIN | Customer Name | Invoice No. | Invoice Date |
  //          Value of Supplies Subject to GST at 8% or 16% (excluding GST) |
  //          Value of Zero-Rated Supplies | Value of Exempt Supplies |
  //          Value of Out-of-Scope Supplies | Your Taxable Activity No.
  // ═══════════════════════════════════════════════════════════════
  // Tax invoices: only sales with named customer (TIN known) — these are the "B2B" GST invoices
  // Sales to walk-in/guest customers go to OtherTransactions sheet
  const taxInvoiceRows = [];
  const otherTransactionsByActivity = {}; // grouped by tax activity number

  // Helper: classify a sale's items by GST treatment
  function classifySale(s){
    const fxMul = s.ccy==='MVR'?1:s.fxRate;
    let taxableSupplies = 0; // 8% or 16% supplies (ex-GST)
    let zeroRated = 0;        // 0% rated
    let exempt = 0;           // exempt
    let outOfScope = 0;       // out of scope
    s.items.forEach(it=>{
      const net = (it.lineNet - (it.lineDiscount||0)) * fxMul;
      const r = it.taxRate || 0;
      if(r === 8 || r === 16) taxableSupplies += net;
      else if(r === 0){
        // For r=0, treat as zero-rated by default. UI could let users tag exempt/out-of-scope per product later.
        zeroRated += net;
      }
      else { taxableSupplies += net; } // any other rate counted as taxable
    });
    return { taxableSupplies, zeroRated, exempt, outOfScope };
  }

  // Refunds reduce values (negative entries in tax invoices section, since MIRA expects net values)
  const allEntries = [...list, ...refunds.map(r=>({...r, _isRefund:true}))];

  allEntries.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)).forEach(s=>{
    const c = getCustomer(s.customer);
    const store = STORES.find(x=>x.code===s.store);
    const taxAct = store?.taxActivityNo || '';
    const sign = s._isRefund ? -1 : 1;
    const cls = classifySale(s);

    if(c.tin && c.tin.trim()){
      // Has TIN -> Tax Invoice (B2B)
      taxInvoiceRows.push({
        'Customer TIN': c.tin.trim(),
        'Customer Name': c.name,
        'Invoice No.': s.invoiceNo,
        'Invoice Date': s.date,
        'Value of Supplies Subject to GST at 8% or 16% (excluding GST)': +(cls.taxableSupplies * sign).toFixed(2),
        'Value of Zero-Rated Supplies': +(cls.zeroRated * sign).toFixed(2),
        'Value of Exempt Supplies': +(cls.exempt * sign).toFixed(2),
        'Value of Out-of-Scope Supplies': +(cls.outOfScope * sign).toFixed(2),
        'Your Taxable Activity No.': taxAct
      });
    } else {
      // Walk-in/guest -> aggregate into OtherTransactions by tax activity
      if(!otherTransactionsByActivity[taxAct]) {
        otherTransactionsByActivity[taxAct] = { taxableSupplies:0, zeroRated:0, exempt:0, outOfScope:0 };
      }
      otherTransactionsByActivity[taxAct].taxableSupplies += cls.taxableSupplies * sign;
      otherTransactionsByActivity[taxAct].zeroRated       += cls.zeroRated * sign;
      otherTransactionsByActivity[taxAct].exempt          += cls.exempt * sign;
      otherTransactionsByActivity[taxAct].outOfScope      += cls.outOfScope * sign;
    }
  });

  // Build TaxInvoices sheet (exact MIRA headers)
  const taxInvoiceHeaders = [
    'Customer TIN','Customer Name','Invoice No.','Invoice Date',
    'Value of Supplies Subject to GST at 8% or 16% (excluding GST)',
    'Value of Zero-Rated Supplies','Value of Exempt Supplies',
    'Value of Out-of-Scope Supplies','Your Taxable Activity No.'
  ];
  const wsTax = XLSX.utils.json_to_sheet(taxInvoiceRows, { header: taxInvoiceHeaders });
  wsTax['!cols'] = [{wch:18},{wch:30},{wch:18},{wch:14},{wch:38},{wch:22},{wch:20},{wch:24},{wch:22}];
  XLSX.utils.book_append_sheet(wb, wsTax, 'TaxInvoices');

  // ═══════════════════════════════════════════════════════════════
  // Sheet 2: OtherTransactions (MIRA exact format)
  // Columns: Your Taxable Activity No. | Value of Supplies Subject to GST at 8% or 16% (excluding GST) |
  //          Value of Zero-Rated Supplies | Value of Exempt Supplies | Value of Out-of-Scope Supplies
  // ═══════════════════════════════════════════════════════════════
  const otherHeaders = [
    'Your Taxable Activity No.',
    'Value of Supplies Subject to GST at 8% or 16% (excluding GST)',
    'Value of Zero-Rated Supplies','Value of Exempt Supplies','Value of Out-of-Scope Supplies'
  ];
  const otherRows = Object.entries(otherTransactionsByActivity).map(([taxAct, v])=>({
    'Your Taxable Activity No.': taxAct,
    'Value of Supplies Subject to GST at 8% or 16% (excluding GST)': +v.taxableSupplies.toFixed(2),
    'Value of Zero-Rated Supplies': +v.zeroRated.toFixed(2),
    'Value of Exempt Supplies': +v.exempt.toFixed(2),
    'Value of Out-of-Scope Supplies': +v.outOfScope.toFixed(2)
  }));
  const wsOther = XLSX.utils.json_to_sheet(otherRows, { header: otherHeaders });
  wsOther['!cols'] = [{wch:22},{wch:38},{wch:22},{wch:20},{wch:24}];
  XLSX.utils.book_append_sheet(wb, wsOther, 'OtherTransactions');

  XLSX.writeFile(wb, `MIRA-Output-${f.period}.xlsx`);
  toast('MIRA Output template exported (TaxInvoices + OtherTransactions)');
}

// ═══════════════════════════════════════════════════════════════
//  MIRA INPUT TAX REPORT (GST claimed on bills/purchases)
// ═══════════════════════════════════════════════════════════════
let MIRA_IN_FILTER = { period: getCurrentTaxPeriod() };

function renderMiraInputReport(){
  const f = MIRA_IN_FILTER;
  const { from, to } = getPeriodDates(f.period);
  // Use bill date for tax period (when invoice was issued)
  const bills = BILLS.filter(b=>b.date>=from && b.date<=to && b.status!=='cancelled');
  // Also include POs that have been received in this period (taxable inventory purchases)
  const pos = PURCHASE_ORDERS.filter(p=>p.status!=='pending' && p.status!=='cancelled' && p.date>=from && p.date<=to);

  // Group bills by claimable status
  const byRate = {};
  bills.forEach(b=>{
    const fxMul = b.ccy==='MVR'?1:b.fxRate;
    b.lines.forEach(l=>{
      if(!l.taxClaimable) return; // skip non-claimable
      const r = l.taxRate||0;
      if(!byRate[r]) byRate[r] = { taxable:0, input:0, count:0 };
      byRate[r].taxable += l.amount * fxMul;
      byRate[r].input += (l.amount * l.taxRate / 100) * fxMul;
      byRate[r].count++;
    });
  });
  // POs (inventory purchases)
  pos.forEach(po=>{
    const fxMul = po.ccy==='MVR'?1:(CURRENCIES.find(c=>c.code===po.ccy)?.rate||1);
    po.items.forEach(it=>{
      const p = getProduct(it.pid);
      const r = p?.taxRate||8;
      const taxable = it.received * it.unitCost * fxMul;
      const tax = taxable * r / 100;
      if(!byRate[r]) byRate[r] = { taxable:0, input:0, count:0 };
      byRate[r].taxable += taxable;
      byRate[r].input += tax;
      byRate[r].count += it.received;
    });
  });

  const totalTaxable = Object.values(byRate).reduce((a,b)=>a+b.taxable,0);
  const totalInput = Object.values(byRate).reduce((a,b)=>a+b.input,0);

  // Month options
  const monthOpts = [];
  const today = new Date();
  for(let i=0;i<12;i++){
    const d = new Date(today.getFullYear(), today.getMonth()-i, 1);
    monthOpts.push({ value:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`, label:d.toLocaleDateString('en-US',{year:'numeric',month:'long'}) });
  }

  return `

      <strong>GST Input Tax</strong> — Tax paid on business purchases that's claimable as input credit. Includes both <strong>Bills</strong> (rent, utilities, services) and <strong>Inventory Purchase Orders</strong> received during the period.
    </div>

      <div class="cb">
        <div class="fg"><label class="fl">Tax Period</label>
          <select class="fs" onchange="MIRA_IN_FILTER.period=this.value;renderMain()">
            ${monthOpts.map(o=>`<option value="${o.value}" ${f.period===o.value?'selected':''}>${o.label}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>

    <div class="card" style="background:linear-gradient(135deg,#fff,#f0fdf4);border:2px solid var(--green)">
      <div class="ch"><div class="ct" style="color:var(--green)">📋 Input Tax Summary</div></div>
      <div class="cb">
        <div class="info-row"><span class="il">Taxpayer Name</span><span class="iv">${COMPANY.name}</span></div>
        <div class="info-row"><span class="il">TIN</span><span class="iv mono">${TAX_CONFIG.tinNumber}</span></div>
        <div class="info-row"><span class="il">Period</span><span class="iv">${from} to ${to}</span></div>
        <div class="info-row"><span class="il">Bills Recorded</span><span class="iv">${bills.length}</span></div>
        <div class="info-row"><span class="il">POs Received</span><span class="iv">${pos.length}</span></div>
      </div>
    </div>

    <div class="sgrid g3">
      <div class="sc bl"><div class="sl">Total Purchases (Net)</div><div class="sv">${fmtMoney(totalTaxable,'MVR')}</div><div class="si">📦</div></div>
      <div class="sc gr"><div class="sl">Input Tax (Claimable)</div><div class="sv">${fmtMoney(totalInput,'MVR')}</div><div class="ss">For GST refund</div><div class="si">📥</div></div>
      <div class="sc te"><div class="sl">Bills + POs</div><div class="sv">${bills.length+pos.length}</div><div class="ss">Source documents</div><div class="si">📋</div></div>
    </div>

    <div class="card">
      <div class="ch"><div class="ct">Input Tax by Rate</div></div>
      <div class="cb flush">
        <div class="tw"><table>
          <tr><th>Tax Rate</th><th>Description</th><th class="amt">Line Items</th><th class="amt">Net Purchases (MVR)</th><th class="amt">Input Tax (MVR)</th></tr>
          ${Object.entries(byRate).sort((a,b)=>parseFloat(a[0])-parseFloat(b[0])).map(([r,d])=>`<tr>
            <td><strong>${r}%</strong></td>
            <td>${r==='0'?'Zero-rated supplies':r==='8'?'GST 8% supplies':r==='16'?'T-GST 16% supplies':r+'%'}</td>
            <td class="amt">${d.count}</td>
            <td class="amt">${fmtMoney(d.taxable,'MVR')}</td>
            <td class="amt" style="color:var(--green);font-weight:700">${fmtMoney(d.input,'MVR')}</td>

function exportMiraInput(){
  const f = MIRA_IN_FILTER;
  const { from, to } = getPeriodDates(f.period);
  const bills = BILLS.filter(b=>b.date>=from && b.date<=to && b.status!=='cancelled');
  const pos = PURCHASE_ORDERS.filter(p=>p.status!=='pending' && p.status!=='cancelled' && p.date>=from && p.date<=to);

  const wb = XLSX.utils.book_new();

  // ═══════════════════════════════════════════════════════════════
  // Single Sheet: 'Input Tax Statement' (exact MIRA template format)
  // Layout (per MIRA template version 25.1):
  //   M1: Version 25.1
  //   A2: Input Tax Statement
  //   A4: TIN: | B4: <tin>
  //   A5: Taxpayer Name: | B5: <name>
  //   A6: Taxable Period: | B6: <period>
  //   A8: Write "Revenue" to indicate revenue expenditure and "Capital" to indicate capital expenditure.
  //   Row 10: Headers (# | Supplier TIN | Supplier Name | Supplier Invoice Number | Invoice Date |
  //                    Invoice Total (excluding GST) | GST Charged at 6% | GST Charged at 8% |
  //                    GST Charged at 12% | GST Charged at 16% | GST Charged at 17% |
  //                    Your Taxable Activity Number | Revenue / Capital)
  //   Row 11+: Data
  // ═══════════════════════════════════════════════════════════════

  const aoa = [];
  // Pre-fill with empty rows
  for(let i=0; i<10; i++) aoa.push(['','','','','','','','','','','','','']);

  // M1 = Version
  aoa[0][12] = 'Version 25.1';
  // A2
  aoa[1][0] = 'Input Tax Statement';
  // A4..A6
  aoa[3][0] = 'TIN:';                aoa[3][1] = TAX_CONFIG.tinNumber || '';
  aoa[4][0] = 'Taxpayer Name:';      aoa[4][1] = COMPANY.name || '';
  aoa[5][0] = 'Taxable Period:';     aoa[5][1] = `${from} to ${to}`;
  // A8
  aoa[7][0] = 'Write "Revenue" to indicate revenue expenditure and "Capital" to indicate capital expenditure.';
  // Row 10 headers (index 9)
  aoa[9] = [
    '#', 'Supplier TIN', 'Supplier Name', 'Supplier Invoice Number', 'Invoice Date',
    'Invoice Total (excluding GST)',
    'GST Charged at 6%', 'GST Charged at 8%', 'GST Charged at 12%',
    'GST Charged at 16%', 'GST Charged at 17%',
    'Your Taxable Activity Number', 'Revenue / Capital'
  ];

  // Build data rows from bills + POs, filtered to claimable items only
  let rowNum = 1;

  // Bills (claimable lines)
  bills.forEach(b=>{
    const claimableLines = b.lines.filter(l=>l.taxClaimable);
    if(claimableLines.length === 0) return;
    const fxMul = b.ccy==='MVR' ? 1 : b.fxRate;
    const store = STORES.find(s=>s.code===b.store);
    const taxAct = store?.taxActivityNo || '';
    // Determine Revenue / Capital based on bill category
    const cat = BILL_CATEGORIES.find(c=>c.id===b.category);
    const isCapital = cat && cat.glCode && cat.glCode.startsWith('1'); // GL codes starting with 1 = assets/capital
    const revCap = isCapital ? 'Capital' : 'Revenue';
    // Combine all claimable lines into one entry per bill, summing by tax rate
    let totalNet = 0;
    let gst6 = 0, gst8 = 0, gst12 = 0, gst16 = 0, gst17 = 0;
    claimableLines.forEach(l=>{
      const net = l.amount * fxMul;
      const tax = l.amount * l.taxRate / 100 * fxMul;
      totalNet += net;
      if(l.taxRate === 6) gst6 += tax;
      else if(l.taxRate === 8) gst8 += tax;
      else if(l.taxRate === 12) gst12 += tax;
      else if(l.taxRate === 16) gst16 += tax;
      else if(l.taxRate === 17) gst17 += tax;
    });
    aoa.push([
      rowNum++, b.supplierTin || '', b.supplierName, b.billNo, b.date,
      +totalNet.toFixed(2),
      gst6 ? +gst6.toFixed(2) : '',
      gst8 ? +gst8.toFixed(2) : '',
      gst12 ? +gst12.toFixed(2) : '',
      gst16 ? +gst16.toFixed(2) : '',
      gst17 ? +gst17.toFixed(2) : '',
      taxAct, revCap
    ]);
  });

  // Purchase Orders (received inventory)
  pos.forEach(po=>{
    const fxMul = po.ccy==='MVR' ? 1 : (CURRENCIES.find(c=>c.code===po.ccy)?.rate || 1);
    const sup = SUPPLIERS.find(s=>s.id===po.supplier);
    const store = STORES.find(s=>s.code===po.store);
    const taxAct = store?.taxActivityNo || '';
    let totalNet = 0;
    let gst6 = 0, gst8 = 0, gst12 = 0, gst16 = 0, gst17 = 0;
    po.items.forEach(it=>{
      if(it.received <= 0) return;
      const p = getProduct(it.pid);
      const r = p?.taxRate || 8;
      const net = it.received * it.unitCost * fxMul;
      const tax = net * r / 100;
      totalNet += net;
      if(r === 6) gst6 += tax;
      else if(r === 8) gst8 += tax;
      else if(r === 12) gst12 += tax;
      else if(r === 16) gst16 += tax;
      else if(r === 17) gst17 += tax;
    });
    if(totalNet > 0){
      aoa.push([
        rowNum++,
        sup?.tin || sup?.contactTin || '',
        sup?.name || po.supplier,
        po.poNo, po.date,
        +totalNet.toFixed(2),
        gst6 ? +gst6.toFixed(2) : '',
        gst8 ? +gst8.toFixed(2) : '',
        gst12 ? +gst12.toFixed(2) : '',
        gst16 ? +gst16.toFixed(2) : '',
        gst17 ? +gst17.toFixed(2) : '',
        taxAct, 'Revenue'
      ]);
    }
  });

  // If no data rows, add an empty placeholder
  if(rowNum === 1){
    aoa.push(['','','','','','','','','','','','','']);
  }

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [
    {wch:5}, {wch:18}, {wch:30}, {wch:22}, {wch:14},
    {wch:24}, {wch:16}, {wch:16}, {wch:16},
    {wch:16}, {wch:16}, {wch:22}, {wch:18}
  ];
  XLSX.utils.book_append_sheet(wb, ws, 'Input Tax Statement');

  XLSX.writeFile(wb, `MIRA-Input-${f.period}.xlsx`);
  toast('MIRA Input Tax Statement exported');
}

    ['GST SETTLEMENT REPORT — ' + COMPANY.name],
    [''],
    ['Taxpayer Name', COMPANY.name],
    ['TIN', TAX_CONFIG.tinNumber],
    ['Tax Period', `${from} to ${to}`],
    ['Filing Form', 'GST-105'],
    ['Generated', nowFull()],
    [''],
    ['PART A: OUTPUT TAX (GST on Sales)', '', ''],
    ['Tax Rate', 'Taxable Supplies (MVR)', 'Output Tax (MVR)'],
  ];
  Object.entries(outputByRate).sort((a,b)=>parseFloat(a[0])-parseFloat(b[0])).forEach(([r,d])=>{
    summary.push([`${r}%`, +d.taxable.toFixed(2), +d.tax.toFixed(2)]);
  });
  summary.push(['TOTAL OUTPUT', +totalOutTaxable.toFixed(2), +totalOut.toFixed(2)]);
  summary.push(['']);
  summary.push(['PART B: INPUT TAX (GST on Purchases — Claimable)', '', '']);
  summary.push(['Tax Rate', 'Net Purchases (MVR)', 'Input Tax (MVR)']);
  Object.entries(inputByRate).sort((a,b)=>parseFloat(a[0])-parseFloat(b[0])).forEach(([r,d])=>{
    summary.push([`${r}%`, +d.taxable.toFixed(2), +d.tax.toFixed(2)]);
  });
  summary.push(['TOTAL INPUT', +totalInTaxable.toFixed(2), +totalIn.toFixed(2)]);
  summary.push(['']);
  summary.push(['PART C: SETTLEMENT', '', '']);
  summary.push(['(A) Total Output Tax', '', +totalOut.toFixed(2)]);
  summary.push(['(B) Total Input Tax', '', +totalIn.toFixed(2)]);
  summary.push(['(C) NET = (A) − (B)', '', +net.toFixed(2)]);
  summary.push(['']);
  summary.push([net >= 0 ? 'NET PAYABLE TO MIRA' : 'NET REFUND / CREDIT FROM MIRA', '', +Math.abs(net).toFixed(2)]);

  const ws1 = XLSX.utils.aoa_to_sheet(summary);
  ws1['!cols'] = [{wch:50},{wch:25},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Settlement Summary');

  // Sheet 2: Output Tax Detail (per invoice)
  const outDetail = sales.map(s=>{
    const c = getCustomer(s.customer);
    const fxMul = s.ccy==='MVR'?1:s.fxRate;
    return {
      'Date': s.date, 'Invoice #': s.invoiceNo,
      'Customer Name': c.name, 'Customer TIN': c.tin || '',
      'Net (MVR)': +(s.subtotal*fxMul).toFixed(2),
      'Output Tax (MVR)': +(s.tax*fxMul).toFixed(2),
      'Total (MVR)': +s.totalInBase.toFixed(2)
    };
  });
  refunds.forEach(s=>{
    const c = getCustomer(s.customer);
    const fxMul = s.ccy==='MVR'?1:s.fxRate;
    outDetail.push({
      'Date': s.date, 'Invoice #': s.invoiceNo + ' (REFUND)',
      'Customer Name': c.name, 'Customer TIN': c.tin || '',
      'Net (MVR)': +(s.subtotal*fxMul).toFixed(2),
      'Output Tax (MVR)': +(s.tax*fxMul).toFixed(2),
      'Total (MVR)': +s.totalInBase.toFixed(2)
    });
  });
  if(outDetail.length>0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(outDetail), 'Output Tax Detail');

  // Sheet 3: Input Tax Detail (bills + POs)
  const inDetail = [];
  bills.forEach(b=>{
    const fxMul = b.ccy==='MVR'?1:b.fxRate;
    b.lines.filter(l=>l.taxClaimable).forEach(l=>{
      inDetail.push({
        'Date': b.date, 'Source': 'Bill', 'Document #': b.billNo,
        'Supplier Name': b.supplierName, 'Supplier TIN': b.supplierTin||'',
        'Description': l.description,
        'Net (MVR)': +(l.amount*fxMul).toFixed(2),
        'GST Rate': `${l.taxRate}%`,
        'Input Tax (MVR)': +(l.amount*l.taxRate/100*fxMul).toFixed(2)
      });
    });
  });
  pos.forEach(po=>{
    const fxMul = po.ccy==='MVR'?1:(CURRENCIES.find(c=>c.code===po.ccy)?.rate||1);
    const sup = SUPPLIERS.find(s=>s.id===po.supplier);
    po.items.forEach(it=>{
      if(it.received<=0) return;
      const p = getProduct(it.pid);
      const r = p?.taxRate||8;
      const net = it.received * it.unitCost * fxMul;
      inDetail.push({
        'Date': po.date, 'Source': 'PO', 'Document #': po.poNo,
        'Supplier Name': sup?.name||po.supplier, 'Supplier TIN': sup?.tin||'',
        'Description': p?.name||it.pid,
        'Net (MVR)': +net.toFixed(2),
        'GST Rate': `${r}%`,
        'Input Tax (MVR)': +(net*r/100).toFixed(2)
      });
    });
  });
  if(inDetail.length>0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(inDetail), 'Input Tax Detail');

  XLSX.writeFile(wb, `GST-Settlement-${f.period}.xlsx`);
  toast('GST Settlement exported');
}

function openNotifs(){
  // Build notifs from current state
  const notifs = [];
  // Low stock
  PRODUCTS.filter(p=>{const t=getTotalStock(p.id);return t<=p.lowStock}).slice(0,5).forEach(p=>{
    const t = getTotalStock(p.id);
    notifs.push({
      icon: t===0?'🚫':'⚠️',
      title: t===0?'Out of stock':'Low stock alert',
      message: `${p.name} (${p.sku}) — ${t} ${p.unit} remaining`,
      type: t===0?'error':'warn',
      action: () => { closeModal(); nav('stock'); }
    });
  });
  // Pending POs
  PURCHASE_ORDERS.filter(p=>p.status==='pending'||p.status==='partial').slice(0,3).forEach(po=>{
    notifs.push({
      icon: '📥', title: 'Pending PO',
      message: `${po.poNo} — Expected ${po.expectedDate}`,
      type: 'info', action: () => { closeModal(); nav('purchase-orders'); }
    });
  });
  // Parked sales
  if(PARKED_SALES.length>0){
    notifs.push({ icon:'⏸️', title:'Parked sales waiting', message:`${PARKED_SALES.length} sales on hold`, type:'info', action:()=>{closeModal();nav('parked');} });
  }

  const body = notifs.length===0 ? '<div style="padding:30px;text-align:center;color:var(--t3)">No notifications</div>' :
    notifs.map(n=>`
      <div class="list-row" style="cursor:pointer;border-left:3px solid ${n.type==='error'?'var(--red)':n.type==='warn'?'#d97706':'var(--blue)'}" onclick="(${n.action.toString()})()">
        <div style="font-size:24px">${n.icon}</div>
        <div class="lr-info">
          <div class="lr-name">${n.title}</div>
          <div class="lr-meta">${n.message}</div>
        </div>
        <div style="color:var(--t3)">→</div>
      </div>
    `).join('');
  openModal('🔔 Notifications', body);
}
