<!DOCTYPE html>
<html lang="en">
<head>
<script src="/erp-bridge.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetailFlow POS — Point of Sale & Inventory</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.0/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   RETAILFLOW POS v1.0 — STAKEHOLDER PROTOTYPE
   Designed to integrate with PayFlow Pro & PeopleFlow HR
   ═══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--surface:#fff;--s2:#f0f2f6;--s3:#e8ebf0;
  --border:#dde1e8;--border2:#c8cdd8;
  --text:#1c2030;--t2:#5c6478;--t3:#9ba3b5;
  --blue:#1849a9;--blue2:#eef2fc;--blue3:#0d2d6e;
  --green:#166534;--green2:#f0fdf4;--green3:#dcfce7;
  --amber:#92400e;--amber2:#fffbeb;
  --red:#991b1b;--red2:#fef2f2;--red3:#fee2e2;
  --teal:#115e59;--teal2:#f0fdfa;
  --orange:#c2410c;--orange2:#fff7ed;
  --purple:#6b21a8;--purple2:#faf5ff;
  --r:8px;--r2:12px;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}

/* ── LOGIN SCREEN ── */
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,var(--blue3) 0%,#1849a9 60%,#1e6fa0 100%);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;overflow-y:auto}
.login-box{background:#fff;border-radius:16px;padding:36px;width:440px;max-width:100%;box-shadow:0 30px 80px rgba(0,0,0,.3);margin:auto}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo .logo-mark{width:56px;height:56px;background:var(--blue3);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;margin-bottom:12px;letter-spacing:.02em}
.login-logo h1{font-size:22px;font-weight:800;color:var(--blue3)}
.login-logo p{font-size:13px;color:var(--t2);margin-top:3px}
.login-field{margin-bottom:14px}
.login-label{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.login-input{width:100%;padding:11px 14px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:13px;color:var(--text);outline:none;transition:border-color .15s}
.login-input:focus{border-color:var(--blue)}
.login-btn{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:background .15s}
.login-btn:hover{background:var(--blue3)}
.login-demo{margin-top:18px;padding:12px;background:var(--s2);border-radius:var(--r);font-size:12px;max-height:280px;overflow-y:auto}
.login-demo-title{font-weight:700;color:var(--text);margin-bottom:8px;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.demo-user{display:flex;align-items:center;gap:8px;cursor:pointer;border-radius:4px;padding:5px 8px;transition:background .1s}
.demo-user:hover{background:var(--border)}
.demo-user .du-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.demo-user .du-info{flex:1}
.demo-user .du-name{font-weight:600;font-size:12px}
.demo-user .du-role{font-size:10px;color:var(--t2)}
.login-error{background:var(--red2);color:var(--red);border-radius:var(--r);padding:10px 14px;font-size:12px;margin-bottom:12px;display:none}

/* ── TOPBAR ── */
.topbar{background:var(--blue3);display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:50px;position:sticky;top:0;z-index:60;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.logo{display:flex;align-items:center;gap:10px}
.logo-box{width:30px;height:30px;border-radius:7px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--blue3);overflow:hidden;flex-shrink:0}
.logo-text{color:#fff;font-size:15px;font-weight:700}
.logo-sub{color:rgba(255,255,255,.4);font-size:10px;margin-left:6px}
.topbar-right{display:flex;align-items:center;gap:10px}
.urg-bell{position:relative;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:6px 10px;cursor:pointer;color:#fff;font-size:15px}
.urg-count{position:absolute;top:-5px;right:-5px;width:17px;height:17px;background:#ef4444;border-radius:50%;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;color:#fff;border:2px solid var(--blue3)}
.pkg-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;color:#fff}
.user-pill{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 12px 4px 4px;cursor:pointer}
.user-av{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}
.user-nm{color:#fff;font-size:12px;font-weight:500}
.logout-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:5px 10px;color:#fff;font-size:11px;cursor:pointer}

/* ── STORE/REGISTER STATUS BAR ── */
.reg-bar{background:linear-gradient(135deg,#0d2d6e,#1849a9);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.reg-status{display:flex;align-items:center;gap:10px;flex:1;min-width:240px}
.reg-status-dot{width:12px;height:12px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 4px rgba(34,197,94,.25);flex-shrink:0}
.reg-status-dot.closed{background:#94a3b8;box-shadow:0 0 0 4px rgba(148,163,184,.25)}
.reg-status-text .rs-lbl{font-size:10px;opacity:.7;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.reg-status-text .rs-val{font-size:14px;font-weight:700}
.reg-time{font-family:'Courier New',monospace;font-size:18px;font-weight:800;letter-spacing:.04em;background:rgba(255,255,255,.1);padding:6px 14px;border-radius:var(--r)}
.reg-store{font-size:11px;opacity:.85;display:flex;align-items:center;gap:5px}
.reg-btn{padding:9px 20px;border-radius:var(--r);border:none;font-weight:800;font-size:12px;cursor:pointer;transition:all .15s}
.reg-btn.open{background:#22c55e;color:#fff}
.reg-btn.open:hover{background:#16a34a}
.reg-btn.close{background:#ef4444;color:#fff}
.reg-btn.close:hover{background:#dc2626}

/* ── LAYOUT ── */
.app-body{display:grid;grid-template-columns:215px 1fr;min-height:calc(100vh - 50px)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:10px 0;overflow-y:auto}
.nav-sec{font-size:9px;font-weight:800;color:var(--t3);padding:12px 15px 3px;text-transform:uppercase;letter-spacing:.09em}
.ni{display:flex;align-items:center;gap:9px;padding:8px 15px;font-size:12px;color:var(--t2);cursor:pointer;border-left:3px solid transparent;transition:all .12s;user-select:none}
.ni:hover{background:var(--s2);color:var(--text)}
.ni.active{background:var(--blue2);color:var(--blue);border-left-color:var(--blue);font-weight:600}
.ni .ic{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nbadge{margin-left:auto;border-radius:20px;font-size:9px;font-weight:800;padding:2px 7px;min-width:18px;text-align:center;color:#fff;background:var(--red)}
.nbadge.a{background:#d97706}.nbadge.g{background:var(--green)}.nbadge.b{background:var(--blue)}

/* ── MAIN ── */
.main{padding:22px;overflow-y:auto;background:var(--bg)}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.pt{font-size:19px;font-weight:700;color:var(--text)}
.ps{font-size:12px;color:var(--t2);margin-top:3px}
.brow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:12px;cursor:pointer;font-weight:500;transition:all .12s;white-space:nowrap;line-height:1.4;font-family:inherit}
.btn:hover{background:var(--s2)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-p:hover{background:var(--blue3)}
.btn-g{background:var(--green);color:#fff;border-color:var(--green)}.btn-g:hover{background:#14532d}
.btn-r{background:var(--red);color:#fff;border-color:var(--red)}.btn-r:hover{background:#7f1d1d}
.btn-o{background:var(--orange);color:#fff;border-color:var(--orange)}.btn-o:hover{background:#9a3412}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:6px}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:16px}
.ch{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ct{font-size:13px;font-weight:700;color:var(--text)}
.cs{font-size:11px;color:var(--t2);margin-top:2px}
.cb{padding:18px}
.cb.flush{padding:0}

/* ── STATS ── */
.sgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.sgrid.g4{grid-template-columns:repeat(4,1fr)}
.sgrid.g3{grid-template-columns:repeat(3,1fr)}
.sgrid.g6{grid-template-columns:repeat(6,1fr)}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.bl::before{background:var(--blue)}.sc.gr::before{background:var(--green)}
.sc.am::before{background:#d97706}.sc.te::before{background:var(--teal)}
.sc.or::before{background:var(--orange)}.sc.pu::before{background:var(--purple)}
.sc.rd::before{background:var(--red)}
.sl{font-size:10px;font-weight:600;color:var(--t2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.sv{font-size:24px;font-weight:800;color:var(--text);line-height:1}
.ss{font-size:10px;color:var(--t3);margin-top:5px}
.si{position:absolute;right:12px;top:14px;font-size:22px;opacity:.12}

/* ── ALERTS ── */
.al{border-radius:var(--r);padding:11px 15px;font-size:12px;margin-bottom:12px;border-left:3px solid;line-height:1.6}
.al-i{background:var(--blue2);color:var(--blue);border-color:var(--blue)}
.al-s{background:var(--green2);color:var(--green);border-color:var(--green)}
.al-w{background:var(--amber2);color:var(--amber);border-color:#d97706}
.al-r{background:var(--red2);color:var(--red);border-color:var(--red)}
.al-o{background:var(--orange2);color:var(--orange);border-color:var(--orange)}

/* ── BADGES ── */
.bdg{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.bd{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.b-draft{background:var(--s3);color:var(--t2)}
.b-paid{background:var(--green3);color:var(--green)}
.b-pend{background:#fef3c7;color:#92400e}
.b-void{background:var(--red3);color:var(--red)}
.b-refund{background:#fef3c7;color:#92400e}
.b-active{background:var(--green3);color:var(--green)}
.b-inactive{background:var(--s3);color:var(--t2)}
.b-low{background:var(--amber2);color:var(--amber);border:1px solid #fcd34d}
.b-out{background:var(--red3);color:var(--red);border:1px solid #fca5a5}
.b-instock{background:var(--green3);color:var(--green)}
.etag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:4px;letter-spacing:.04em}
.e-MAIN{background:#dbeafe;color:#1e40af}.e-HULH{background:#ccfbf1;color:#115e59}
.e-ADDU{background:#fef3c7;color:#92400e}.e-MAA{background:#dcfce7;color:#166534}

/* ── TABLES ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;font-weight:700;color:var(--t3);padding:9px 13px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;background:var(--s2)}
td{padding:10px 13px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--s2)}
.mono{font-family:'Courier New',monospace;font-size:11px;font-weight:700;letter-spacing:.02em;color:var(--blue3)}
.amt{font-family:'Courier New',monospace;font-weight:700;text-align:right}

/* ── FORMS ── */
.fg{margin-bottom:13px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px}
.req{color:var(--red);margin-left:2px}
.fi,.fs,.fta{width:100%;font-size:12px;padding:8px 11px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text);outline:none;transition:border-color .12s;font-family:inherit}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,73,169,.08)}
.fta{resize:vertical;min-height:64px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.fsec{font-size:10px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;padding-bottom:9px;border-bottom:1px solid var(--border);margin:16px 0 13px}

/* ── ENTITY/STORE BAR ── */
.ebar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.ebt{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--t2);cursor:pointer;transition:all .12s}
.ebt:hover{border-color:var(--blue);color:var(--blue)}
.ebt.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto}
.tab{padding:10px 18px;font-size:12px;font-weight:500;color:var(--t2);border-bottom:2px solid transparent;cursor:pointer;margin-bottom:-1px;white-space:nowrap;transition:all .12s;background:none;border-left:none;border-right:none;border-top:none;font-family:inherit}
.tab:hover{color:var(--text)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}

/* ── MODAL ── */
.mbd{position:fixed;inset:0;background:rgba(5,10,25,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border-radius:var(--r2);width:720px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.3)}
.modal.lg{width:980px}
.modal.xl{width:1200px}
.modal.sm{width:480px}
.mh{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:5}
.mt{font-size:15px;font-weight:800;color:var(--text)}
.mc{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:none;cursor:pointer;font-size:16px;color:var(--t2);display:flex;align-items:center;justify-content:center}
.mc:hover{background:var(--s2)}
.mb{padding:20px 22px}
.mf{padding:13px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surface)}

/* ── KPI ROWS ── */
.kpi-row{display:flex;align-items:center;gap:8px;font-size:11px}
.kpi-up{color:var(--green);font-weight:700}
.kpi-down{color:var(--red);font-weight:700}

/* ═══════════════════════════════════════════
   POS-SPECIFIC STYLES (the cashier register UI)
   ═══════════════════════════════════════════ */
.pos-layout{display:grid;grid-template-columns:1fr 420px;gap:14px;height:calc(100vh - 50px - 56px - 44px);min-height:520px}
.pos-products{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);display:flex;flex-direction:column;overflow:hidden}
.pos-search-bar{padding:12px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pos-search{flex:1;min-width:200px;padding:9px 12px;border:1.5px solid var(--blue);border-radius:var(--r);font-size:13px;outline:none;font-family:inherit}
.pos-search:focus{box-shadow:0 0 0 3px rgba(24,73,169,.12)}
.cat-pills{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;gap:6px;overflow-x:auto;background:var(--s2)}
.cat-pill{padding:6px 13px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;white-space:nowrap;transition:all .12s}
.cat-pill:hover{border-color:var(--blue);color:var(--blue)}
.cat-pill.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.prod-grid{flex:1;overflow-y:auto;padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;align-content:start}
.prod-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;gap:6px;min-height:120px;position:relative}
.prod-card:hover{border-color:var(--blue);transform:translateY(-1px);box-shadow:0 4px 12px rgba(24,73,169,.1)}
.prod-card.oos{opacity:.5;cursor:not-allowed}
.prod-card.oos:hover{transform:none;border-color:var(--border)}
.prod-img{width:100%;aspect-ratio:1;background:var(--s2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--t3)}
.prod-name{font-size:11px;font-weight:600;color:var(--text);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prod-price{font-size:13px;font-weight:800;color:var(--blue3);font-family:'Courier New',monospace}
.prod-stock-pill{position:absolute;top:6px;right:6px;font-size:8px;font-weight:800;padding:2px 6px;border-radius:10px;color:#fff}
.prod-stock-pill.low{background:#d97706}
.prod-stock-pill.out{background:var(--red)}

/* CART (Right side) */
.pos-cart{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);display:flex;flex-direction:column;overflow:hidden}
.cart-header{padding:12px 14px;background:var(--blue3);color:#fff;display:flex;justify-content:space-between;align-items:center}
.cart-header .ch-title{font-size:13px;font-weight:700}
.cart-header .ch-num{font-family:'Courier New',monospace;font-size:11px;opacity:.85}
.cart-customer{padding:9px 14px;background:var(--s2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
.cart-cust-info{font-size:11px}
.cart-cust-info .ci-lbl{color:var(--t3);font-size:9px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.cart-cust-info .ci-val{color:var(--text);font-weight:600}
.cart-items{flex:1;overflow-y:auto;padding:6px}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--t3);text-align:center;padding:20px}
.cart-empty .ce-icon{font-size:42px;opacity:.4;margin-bottom:10px}
.cart-empty .ce-text{font-size:13px;font-weight:600;color:var(--t2)}
.cart-empty .ce-hint{font-size:11px;margin-top:4px}
.cart-row{padding:9px 10px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start}
.cart-row:last-child{border-bottom:none}
.cart-row .cr-info{flex:1;min-width:0}
.cart-row .cr-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.3}
.cart-row .cr-meta{font-size:10px;color:var(--t2);margin-top:2px;font-family:'Courier New',monospace}
.cart-row .cr-amt{text-align:right;font-family:'Courier New',monospace;font-size:12px;font-weight:700;min-width:70px}

.tot-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}

.cart-actions .act-pay{grid-column:span 2;background:var(--green);color:#fff;border:none;padding:13px;border-radius:var(--r);font-size:14px;font-weight:800;cursor:pointer;transition:all .12s}
.cart-actions .act-pay:hover{background:#14532d}

}

      const lineNet = p.price * it.qty;
      const lineTax = lineNet * taxRate / 100;

        pid:p.id, sku:p.sku, name:p.name, qty:it.qty,
        unitPrice:p.price, taxRate, lineNet, lineTax, lineTotal:lineNet+lineTax,
        cost:p.cost, lineCost:p.cost*it.qty

      regId: s.regId,
      cashier: s.cashier,
      customer: s.customer,

      time: time,
      items: lineItems,
      subtotal, tax, discount, total,
      totalInBase,
      ccy: s.ccy,
      fxRate: ccyRate(s.ccy),
      paymentMethod: s.paymentMethod,
      tendered: s.tendered || total,

      voidedAt: null, voidedBy: null, voidReason: '',
      refundOf: null,
      notes: '',
      discountId: s.discountId || null
    });
  });
  // sort newest first
  SALES.sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
}

function hasPermission(pageId){
  if(!CU) return false;
  if(CU.role === 'admin') return true;
  // Per-user override (highest priority)
  if(CU.permissions && Array.isArray(CU.permissions) && CU.permissions.includes(pageId)) return true;
  if(CU.deniedPermissions && Array.isArray(CU.deniedPermissions) && CU.deniedPermissions.includes(pageId)) return false;
  return PERMISSIONS[CU.role]?.has(pageId) || false;
}
function requirePermission(pageId){
  if(!hasPermission(pageId)){
    return `<div class="ph"><div><div class="pt">🔒 Access Denied</div><div class="ps">You don't have permission to view this page</div></div></div>
      <div class="al al-w">
        <strong>Permission required.</strong> Your role (<strong>${CU?.role||'unknown'}</strong>) is not authorized to access "${ALL_FEATURES.find(f=>f.id===pageId)?.lb||pageId}". Contact your administrator if you need access.
      </div>
      <button class="btn btn-p" onclick="nav('dashboard')">← Back to Dashboard</button>`;
  }
  return null;
}

function fillLogin(email, pin){
  el('loginEmail').value = email;
  el('loginPass').value = pin;
}
function doLogin(){
  const email = el('loginEmail').value.trim();
  const pin = el('loginPass').value.trim();
  const u = USERS.find(x=>x.email.toLowerCase()===email.toLowerCase() && x.pin===pin && x.active);
  if(!u){
    el('loginError').textContent = 'Invalid credentials. Use a demo account from below.';
    el('loginError').style.display = 'block';
    return;
  }
  el('loginError').style.display = 'none';
  CU = u;
  el('loginScreen').style.display = 'none';
  el('appRoot').style.display = 'block';
  el('uav').textContent = u.initials;
  el('uav').style.background = u.color;
  el('unm').textContent = u.name.split(' ')[0];
  PAGE = 'dashboard';
  if(u.role==='cashier' && u.store) CURRENT_STORE = u.store;
  if(u.role==='manager' && u.store) CURRENT_STORE = u.store;
  logAudit('login', '', `User logged in from ${u.role} role`);
  renderSidebar();
  renderRegBar();
  renderMain();
}
function doLogout(){
  if(CU) logAudit('logout', '', 'User logged out');
  CU = null;

}

// ═══════════════════════════════════════════════════════════════
function renderSidebar(){
  if(!CU) return;
  const navList = NAV[CU.role] || NAV.cashier;
  const lowStockCnt = PRODUCTS.filter(p=>{
    const total = getTotalStock(p.id);
    return total <= p.lowStock && total > 0;
  }).length;
  const outOfStockCnt = PRODUCTS.filter(p=>getTotalStock(p.id)===0).length;
  const parkedCnt = PARKED_SALES.length;
  const cnt = {
    lowStock: lowStockCnt + outOfStockCnt,
    parked: parkedCnt
  };
  el('urgCount').textContent = lowStockCnt + outOfStockCnt + parkedCnt;

  // Filter by permissions, then collapse empty sections
  const filtered = [];
  let pendingSection = null;
  navList.forEach(item=>{
    if(item.s){ pendingSection = item; return; }
    if(!hasPermission(item.id)) return; // RBAC: skip if no permission
    if(pendingSection){ filtered.push(pendingSection); pendingSection = null; }
    filtered.push(item);
  });

  el('sidebar').innerHTML = filtered.map(item=>{
    if(item.s) return `<div class="nav-sec">${item.s}</div>`;
    const c = item.bg ? cnt[item.bg]||0 : 0;
    const badgeClass = item.bg==='lowStock'?'a':item.bg==='parked'?'b':'';
    return `<div class="ni${PAGE===item.id?' active':''}" onclick="nav('${item.id}')">
      <span class="ic">${item.ic}</span>${item.lb}${c?`<span class="nbadge ${badgeClass}">${c}</span>`:''}
    </div>`;
  }).join('');
}
function nav(p){
  // RBAC: block direct navigation to unauthorized pages (admin always passes)
  if(CU && CU.role !== 'admin' && !hasPermission(p)){
    toast('Access denied: insufficient permissions', 'error');
    return;
  }
  PAGE = p; TAB = 0;
  renderSidebar(); renderMain();
  window.scrollTo(0,0);
}

//  TOAST NOTIFICATIONS
// ═══════════════════════════════════════════════════════════════
function toast(msg, type='success'){
  const t = document.createElement('div');
  t.className = 'toast' + (type==='error'?' error':type==='warn'?' warn':'');
  t.textContent = (type==='error'?'❌ ':type==='warn'?'⚠️ ':'✓ ') + msg;
  el('toastContainer').appendChild(t);
  setTimeout(()=>t.style.opacity='0',2300);
  setTimeout(()=>t.remove(),2700);
}

function renderManagerDashboard(){
  const storeFilter = CURRENT_STORE==='ALL' ? null : CURRENT_STORE;
  const todaySales = SALES.filter(s=>s.date===todayISO && s.status==='completed' && (!storeFilter || s.store===storeFilter));
  const yestSales  = SALES.filter(s=>s.date===addDays(-1) && s.status==='completed' && (!storeFilter || s.store===storeFilter));
  const todayTotal = todaySales.reduce((a,b)=>a+b.totalInBase,0);
  const yestTotal  = yestSales.reduce((a,b)=>a+b.totalInBase,0);
  const change = yestTotal>0 ? ((todayTotal-yestTotal)/yestTotal*100).toFixed(1) : 0;

  const todayTxns = todaySales.length;
  const avgTicket = todayTxns>0 ? todayTotal/todayTxns : 0;
  const todayCost = todaySales.reduce((a,s)=>a+s.items.reduce((x,i)=>x+i.lineCost,0),0);
  const todayProfit = todayTotal - todayCost;
  const profitMargin = todayTotal>0 ? (todayProfit/todayTotal*100).toFixed(1) : 0;

  // Customer count
  const uniqueCust = new Set(todaySales.map(s=>s.customer).filter(c=>c!=='C001')).size;

  // 7-day chart
  const last7 = [];
  for(let i=6;i>=0;i--){
    const d = addDays(-i);
    const ds = SALES.filter(s=>s.date===d && s.status==='completed' && (!storeFilter || s.store===storeFilter));
    last7.push({ date:d, total:ds.reduce((a,b)=>a+b.totalInBase,0), count:ds.length });
  }
  const maxBar = Math.max(...last7.map(x=>x.total),1);

  // Top products today
  const prodTotals = {};
  todaySales.forEach(s=>s.items.forEach(it=>{
    if(!prodTotals[it.pid]) prodTotals[it.pid]={qty:0,total:0,name:it.name};
    prodTotals[it.pid].qty += it.qty;
    prodTotals[it.pid].total += it.lineTotal;
  }));
  const topProducts = Object.entries(prodTotals).sort((a,b)=>b[1].total-a[1].total).slice(0,5);

  // Top cashiers
  const cashierTotals = {};
  todaySales.forEach(s=>{
    if(!cashierTotals[s.cashier]) cashierTotals[s.cashier]={total:0,count:0};
    cashierTotals[s.cashier].total += s.totalInBase;
    cashierTotals[s.cashier].count++;
  });
  const topCashiers = Object.entries(cashierTotals).sort((a,b)=>b[1].total-a[1].total).slice(0,5);

  // Low stock alerts
  const lowStockProds = PRODUCTS.filter(p=>{
    const total = getTotalStock(p.id);
    return total <= p.lowStock;
  }).sort((a,b)=>getTotalStock(a.id)-getTotalStock(b.id)).slice(0,5);

  // Payment method breakdown
  const pmTotals = {};
  todaySales.forEach(s=>{
    if(!pmTotals[s.paymentMethod]) pmTotals[s.paymentMethod]=0;
    pmTotals[s.paymentMethod] += s.totalInBase;
  });

  // Open registers
  const openRegs = REGISTERS.filter(r=>r.status==='open' && (!storeFilter || r.store===storeFilter));

  return `
    <div class="ph">
      <div>
        <div class="pt">Welcome, ${CU.name.split(' ')[0]} 👋</div>
        <div class="ps">${CU.role.toUpperCase()} • ${storeFilter?getStoreName(storeFilter):'All Stores'} • ${todayISO}</div>
      </div>
      <div class="brow">
        <button class="btn" onclick="nav('reports')">📊 All Reports</button>
        <button class="btn btn-p" onclick="nav('pos')">🛒 New Sale</button>
      </div>
    </div>

    <div class="sgrid">
      <div class="sc bl">
        <div class="sl">Today's Sales</div>
        <div class="sv">${fmtMoney(todayTotal,'MVR')}</div>
        <div class="kpi-row">
          <span class="${change>=0?'kpi-up':'kpi-down'}">${change>=0?'▲':'▼'} ${Math.abs(change)}%</span>
          <span style="color:var(--t3)">vs yesterday</span>
        </div>
        <div class="si">💹</div>
      </div>
      <div class="sc gr">
        <div class="sl">Transactions</div>
        <div class="sv">${todayTxns}</div>
        <div class="ss">Avg. ticket: ${fmtMoney(avgTicket,'MVR')}</div>
        <div class="si">🧾</div>
      </div>
      <div class="sc te">
        <div class="sl">Gross Profit</div>
        <div class="sv">${fmtMoney(todayProfit,'MVR')}</div>
        <div class="ss">${profitMargin}% margin</div>
        <div class="si">💎</div>
      </div>
      <div class="sc am">
        <div class="sl">Customers</div>
        <div class="sv">${uniqueCust}</div>
        <div class="ss">${todayTxns - uniqueCust} walk-ins</div>
        <div class="si">👥</div>
      </div>
      <div class="sc or">
        <div class="sl">Stock Alerts</div>
        <div class="sv">${lowStockProds.length}</div>
        <div class="ss" style="color:var(--red);font-weight:700">${PRODUCTS.filter(p=>getTotalStock(p.id)===0).length} out of stock</div>
        <div class="si">⚠️</div>
      </div>
    </div>

    <div class="dash-row">
      <div class="card">
        <div class="ch">
          <div>
            <div class="ct">Sales — Last 7 Days</div>
            <div class="cs">Daily revenue trend (${storeFilter||'all stores'})</div>
          </div>
          <button class="btn btn-sm" onclick="nav('rep-sales')">View Report →</button>
        </div>
        <div class="cb">
          <div class="dash-bar-chart">
            ${last7.map(d=>{
              const h = d.total>0 ? Math.max(8, (d.total/maxBar*100)) : 4;
              const isToday = d.date===todayISO;
              return `<div class="dash-bar ${isToday?'high':''}">
                <div class="db-fill" style="height:${h}%">
                  ${d.total>0?`<span class="db-val">${(d.total/1000).toFixed(1)}k</span>`:''}
                </div>
                <div class="db-lbl">${d.date.slice(8)}/${d.date.slice(5,7)}</div>

            }).join('')}
          </div>
        </div>
      </div>

      <div class="card">
        <div class="ch"><div class="ct">Open Registers</div></div>
        <div class="cb flush">
          ${openRegs.length===0?'<div style="padding:30px;text-align:center;color:var(--t3)">No registers open</div>':
            openRegs.map(r=>{
              const u = getUser(r.assignedTo);

              const total = sales.reduce((a,b)=>a+b.totalInBase,0);
              return `<div class="list-row">
                <div class="av sm" style="background:${u?.color||'#94a3b8'}">${u?.initials||'?'}</div>

                  <div class="lr-name">${r.id} — ${r.name}</div>

              </div>`;

        </div>
      </div>
    </div>

    <div class="dash-row">
      <div class="card">

            topProducts.map(([pid,d],i)=>`

              </div>

        </div>
      </div>

      <div class="card">
        <div class="ch"><div class="ct">Top Cashiers</div></div>
        <div class="cb flush">
          ${topCashiers.length===0?'<div style="padding:30px;text-align:center;color:var(--t3)">No data</div>':
            topCashiers.map(([cid,d],i)=>{
              const u = getUser(cid);
              return `<div class="list-row">
                <div class="av sm" style="background:${u?.color||'#94a3b8'}">${u?.initials||'?'}</div>
                <div class="lr-info">
                  <div class="lr-name">${u?.name||cid}</div>

            }).join('')}

    <div class="dash-row" style="grid-template-columns:1fr 1fr">
      <div class="card">
        <div class="ch">
          <div><div class="ct">⚠️ Low Stock Alerts</div><div class="cs">Items needing restock</div></div>
          <button class="btn btn-sm" onclick="nav('stock')">View All →</button>
        </div>
        <div class="cb flush">
          ${lowStockProds.length===0?'<div style="padding:30px;text-align:center;color:var(--green)">✓ All stock levels healthy</div>':
            lowStockProds.map(p=>{
              const total = getTotalStock(p.id);
              const isOut = total===0;
              return `<div class="list-row" style="background:${isOut?'var(--red2)':'var(--amber2)'}">
                <div style="font-size:24px">${p.img}</div>

                  <span class="bdg ${isOut?'b-out':'b-low'}" style="font-size:9px">${isOut?'OUT':'LOW'}</span>

              </div>`;
            }).join('')}
        </div>
      </div>

      <div class="card">
        <div class="ch"><div class="ct">Payment Methods Today</div></div>
        <div class="cb">
          ${Object.entries(pmTotals).length===0?'<div style="padding:20px;text-align:center;color:var(--t3)">No data</div>':
            Object.entries(pmTotals).sort((a,b)=>b[1]-a[1]).map(([pm,total])=>{
              const m = PAYMENT_METHODS.find(x=>x.id===pm) || {name:pm, icon:'💰'};
              const pct = todayTotal>0 ? (total/todayTotal*100).toFixed(0) : 0;
              return `<div style="margin-bottom:10px">

                </div>
                <div class="pbar-bg"><div class="pbar-fill" style="width:${pct}%"></div></div>
              </div>`;
            }).join('')}
        </div>
      </div>
    </div>
  `;
}

    const candidate = REGISTERS.find(r=>r.status==='open' && r.store===CURRENT_STORE);
    if(candidate){ reg = candidate; CURRENT_REGISTER = candidate; }
    else {
      return `

        <div class="al al-w"><strong>No open register at ${getStoreName(CURRENT_STORE)}.</strong> Open a register or switch store.</div>
      `;
    }
  }
  CART_CCY = reg.ccy;
  const customer = getCustomer(CART_CUSTOMER);

  // Filtered products
  const storeStock = (pid)=>getStock(pid, reg.store);
  let prods = PRODUCTS.filter(p=>p.active);
  if(POS_CATEGORY!=='ALL') prods = prods.filter(p=>p.cat===POS_CATEGORY);
  if(POS_SEARCH){
    const q = POS_SEARCH.toLowerCase();
    prods = prods.filter(p=>p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q) || (p.barcode||'').includes(q));
  }

  // Cart totals
  const totals = computeCartTotals();

  return `

      <div>
        <div class="pt">🛒 Point of Sale</div>
        <div class="ps">${reg.id} — ${reg.name} • ${getStoreName(reg.store)} • Cashier: ${CU.name}</div>

    </div>

    <div class="pos-layout">
      <!-- LEFT: PRODUCTS -->
      <div class="pos-products">
        <div class="pos-search-bar">
          <input type="text" class="pos-search" id="posSearch" placeholder="🔍 Search by name / SKU / barcode... (Press Enter for barcode lookup)" value="${POS_SEARCH}" oninput="updatePOSSearch(this.value)" onkeypress="if(event.key==='Enter')handleBarcodeEntry(this.value)">
          <button class="btn" onclick="el('posSearch').focus()">⌨️ Manual</button>
        </div>
        <div class="cat-pills">
          <div class="cat-pill ${POS_CATEGORY==='ALL'?'on':''}" onclick="setPOSCategory('ALL')">All Items</div>
          ${CATEGORIES.filter(c=>c.active).map(c=>`
            <div class="cat-pill ${POS_CATEGORY===c.id?'on':''}" onclick="setPOSCategory('${c.id}')">${c.icon} ${c.name}</div>
          `).join('')}
        </div>
        <div class="prod-grid">
          ${prods.length===0?'<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--t3)">No products found</div>':
            prods.map(p=>{
              const stock = storeStock(p.id);
              const isOut = stock<=0;
              const isLow = stock<=p.lowStock && stock>0;
              const displayPrice = CART_CCY==='MVR' ? p.price : fxConvert(p.price, 'MVR', CART_CCY);
              return `
                <div class="prod-card ${isOut?'oos':''}" ${isOut?'':`onclick="addToCart('${p.id}')"`}>
                  ${isLow?`<div class="prod-stock-pill low">${stock}</div>`:''}
                  ${isOut?`<div class="prod-stock-pill out">OUT</div>`:''}
                  <div class="prod-img">${p.image1?`<img src="${p.image1}" style="width:100%;height:60px;object-fit:cover;border-radius:6px">`:(p.img||'📦')}</div>
                  <div class="prod-name">${p.name}</div>
                  <div class="prod-price">${ccySym(CART_CCY)} ${displayPrice.toFixed(2)}</div>
                </div>
              `;
            }).join('')}
        </div>
      </div>

      <!-- RIGHT: CART -->
      <div class="pos-cart">
        <div class="cart-header">
          <div class="ch-title">🧾 Current Sale</div>
          <div class="ch-num">${CART.length} items</div>
        </div>
        <div class="cart-customer">

            <div class="ci-val">${customer.name}${customer.tier!=='guest'?` <span class="bdg b-active" style="font-size:9px;margin-left:4px;text-transform:uppercase">${customer.tier}</span>`:''}</div>
          </div>
          <button class="btn btn-sm" onclick="openSelectCustomerModal()">${CART_CUSTOMER==='C001'?'+ Add':'Change'}</button>
        </div>
        <div class="cart-items">
          ${CART.length===0?`
            <div class="cart-empty">
              <div class="ce-icon">🛒</div>
              <div class="ce-text">Cart is empty</div>
              <div class="ce-hint">Click products to add them</div>

          `:CART.map((item,idx)=>{
            const p = getProduct(item.pid);
            const lineTotal = item.unitPrice * item.qty;
            return `
              <div class="cart-row">

        <div class="cart-totals">
          <div class="tot-row"><span class="tr-lbl">Subtotal</span><span class="tr-val">${ccySym(CART_CCY)} ${totals.subtotal.toFixed(2)}</span></div>
          ${totals.discount>0?`<div class="tot-row" style="color:var(--green)"><span class="tr-lbl">Discount${CART_DISCOUNT?` (${DISCOUNTS.find(d=>d.id===CART_DISCOUNT)?.code})`:''}</span><span class="tr-val">− ${ccySym(CART_CCY)} ${totals.discount.toFixed(2)}</span></div>`:''}
          <div class="tot-row"><span class="tr-lbl">Tax (${TAX_CONFIG.taxName})</span><span class="tr-val">${ccySym(CART_CCY)} ${totals.tax.toFixed(2)}</span></div>
          <div class="tot-row grand"><span class="tr-lbl">TOTAL</span><span class="tr-val">${ccySym(CART_CCY)} ${totals.total.toFixed(2)}</span></div>

  `;

function setPOSCategory(c){ POS_CATEGORY=c; renderMain(); setTimeout(()=>el('posSearch')?.focus(),50); }
function updatePOSSearch(v){ POS_SEARCH=v; const grid=document.querySelector('.prod-grid');if(grid){renderMain();el('posSearch').focus();el('posSearch').setSelectionRange(v.length,v.length);} }

function handleBarcodeEntry(value){
  const v = value.trim();
  if(!v) return;
  // First try barcode match
  let p = PRODUCTS.find(x=>x.barcode===v);
  if(!p) p = PRODUCTS.find(x=>x.sku===v);
  if(p){ addToCart(p.id); POS_SEARCH=''; renderMain(); }
  else toast('Product not found: '+v, 'error');
}

function changeCartCcy(code){
  if(CART.length>0){
    if(!confirm('Changing currency will reset cart prices. Continue?')) {
      renderMain(); return;
    }
    CART = CART.map(it=>{
      const p = getProduct(it.pid);
      return {...it, unitPrice: code==='MVR' ? p.price : fxConvert(p.price, 'MVR', code)};
    });
  }
  CART_CCY = code;
  renderMain();
}

function addToCart(pid){
  const p = getProduct(pid);
  if(!p) return;
  const reg = currentRegister() || REGISTERS.find(r=>r.status==='open' && r.store===CURRENT_STORE);
  if(!reg){ toast('No open register', 'error'); return; }
  const stock = getStock(pid, reg.store);
  // Check stock
  const existing = CART.find(it=>it.pid===pid);
  if(existing){
    if(existing.qty + 1 > stock){
      toast(`Only ${stock} in stock!`, 'warn'); return;
    }
    existing.qty++;
  } else {
    if(stock<=0){ toast('Out of stock', 'error'); return; }
    const unitPrice = CART_CCY==='MVR' ? p.price : fxConvert(p.price, 'MVR', CART_CCY);
    CART.push({
      pid: p.id, sku: p.sku, name: p.name,
      qty: 1, unitPrice: unitPrice, taxRate: p.taxRate, cost: p.cost
    });
  }
  renderMain();
}

function updateCartQty(idx, delta){
  const item = CART[idx];
  const newQty = item.qty + delta;
  const stock = getStock(item.pid, (currentRegister()||REGISTERS.find(r=>r.status==='open' && r.store===CURRENT_STORE)).store);
  if(newQty <= 0){
    CART.splice(idx, 1);
  } else if(newQty > stock){
    toast(`Only ${stock} in stock!`, 'warn'); return;
  } else {
    item.qty = newQty;
  }
  renderMain();
}
function setCartQty(idx, val){
  const q = parseInt(val) || 1;
  const stock = getStock(CART[idx].pid, (currentRegister()||REGISTERS.find(r=>r.status==='open' && r.store===CURRENT_STORE)).store);
  if(q > stock){ toast(`Only ${stock} in stock!`, 'warn'); renderMain(); return; }
  CART[idx].qty = Math.max(1, q);
  renderMain();
}
function removeFromCart(idx){ CART.splice(idx,1); renderMain(); }
function clearCart(){
  if(CART.length===0) return;
  if(!confirm('Clear entire cart?')) return;
  CART = []; CART_DISCOUNT = null; CART_CUSTOMER='C001';
  renderMain();
}

function computeCartTotals(){
  const subtotal = CART.reduce((a,it)=>a + it.unitPrice*it.qty, 0);
  let discount = 0;
  if(CART_DISCOUNT){
    const d = DISCOUNTS.find(x=>x.id===CART_DISCOUNT);
    if(d){
      if(d.type==='percent') discount = subtotal * d.value/100;
      else discount = CART_CCY==='MVR' ? d.value : fxConvert(d.value,'MVR',CART_CCY);
      if(d.maxDiscount > 0){
        const maxD = CART_CCY==='MVR' ? d.maxDiscount : fxConvert(d.maxDiscount,'MVR',CART_CCY);
        if(discount > maxD) discount = maxD;
      }
    }
  }
  const taxableBase = subtotal - discount;
  // Calculate weighted tax based on items
  const totalTaxable = CART.reduce((a,it)=>a + it.unitPrice*it.qty, 0);
  let tax = 0;
  if(totalTaxable > 0){
    CART.forEach(it=>{
      const itemNet = it.unitPrice * it.qty;
      const itemDiscount = totalTaxable>0 ? (itemNet/totalTaxable) * discount : 0;
      const taxable = itemNet - itemDiscount;
      tax += taxable * it.taxRate / 100;
    });
  }
  const total = subtotal - discount + tax;
  return { subtotal, discount, tax, total };
}

function openDiscountModal(){
  const customer = getCustomer(CART_CUSTOMER);
  const totals = computeCartTotals();
  const subtotal = totals.subtotal;
  const ccyForCheck = 'MVR'; // discount minimums are in MVR
  const subtotalInBase = CART_CCY==='MVR' ? subtotal : fxConvert(subtotal, CART_CCY, 'MVR');
  const eligible = DISCOUNTS.filter(d=>{
    if(!d.active) return false;
    if(d.minAmount && subtotalInBase < d.minAmount) return false;
    if(d.scope==='tier' && d.tier!==customer.tier) return false;
    if(d.scope==='category' && !CART.some(it=>getProduct(it.pid)?.cat===d.categoryId)) return false;
    if(d.validFrom && todayISO < d.validFrom) return false;
    if(d.validTo && todayISO > d.validTo) return false;
    return true;
  });
  const body = `
    <div class="al al-i">Subtotal: <strong>${ccySym(CART_CCY)} ${subtotal.toFixed(2)}</strong></div>
    ${eligible.length===0?'<div style="padding:20px;text-align:center;color:var(--t3)">No discounts apply to this cart</div>':eligible.map(d=>`
      <div class="list-row" onclick="applyDiscount('${d.id}')" style="cursor:pointer;border:1px solid ${CART_DISCOUNT===d.id?'var(--blue)':'var(--border)'};border-radius:8px;margin-bottom:6px">
        <div style="font-size:24px">🎯</div>
        <div class="lr-info">
          <div class="lr-name">${d.name}</div>
          <div class="lr-meta"><span class="mono">${d.code}</span> • ${d.type==='percent'?d.value+'% off':fmtMoney(d.value,'MVR')+' off'}</div>
        </div>
        ${CART_DISCOUNT===d.id?'<span class="bdg b-active">APPLIED</span>':'<button class="btn btn-xs btn-p">Apply</button>'}
      </div>
    `).join('')}
    ${CART_DISCOUNT?`<button class="btn btn-r" style="width:100%;margin-top:10px" onclick="applyDiscount(null)">✕ Remove Discount</button>`:''}
    <div class="fsec">Manual Discount</div>

      <div class="fg"><label class="fl">Type</label>

    </div>

}

function loadParked(id){
  if(CART.length>0 && !confirm('Replace current cart?')) return;
  const p = PARKED_SALES.find(x=>x.id===id);
  if(!p) return;
  CART = [...p.items]; CART_DISCOUNT = p.discount; CART_CUSTOMER = p.customer; CART_CCY = p.ccy; CART_NOTES = p.notes||'';
  PARKED_SALES = PARKED_SALES.filter(x=>x.id!==id);
  closeModal(); renderMain();
  toast('Sale loaded');

function deleteParked(id){
  if(!confirm('Delete this parked sale?')) return;
  PARKED_SALES = PARKED_SALES.filter(x=>x.id!==id);
  openLoadParkedModal();
}


// ─── PAYMENT MODAL ───
let PAY_METHOD = 'cash';
let PAY_TENDERED = '';
let PAY_REF = '';
let SPLIT_PAYMENTS = [];

function openPaymentModal(){
  const totals = computeCartTotals();
  if(totals.total<=0){ toast('Cart is empty','warn'); return; }
  PAY_METHOD = 'cash';
  PAY_TENDERED = totals.total.toFixed(2);
  PAY_REF = '';
  SPLIT_PAYMENTS = [];
  renderPaymentModalBody();
}
function renderPaymentModalBody(){
  const totals = computeCartTotals();
  const customer = getCustomer(CART_CUSTOMER);
  const tenderedNum = parseFloat(PAY_TENDERED) || 0;
  const splitTotal = SPLIT_PAYMENTS.reduce((a,p)=>a+p.amount,0);
  const remaining = totals.total - splitTotal;
  const change = (PAY_METHOD==='cash' && tenderedNum >= remaining) ? tenderedNum - remaining : 0;
  const sufficient = PAY_METHOD==='cash' ? tenderedNum >= remaining : (PAY_METHOD==='credit' ? customer.creditLimit >= (customer.balance + (CART_CCY==='MVR'?totals.total:fxConvert(totals.total, CART_CCY,'MVR'))) : tenderedNum > 0);
  const isCredit = PAY_METHOD==='credit';

  const body = `
    <div class="pay-summary">
      <div class="info-row"><span class="il">Subtotal</span><span class="iv mono">${ccySym(CART_CCY)} ${totals.subtotal.toFixed(2)}</span></div>
      ${totals.discount>0?`<div class="info-row" style="color:var(--green)"><span class="il">Discount</span><span class="iv mono">− ${ccySym(CART_CCY)} ${totals.discount.toFixed(2)}</span></div>`:''}

      <div class="info-row" style="font-size:15px;font-weight:800;color:var(--blue3);border-top:2px solid var(--border2);padding-top:10px;margin-top:6px"><span class="il">TOTAL DUE</span><span class="iv mono" style="font-size:18px">${ccySym(CART_CCY)} ${totals.total.toFixed(2)}</span></div>
      ${SPLIT_PAYMENTS.length>0?`
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border2)">
          <div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:4px">SPLIT PAYMENTS:</div>
          ${SPLIT_PAYMENTS.map((p,i)=>{
            const m = PAYMENT_METHODS.find(x=>x.id===p.method);
            return `<div class="info-row"><span class="il">${m.icon} ${m.name}${p.ref?' ('+p.ref+')':''}</span><span class="iv mono">${ccySym(CART_CCY)} ${p.amount.toFixed(2)} <button class="btn btn-xs btn-r" onclick="removeSplit(${i})">×</button></span></div>`;
          }).join('')}
          <div class="info-row" style="font-weight:700;color:var(--orange)"><span class="il">REMAINING</span><span class="iv mono">${ccySym(CART_CCY)} ${remaining.toFixed(2)}</span></div>

    <div class="pay-method-grid">
      ${PAYMENT_METHODS.filter(m=>m.active).map(m=>`
        <div class="pay-method ${PAY_METHOD===m.id?'on':''}" onclick="setPayMethod('${m.id}')">

    ${isCredit ? `
      <div class="al ${customer.creditLimit > 0 ? 'al-i' : 'al-w'}">

      <div class="fg2" style="margin-top:14px">

        </div>
      `:''}

    <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
      <button class="btn" onclick="addSplitPayment()">+ Split Payment</button>
      ${customer.tier!=='guest' && customer.points>0 && PAY_METHOD!=='credit' ? `<button class="btn" onclick="redeemPoints()">⭐ Redeem ${customer.points} pts</button>` : ''}
    </div>
  `;
  const footer = `
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn btn-g" ${!sufficient && SPLIT_PAYMENTS.length===0?'disabled':''} onclick="completeSale()" style="font-size:14px;padding:10px 24px">
      ✓ COMPLETE SALE
    </button>
  `;
  openModal('💳 Process Payment', body, footer, 'lg');
}
function setPayMethod(m){
  PAY_METHOD = m;
  const totals = computeCartTotals();
  const remaining = totals.total - SPLIT_PAYMENTS.reduce((a,p)=>a+p.amount,0);
  PAY_TENDERED = remaining.toFixed(2);
  renderPaymentModalBody();
}
function setTendered(amt){
  PAY_TENDERED = amt.toFixed(2);
  if(el('payTendered')) el('payTendered').value = PAY_TENDERED;
  updatePayDisplay();
}
function updatePayDisplay(){
  const totals = computeCartTotals();
  const remaining = totals.total - SPLIT_PAYMENTS.reduce((a,p)=>a+p.amount,0);
  const change = (PAY_METHOD==='cash' && parseFloat(PAY_TENDERED) >= remaining) ? parseFloat(PAY_TENDERED) - remaining : 0;
  if(el('changeDue')) el('changeDue').value = `${ccySym(CART_CCY)} ${change.toFixed(2)}`;
}

function addSplitPayment(){
  const totals = computeCartTotals();
  const remaining = totals.total - SPLIT_PAYMENTS.reduce((a,p)=>a+p.amount,0);
  const amt = parseFloat(PAY_TENDERED);
  if(!amt || amt<=0){ toast('Enter amount','error'); return; }
  if(amt > remaining){ toast('Amount exceeds remaining','warn'); return; }
  SPLIT_PAYMENTS.push({ method:PAY_METHOD, amount:amt, ref:PAY_REF });
  PAY_TENDERED = (remaining - amt).toFixed(2);
  PAY_REF = '';
  renderPaymentModalBody();
}
function removeSplit(idx){
  SPLIT_PAYMENTS.splice(idx,1);
  const totals = computeCartTotals();
  const remaining = totals.total - SPLIT_PAYMENTS.reduce((a,p)=>a+p.amount,0);
  PAY_TENDERED = remaining.toFixed(2);
  renderPaymentModalBody();
}

function redeemPoints(){
  const c = getCustomer(CART_CUSTOMER);
  if(c.points<=0){ toast('No points available','warn'); return; }
  // 10 points = 1 MVR
  const maxRedeem = Math.floor(c.points / 10);
  const totals = computeCartTotals();
  const remaining = totals.total - SPLIT_PAYMENTS.reduce((a,p)=>a+p.amount,0);
  const totalInBase = CART_CCY==='MVR' ? remaining : fxConvert(remaining, CART_CCY, 'MVR');
  const useMVR = Math.min(maxRedeem, totalInBase);
  const useInCCY = CART_CCY==='MVR' ? useMVR : fxConvert(useMVR, 'MVR', CART_CCY);
  const usePoints = Math.ceil(useMVR * 10);
  if(!confirm(`Redeem ${usePoints} points for ${fmtMoney(useMVR,'MVR')}?`)) return;
  SPLIT_PAYMENTS.push({ method:'voucher', amount:useInCCY, ref:`POINTS-${usePoints}`, isPoints:true, pointsUsed:usePoints });
  c.points -= usePoints;
  renderPaymentModalBody();
  toast(`${usePoints} points redeemed`);
}

function completeSale(){
  const reg = currentRegister() || REGISTERS.find(r=>r.status==='open' && r.store===CURRENT_STORE);
  if(!reg){ toast('No open register','error'); return; }
  const totals = computeCartTotals();
  const customer = getCustomer(CART_CUSTOMER);

  // Build payments array
  let payments = [...SPLIT_PAYMENTS];
  const remaining = totals.total - SPLIT_PAYMENTS.reduce((a,p)=>a+p.amount,0);
  if(remaining > 0.01){
    if(PAY_METHOD==='credit'){
      // Check credit limit
      const totalInBase = CART_CCY==='MVR' ? totals.total : fxConvert(totals.total, CART_CCY, 'MVR');
      if(customer.creditLimit < customer.balance + totalInBase){
        toast('Customer credit limit exceeded','error'); return;
      }
      payments.push({ method:'credit', amount:remaining, ref:'' });
    } else {
      const tendered = parseFloat(PAY_TENDERED);
      if(PAY_METHOD==='cash'){
        if(tendered < remaining){ toast('Insufficient amount','error'); return; }
        payments.push({ method:'cash', amount:remaining, ref:'', tendered, change:tendered-remaining });
      } else {
        payments.push({ method:PAY_METHOD, amount:remaining, ref:PAY_REF });
      }
    }
  }

  // Build sale record
  const lineItems = CART.map(it=>{
    const lineNet = it.unitPrice * it.qty;
    const itemDiscount = totals.subtotal>0 ? (lineNet/totals.subtotal) * totals.discount : 0;
    const taxable = lineNet - itemDiscount;
    const lineTax = taxable * it.taxRate / 100;
    return {
      pid: it.pid, sku: it.sku, name: it.name, qty: it.qty,
      unitPrice: it.unitPrice, taxRate: it.taxRate,
      lineNet, lineTax, lineTotal: lineNet + lineTax - itemDiscount, lineDiscount: itemDiscount,
      cost: it.cost, lineCost: it.cost * it.qty
    };
  });

  const totalInBase = CART_CCY==='MVR' ? totals.total : totals.total * ccyRate(CART_CCY);
  const sale = {
    id: uid(),
    invoiceNo: generateInvoiceNo(reg.store),
    store: reg.store,
    regId: reg.id,
    cashier: CU.id,
    customer: CART_CUSTOMER,
    date: todayISO,
    time: nowTime(),
    items: lineItems,
    subtotal: totals.subtotal, tax: totals.tax, discount: totals.discount, total: totals.total,
    totalInBase,
    ccy: CART_CCY,
    fxRate: ccyRate(CART_CCY),
    paymentMethod: payments.length===1 ? payments[0].method : 'split',
    payments: payments,
    tendered: payments.find(p=>p.method==='cash')?.tendered || 0,
    change: payments.find(p=>p.method==='cash')?.change || 0,
    paymentRef: payments.map(p=>p.ref).filter(r=>r).join(', '),
    status: 'completed',
    voidedAt: null, voidedBy: null, voidReason: '',
    refundOf: null,
    notes: CART_NOTES,
    discountId: CART_DISCOUNT
  };
  SALES.unshift(sale);

  // Reduce stock & log movements
  CART.forEach(it=>{
    STOCK[it.pid][reg.store] = (STOCK[it.pid][reg.store]||0) - it.qty;
    logMovement(it.pid, reg.store, 'sale', -it.qty, sale.invoiceNo, `Sale to ${customer.name}`, CU.id);
  });

  // Update customer credit balance (for credit sales)
  const creditAmt = payments.filter(p=>p.method==='credit').reduce((a,p)=>a+p.amount,0);
  if(creditAmt > 0){
    const inBase = CART_CCY==='MVR' ? creditAmt : fxConvert(creditAmt, CART_CCY, 'MVR');
    customer.balance += inBase;
  }
  // Loyalty points (1 pt per 10 MVR for non-guest, non-credit-only)
  if(customer.tier !== 'guest' && customer.tier !== 'corporate'){
    const earnedPoints = Math.floor(totalInBase / 10);
    customer.points += earnedPoints;
  }

  // Mark discount used
  if(CART_DISCOUNT){
    const d = DISCOUNTS.find(x=>x.id===CART_DISCOUNT);
    if(d) d.used = (d.used||0) + 1;
  }

  logAudit('sale', sale.invoiceNo, `Sale completed: ${customer.name} • ${fmtMoney(totals.total, CART_CCY)}`);

  // Reset cart
  CART = []; CART_DISCOUNT = null; CART_NOTES = ''; CART_CUSTOMER = 'C001';
  SPLIT_PAYMENTS = []; PAY_METHOD = 'cash'; PAY_TENDERED = ''; PAY_REF = '';

  // Show receipt
  showReceiptModal(sale);
  renderRegBar();
}

function updateDenomTotal(ccy, isOpen){
  const denoms = getDenoms(ccy);
  if(!denoms) return;
  let total = 0;
  denoms.forEach((d,i)=>{
    const prefix = isOpen ? 'dn' : 'cd';
    const cnt = parseInt(el(`${prefix}-${i}`)?.value)||0;
    const sub = cnt * d.value;
    total += sub;
    const dt = el(`${(isOpen?'dt':'ct')}-${i}`);
    if(dt) dt.textContent = `${ccySym(ccy)} ${sub.toFixed(2)}`;
  });
  const totalEl = el(isOpen ? 'openFloatTotal' : 'closeCountTotal');
  if(totalEl) totalEl.textContent = `${ccySym(ccy)} ${total.toFixed(2)}`;
  const hidden = el(isOpen ? 'openFloat' : 'closeActual');
  if(hidden) hidden.value = total.toFixed(2);
  return total;
}
function openRegisterConfirm(regId){
  const myReg = REGISTERS.find(r=>r.id===(regId || (REGISTERS.find(r=>r.assignedTo===CU.id)||{}).id));
  if(!myReg){ toast('Register not found','error'); return; }
  const float = parseFloat(el('openFloat').value) || 0;
  // Capture denomination breakdown if available
  const denoms = getDenoms(myReg.ccy);
  const breakdown = [];
  if(denoms){
    denoms.forEach((d,i)=>{
      const cnt = parseInt(el(`dn-${i}`)?.value)||0;
      if(cnt>0) breakdown.push({ label:d.label, value:d.value, count:cnt, subtotal:cnt*d.value });
    });
  }
  myReg.status = 'open';
  myReg.openedAt = nowFull();
  myReg.openingFloat = float;
  myReg.openingBreakdown = breakdown;
  myReg.openedBy = CU.id;
  // Create session
  SESSIONS.push({
    id: uid(), regId: myReg.id, store: myReg.store, cashier: CU.id,
    openedAt: nowFull(), closedAt: null,
    openingFloat: float, openingBreakdown: breakdown,
    expectedClose:0, actualClose:0, variance:0,
    sales:0, transactions:0, status:'open', ccy: myReg.ccy,
    notes: el('openNotes').value
  });
  if(CU.role==='manager') MGR_REG = myReg.id;
  logAudit('register-open', myReg.id, `Opened with float ${fmtMoney(float, myReg.ccy)} • ${breakdown.length} denominations`);
  closeModal(); renderRegBar(); renderMain();
  toast('Register opened');
}

function closeRegisterModal(){
  const reg = currentRegister();
  if(!reg){ toast('No open register','error'); return; }
  // Calculate expected
  const sess = SESSIONS.find(s=>s.regId===reg.id && s.status==='open');
  const sessionStart = sess?.openedAt || reg.openedAt;
  const sessionSales = SALES.filter(s=>s.regId===reg.id && s.status==='completed' && (s.date+' '+s.time) >= sessionStart);
  const cashSales = sessionSales.filter(s=>s.paymentMethod==='cash' || (s.payments||[]).some(p=>p.method==='cash')).reduce((a,b)=>{
    const cashPart = (b.payments||[{method:b.paymentMethod,amount:b.total}]).filter(p=>p.method==='cash').reduce((x,p)=>x+p.amount,0);
    return a + cashPart;
  },0);
  const cardSales = sessionSales.filter(s=>(s.payments||[{method:s.paymentMethod,amount:s.total}]).some(p=>p.method==='card')).reduce((a,b)=>{
    return a + (b.payments||[{method:b.paymentMethod,amount:b.total}]).filter(p=>p.method==='card').reduce((x,p)=>x+p.amount,0);
  },0);
  const otherSales = sessionSales.reduce((a,b)=>a+b.total,0) - cashSales - cardSales;
  const expectedCash = (reg.openingFloat||0) + cashSales;
  const denoms = getDenoms(reg.ccy);

  const denomCount = denoms ? `
    <div class="fsec">Cash Count by Denomination</div>
    <div class="al al-i" style="font-size:11px">Count actual cash in drawer by denomination. Total auto-calculates.</div>
    <div class="tw" style="border:1px solid var(--border);border-radius:8px;overflow:hidden">
      <table style="margin:0">
        <tr><th>Denomination</th><th class="amt" style="text-align:right">Value</th><th style="width:120px">Count</th><th class="amt" style="text-align:right">Subtotal</th></tr>
        ${denoms.map((d,i)=>`<tr>
          <td><strong>${d.label}</strong></td>
          <td class="amt mono">${ccySym(reg.ccy)} ${d.value.toFixed(2)}</td>
          <td><input type="number" class="fi" id="cd-${i}" value="0" min="0" step="1" style="width:90px;text-align:center" oninput="updateDenomTotal('${reg.ccy}',false);updateVariance(${expectedCash})"></td>
          <td class="amt mono" id="ct-${i}">${ccySym(reg.ccy)} 0.00</td>
        </tr>`).join('')}
        <tr style="background:var(--blue2);font-weight:800">
          <td colspan="3" style="text-align:right">TOTAL COUNTED</td>
          <td class="amt mono" id="closeCountTotal" style="font-size:14px;color:var(--blue3)">${ccySym(reg.ccy)} 0.00</td>
        </tr>
      </table>
    </div>
    <input type="hidden" id="closeActual" value="0">
  ` : `
    <div class="fg"><label class="fl">Actual Cash Counted (${reg.ccy})</label>
      <input type="number" class="fi" id="closeActual" value="${expectedCash.toFixed(2)}" step="0.01" oninput="updateVariance(${expectedCash})">
    </div>
  `;

  const body = `
    <div class="al al-w"><strong>Closing register:</strong> ${reg.id} — ${reg.name}<br>Session opened: ${sessionStart}</div>
    <div class="fsec">Session Summary</div>
    <div class="info-row"><span class="il">Transactions</span><span class="iv">${sessionSales.length}</span></div>
    <div class="info-row"><span class="il">Total Sales</span><span class="iv mono">${fmtMoney(sessionSales.reduce((a,b)=>a+b.total,0), reg.ccy)}</span></div>
    <div class="info-row"><span class="il">  • Cash Sales</span><span class="iv mono">${fmtMoney(cashSales, reg.ccy)}</span></div>
    <div class="info-row"><span class="il">  • Card Sales</span><span class="iv mono">${fmtMoney(cardSales, reg.ccy)}</span></div>
    <div class="info-row"><span class="il">  • Other</span><span class="iv mono">${fmtMoney(otherSales, reg.ccy)}</span></div>
    <div class="info-row" style="border-top:2px solid var(--border2);margin-top:8px;padding-top:8px;font-weight:700"><span class="il">Opening Float</span><span class="iv mono">${fmtMoney(reg.openingFloat||0, reg.ccy)}</span></div>
    <div class="info-row" style="font-weight:800;color:var(--green)"><span class="il">EXPECTED CASH IN DRAWER</span><span class="iv mono">${fmtMoney(expectedCash, reg.ccy)}</span></div>

    ${denomCount}
    <div class="fg" style="margin-top:14px"><label class="fl">Variance</label>
      <input type="text" class="fi" id="varianceDisplay" value="${ccySym(reg.ccy)} 0.00" readonly style="background:var(--green2);color:var(--green);font-weight:700;font-size:14px">
    </div>
    <div class="fg"><label class="fl">Closing Notes</label>
      <textarea class="fta" id="closeNotes" placeholder="Variance reason if any..."></textarea>
    </div>
  `;
  const footer = `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-r" onclick="closeRegisterConfirm(${expectedCash}, '${reg.ccy}', ${sessionSales.reduce((a,b)=>a+b.total,0)}, ${sessionSales.length})">⏹ Close Register & Print Z-Report</button>`;
  openModal('Close Register / End Shift', body, footer, 'lg');
}
function updateVariance(expected){
  const actual = parseFloat(el('closeActual').value)||0;
  const v = actual - expected;
  const display = el('varianceDisplay');
  const reg = currentRegister();
  if(!display || !reg) return;
  display.value = `${ccySym(reg.ccy)} ${v >= 0 ? '+' : ''}${v.toFixed(2)}`;
  display.style.background = v===0?'var(--green2)':v>0?'var(--blue2)':'var(--red2)';
  display.style.color = v===0?'var(--green)':v>0?'var(--blue)':'var(--red)';
}
function closeRegisterConfirm(expected, ccy, totalSales, txns){
  const reg = currentRegister();
  const actual = parseFloat(el('closeActual').value)||0;
  const variance = actual - expected;
  const sess = SESSIONS.find(s=>s.regId===reg.id && s.status==='open');
  // Capture closing breakdown
  const denoms = getDenoms(reg.ccy);
  const closeBreakdown = [];
  if(denoms){
    denoms.forEach((d,i)=>{
      const cnt = parseInt(el(`cd-${i}`)?.value)||0;
      if(cnt>0) closeBreakdown.push({ label:d.label, value:d.value, count:cnt, subtotal:cnt*d.value });
    });
  }
  if(sess){
    sess.closedAt = nowFull();
    sess.expectedClose = expected;
    sess.actualClose = actual;
    sess.variance = variance;
    sess.sales = totalSales;
    sess.transactions = txns;
    sess.status = 'closed';
    sess.notes = el('closeNotes').value;
    sess.closingBreakdown = closeBreakdown;
  }
  reg.status = 'closed';
  reg.openedAt = null;
  reg.openingFloat = 0;
  reg.openingBreakdown = [];
  if(CU.role==='manager') MGR_REG = null;
  logAudit('register-close', reg.id, `Closed. Expected: ${fmtMoney(expected,ccy)} Actual: ${fmtMoney(actual,ccy)} Variance: ${fmtMoney(variance,ccy)}`);
  // Show Z-report
  showZReport(sess);
  renderRegBar();
}
function showZReport(sess){
  const reg = REGISTERS.find(r=>r.id===sess.regId);
  const cashier = getUser(sess.cashier);
  const sales = SALES.filter(s=>s.regId===sess.regId && s.status==='completed' && (s.date+' '+s.time) >= sess.openedAt && (!sess.closedAt || (s.date+' '+s.time) <= sess.closedAt));
  const byMethod = {};
  sales.forEach(s=>{
    (s.payments||[{method:s.paymentMethod,amount:s.total}]).forEach(p=>{
      byMethod[p.method] = (byMethod[p.method]||0) + p.amount;
    });
  });
  const totalTax = sales.reduce((a,b)=>a+b.tax,0);
  const totalDisc = sales.reduce((a,b)=>a+b.discount,0);

  const body = `
    <div class="receipt" id="zReportPrint">
      <div class="rc-center rc-bold" style="font-size:14px">Z-REPORT (END OF SHIFT)</div>
      <div class="rc-center" style="font-size:10px">${COMPANY.name}</div>
      <div class="rc-divider"></div>
      <div class="rc-row"><span>Register:</span><span class="rc-bold">${reg.id} — ${reg.name}</span></div>
      <div class="rc-row"><span>Store:</span><span>${getStoreName(reg.store)}</span></div>
      <div class="rc-row"><span>Cashier:</span><span>${cashier?.name||sess.cashier}</span></div>
      <div class="rc-row"><span>Opened:</span><span>${sess.openedAt}</span></div>
      <div class="rc-row"><span>Closed:</span><span>${sess.closedAt}</span></div>
      <div class="rc-divider"></div>
      <div class="rc-bold">SALES SUMMARY</div>
      <div class="rc-row"><span>Transactions:</span><span>${sess.transactions}</span></div>
      <div class="rc-row"><span>Gross Sales:</span><span>${ccySym(sess.ccy)} ${sales.reduce((a,b)=>a+b.subtotal,0).toFixed(2)}</span></div>
      <div class="rc-row"><span>Discounts:</span><span>− ${ccySym(sess.ccy)} ${totalDisc.toFixed(2)}</span></div>
      <div class="rc-row"><span>Tax:</span><span>${ccySym(sess.ccy)} ${totalTax.toFixed(2)}</span></div>
      <div class="rc-row rc-bold"><span>NET SALES:</span><span>${ccySym(sess.ccy)} ${sess.sales.toFixed(2)}</span></div>
      <div class="rc-divider"></div>
      <div class="rc-bold">PAYMENT BREAKDOWN</div>
      ${Object.entries(byMethod).map(([m,v])=>{
        const pm = PAYMENT_METHODS.find(x=>x.id===m)||{name:m};
        return `<div class="rc-row"><span>${pm.name}:</span><span>${ccySym(sess.ccy)} ${v.toFixed(2)}</span></div>`;
      }).join('')}
      <div class="rc-divider"></div>
      <div class="rc-bold">CASH RECONCILIATION</div>
      <div class="rc-row"><span>Opening Float:</span><span>${ccySym(sess.ccy)} ${sess.openingFloat.toFixed(2)}</span></div>
      <div class="rc-row"><span>Cash Sales:</span><span>+ ${ccySym(sess.ccy)} ${(byMethod.cash||0).toFixed(2)}</span></div>
      <div class="rc-row rc-bold"><span>Expected:</span><span>${ccySym(sess.ccy)} ${sess.expectedClose.toFixed(2)}</span></div>
      <div class="rc-row"><span>Actual Counted:</span><span>${ccySym(sess.ccy)} ${sess.actualClose.toFixed(2)}</span></div>
      <div class="rc-row rc-bold" style="color:${sess.variance===0?'#16a34a':sess.variance>0?'#1849a9':'#dc2626'}"><span>VARIANCE:</span><span>${ccySym(sess.ccy)} ${sess.variance>=0?'+':''}${sess.variance.toFixed(2)}</span></div>
      ${sess.closingBreakdown && sess.closingBreakdown.length>0 ? `
      <div class="rc-divider"></div>
      <div class="rc-bold">DENOMINATION COUNT</div>
      ${sess.closingBreakdown.map(b=>`<div class="rc-row" style="font-size:10px"><span>${b.label} × ${b.count}</span><span>${ccySym(sess.ccy)} ${b.subtotal.toFixed(2)}</span></div>`).join('')}
      ` : ''}
      <div class="rc-divider"></div>
      <div class="rc-center" style="font-size:9px">Z-Report ID: ${sess.id}<br>Generated: ${nowFull()}</div>
    </div>
  `;
  const footer = `<button class="btn" onclick="printZReport()">🖨️ Print</button><button class="btn btn-p" onclick="closeModal()">✓ Done</button>`;
  openModal('Z-Report — Shift Closed', body, footer);
}
function printZReport(){
  const content = el('zReportPrint').outerHTML;
  const w = window.open('','_blank','width=400,height=700');
  w.document.write(`<html><head><title>Z-Report</title><style>
    body{font-family:'Courier New',monospace;font-size:11px;padding:0;margin:0}
    .receipt{padding:10px;width:280px}
    .rc-center{text-align:center}
    .rc-divider{border-top:1px dashed #999;margin:8px 0}
    .rc-row{display:flex;justify-content:space-between}
    .rc-bold{font-weight:bold}
  </style></head><body>${content}</body></html>`);
  w.document.close();
  setTimeout(()=>w.print(),250);
}

          <div class="fg"><label class="fl">Cashier</label><select class="fs" onchange="setSaleFilter('cashier',this.value)"><option value="all">All</option>${USERS.filter(u=>u.role==='cashier'||u.role==='manager').map(u=>`<option value="${u.id}" ${f.cashier===u.id?'selected':''}>${u.name}</option>`).join('')}</select></div>

function setSaleFilter(k,v){ SALES_FILTER[k]=v; renderMain(); }
function resetSaleFilter(){ SALES_FILTER = { dateFrom:'', dateTo:'', store:'all', cashier:'all', method:'all', status:'all', search:'' }; renderMain(); }

function viewSale(id){
  const s = SALES.find(x=>x.id===id);
  if(!s) return;
  showReceiptModal(s);
}

function voidSale(id){
  const s = SALES.find(x=>x.id===id);
  if(!s) return;
  const reason = prompt('Reason for voiding this sale:');
  if(!reason) return;
  s.status = 'voided';
  s.voidedAt = nowFull();
  s.voidedBy = CU.id;
  s.voidReason = reason;
  // Reverse stock
  s.items.forEach(it=>{
    STOCK[it.pid][s.store] = (STOCK[it.pid][s.store]||0) + it.qty;
    logMovement(it.pid, s.store, 'void', it.qty, s.invoiceNo, `Void: ${reason}`, CU.id);
  });
  // Reverse credit balance
  if(s.paymentMethod==='credit' || (s.payments||[]).some(p=>p.method==='credit')){
    const c = getCustomer(s.customer);
    const creditAmt = (s.payments||[{method:s.paymentMethod,amount:s.total}]).filter(p=>p.method==='credit').reduce((a,p)=>a+p.amount,0);
    const inBase = s.ccy==='MVR' ? creditAmt : creditAmt * s.fxRate;
    c.balance = Math.max(0, c.balance - inBase);
  }
  logAudit('void-sale', s.invoiceNo, `Voided: ${reason}`);
  toast('Sale voided');
  renderMain(); renderSidebar();
}

function exportSales(format){
  const list = SALES.filter(s=>{
    const f = SALES_FILTER;
    if(f.search){const q=f.search.toLowerCase();if(!s.invoiceNo.toLowerCase().includes(q)&&!getCustomer(s.customer).name.toLowerCase().includes(q))return false;}
    if(f.dateFrom && s.date<f.dateFrom) return false;
    if(f.dateTo && s.date>f.dateTo) return false;
    if(f.store!=='all' && s.store!==f.store) return false;
    if(f.cashier!=='all' && s.cashier!==f.cashier) return false;
    if(f.method!=='all' && s.paymentMethod!==f.method) return false;
    if(f.status!=='all' && s.status!==f.status) return false;
    return true;
  });

  const rows = list.map(s=>({
    'Invoice #':s.invoiceNo, 'Date':s.date, 'Time':s.time, 'Store':s.store,
    'Cashier':getUserName(s.cashier), 'Customer':getCustomer(s.customer).name,
    'Items':s.items.length, 'Subtotal':s.subtotal.toFixed(2), 'Discount':s.discount.toFixed(2),
    'Tax':s.tax.toFixed(2), 'Total':s.total.toFixed(2), 'Currency':s.ccy,
    'Total (MVR)':s.totalInBase.toFixed(2),
    'Payment':s.paymentMethod, 'Reference':s.paymentRef||'', 'Status':s.status
  }));

  if(format==='csv'){
    const headers = Object.keys(rows[0]||{});
    const csv = [headers.join(','), ...rows.map(r=>headers.map(h=>`"${(r[h]||'').toString().replace(/"/g,'""')}"`).join(','))].join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `sales-${todayISO}.csv`; a.click();
  } else if(format==='xlsx'){
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Sales');
    XLSX.writeFile(wb, `sales-${todayISO}.xlsx`);
  } else if(format==='pdf'){
    const doc = new jspdf.jsPDF('l','mm','a4');
    doc.setFontSize(14); doc.text('Sales Report', 14, 14);
    doc.setFontSize(9); doc.text(`Generated: ${nowFull()} • ${list.length} records`, 14, 20);
    doc.autoTable({
      startY: 26,
      head: [['Invoice','Date','Store','Cashier','Customer','Items','Total','Method','Status']],
      body: list.map(s=>[s.invoiceNo, s.date+' '+s.time, s.store, getUserName(s.cashier), getCustomer(s.customer).name, s.items.length, fmtMoney(s.total,s.ccy), s.paymentMethod, s.status]),
      styles: {fontSize:7}, headStyles:{fillColor:[24,73,169]}
    });
    doc.save(`sales-${todayISO}.pdf`);
  }
  toast(`Exported ${list.length} records`);
}

function updateRefundTotal(saleId){
  const s = SALES.find(x=>x.id===saleId);
  let total = 0;
  s.items.forEach((it,i)=>{
    const sel = el(`rf-sel-${i}`)?.checked;
    const qty = parseFloat(el(`rf-qty-${i}`)?.value)||0;
    const amt = sel ? it.unitPrice * qty : 0;
    if(el(`rf-amt-${i}`)) el(`rf-amt-${i}`).textContent = `${ccySym(s.ccy)} ${amt.toFixed(2)}`;
    total += amt;
  });
  // Add proportional tax/discount
  if(s.subtotal>0){
    const ratio = total / s.subtotal;
    total = total - (s.discount * ratio) + (s.tax * ratio);
  }
  if(el('rfTotal')) el('rfTotal').textContent = `${ccySym(s.ccy)} ${total.toFixed(2)}`;
}
function processRefund(origId){
  const orig = SALES.find(x=>x.id===origId);
  const reason = el('rfReason').value;
  if(!reason){ toast('Select reason','error'); return; }
  const method = el('rfMethod').value;
  const notes = el('rfNotes').value;

  // Build refund items
  const items = [];
  orig.items.forEach((it,i)=>{
    const sel = el(`rf-sel-${i}`)?.checked;
    const qty = parseFloat(el(`rf-qty-${i}`)?.value)||0;
    if(sel && qty>0){
      const lineNet = it.unitPrice * qty;
      const lineTax = lineNet * it.taxRate / 100;
      items.push({...it, qty, lineNet, lineTax, lineTotal: lineNet+lineTax, lineCost: it.cost*qty});
    }
  });
  if(items.length===0){ toast('Select at least one item','error'); return; }

  const subtotal = items.reduce((a,i)=>a+i.lineNet,0);
  const tax = items.reduce((a,i)=>a+i.lineTax,0);
  const ratio = orig.subtotal>0 ? subtotal/orig.subtotal : 0;
  const discount = orig.discount * ratio;
  const total = subtotal - discount + tax;
  const totalInBase = orig.ccy==='MVR' ? total : total * orig.fxRate;

  const refund = {
    id: uid(), invoiceNo: 'RF-' + generateInvoiceNo(orig.store).split('/').slice(1).join('/'),
    store: orig.store, regId: orig.regId, cashier: CU.id, customer: orig.customer,
    date: todayISO, time: nowTime(),
    items, subtotal: -subtotal, tax: -tax, discount: -discount, total: -total, totalInBase: -totalInBase,
    ccy: orig.ccy, fxRate: orig.fxRate,
    paymentMethod: method, payments: [{method, amount: total, ref:''}],
    tendered:0, change:0, paymentRef:'',
    status: 'refunded', refundOf: orig.id,
    notes: `${reason}: ${notes}`, voidedAt:null, voidedBy:null, voidReason:'', discountId:null
  };
  SALES.unshift(refund);

  // Mark original as having refunds
  if(items.length === orig.items.length && items.every((it,idx)=>it.qty===orig.items[idx].qty)){
    orig.status = 'refunded';
  }

  // Restock items
  items.forEach(it=>{
    STOCK[it.pid][orig.store] = (STOCK[it.pid][orig.store]||0) + it.qty;
    logMovement(it.pid, orig.store, 'refund', it.qty, refund.invoiceNo, reason, CU.id);
  });

  // Adjust customer balance for credit refunds
  if(method==='credit'){
    const c = getCustomer(orig.customer);
    const inBase = orig.ccy==='MVR' ? total : total * orig.fxRate;
    c.balance = Math.max(0, c.balance + inBase); // store credit
  }

  logAudit('refund', refund.invoiceNo, `Refund: ${reason} — ${fmtMoney(total, orig.ccy)}`);
  toast('Refund processed');
  closeModal(); renderMain();
}

function saveProduct(id){
  const data = {
    sku: el('prSku').value.trim(),
    barcode: el('prBarcode').value.trim(),
    name: el('prName').value.trim(),
    cat: el('prCat').value,
    supplier: el('prSupplier').value,
    unit: el('prUnit').value,
    cost: parseFloat(el('prCost').value)||0,
    price: parseFloat(el('prPrice').value)||0,
    taxRate: parseFloat(el('prTaxRate').value)||0,
    track: el('prTrack').value==='true',
    lowStock: parseInt(el('prLowStock').value)||10,
    img: el('prImg').value || '📦',
    image1: el('prImage1Data')?.value || '',
    image2: el('prImage2Data')?.value || '',
    active: el('prActive').value==='true'
  };
  if(!data.sku || !data.name){ toast('SKU and name required','error'); return; }
  if(id){
    const p = PRODUCTS.find(x=>x.id===id);
    Object.assign(p, data);
    logAudit('update', 'product', `Updated: ${p.name}`);
    toast('Product updated');
  } else {
    const newId = 'P' + String(PRODUCTS.length+1).padStart(4,'0');
    PRODUCTS.push({ id:newId, ...data });
    STOCK[newId] = {};
    STORES.forEach(s=>STOCK[newId][s.code]=0);
    logAudit('create', 'product', `Created: ${data.name}`);
    toast('Product created');
  }
  closeModal(); renderMain();
}
function handleProductImageUpload(slot, input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 2*1024*1024){ toast('Image too large (max 2MB)','warn'); input.value=''; return; }
  const reader = new FileReader();
  reader.onload = (e)=>{
    const dataUrl = e.target.result;
    el(`prImage${slot}Data`).value = dataUrl;
    el(`prImg${slot}Preview`).innerHTML = `<img src="${dataUrl}" style="max-width:100%;max-height:140px;border-radius:6px"><br><button class="btn btn-xs btn-r" onclick="clearProductImage(${slot})" style="margin-top:6px">Remove</button>`;
  };
  reader.readAsDataURL(file);
}
function clearProductImage(slot){
  el(`prImage${slot}Data`).value = '';
  el(`prImg${slot}Preview`).innerHTML = '<div style="color:var(--t3);font-size:12px">No image yet</div>';
  if(el(`prImg${slot}File`)) el(`prImg${slot}File`).value = '';
}
function deleteProduct(id){
  if(!confirm('Delete this product? (Soft delete — sets to inactive)')) return;
  const p = PRODUCTS.find(x=>x.id===id);
  p.active = false;
  logAudit('delete', 'product', `Deactivated: ${p.name}`);
  toast('Product deactivated');
  closeModal(); renderMain();
}
function exportProducts(){
  const rows = PRODUCTS.map(p=>({
    'SKU':p.sku, 'Barcode':p.barcode||'', 'Name':p.name,
    'Category':getCategory(p.cat)?.name||'',
    'Supplier':getSupplier(p.supplier),
    'Unit':p.unit, 'Cost (MVR)':p.cost, 'Price (MVR)':p.price,
    'Tax %':p.taxRate, 'Reorder Point':p.lowStock,
    'Total Stock':getTotalStock(p.id),
    ...STORES.reduce((a,s)=>{a[`Stock ${s.code}`]=getStock(p.id,s.code);return a;},{}),
    'Status':p.active?'Active':'Inactive'

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Products');

  toast('Products exported');
}

        <option>Return to supplier</option><option>Other</option>

    </div>

function updateNewTotal(pid, store){
  const cur = getStock(pid, store);
  const adj = parseInt(el(`adj-${store}`).value)||0;
  el(`new-${store}`).innerHTML = `<strong style="color:${(cur+adj)<0?'var(--red)':'var(--green)'}">${cur+adj}</strong>`;
}
function saveStockAdjust(pid){
  const reason = el('adjReason').value;
  if(!reason){ toast('Select reason','error'); return; }
  const notes = el('adjNotes').value;
  let any=false;
  STORES.forEach(s=>{
    const adj = parseInt(el(`adj-${s.code}`).value)||0;
    if(adj!==0){
      STOCK[pid][s.code] = (STOCK[pid][s.code]||0) + adj;
      logMovement(pid, s.code, 'adjustment', adj, '', `${reason}: ${notes}`, CU.id);
      any=true;
    }
  });
  if(!any){ toast('No adjustments made','warn'); return; }
  logAudit('stock-adjust', getProduct(pid).name, reason);
  toast('Stock adjusted');
  closeModal(); renderMain();
}

let STOCK_FILTER = { search:'', store:'all', status:'all' };
function renderStockLevels(){
  let list = [...PRODUCTS];

  if(f.search){const q=f.search.toLowerCase();list=list.filter(p=>p.name.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q));}
  if(f.status==='low') list=list.filter(p=>{const t=getTotalStock(p.id);return t>0 && t<=p.lowStock});
  if(f.status==='out') list=list.filter(p=>getTotalStock(p.id)===0);

  return `
    <div class="ph">
      <div><div class="pt">📊 Stock Levels</div><div class="ps">Multi-store inventory tracking</div></div>
      <div class="brow">
