      <div class="sc am"><div class="sl">Low Stock</div><div class="sv" style="color:var(--amber)">${PRODUCTS.filter(p=>{const t=getTotalStock(p.id);return t>0 && t<=p.lowStock}).length}</div><div class="si">⚠️</div></div>
      <div class="sc rd"><div class="sl">Out of Stock</div><div class="sv" style="color:var(--red)">${PRODUCTS.filter(p=>getTotalStock(p.id)===0).length}</div><div class="si">🚫</div></div>
    </div>

    <div class="card">
      <div class="cb">
        <div class="fg3">
          <div class="fg"><label class="fl">Search</label><input type="text" class="fi" value="${f.search}" oninput="STOCK_FILTER.search=this.value;renderMain()" placeholder="Name / SKU"></div>
          <div class="fg"><label class="fl">Status</label>
            <select class="fs" onchange="STOCK_FILTER.status=this.value;renderMain()">
              <option value="all">All</option>
              <option value="healthy" ${f.status==='healthy'?'selected':''}>Healthy</option>
              <option value="low" ${f.status==='low'?'selected':''}>Low Stock</option>
              <option value="out" ${f.status==='out'?'selected':''}>Out of Stock</option>
            </select>
          </div>
          <div class="fg" style="display:flex;align-items:flex-end"><button class="btn" onclick="STOCK_FILTER={search:'',store:'all',status:'all'};renderMain()">↺ Reset</button></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="cb flush">
        <div class="tw"><table>
          <tr>
            <th>Product</th><th>SKU</th>
            ${STORES.filter(s=>s.active).map(s=>`<th class="amt" style="text-align:right"><span class="etag e-${s.code}">${s.code}</span></th>`).join('')}
            <th class="amt" style="text-align:right">Total</th>
            <th class="amt" style="text-align:right">Reorder At</th>
            <th>Status</th><th class="amt" style="text-align:right">Stock Value</th>
          </tr>
          ${list.length===0?'<tr><td colspan="20" style="padding:30px;text-align:center;color:var(--t3)">No products match filters</td></tr>':list.map(p=>{
            const total = getTotalStock(p.id);

            return `<tr class="${rowClass}">
              <td><div style="display:flex;gap:8px;align-items:center"><span style="font-size:20px">${p.img}</span><strong>${p.name}</strong></div></td>

              }).join('')}
              <td class="amt"><strong style="color:${isOut?'var(--red)':isLow?'var(--amber)':'var(--text)'};font-size:13px">${total}</strong> <span style="color:var(--t3);font-size:10px">${p.unit}</span></td>
              <td class="amt">${p.lowStock}</td>

      </div>

function exportStock(){
  const rows = PRODUCTS.map(p=>{
    const r = { 'SKU':p.sku, 'Name':p.name, 'Category':getCategory(p.cat)?.name||'' };
    STORES.forEach(s=>r[s.code]=getStock(p.id, s.code));
    r['Total'] = getTotalStock(p.id);
    r['Reorder At'] = p.lowStock;
    r['Cost'] = p.cost; r['Stock Value (MVR)'] = (getTotalStock(p.id)*p.cost).toFixed(2);
    return r;
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Stock');
  XLSX.writeFile(wb, `stock-${todayISO}.xlsx`);
  toast('Stock exported');
}

function simulateStockTake(){
  const store = el('stkStore').value;
  // Random adjustments on 3 products
  const sample = PRODUCTS.slice(0,3);
  sample.forEach(p=>{
    const adj = Math.floor(Math.random()*5) - 2;
    if(adj!==0){
      STOCK[p.id][store] = Math.max(0, (STOCK[p.id][store]||0) + adj);
      logMovement(p.id, store, 'stock-take', adj, '', 'Physical count adjustment', CU.id);
    }
  });
  logAudit('stock-take', store, `Stock take performed`);
  toast('Stock take recorded');
  closeModal(); renderMain();
}

let PO_DRAFT_ITEMS = [];
function addPOItem(){
  PO_DRAFT_ITEMS.push({ pid:'', qty:1, unitCost:0 });
  renderPOItems();
}
function removePOItem(idx){
  PO_DRAFT_ITEMS.splice(idx,1);
  renderPOItems();
}
function renderPOItems(){
  el('poItems').innerHTML = PO_DRAFT_ITEMS.map((it,i)=>`
    <div style="display:grid;grid-template-columns:2.5fr 1fr 1fr auto;gap:8px;margin-bottom:6px">
      <select class="fs" onchange="PO_DRAFT_ITEMS[${i}].pid=this.value;PO_DRAFT_ITEMS[${i}].unitCost=getProduct(this.value)?.cost||0;renderPOItems()">
        <option value="">— Select Product —</option>
        ${PRODUCTS.filter(p=>p.active).map(p=>`<option value="${p.id}" ${it.pid===p.id?'selected':''}>${p.sku} — ${p.name}</option>`).join('')}
      </select>
      <input type="number" class="fi" placeholder="Qty" value="${it.qty}" oninput="PO_DRAFT_ITEMS[${i}].qty=parseFloat(this.value)||0;updatePOTotal()">
      <input type="number" class="fi" placeholder="Unit Cost" step="0.01" value="${it.unitCost}" oninput="PO_DRAFT_ITEMS[${i}].unitCost=parseFloat(this.value)||0;updatePOTotal()">
      <button class="btn btn-xs btn-r" onclick="removePOItem(${i})">✕</button>
    </div>
  `).join('');
  updatePOTotal();
}
function updatePOSupplier(){
  const sup = SUPPLIERS.find(s=>s.id===el('poSupplier').value);
  if(sup) updatePOTotal();
}
function updatePOTotal(){
  const sup = SUPPLIERS.find(s=>s.id===el('poSupplier').value);
  const total = PO_DRAFT_ITEMS.reduce((a,i)=>a + (i.qty||0)*(i.unitCost||0), 0);
  el('poTotal').textContent = `${ccySym(sup?.ccy||'MVR')} ${total.toFixed(2)}`;
}
function savePO(){
  const items = PO_DRAFT_ITEMS.filter(i=>i.pid && i.qty>0);
  if(items.length===0){ toast('Add at least one item','error'); return; }
  const sup = SUPPLIERS.find(s=>s.id===el('poSupplier').value);
  const yy = new Date().getFullYear();
  const seq = String(PURCHASE_ORDERS.length+1).padStart(4,'0');
  const po = {
    id: 'PO'+seq, poNo: `PO/${yy}/${seq}`,
    store: el('poStore').value, supplier: el('poSupplier').value,
    date: el('poDate').value, expectedDate: el('poExpected').value,
    status: 'pending', ccy: sup?.ccy||'MVR',
    items: items.map(i=>({ pid:i.pid, qty:i.qty, unitCost:i.unitCost, received:0 })),
    notes: el('poNotes').value, createdBy: CU.id
  };
  PURCHASE_ORDERS.unshift(po);
  PO_DRAFT_ITEMS = [];
  logAudit('create', 'purchase-order', `Created ${po.poNo}`);
  toast('Purchase order created');
  closeModal(); renderMain();
}

function viewPO(id){
  const po = PURCHASE_ORDERS.find(x=>x.id===id);
  if(!po) return;
  const total = po.items.reduce((a,i)=>a+i.qty*i.unitCost,0);
  const body = `
    <div class="info-row"><span class="il">PO Number</span><span class="iv mono">${po.poNo}</span></div>
    <div class="info-row"><span class="il">Store</span><span class="iv">${getStoreName(po.store)}</span></div>
    <div class="info-row"><span class="il">Supplier</span><span class="iv">${getSupplier(po.supplier)}</span></div>
    <div class="info-row"><span class="il">Order Date</span><span class="iv">${po.date}</span></div>
    <div class="info-row"><span class="il">Expected</span><span class="iv">${po.expectedDate}</span></div>
    <div class="info-row"><span class="il">Status</span><span class="iv"><span class="bdg b-${po.status==='received'?'paid':po.status==='partial'?'pap':'pend'}">${po.status.toUpperCase()}</span></span></div>
    <div class="info-row"><span class="il">Created By</span><span class="iv">${getUserName(po.createdBy)}</span></div>
    <div class="fsec">Items</div>
    <div class="tw"><table>
      <tr><th>Product</th><th>SKU</th><th>Ordered</th><th>Received</th><th class="amt">Unit Cost</th><th class="amt">Line Total</th></tr>
      ${po.items.map(it=>{
        const p = getProduct(it.pid);
        return `<tr>
          <td>${p?.name||it.pid}</td>
          <td><span class="mono">${p?.sku||''}</span></td>
          <td>${it.qty}</td>
          <td><strong style="color:${it.received===it.qty?'var(--green)':it.received>0?'var(--orange)':'var(--t3)'}">${it.received}</strong> / ${it.qty}</td>
          <td class="amt">${fmtMoney(it.unitCost, po.ccy)}</td>
          <td class="amt">${fmtMoney(it.qty*it.unitCost, po.ccy)}</td>
        </tr>`;
      }).join('')}
    </table></div>
    <div class="info-row" style="font-weight:800;font-size:14px;margin-top:10px;border-top:2px solid var(--border);padding-top:10px"><span>TOTAL</span><span class="iv mono">${fmtMoney(total, po.ccy)}</span></div>
    ${po.notes?`<div class="al al-i" style="margin-top:10px"><strong>Notes:</strong> ${po.notes}</div>`:''}
  `;
  openModal('Purchase Order Details', body, `<button class="btn" onclick="closeModal()">Close</button>${(po.status==='pending'||po.status==='partial')?`<button class="btn btn-g" onclick="receivePO('${po.id}')">Receive Items</button>`:''}<button class="btn" onclick="printPO('${po.id}')">🖨 Print</button>`, 'lg');
}

function receivePO(id){
  const po = PURCHASE_ORDERS.find(x=>x.id===id);
  if(!po) return;
  closeModal();
  const body = `
    <div class="al al-i"><strong>${po.poNo}</strong> — Receive items into <strong>${getStoreName(po.store)}</strong></div>
    <div class="tw"><table>
      <tr><th>Product</th><th>Ordered</th><th>Already Recv</th><th>Receiving Now</th><th>New Total</th></tr>
      ${po.items.map((it,i)=>{
        const p = getProduct(it.pid);
        const remaining = it.qty - it.received;
        return `<tr>
          <td><strong>${p?.name||it.pid}</strong><br><span class="mono" style="font-size:10px;color:var(--t3)">${p?.sku||''}</span></td>
          <td>${it.qty}</td>
          <td>${it.received}</td>
          <td><input type="number" class="fi" id="rcv-${i}" value="${remaining}" max="${remaining}" min="0" style="width:90px" oninput="updateRcvTotal('${id}',${i})"></td>
          <td id="rcvNew-${i}" class="mono"><strong>${it.received + remaining}</strong> / ${it.qty}</td>
        </tr>`;
      }).join('')}
    </table></div>
    <div class="fg" style="margin-top:14px"><label class="fl">GRN Reference / Invoice from Supplier</label><input type="text" class="fi" id="grnRef" placeholder="e.g. INV-12345"></div>
    <div class="fg"><label class="fl">Notes</label><textarea class="fta" id="grnNotes"></textarea></div>
  `;
  openModal(`Receive Items — ${po.poNo}`, body, `<button class="btn" onclick="viewPO('${id}')">Cancel</button><button class="btn btn-g" onclick="confirmReceivePO('${id}')">✓ Confirm Receipt</button>`, 'lg');
}
function updateRcvTotal(poId, idx){
  const po = PURCHASE_ORDERS.find(x=>x.id===poId);
  const it = po.items[idx];
  const rcv = parseInt(el(`rcv-${idx}`).value)||0;
  el(`rcvNew-${idx}`).innerHTML = `<strong>${it.received + rcv}</strong> / ${it.qty}`;
}
function confirmReceivePO(id){
  const po = PURCHASE_ORDERS.find(x=>x.id===id);
  const grnRef = el('grnRef').value || `GRN-${po.poNo}`;
  const notes = el('grnNotes').value;
  let allReceived = true;
  po.items.forEach((it,i)=>{
    const rcv = parseInt(el(`rcv-${i}`).value)||0;
    if(rcv>0){
      it.received += rcv;
      STOCK[it.pid][po.store] = (STOCK[it.pid][po.store]||0) + rcv;
      logMovement(it.pid, po.store, 'purchase', rcv, grnRef, `PO ${po.poNo}: ${notes}`, CU.id);
    }
    if(it.received < it.qty) allReceived = false;
  });
  po.status = allReceived ? 'received' : 'partial';
  logAudit('po-receive', po.poNo, `Items received • ${grnRef}`);
  toast('Goods received');
  closeModal(); renderMain();
}
function printPO(id){
  const po = PURCHASE_ORDERS.find(x=>x.id===id);
  const total = po.items.reduce((a,i)=>a+i.qty*i.unitCost,0);
  const doc = new jspdf.jsPDF();
  doc.setFontSize(16); doc.text('PURCHASE ORDER', 105, 15, {align:'center'});
  doc.setFontSize(10);
  doc.text(`PO #: ${po.poNo}`, 14, 30);
  doc.text(`Date: ${po.date}`, 14, 36);
  doc.text(`Expected: ${po.expectedDate}`, 14, 42);
  doc.text(`Store: ${getStoreName(po.store)}`, 120, 30);
  doc.text(`Supplier: ${getSupplier(po.supplier)}`, 120, 36);
  doc.text(`Currency: ${po.ccy}`, 120, 42);
  doc.autoTable({
    startY: 50,
    head: [['Product','SKU','Qty','Unit Cost','Line Total']],
    body: po.items.map(it=>{const p=getProduct(it.pid);return [p?.name||'',p?.sku||'',it.qty,it.unitCost.toFixed(2),(it.qty*it.unitCost).toFixed(2)]}),
    foot:[['','','','TOTAL', total.toFixed(2)+' '+po.ccy]],
    headStyles:{fillColor:[24,73,169]}
  });
  doc.save(`${po.poNo.replace(/\//g,'-')}.pdf`);
}

function addTransferItem(){ TRANSFER_DRAFT_ITEMS.push({ pid:'', qty:1 }); renderTransferItems(); }
function renderTransferItems(){
  const fromStore = el('tFrom')?.value || 'MAIN';
  el('tItems').innerHTML = TRANSFER_DRAFT_ITEMS.map((it,i)=>{
    const stock = it.pid ? getStock(it.pid, fromStore) : 0;
    return `<div style="display:grid;grid-template-columns:3fr 1fr auto;gap:8px;margin-bottom:6px;align-items:center">
      <select class="fs" onchange="TRANSFER_DRAFT_ITEMS[${i}].pid=this.value;renderTransferItems()">
        <option value="">— Select Product —</option>
        ${PRODUCTS.filter(p=>p.active && getStock(p.id, fromStore)>0).map(p=>`<option value="${p.id}" ${it.pid===p.id?'selected':''}>${p.name} (${getStock(p.id, fromStore)} in stock)</option>`).join('')}
      </select>
      <input type="number" class="fi" placeholder="Qty" value="${it.qty}" max="${stock}" oninput="TRANSFER_DRAFT_ITEMS[${i}].qty=parseInt(this.value)||0">
      <button class="btn btn-xs btn-r" onclick="TRANSFER_DRAFT_ITEMS.splice(${i},1);renderTransferItems()">✕</button>
    </div>`;
  }).join('');
}
function saveTransfer(){
  const from = el('tFrom').value;
  const to = el('tTo').value;
  if(from===to){ toast('From and To must differ','error'); return; }
  const items = TRANSFER_DRAFT_ITEMS.filter(i=>i.pid && i.qty>0);
  if(items.length===0){ toast('Add at least one item','error'); return; }
  // Verify stock
  for(const it of items){
    if(getStock(it.pid, from) < it.qty){ toast(`Insufficient stock for ${getProduct(it.pid).name}`,'error'); return; }
  }
  const yy = new Date().getFullYear();
  const seq = String(TRANSFERS.length+1).padStart(4,'0');
  const t = {
    id: 'T'+seq, transferNo: `TR/${yy}/${seq}`,
    fromStore: from, toStore: to,
    date: todayISO, status:'in-transit', items, notes: el('tNotes').value, createdBy: CU.id, completedAt:null
  };
  TRANSFERS.unshift(t);
  // Reduce from-store stock immediately
  items.forEach(it=>{
    STOCK[it.pid][from] -= it.qty;
    logMovement(it.pid, from, 'transfer-out', -it.qty, t.transferNo, `→ ${to}`, CU.id);
  });
  logAudit('create', 'transfer', `${t.transferNo}: ${from}→${to}`);
  toast('Transfer created');
  closeModal(); renderMain();
}
function viewTransfer(id){
  const t = TRANSFERS.find(x=>x.id===id);
  const body = `
    <div class="info-row"><span class="il">Transfer #</span><span class="iv mono">${t.transferNo}</span></div>
    <div class="info-row"><span class="il">From</span><span class="iv">${getStoreName(t.fromStore)}</span></div>
    <div class="info-row"><span class="il">To</span><span class="iv">${getStoreName(t.toStore)}</span></div>
    <div class="info-row"><span class="il">Date</span><span class="iv">${t.date}</span></div>
    <div class="info-row"><span class="il">Status</span><span class="iv"><span class="bdg b-${t.status==='completed'?'paid':t.status==='cancelled'?'rej':'pap'}">${t.status.toUpperCase()}</span></span></div>
    <div class="info-row"><span class="il">Created By</span><span class="iv">${getUserName(t.createdBy)}</span></div>
    ${t.completedAt?`<div class="info-row"><span class="il">Completed At</span><span class="iv">${t.completedAt}</span></div>`:''}
    <div class="fsec">Items</div>
    <div class="tw"><table>
      <tr><th>Product</th><th>SKU</th><th>Qty</th></tr>
      ${t.items.map(it=>{const p=getProduct(it.pid);return `<tr><td>${p?.name||''}</td><td>${p?.sku||''}</td><td>${it.qty}</td></tr>`}).join('')}
    </table></div>
    ${t.notes?`<div class="al al-i"><strong>Notes:</strong> ${t.notes}</div>`:''}
  `;
  openModal('Transfer Details', body, `<button class="btn" onclick="closeModal()">Close</button>${t.status==='in-transit'?`<button class="btn btn-g" onclick="completeTransfer('${t.id}')">Receive</button>`:''}`);
}
function completeTransfer(id){
  const t = TRANSFERS.find(x=>x.id===id);
  if(!confirm(`Confirm receipt of ${t.transferNo} at ${getStoreName(t.toStore)}?`)) return;
  t.items.forEach(it=>{
    STOCK[it.pid][t.toStore] = (STOCK[it.pid][t.toStore]||0) + it.qty;
    logMovement(it.pid, t.toStore, 'transfer-in', it.qty, t.transferNo, `← ${t.fromStore}`, CU.id);
  });
  t.status = 'completed'; t.completedAt = nowFull();
  logAudit('transfer-receive', t.transferNo, `Received at ${t.toStore}`);
  toast('Transfer completed');
  closeModal(); renderMain();
}

    email: el('cuEmail').value.trim(),

function saveDiscount(id){
  const data = {
    code: el('dCode').value.trim().toUpperCase(),
    name: el('dName').value.trim(),
    type: el('dType').value,
    value: parseFloat(el('dValue').value)||0,
    maxDiscount: parseFloat(el('dMax').value)||0,
    scope: el('dScope').value,
    minAmount: parseFloat(el('dMin').value)||0,
    validFrom: el('dFrom').value,
    validTo: el('dTo').value,
    active: el('dActive').value==='true'
  };
  if(data.scope==='category') data.categoryId = el('dCat').value;
  if(data.scope==='tier') data.tier = el('dTier').value;
  if(!data.code || !data.name){ toast('Code and name required','error'); return; }
  if(id){ Object.assign(DISCOUNTS.find(x=>x.id===id), data); toast('Promo updated'); }
  else { DISCOUNTS.push({ id:'D'+String(DISCOUNTS.length+1).padStart(3,'0'), used:0, ...data }); toast('Promo created'); }

  const reg = currentRegister();
  if(!sess || !reg){
    return `<div class="ph"><div><div class="pt">💰 My Cash Drawer</div></div></div>

  }
  const sales = SALES.filter(s=>s.regId===reg.id && s.status==='completed' && (s.date+' '+s.time) >= sess.openedAt);
  const cashSales = sales.reduce((a,s)=>{
    return a + (s.payments||[{method:s.paymentMethod,amount:s.total}]).filter(p=>p.method==='cash').reduce((x,p)=>x+p.amount,0);
  },0);
  const expectedCash = (sess.openingFloat||0) + cashSales;

            <div style="font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px">${r.t}</div>
            <div style="font-size:11px;color:var(--t2);line-height:1.5">${r.d}</div>
            <div style="font-size:11px;color:var(--blue);font-weight:700;margin-top:10px">View Report →</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
//  SALES REPORT
// ═══════════════════════════════════════════════════════════════
let REP_SALES_FILTER = { dateFrom: addDays(-30), dateTo: todayISO, store:'all', groupBy:'day' };
function renderSalesReport(){
  const f = REP_SALES_FILTER;
  let list = SALES.filter(s=>s.status==='completed' && s.date>=f.dateFrom && s.date<=f.dateTo);
  if(f.store!=='all') list = list.filter(s=>s.store===f.store);

  const total = list.reduce((a,b)=>a+b.totalInBase,0);
  const txns = list.length;
  const tax = list.reduce((a,b)=>a + (b.ccy==='MVR'?b.tax:b.tax*ccyRate(b.ccy)),0);
  const discount = list.reduce((a,b)=>a + (b.ccy==='MVR'?b.discount:b.discount*ccyRate(b.ccy)),0);
  const avg = txns>0 ? total/txns : 0;

  // Group by
  const groups = {};
  list.forEach(s=>{
    let key;
    if(f.groupBy==='day') key = s.date;
    else if(f.groupBy==='week'){
      const d = new Date(s.date);
      const start = new Date(d); start.setDate(d.getDate()-d.getDay());
      key = `Week of ${start.toISOString().slice(0,10)}`;
    } else if(f.groupBy==='month') key = s.date.slice(0,7);
    else if(f.groupBy==='store') key = s.store;
    else if(f.groupBy==='cashier') key = getUserName(s.cashier);
    else if(f.groupBy==='method') key = s.paymentMethod;
    else if(f.groupBy==='customer') key = getCustomer(s.customer).name;
    if(!groups[key]) groups[key] = { total:0, count:0, tax:0, discount:0, items:0 };
    groups[key].total += s.totalInBase;
    groups[key].count++;
    groups[key].tax += s.ccy==='MVR'?s.tax:s.tax*ccyRate(s.ccy);
    groups[key].discount += s.ccy==='MVR'?s.discount:s.discount*ccyRate(s.ccy);
    groups[key].items += s.items.reduce((a,i)=>a+i.qty,0);
  });
  const sortedGroups = Object.entries(groups).sort((a,b)=>{
    if(f.groupBy==='day'||f.groupBy==='week'||f.groupBy==='month') return b[0].localeCompare(a[0]);
    return b[1].total - a[1].total;
  });

  return `
    <div class="ph">
      <div><div class="pt">💹 Sales Report</div><div class="ps">${f.dateFrom} to ${f.dateTo}${f.store!=='all'?' • '+f.store:''}</div></div>
      <div class="brow">
        <button class="btn" onclick="exportSalesReport('csv')">📥 CSV</button>
        <button class="btn" onclick="exportSalesReport('xlsx')">📊 Excel</button>
        <button class="btn" onclick="exportSalesReport('pdf')">📄 PDF</button>
      </div>
    </div>

    <div class="card">
      <div class="cb">
        <div class="fg4">
          <div class="fg"><label class="fl">Date From</label><input type="date" class="fi" value="${f.dateFrom}" oninput="REP_SALES_FILTER.dateFrom=this.value;renderMain()"></div>
          <div class="fg"><label class="fl">Date To</label><input type="date" class="fi" value="${f.dateTo}" oninput="REP_SALES_FILTER.dateTo=this.value;renderMain()"></div>
          <div class="fg"><label class="fl">Store</label>
            <select class="fs" onchange="REP_SALES_FILTER.store=this.value;renderMain()">
              <option value="all">All Stores</option>
              ${STORES.map(s=>`<option value="${s.code}" ${f.store===s.code?'selected':''}>${s.code}</option>`).join('')}
            </select>
          </div>
          <div class="fg"><label class="fl">Group By</label>
            <select class="fs" onchange="REP_SALES_FILTER.groupBy=this.value;renderMain()">
              <option value="day" ${f.groupBy==='day'?'selected':''}>Day</option>
              <option value="week" ${f.groupBy==='week'?'selected':''}>Week</option>
              <option value="month" ${f.groupBy==='month'?'selected':''}>Month</option>
              <option value="store" ${f.groupBy==='store'?'selected':''}>Store</option>
              <option value="cashier" ${f.groupBy==='cashier'?'selected':''}>Cashier</option>
              <option value="method" ${f.groupBy==='method'?'selected':''}>Payment Method</option>
              <option value="customer" ${f.groupBy==='customer'?'selected':''}>Customer</option>
            </select>
          </div>
          <div class="fg" style="display:flex;gap:6px;align-items:flex-end">
            <button class="btn btn-sm" onclick="setSalesPeriod(7)">7d</button>
            <button class="btn btn-sm" onclick="setSalesPeriod(30)">30d</button>
            <button class="btn btn-sm" onclick="setSalesPeriod(90)">90d</button>
            <button class="btn btn-sm" onclick="setSalesPeriod(365)">1y</button>
          </div>
        </div>
      </div>
    </div>

    <div class="sgrid g4">
      <div class="sc bl"><div class="sl">Total Sales (MVR)</div><div class="sv">${fmtMoney(total,'MVR')}</div><div class="si">💹</div></div>
      <div class="sc gr"><div class="sl">Transactions</div><div class="sv">${txns}</div><div class="ss">Avg ${fmtMoney(avg,'MVR')}</div><div class="si">🧾</div></div>
      <div class="sc te"><div class="sl">Tax Collected</div><div class="sv">${fmtMoney(tax,'MVR')}</div><div class="si">📑</div></div>
      <div class="sc or"><div class="sl">Discounts Given</div><div class="sv">${fmtMoney(discount,'MVR')}</div><div class="si">🎯</div></div>
    </div>

    <div class="card">
      <div class="ch"><div class="ct">Sales by ${f.groupBy.charAt(0).toUpperCase()+f.groupBy.slice(1)}</div></div>
      <div class="cb flush">
        <div class="tw"><table>
          <tr><th>${f.groupBy.charAt(0).toUpperCase()+f.groupBy.slice(1)}</th><th>Transactions</th><th>Items Sold</th><th class="amt">Tax</th><th class="amt">Discounts</th><th class="amt" style="text-align:right">Net Sales</th><th class="amt" style="text-align:right">% of Total</th></tr>
          ${sortedGroups.length===0?'<tr><td colspan="7" style="padding:30px;text-align:center;color:var(--t3)">No data</td></tr>':sortedGroups.map(([k,d])=>`
            <tr>
              <td><strong>${k}</strong></td>
              <td>${d.count}</td>
              <td>${d.items}</td>
              <td class="amt">${fmtMoney(d.tax,'MVR')}</td>
              <td class="amt">${fmtMoney(d.discount,'MVR')}</td>
              <td class="amt" style="color:var(--blue3);font-weight:800">${fmtMoney(d.total,'MVR')}</td>
              <td class="amt">${total>0?(d.total/total*100).toFixed(1):0}%</td>
            </tr>
          `).join('')}
          ${sortedGroups.length>0?`<tr style="background:var(--blue2);font-weight:800">
            <td>TOTAL</td><td>${txns}</td><td>${list.reduce((a,s)=>a+s.items.reduce((x,i)=>x+i.qty,0),0)}</td>
            <td class="amt">${fmtMoney(tax,'MVR')}</td><td class="amt">${fmtMoney(discount,'MVR')}</td>
            <td class="amt" style="font-size:14px;color:var(--blue3)">${fmtMoney(total,'MVR')}</td><td class="amt">100%</td>
          </tr>`:''}
        </table></div>
      </div>
    </div>

    <div class="dash-row">
      <div class="card">
        <div class="ch"><div class="ct">Top 10 Products by Revenue</div></div>
        <div class="cb flush">
          ${(()=>{
            const ptot = {};
            list.forEach(s=>s.items.forEach(it=>{
              if(!ptot[it.pid]) ptot[it.pid]={qty:0,total:0,name:it.name};
              ptot[it.pid].qty += it.qty;
              ptot[it.pid].total += it.lineTotal * (s.ccy==='MVR'?1:s.fxRate);
            }));
            const top = Object.entries(ptot).sort((a,b)=>b[1].total-a[1].total).slice(0,10);
            if(top.length===0) return '<div style="padding:30px;text-align:center;color:var(--t3)">No data</div>';
            return top.map(([pid,d],i)=>`<div class="list-row">
              <div class="lr-rank">${i+1}</div>
              <div class="lr-info"><div class="lr-name">${d.name}</div><div class="lr-meta">${d.qty} sold</div></div>
              <div class="lr-amt">${fmtMoney(d.total,'MVR')}</div>
            </div>`).join('');
          })()}
        </div>
      </div>
      <div class="card">
        <div class="ch"><div class="ct">By Payment Method</div></div>
        <div class="cb">
          ${(()=>{
            const pm = {};
            list.forEach(s=>{ pm[s.paymentMethod] = (pm[s.paymentMethod]||0) + s.totalInBase; });
            return Object.entries(pm).sort((a,b)=>b[1]-a[1]).map(([m,v])=>{
              const meth = PAYMENT_METHODS.find(x=>x.id===m)||{name:m,icon:'💰'};
              const pct = total>0?(v/total*100).toFixed(1):0;
              return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;font-weight:600">${meth.icon} ${meth.name}</span><span class="mono" style="font-size:11px;font-weight:700">${fmtMoney(v,'MVR')} (${pct}%)</span></div><div class="pbar-bg"><div class="pbar-fill" style="width:${pct}%"></div></div></div>`;
            }).join('');
          })()}
        </div>
      </div>
    </div>
  `;
}
function setSalesPeriod(days){ REP_SALES_FILTER.dateFrom = addDays(-days); REP_SALES_FILTER.dateTo = todayISO; renderMain(); }
function exportSalesReport(format){
  const f = REP_SALES_FILTER;
  let list = SALES.filter(s=>s.status==='completed' && s.date>=f.dateFrom && s.date<=f.dateTo);
  if(f.store!=='all') list = list.filter(s=>s.store===f.store);
  const rows = list.map(s=>({
    'Date':s.date, 'Time':s.time, 'Invoice':s.invoiceNo, 'Store':s.store,
    'Cashier':getUserName(s.cashier), 'Customer':getCustomer(s.customer).name,
    'Items':s.items.length, 'Qty':s.items.reduce((a,i)=>a+i.qty,0),
    'Subtotal':s.subtotal.toFixed(2), 'Discount':s.discount.toFixed(2), 'Tax':s.tax.toFixed(2),
    'Total':s.total.toFixed(2), 'Ccy':s.ccy, 'Total MVR':s.totalInBase.toFixed(2),
    'Payment':s.paymentMethod
  }));
  if(format==='csv' || format==='xlsx'){
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Sales Report');
    XLSX.writeFile(wb, `sales-report-${f.dateFrom}-to-${f.dateTo}.${format}`);
  } else {
    const doc = new jspdf.jsPDF('l');
    doc.setFontSize(14); doc.text(`Sales Report — ${f.dateFrom} to ${f.dateTo}`, 14, 14);
    doc.autoTable({
      startY: 22,
      head: [['Date','Invoice','Store','Cashier','Customer','Items','Total','Method']],
      body: list.map(s=>[s.date, s.invoiceNo, s.store, getUserName(s.cashier).slice(0,15), getCustomer(s.customer).name.slice(0,20), s.items.length, fmtMoney(s.total,s.ccy), s.paymentMethod]),
      styles:{fontSize:7}, headStyles:{fillColor:[24,73,169]}
    });
    doc.save(`sales-report-${f.dateFrom}-to-${f.dateTo}.pdf`);
  }
  toast('Report exported');
}

      <div><div class="pt">📦 Inventory Report</div><div class="ps">As of ${todayISO}</div></div>
      <div class="brow">

      <div class="sc or"><div class="sl">Potential Profit</div><div class="sv">${fmtMoney(potentialProfit,'MVR')}</div><div class="ss">${totalRetail>0?(potentialProfit/totalRetail*100).toFixed(1):0}% margin</div></div>

    <div class="card">
      <div class="ch"><div class="ct">Inventory Valuation by Category</div></div>
      <div class="cb flush">
        <div class="tw"><table>
          <tr><th>Category</th><th>SKUs</th><th class="amt">Total Units</th><th class="amt">Cost Value</th><th class="amt">Retail Value</th><th class="amt">Margin</th></tr>
          ${CATEGORIES.map(c=>{
            const prods = PRODUCTS.filter(p=>p.cat===c.id);
            const units = prods.reduce((a,p)=>a+getTotalStock(p.id),0);
            const cost = prods.reduce((a,p)=>a+getTotalStock(p.id)*p.cost,0);
            const retail = prods.reduce((a,p)=>a+getTotalStock(p.id)*p.price,0);
            return `<tr>
              <td>${c.icon} <strong>${c.name}</strong></td>
              <td>${prods.length}</td>
              <td class="amt">${units}</td>
              <td class="amt">${fmtMoney(cost,'MVR')}</td>
              <td class="amt">${fmtMoney(retail,'MVR')}</td>
              <td class="amt" style="color:var(--green);font-weight:700">${fmtMoney(retail-cost,'MVR')}</td>
            </tr>`;
          }).join('')}
          <tr style="background:var(--blue2);font-weight:800">
            <td>TOTAL</td>
            <td>${PRODUCTS.length}</td>
            <td class="amt">${PRODUCTS.reduce((a,p)=>a+getTotalStock(p.id),0)}</td>
            <td class="amt">${fmtMoney(totalCost,'MVR')}</td>
            <td class="amt">${fmtMoney(totalRetail,'MVR')}</td>
            <td class="amt" style="color:var(--green);font-size:13px">${fmtMoney(potentialProfit,'MVR')}</td>
          </tr>
        </table></div>
      </div>
    </div>

    <div class="dash-row">
      <div class="card">
        <div class="ch"><div class="ct">Low / Out of Stock Items</div></div>
        <div class="cb flush" style="max-height:400px;overflow-y:auto">
          ${PRODUCTS.filter(p=>getTotalStock(p.id)<=p.lowStock).sort((a,b)=>getTotalStock(a.id)-getTotalStock(b.id)).map(p=>{
            const total = getTotalStock(p.id);
            const isOut = total===0;
            return `<div class="list-row">
              <div style="font-size:24px">${p.img}</div>
              <div class="lr-info"><div class="lr-name">${p.name}</div><div class="lr-meta">${p.sku} • Reorder at ${p.lowStock}</div></div>
              <div style="text-align:right">
                <div class="lr-amt" style="color:${isOut?'var(--red)':'var(--amber)'}">${total} ${p.unit}</div>
                <span class="bdg ${isOut?'b-out':'b-low'}" style="font-size:9px">${isOut?'OUT':'LOW'}</span>
              </div>
            </div>`;
          }).join('')||'<div style="padding:20px;text-align:center;color:var(--green)">✓ All stock healthy</div>'}
        </div>
      </div>
      <div class="card">
        <div class="ch"><div class="ct">Stock by Store</div></div>
        <div class="cb">
          ${STORES.filter(s=>s.active).map(s=>{
            const value = PRODUCTS.reduce((a,p)=>a+getStock(p.id, s.code)*p.cost,0);
            const pct = totalCost>0?(value/totalCost*100).toFixed(0):0;
            return `<div style="margin-bottom:10px">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:12px;font-weight:600"><span class="etag e-${s.code}">${s.code}</span> ${s.name}</span>
                <span class="mono" style="font-size:11px">${fmtMoney(value,'MVR')}</span>
              </div>
              <div class="pbar-bg"><div class="pbar-fill" style="width:${pct}%"></div></div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  `;
}
function exportInventoryReport(format){
  const rows = PRODUCTS.map(p=>{
    const r = { 'SKU':p.sku, 'Name':p.name, 'Category':getCategory(p.cat)?.name, 'Unit':p.unit, 'Cost':p.cost, 'Price':p.price };
    STORES.forEach(s=>r[`Stock-${s.code}`]=getStock(p.id, s.code));
    r['Total Stock']=getTotalStock(p.id); r['Cost Value']=(getTotalStock(p.id)*p.cost).toFixed(2);
    r['Retail Value']=(getTotalStock(p.id)*p.price).toFixed(2);
    return r;
  });
  if(format==='xlsx'){
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Inventory');
    XLSX.writeFile(wb, `inventory-${todayISO}.xlsx`);
  } else {
    const doc = new jspdf.jsPDF('l');
    doc.setFontSize(14); doc.text('Inventory Report', 14, 14);
    doc.autoTable({ startY:22, head:[['SKU','Product','Category','Total','Cost','Retail Value']],

      styles:{fontSize:8}, headStyles:{fillColor:[24,73,169]} });
    doc.save(`inventory-${todayISO}.pdf`);
  }
  toast('Inventory exported');
}

// ═══════════════════════════════════════════════════════════════
//  TAX REPORT
// ═══════════════════════════════════════════════════════════════
let TAX_REP_FILTER = { dateFrom: addDays(-30), dateTo: todayISO };
function renderTaxReport(){
  const f = TAX_REP_FILTER;
  const list = SALES.filter(s=>s.status==='completed' && s.date>=f.dateFrom && s.date<=f.dateTo);
  const taxByRate = {};
  const taxByDay = {};
  list.forEach(s=>{
    s.items.forEach(it=>{
      const rate = it.taxRate || 0;
      const lineNet = it.lineNet * (s.ccy==='MVR'?1:s.fxRate);
      const lineTax = it.lineTax * (s.ccy==='MVR'?1:s.fxRate);
      if(!taxByRate[rate]) taxByRate[rate] = { net:0, tax:0, count:0 };
      taxByRate[rate].net += lineNet;
      taxByRate[rate].tax += lineTax;
      taxByRate[rate].count += it.qty;
    });
    if(!taxByDay[s.date]) taxByDay[s.date] = { net:0, tax:0, total:0 };
    taxByDay[s.date].net += s.subtotal * (s.ccy==='MVR'?1:s.fxRate);
    taxByDay[s.date].tax += s.tax * (s.ccy==='MVR'?1:s.fxRate);
    taxByDay[s.date].total += s.totalInBase;
  });
  const totalNet = Object.values(taxByRate).reduce((a,b)=>a+b.net,0);
  const totalTax = Object.values(taxByRate).reduce((a,b)=>a+b.tax,0);

  return `
    <div class="ph">
      <div><div class="pt">🧾 Tax Report (${TAX_CONFIG.taxName})</div><div class="ps">${f.dateFrom} to ${f.dateTo}</div></div>
      <div class="brow"><button class="btn" onclick="exportTaxReport()">📥 Export</button></div>
    </div>

    <div class="card">
      <div class="cb">
        <div class="fg3">
          <div class="fg"><label class="fl">Date From</label><input type="date" class="fi" value="${f.dateFrom}" oninput="TAX_REP_FILTER.dateFrom=this.value;renderMain()"></div>
          <div class="fg"><label class="fl">Date To</label><input type="date" class="fi" value="${f.dateTo}" oninput="TAX_REP_FILTER.dateTo=this.value;renderMain()"></div>
          <div class="fg" style="display:flex;align-items:flex-end;gap:6px">
            <button class="btn btn-sm" onclick="setTaxPeriod('thisMonth')">This Month</button>
            <button class="btn btn-sm" onclick="setTaxPeriod('lastMonth')">Last Month</button>
            <button class="btn btn-sm" onclick="setTaxPeriod('thisQuarter')">This Quarter</button>
          </div>
        </div>
      </div>
    </div>

    <div class="al al-i">
      <strong>Tax Registration:</strong> ${TAX_CONFIG.tinNumber} • Tax: ${TAX_CONFIG.taxName} ${TAX_CONFIG.defaultRate}% • Mode: ${TAX_CONFIG.inclusive?'Inclusive':'Exclusive'}
    </div>

    <div class="sgrid g3">
      <div class="sc bl"><div class="sl">Net Sales (Pre-Tax)</div><div class="sv">${fmtMoney(totalNet,'MVR')}</div><div class="si">💹</div></div>
      <div class="sc gr"><div class="sl">${TAX_CONFIG.taxName} Collected</div><div class="sv">${fmtMoney(totalTax,'MVR')}</div><div class="si">📑</div></div>
      <div class="sc te"><div class="sl">Gross Sales</div><div class="sv">${fmtMoney(totalNet+totalTax,'MVR')}</div><div class="si">💰</div></div>
    </div>

    <div class="card">
      <div class="ch"><div class="ct">Tax Breakdown by Rate</div></div>
      <div class="cb flush">
        <div class="tw"><table>
          <tr><th>Tax Rate</th><th class="amt">Items Sold</th><th class="amt">Net Sales</th><th class="amt">Tax Collected</th><th class="amt">Gross</th></tr>
          ${Object.entries(taxByRate).sort((a,b)=>parseFloat(a[0])-parseFloat(b[0])).map(([r,d])=>`<tr>
            <td><strong>${r}%</strong></td>
            <td class="amt">${d.count}</td>
            <td class="amt">${fmtMoney(d.net,'MVR')}</td>
            <td class="amt" style="color:var(--blue);font-weight:700">${fmtMoney(d.tax,'MVR')}</td>
            <td class="amt">${fmtMoney(d.net+d.tax,'MVR')}</td>
          </tr>`).join('')}
          <tr style="background:var(--blue2);font-weight:800">
            <td>TOTAL</td><td class="amt">—</td>
            <td class="amt">${fmtMoney(totalNet,'MVR')}</td>
            <td class="amt" style="font-size:13px;color:var(--blue3)">${fmtMoney(totalTax,'MVR')}</td>
            <td class="amt">${fmtMoney(totalNet+totalTax,'MVR')}</td>
          </tr>
        </table></div>
      </div>
    </div>

    <div class="card">

function setTaxPeriod(p){
  const today = new Date();
  if(p==='thisMonth'){
    TAX_REP_FILTER.dateFrom = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-01`;
    TAX_REP_FILTER.dateTo = todayISO;
  } else if(p==='lastMonth'){
    const d = new Date(today.getFullYear(), today.getMonth()-1, 1);
    const last = new Date(today.getFullYear(), today.getMonth(), 0);
    TAX_REP_FILTER.dateFrom = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
    TAX_REP_FILTER.dateTo = `${last.getFullYear()}-${String(last.getMonth()+1).padStart(2,'0')}-${String(last.getDate()).padStart(2,'0')}`;
  } else if(p==='thisQuarter'){
    const q = Math.floor(today.getMonth()/3);
    TAX_REP_FILTER.dateFrom = `${today.getFullYear()}-${String(q*3+1).padStart(2,'0')}-01`;
    TAX_REP_FILTER.dateTo = todayISO;
  }
  renderMain();
}

let PROFIT_FILTER = { dateFrom: addDays(-30), dateTo: todayISO };
function renderProfitReport(){
  const f = PROFIT_FILTER;
  const list = SALES.filter(s=>s.status==='completed' && s.date>=f.dateFrom && s.date<=f.dateTo);

  let totalRevenue = 0, totalCost = 0;
  const profitByCat = {};
  const profitByProd = {};
  list.forEach(s=>{
    const fxMul = s.ccy==='MVR'?1:s.fxRate;
    s.items.forEach(it=>{
      const rev = it.lineTotal * fxMul;
      const cost = it.lineCost * fxMul;
      totalRevenue += rev;
      totalCost += cost;
      const p = getProduct(it.pid);
      if(p){
        const cat = p.cat;
        if(!profitByCat[cat]) profitByCat[cat] = { rev:0, cost:0, qty:0 };
        profitByCat[cat].rev += rev;
        profitByCat[cat].cost += cost;
        profitByCat[cat].qty += it.qty;
      }
      if(!profitByProd[it.pid]) profitByProd[it.pid] = { rev:0, cost:0, qty:0, name:it.name };
      profitByProd[it.pid].rev += rev;
      profitByProd[it.pid].cost += cost;
      profitByProd[it.pid].qty += it.qty;
    });
  });
  const grossProfit = totalRevenue - totalCost;
  const margin = totalRevenue>0 ? (grossProfit/totalRevenue*100).toFixed(1) : 0;

  return `
    <div class="ph">
      <div><div class="pt">💎 Profit & Margin Report</div><div class="ps">${f.dateFrom} to ${f.dateTo}</div></div>
      <div class="brow"><button class="btn" onclick="exportProfitReport()">📥 Export</button></div>
    </div>

    <div class="card">
      <div class="cb">
        <div class="fg3">
          <div class="fg"><label class="fl">From</label><input type="date" class="fi" value="${f.dateFrom}" oninput="PROFIT_FILTER.dateFrom=this.value;renderMain()"></div>
          <div class="fg"><label class="fl">To</label><input type="date" class="fi" value="${f.dateTo}" oninput="PROFIT_FILTER.dateTo=this.value;renderMain()"></div>
          <div class="fg" style="display:flex;align-items:flex-end;gap:6px">
            <button class="btn btn-sm" onclick="PROFIT_FILTER={dateFrom:addDays(-7),dateTo:todayISO};renderMain()">7d</button>
            <button class="btn btn-sm" onclick="PROFIT_FILTER={dateFrom:addDays(-30),dateTo:todayISO};renderMain()">30d</button>
            <button class="btn btn-sm" onclick="PROFIT_FILTER={dateFrom:addDays(-90),dateTo:todayISO};renderMain()">90d</button>
          </div>
        </div>
      </div>
    </div>

    <div class="sgrid g4">
      <div class="sc bl"><div class="sl">Revenue</div><div class="sv">${fmtMoney(totalRevenue,'MVR')}</div><div class="si">💹</div></div>
      <div class="sc rd"><div class="sl">COGS</div><div class="sv">${fmtMoney(totalCost,'MVR')}</div><div class="ss">Cost of goods sold</div><div class="si">💸</div></div>
      <div class="sc gr"><div class="sl">Gross Profit</div><div class="sv">${fmtMoney(grossProfit,'MVR')}</div><div class="si">💎</div></div>
      <div class="sc te"><div class="sl">Margin</div><div class="sv">${margin}%</div><div class="si">📊</div></div>
    </div>

    <div class="card">
      <div class="ch"><div class="ct">Profit by Category</div></div>
      <div class="cb flush">
        <div class="tw"><table>
          <tr><th>Category</th><th class="amt">Qty Sold</th><th class="amt">Revenue</th><th class="amt">COGS</th><th class="amt">Profit</th><th class="amt">Margin</th></tr>
          ${Object.entries(profitByCat).sort((a,b)=>(b[1].rev-b[1].cost)-(a[1].rev-a[1].cost)).map(([cid,d])=>{
            const c = getCategory(cid);
            const profit = d.rev - d.cost;
            const m = d.rev>0?(profit/d.rev*100).toFixed(1):0;
            return `<tr>
              <td>${c?.icon} <strong>${c?.name||cid}</strong></td>
              <td class="amt">${d.qty}</td>
              <td class="amt">${fmtMoney(d.rev,'MVR')}</td>
              <td class="amt">${fmtMoney(d.cost,'MVR')}</td>
              <td class="amt" style="color:var(--green);font-weight:800">${fmtMoney(profit,'MVR')}</td>
              <td class="amt" style="font-weight:700">${m}%</td>
            </tr>`;
          }).join('')}
        </table></div>
      </div>
    </div>

    <div class="card">
      <div class="ch"><div class="ct">Top 20 Products by Profit</div></div>
      <div class="cb flush">
        <div class="tw"><table>
          <tr><th>Product</th><th class="amt">Qty</th><th class="amt">Revenue</th><th class="amt">Cost</th><th class="amt">Profit</th><th class="amt">Margin</th></tr>
          ${Object.entries(profitByProd).sort((a,b)=>(b[1].rev-b[1].cost)-(a[1].rev-a[1].cost)).slice(0,20).map(([pid,d])=>{
            const profit = d.rev - d.cost;
            const m = d.rev>0?(profit/d.rev*100).toFixed(1):0;
            return `<tr>
              <td><strong>${d.name}</strong></td>
              <td class="amt">${d.qty}</td>
              <td class="amt">${fmtMoney(d.rev,'MVR')}</td>
              <td class="amt">${fmtMoney(d.cost,'MVR')}</td>
              <td class="amt" style="color:var(--green);font-weight:700">${fmtMoney(profit,'MVR')}</td>
              <td class="amt">${m}%</td>
            </tr>`;
          }).join('')}
        </table></div>
      </div>
    </div>
  `;
}
function exportProfitReport(){
  const f = PROFIT_FILTER;
  const list = SALES.filter(s=>s.status==='completed' && s.date>=f.dateFrom && s.date<=f.dateTo);
  const profitByProd = {};
  list.forEach(s=>{
    const fxMul = s.ccy==='MVR'?1:s.fxRate;
    s.items.forEach(it=>{
      if(!profitByProd[it.pid]) profitByProd[it.pid]={qty:0,rev:0,cost:0,name:it.name,sku:it.sku};
      profitByProd[it.pid].qty += it.qty;

  }));
  const ws = XLSX.utils.json_to_sheet(rows);

  XLSX.utils.book_append_sheet(wb, ws, 'Profit Report');

}

// ═══════════════════════════════════════════════════════════════
let CASHIER_FILTER = { dateFrom: addDays(-30), dateTo: todayISO };
function renderCashierReport(){
  const f = CASHIER_FILTER;
  const list = SALES.filter(s=>s.status==='completed' && s.date>=f.dateFrom && s.date<=f.dateTo);
  const stats = {};
  list.forEach(s=>{
    if(!stats[s.cashier]) stats[s.cashier] = { total:0, count:0, items:0, refunds:0, voids:0, store:s.store };
    stats[s.cashier].total += s.totalInBase;
    stats[s.cashier].count++;
    stats[s.cashier].items += s.items.reduce((a,i)=>a+i.qty,0);
  });
  // count voids/refunds
  SALES.filter(s=>s.date>=f.dateFrom && s.date<=f.dateTo).forEach(s=>{
    if(s.status==='voided' && s.voidedBy && stats[s.voidedBy]) stats[s.voidedBy].voids++;
    if(s.status==='refunded' && stats[s.cashier]) stats[s.cashier].refunds++;
  });

  // Variance
  const variances = {};
  SESSIONS.filter(s=>s.status==='closed' && s.openedAt>=f.dateFrom).forEach(s=>{
    if(!variances[s.cashier]) variances[s.cashier] = { sessions:0, totalVar:0 };
    variances[s.cashier].sessions++;
    variances[s.cashier].totalVar += s.variance;
  });

  return `
    <div class="ph">
      <div><div class="pt">👤 Cashier Performance</div><div class="ps">${f.dateFrom} to ${f.dateTo}</div></div>
      <div class="brow"><button class="btn" onclick="exportCashierReport()">📥 Export</button></div>
    </div>

    <div class="card">
      <div class="cb">
        <div class="fg3">
          <div class="fg"><label class="fl">From</label><input type="date" class="fi" value="${f.dateFrom}" oninput="CASHIER_FILTER.dateFrom=this.value;renderMain()"></div>
          <div class="fg"><label class="fl">To</label><input type="date" class="fi" value="${f.dateTo}" oninput="CASHIER_FILTER.dateTo=this.value;renderMain()"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="cb flush">
        <div class="tw"><table>
          <tr><th></th><th>Cashier</th><th>Store</th><th class="amt">Transactions</th><th class="amt">Items Sold</th><th class="amt">Total Sales</th><th class="amt">Avg Ticket</th><th>Voids</th><th>Refunds</th><th>Cash Variance</th></tr>
          ${Object.entries(stats).sort((a,b)=>b[1].total-a[1].total).map(([cid,d])=>{
            const u = getUser(cid);
            const v = variances[cid] || { sessions:0, totalVar:0 };
            return `<tr>
              <td><div class="av sm" style="background:${u?.color||'#94a3b8'}">${u?.initials||'?'}</div></td>
              <td><strong>${u?.name||cid}</strong></td>
              <td><span class="etag e-${d.store}">${d.store}</span></td>
              <td class="amt">${d.count}</td>
              <td class="amt">${d.items}</td>
              <td class="amt" style="color:var(--blue3);font-weight:800">${fmtMoney(d.total,'MVR')}</td>
              <td class="amt">${fmtMoney(d.total/d.count,'MVR')}</td>
              <td>${d.voids||0}</td>
              <td>${d.refunds||0}</td>
              <td class="amt" style="color:${v.totalVar===0?'var(--green)':v.totalVar>0?'var(--blue)':'var(--red)'};font-weight:700">${v.sessions?fmtMoney(v.totalVar,'MVR'):'—'}<div style="font-size:9px;color:var(--t3);font-weight:500">${v.sessions} sessions</div></td>
            </tr>`;
          }).join('')}
        </table></div>
      </div>
    </div>
  `;
}
function exportCashierReport(){
  const f = CASHIER_FILTER;
  const list = SALES.filter(s=>s.status==='completed' && s.date>=f.dateFrom && s.date<=f.dateTo);
  const stats = {};

  }));

}

function simulateFxUpdate(){
  CURRENCIES.forEach(c=>{
    if(!c.isBase) c.rate = c.rate * (0.98 + Math.random()*0.04); // ±2%

let PERM_ROLE = 'manager'; // current role being edited
function renderPermissions(){
  const role = PERM_ROLE;
  const isAdminRole = role === 'admin';
  const grouped = {};
  ALL_FEATURES.forEach(f=>{
    if(!grouped[f.group]) grouped[f.group] = [];
    grouped[f.group].push(f);
  });
  const granted = PERMISSIONS[role] || new Set();

  // User overrides (per-user grants/denies)
  const usersInRole = USERS.filter(u=>u.active && u.role !== 'admin');

  return `
    <div class="ph">
      <div><div class="pt">🔒 Permissions / Access Control</div><div class="ps">Control which features each role can access</div></div>
      <div class="brow">
        <button class="btn" onclick="resetPermissionsToDefault()">↺ Reset to Defaults</button>
      </div>
    </div>

    <div class="al al-i">
      <strong>How it works:</strong> Permissions are managed per <strong>role</strong>. Tick a box to grant access, untick to revoke. Admin always has full access (cannot be restricted). Changes apply immediately on save. Per-user overrides are available below for fine-grained control.

        <div class="ct">Edit Role: select role to configure</div>
      </div>

        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
          ${['admin','manager','cashier','inventory','accountant'].map(r=>`
            <button class="ebt ${role===r?'on':''}${r==='admin'?' disabled':''}" onclick="${r==='admin'?'':`PERM_ROLE='${r}';renderMain()`}" style="${r==='admin'?'opacity:.5;cursor:not-allowed':''}">
              ${r==='admin'?'🛡️ ':r==='manager'?'👔 ':r==='cashier'?'🛒 ':r==='inventory'?'📦 ':'📒 '}${r.toUpperCase()}
              <span style="font-size:9px;margin-left:4px;color:var(--t3)">(${USERS.filter(u=>u.role===r&&u.active).length} user${USERS.filter(u=>u.role===r&&u.active).length===1?'':'s'})</span>
            </button>
          `).join('')}
        </div>

        ${isAdminRole?`<div class="al al-w"><strong>Admin role</strong> always has full access to all features. To restrict a specific user, change their role or use per-user overrides below.</div>`:''}

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="font-weight:700;font-size:13px;color:var(--blue3)">Configuring: <strong style="text-transform:uppercase">${role}</strong> — ${granted.size} of ${ALL_FEATURES.length} features granted</div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-xs" onclick="permGrantAll('${role}')" ${isAdminRole?'disabled':''}>✓ Grant All</button>
            <button class="btn btn-xs btn-r" onclick="permRevokeAll('${role}')" ${isAdminRole?'disabled':''}>✕ Revoke All</button>
          </div>
        </div>

        ${Object.entries(grouped).map(([groupName, features])=>{
          const groupGranted = features.filter(f=>granted.has(f.id)).length;
          return `
            <div style="border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden">
              <div style="background:var(--bg-alt);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">
                <div style="font-weight:700;color:var(--text)">${groupName}</div>
                <div style="display:flex;align-items:center;gap:10px">
                  <span style="font-size:11px;color:var(--t3)">${groupGranted}/${features.length}</span>
                  <button class="btn btn-xs" onclick="permToggleGroup('${role}','${groupName}',true)" ${isAdminRole?'disabled':''}>All</button>
                  <button class="btn btn-xs" onclick="permToggleGroup('${role}','${groupName}',false)" ${isAdminRole?'disabled':''}>None</button>
                </div>
              </div>
              <div style="padding:8px 14px">
                ${features.map(f=>`
                  <label style="display:flex;align-items:center;gap:10px;padding:6px 0;cursor:${isAdminRole?'not-allowed':'pointer'};${isAdminRole?'opacity:.6':''}">
                    <input type="checkbox" ${granted.has(f.id)?'checked':''} ${isAdminRole?'disabled':''} onchange="permToggle('${role}','${f.id}',this.checked)">
                    <span style="font-size:12px">${f.lb}</span>
                    <span style="font-size:9px;color:var(--t3);font-family:monospace;margin-left:auto">${f.id}</span>
                  </label>
                `).join('')}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <div class="card">
      <div class="ch"><div class="ct">Per-User Overrides</div></div>
      <div class="cb">
        <div class="al al-i">Per-user overrides let you grant individual users access to features beyond what their role allows, OR specifically deny features their role normally has.</div>
        <div class="tw"><table>
          <tr><th>User</th><th>Role</th><th>Extra Grants</th><th>Specific Denies</th><th>Actions</th></tr>
          ${usersInRole.length===0?'<tr><td colspan="5" style="padding:14px;text-align:center;color:var(--t3)">No non-admin users</td></tr>':usersInRole.map(u=>`<tr>
            <td><div style="display:flex;align-items:center;gap:8px"><div class="av sm" style="background:${u.color}">${u.initials}</div><strong>${u.name}</strong></div></td>
            <td><span class="bdg b-sub" style="text-transform:uppercase">${u.role}</span></td>
            <td>${(u.permissions||[]).length===0?'<span style="color:var(--t3)">—</span>':(u.permissions||[]).map(p=>`<span class="bdg b-active" style="font-size:9px;margin-right:3px">${p}</span>`).join('')}</td>
            <td>${(u.deniedPermissions||[]).length===0?'<span style="color:var(--t3)">—</span>':(u.deniedPermissions||[]).map(p=>`<span class="bdg b-rej" style="font-size:9px;margin-right:3px">${p}</span>`).join('')}</td>
            <td><button class="btn btn-xs" onclick="openUserOverridesModal('${u.id}')">Edit Overrides</button></td>
          </tr>`).join('')}
        </table></div>
      </div>
    </div>
  `;
}
function permToggle(role, featureId, enabled){
  if(!PERMISSIONS[role]) PERMISSIONS[role] = new Set();
  if(enabled) PERMISSIONS[role].add(featureId);
  else PERMISSIONS[role].delete(featureId);
  logAudit('permission-change', role, `${enabled?'Granted':'Revoked'} ${featureId}`);
  // Re-render sidebar in case current user is in this role
  if(CU?.role === role) renderSidebar();
}
function permToggleGroup(role, groupName, enable){
  if(!PERMISSIONS[role]) PERMISSIONS[role] = new Set();
  ALL_FEATURES.filter(f=>f.group===groupName).forEach(f=>{
    if(enable) PERMISSIONS[role].add(f.id);
    else PERMISSIONS[role].delete(f.id);
  });
  logAudit('permission-change', role, `${enable?'Granted':'Revoked'} all ${groupName} features`);
  if(CU?.role === role) renderSidebar();
  renderMain();
  toast(`${enable?'Granted':'Revoked'} all ${groupName} features for ${role}`);
}
function permGrantAll(role){
  if(!confirm(`Grant ALL permissions to ${role}?`)) return;
  PERMISSIONS[role] = new Set(ALL_FEATURES.map(f=>f.id));
  logAudit('permission-change', role, 'Granted all permissions');
  if(CU?.role === role) renderSidebar();
  renderMain();
  toast(`All permissions granted to ${role}`);
}
function permRevokeAll(role){
  if(!confirm(`Revoke ALL permissions from ${role}? They will only see Dashboard.`)) return;
  PERMISSIONS[role] = new Set(['dashboard']); // always keep dashboard
  logAudit('permission-change', role, 'Revoked all permissions');
  if(CU?.role === role) renderSidebar();
  renderMain();
  toast(`All permissions revoked from ${role}`);
}
function resetPermissionsToDefault(){
  if(!confirm('Reset all role permissions to factory defaults?')) return;
  PERMISSIONS = {
    admin: new Set(ALL_FEATURES.map(f=>f.id)),
    manager: new Set(['dashboard','pos','sales-history','returns','parked','products','stock','purchase-orders','suppliers','transfers','customers','discounts','bills','registers','sessions','my-session','reports','rep-sales','rep-inventory','rep-cashier']),
    cashier: new Set(['dashboard','pos','parked','my-sales','my-session','customers','discounts-view']),
    inventory: new Set(['dashboard','products','categories','stock','purchase-orders','suppliers','transfers','movements','rep-inventory']),
    accountant: new Set(['dashboard','sales-history','sessions','bills','reports','rep-sales','rep-tax','rep-revcogs','rep-mira-output','rep-mira-input','rep-gst-settle','rep-profit','rep-cashier','currencies','tax-config'])
  };
  logAudit('permission-change', 'all', 'Reset to defaults');
  renderSidebar(); renderMain();
  toast('Permissions reset to defaults');
}
function openUserOverridesModal(userId){
  const u = USERS.find(x=>x.id===userId);
  if(!u) return;
  const grouped = {};
  ALL_FEATURES.forEach(f=>{
    if(!grouped[f.group]) grouped[f.group] = [];
    grouped[f.group].push(f);
  });
  const roleSet = PERMISSIONS[u.role] || new Set();
  const userGrants = u.permissions || [];
  const userDenies = u.deniedPermissions || [];
  const body = `
    <div class="al al-i">
      <strong>Per-User Overrides for ${u.name}</strong> (Role: ${u.role.toUpperCase()})<br>
      <span style="font-size:11px">Each feature shows the role default. You can override for this specific user.</span>
    </div>
    ${Object.entries(grouped).map(([groupName, features])=>`
      <div style="border:1px solid var(--border);border-radius:8px;margin-bottom:10px;padding:10px 14px">
        <div style="font-weight:700;color:var(--text);margin-bottom:8px">${groupName}</div>
        ${features.map(f=>{
          const inRole = roleSet.has(f.id);
          const isGrant = userGrants.includes(f.id);
          const isDeny = userDenies.includes(f.id);
          let state = inRole ? 'role' : 'no-access';
          if(isGrant) state = 'granted';
          if(isDeny) state = 'denied';
          return `<div style="display:flex;align-items:center;gap:10px;padding:5px 0">
            <span style="font-size:12px;flex:1">${f.lb}</span>
            <span style="font-size:9px;color:var(--t3);font-family:monospace">${f.id}</span>
            <select class="fs" style="width:auto;padding:4px 8px;font-size:11px" onchange="setUserOverride('${u.id}','${f.id}',this.value)">
              <option value="role" ${state==='role'?'selected':''}>${inRole?'✓ Role default (allow)':'⊘ Role default (deny)'}</option>
              <option value="grant" ${state==='granted'?'selected':''}>✓ Grant (override)</option>
              <option value="deny" ${state==='denied'?'selected':''}>✕ Deny (override)</option>
            </select>
          </div>`;
        }).join('')}
      </div>
    `).join('')}
  `;
  openModal(`User Overrides — ${u.name}`, body, `<button class="btn btn-p" onclick="closeModal();renderMain()">Done</button>`, 'lg');
}
function setUserOverride(userId, featureId, mode){
  const u = USERS.find(x=>x.id===userId);
  if(!u) return;
  if(!u.permissions) u.permissions = [];
  if(!u.deniedPermissions) u.deniedPermissions = [];
  // Remove from both lists first
  u.permissions = u.permissions.filter(p=>p!==featureId);
  u.deniedPermissions = u.deniedPermissions.filter(p=>p!==featureId);
  if(mode==='grant') u.permissions.push(featureId);
  else if(mode==='deny') u.deniedPermissions.push(featureId);
  logAudit('user-permission', u.name, `${mode}: ${featureId}`);
  if(CU?.id === u.id) renderSidebar(); // self-edit case
}

let BILLS_FILTER = { search:'', dateFrom:'', dateTo:'', status:'all', category:'all' };

function renderBills(){
  let list = [...BILLS];
  const f = BILLS_FILTER;
  if(f.search){const q=f.search.toLowerCase();list=list.filter(b=>b.billNo.toLowerCase().includes(q)||b.supplierName.toLowerCase().includes(q));}
  if(f.dateFrom) list=list.filter(b=>b.date>=f.dateFrom);
  if(f.dateTo) list=list.filter(b=>b.date<=f.dateTo);
  if(f.status!=='all') list=list.filter(b=>b.status===f.status);
  if(f.category!=='all') list=list.filter(b=>b.category===f.category);

  const totalBills = list.reduce((a,b)=>a+b.totalInBase,0);
  const totalTax = list.reduce((a,b)=>a + (b.lines||[]).reduce((x,l)=>x + (l.taxClaimable?l.amount*l.taxRate/100:0),0) * (b.ccy==='MVR'?1:b.fxRate),0);
  const pending = list.filter(b=>b.status==='pending').reduce((a,b)=>a+b.totalInBase,0);
  const overdue = list.filter(b=>b.status==='pending' && b.dueDate<todayISO).length;

  return `
    <div class="ph">
      <div><div class="pt">🧾 Bills / Purchase Invoices</div><div class="ps">Non-inventory expenses for GST input claims</div></div>
      <div class="brow">
        <button class="btn" onclick="exportBills()">📥 Export</button>
        <button class="btn btn-p" onclick="openBillModal()">+ New Bill</button>
      </div>
    </div>

    <div class="al al-i">
      <strong>Bills</strong> are for non-inventory expenses (rent, utilities, services). Inventory purchases use the Purchase Orders module. Bills with claimable tax rate flow into the <strong>MIRA Input Tax report</strong> for GST submission.
    </div>

    <div class="sgrid g4">
      <div class="sc bl"><div class="sl">Total Bills</div><div class="sv">${BILLS.length}</div><div class="ss">${list.length} matching filters</div><div class="si">🧾</div></div>
      <div class="sc te"><div class="sl">Total Value</div><div class="sv">${fmtMoney(totalBills,'MVR')}</div><div class="si">💸</div></div>
      <div class="sc gr"><div class="sl">Input Tax (Claimable)</div><div class="sv">${fmtMoney(totalTax,'MVR')}</div><div class="ss">For GST refund</div><div class="si">📥</div></div>
      <div class="sc am"><div class="sl">Pending / Overdue</div><div class="sv">${fmtMoney(pending,'MVR')}</div><div class="ss" style="color:${overdue>0?'var(--red)':'var(--t3)'}">${overdue} overdue</div><div class="si">⚠️</div></div>
    </div>

    <div class="card">
      <div class="cb">
        <div class="fg4">
          <div class="fg"><label class="fl">Search</label><input type="text" class="fi" value="${f.search}" oninput="BILLS_FILTER.search=this.value;renderMain()" placeholder="Bill # / Supplier"></div>
          <div class="fg"><label class="fl">From</label><input type="date" class="fi" value="${f.dateFrom}" oninput="BILLS_FILTER.dateFrom=this.value;renderMain()"></div>
          <div class="fg"><label class="fl">To</label><input type="date" class="fi" value="${f.dateTo}" oninput="BILLS_FILTER.dateTo=this.value;renderMain()"></div>
          <div class="fg"><label class="fl">Category</label>
            <select class="fs" onchange="BILLS_FILTER.category=this.value;renderMain()">
              <option value="all">All</option>
              ${BILL_CATEGORIES.map(c=>`<option value="${c.id}" ${f.category===c.id?'selected':''}>${c.icon} ${c.name}</option>`).join('')}
            </select>
          </div>
          <div class="fg"><label class="fl">Status</label>
            <select class="fs" onchange="BILLS_FILTER.status=this.value;renderMain()">
              <option value="all">All</option>
              <option value="pending" ${f.status==='pending'?'selected':''}>Pending</option>
              <option value="paid" ${f.status==='paid'?'selected':''}>Paid</option>
              <option value="cancelled" ${f.status==='cancelled'?'selected':''}>Cancelled</option>
            </select>
          </div>
          <div class="fg" style="display:flex;align-items:flex-end"><button class="btn" onclick="BILLS_FILTER={search:'',dateFrom:'',dateTo:'',status:'all',category:'all'};renderMain()">↺ Reset</button></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="cb flush">
        <div class="tw"><table>
          <tr><th>Bill #</th><th>Date</th><th>Due</th><th>Supplier (TIN)</th><th>Category</th><th class="amt">Subtotal</th><th class="amt">GST</th><th class="amt">Total</th><th>Status</th><th>Actions</th></tr>
          ${list.length===0?'<tr><td colspan="10" style="padding:30px;text-align:center;color:var(--t3)">No bills found</td></tr>':list.map(b=>{
            const cat = BILL_CATEGORIES.find(c=>c.id===b.category);
            const isOverdue = b.status==='pending' && b.dueDate < todayISO;
            const statusClass = b.status==='paid'?'b-paid':isOverdue?'b-rej':b.status==='cancelled'?'b-void':'b-pend';
            return `<tr>
              <td><span class="mono">${b.billNo}</span></td>
              <td>${b.date}</td>
              <td style="color:${isOverdue?'var(--red)':'var(--text)'};font-weight:${isOverdue?'700':'400'}">${b.dueDate}</td>
              <td><strong>${b.supplierName}</strong><br><span style="font-size:9px;color:var(--t3);font-family:monospace">${b.supplierTin||'No TIN'}</span></td>
              <td>${cat?.icon||''} ${cat?.name||b.category}</td>
              <td class="amt">${fmtMoney(b.subtotal,b.ccy)}</td>
              <td class="amt">${fmtMoney(b.tax,b.ccy)}</td>
              <td class="amt" style="font-weight:700">${fmtMoney(b.total,b.ccy)}</td>
              <td><span class="bdg ${statusClass}"><span class="bd"></span>${(isOverdue?'OVERDUE':b.status).toUpperCase()}</span></td>
              <td>
                <button class="btn btn-xs" onclick="viewBill('${b.id}')">View</button>
                ${b.status==='pending'?`<button class="btn btn-xs btn-g" onclick="payBill('${b.id}')">Pay</button>`:''}
              </td>
            </tr>`;
          }).join('')}
        </table></div>
      </div>
    </div>
  `;
}

      <input type="text" class="fi" placeholder="Description" value="${ln.description}" oninput="BILL_DRAFT_LINES[${i}].description=this.value">
      <input type="number" class="fi" placeholder="Amount (excl tax)" step="0.01" value="${ln.amount}" oninput="BILL_DRAFT_LINES[${i}].amount=parseFloat(this.value)||0;updateBillTotal()">
      <select class="fs" onchange="BILL_DRAFT_LINES[${i}].taxRate=parseFloat(this.value);BILL_DRAFT_LINES[${i}].taxable=parseFloat(this.value)>0;updateBillTotal()">
        <option value="0" ${ln.taxRate===0?'selected':''}>0% (exempt)</option>
        <option value="8" ${ln.taxRate===8?'selected':''}>8% GST</option>
        <option value="16" ${ln.taxRate===16?'selected':''}>16% GST (T-GST)</option>
      </select>
      <select class="fs" onchange="BILL_DRAFT_LINES[${i}].taxClaimable=this.value==='true'">
        <option value="true" ${ln.taxClaimable?'selected':''}>Claimable</option>
        <option value="false" ${!ln.taxClaimable?'selected':''}>Not Claimable</option>
      </select>
      <button class="btn btn-xs btn-r" onclick="removeBillLine(${i})">✕</button>
    </div>
  `).join('');
  updateBillTotal();
}
function updateBillTotal(){
  const sub = BILL_DRAFT_LINES.reduce((a,l)=>a+(l.amount||0),0);
  const tax = BILL_DRAFT_LINES.reduce((a,l)=>a + (l.amount||0) * (l.taxRate||0) / 100, 0);
  if(el('bSubtotal')) el('bSubtotal').textContent = sub.toFixed(2);
  if(el('bTaxTotal')) el('bTaxTotal').textContent = tax.toFixed(2);
  if(el('bGrandTotal')) el('bGrandTotal').textContent = (sub+tax).toFixed(2);
}
function saveBill(id){
  const lines = BILL_DRAFT_LINES.filter(l=>l.description && l.amount>0);
  if(lines.length===0){ toast('Add at least one line','error'); return; }
  const subtotal = lines.reduce((a,l)=>a+l.amount,0);
  const tax = lines.reduce((a,l)=>a+l.amount*l.taxRate/100,0);
  const total = subtotal + tax;
  const ccy = el('bCcy').value;
  const fxRate = ccy==='MVR' ? 1 : (CURRENCIES.find(c=>c.code===ccy)?.rate || 1);
  const totalInBase = ccy==='MVR' ? total : total * fxRate;

  const data = {
    billNo: el('bNum').value.trim(),
    supplierName: el('bSupName').value.trim(),
    supplierTin: el('bSupTin').value.trim(),
    date: el('bDate').value, dueDate: el('bDue').value,
    type: BILL_CATEGORIES.find(c=>c.id===el('bCat').value)?.name.toLowerCase().split(' ')[0] || 'other',
    category: el('bCat').value, store: el('bStore').value,
    ccy, fxRate, lines, subtotal, tax, total, totalInBase,
    status: el('bStatus').value, notes: el('bNotes').value,
    paidDate: el('bStatus').value==='paid' ? el('bPaidDate').value : null,
    paymentMethod: el('bStatus').value==='paid' ? el('bPayMethod').value : '',
    paymentRef: el('bStatus').value==='paid' ? el('bPayRef').value : ''
  };
  if(!data.billNo || !data.supplierName){ toast('Bill # and supplier required','error'); return; }
  if(id){ Object.assign(BILLS.find(x=>x.id===id), data); toast('Bill updated'); }
  else { BILLS.unshift({ id:uid(), supplier:'', attachments:[], createdBy:CU.id, ...data }); toast('Bill created'); }
  logAudit('bill-save', data.billNo, '');
  closeModal(); renderMain();
}

    <div class="fsec">Line Items</div>

    ${b.notes?`<div class="al al-i" style="margin-top:10px"><strong>Notes:</strong> ${b.notes}</div>`:''}
  `;
  openModal('Bill Details', body, `<button class="btn" onclick="closeModal()">Close</button><button class="btn" onclick="openBillModal('${b.id}')">Edit</button>${b.status==='pending'?`<button class="btn btn-g" onclick="payBill('${b.id}')">Mark Paid</button>`:''}`, 'lg');

function payBill(id){
  closeModal();
  const b = BILLS.find(x=>x.id===id);
  const body = `

function confirmPayBill(id){
  const b = BILLS.find(x=>x.id===id);

function deleteBill(id){

function exportBills(){
  const rows = BILLS.map(b=>({
    'Bill #':b.billNo, 'Date':b.date, 'Due':b.dueDate, 'Supplier':b.supplierName, 'TIN':b.supplierTin,

//  REVENUE & COGS REPORT (for accounts system entry)
