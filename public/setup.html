<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Setup · YenuERP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--surface:#fff;--s2:#f0f2f6;--s3:#e8ebf0;
  --border:#dde1e8;--border2:#c8cdd8;
  --text:#1c2030;--t2:#5c6478;--t3:#9ba3b5;
  --blue:#1849a9;--blue2:#eef2fc;--blue3:#0d2d6e;
  --green:#166534;--green2:#f0fdf4;--green3:#dcfce7;
  --amber:#92400e;--amber2:#fffbeb;
  --red:#991b1b;--red2:#fef2f2;--red3:#fee2e2;
  --teal:#115e59;--teal2:#f0fdfa;
  --purple:#6b21a8;--purple2:#faf5ff;
  --orange:#c2410c;--orange2:#fff7ed;
  --r:8px;--r2:12px;
}
html,body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}

/* Top bar */
.topbar{background:var(--blue3);height:54px;padding:0 22px;color:#fff;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:60;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;color:#fff;font-size:14px;text-decoration:none}
.brand-mark{width:32px;height:32px;background:#fff;color:var(--blue3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px}
.brand-sub{font-size:10.5px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);padding:3px 9px;border-radius:14px;font-weight:600}
.co-pill{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);padding:5px 12px;border-radius:20px;font-size:11.5px;font-weight:600;color:#fff}
.spacer{flex:1}
.user-pill{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 12px 4px 4px;font-size:12px;font-weight:600}
.user-av{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:800}
.tb-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:5px 11px;color:#fff;font-size:11px;cursor:pointer;font-weight:600;font-family:inherit;text-decoration:none}
.tb-btn:hover{background:rgba(255,255,255,.18)}

/* Layout */
.app-body{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 54px)}
.sidebar{background:#fff;border-right:1px solid var(--border);padding:14px 0;overflow-y:auto;max-height:calc(100vh - 54px)}
.nav-sec{font-size:9.5px;font-weight:800;color:var(--t3);padding:14px 16px 5px;text-transform:uppercase;letter-spacing:.09em}
.ni{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:12.5px;color:var(--t2);cursor:pointer;border-left:3px solid transparent;font-weight:500;user-select:none}
.ni:hover{background:var(--s2);color:var(--text)}
.ni.active{background:var(--blue2);color:var(--blue);border-left-color:var(--blue);font-weight:700}
.ni .ic{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.ni .badge{margin-left:auto;background:var(--green);color:#fff;border-radius:10px;font-size:9px;font-weight:800;padding:2px 7px;letter-spacing:.03em}
.ni .badge.warn{background:var(--amber)}
.ni .badge.todo{background:var(--red)}

.main{padding:24px 28px;max-height:calc(100vh - 54px);overflow-y:auto;background:var(--bg)}

/* Page header */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:14px;flex-wrap:wrap}
.pt{font-size:21px;font-weight:800;color:var(--text);letter-spacing:-.01em}
.ps{font-size:12.5px;color:var(--t2);margin-top:4px}
.brow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:1px solid var(--border2);background:#fff;color:var(--text);font-size:12px;cursor:pointer;font-weight:600;font-family:inherit;transition:all .12s;text-decoration:none;line-height:1.4}
.btn:hover{background:var(--s2)}
.btn-p{background:linear-gradient(135deg,#1849a9,#0d2d6e);color:#fff;border-color:var(--blue)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(13,45,110,.2);background:linear-gradient(135deg,#1849a9,#0d2d6e)}
.btn-g{background:var(--green);color:#fff;border-color:var(--green)}
.btn-r{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-xs{padding:4px 9px;font-size:10.5px;border-radius:6px;font-weight:700}
.btn-icon{padding:6px 9px}

/* Cards */
.card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.ch{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ct{font-size:14px;font-weight:800;color:var(--text)}
.cs{font-size:11.5px;color:var(--t2);margin-top:2px}
.cb{padding:18px}

/* Progress / Stats */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--blue))}
.sc.blue{--accent:#1849a9}
.sc.green{--accent:#166534}
.sc.amber{--accent:#d97706}
.sc.purple{--accent:#6b21a8}
.sl{font-size:10.5px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:6px}
.sv{font-size:24px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;line-height:1.1}
.ss{font-size:10.5px;color:var(--t3);margin-top:5px}
@media (max-width:1100px){.sgrid{grid-template-columns:1fr 1fr}}

/* Form */
.fg{margin-bottom:14px}
.fl{display:block;font-size:11.5px;font-weight:700;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em}
.fl .req{color:var(--red);margin-left:2px}
.fi,.fs,.fta{width:100%;padding:9px 12px;font-size:13px;border:1.5px solid var(--border);border-radius:8px;outline:none;font-family:inherit;background:#fff}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,73,169,.08)}
.fta{resize:vertical;min-height:60px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fg4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.fhelp{font-size:10.5px;color:var(--t3);margin-top:4px}
@media(max-width:700px){.fg2,.fg3,.fg4{grid-template-columns:1fr}}

/* Tables */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;font-weight:800;color:var(--t3);padding:9px 13px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;background:var(--s2)}
td{padding:10px 13px;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
.mono{font-family:'Consolas',monospace;font-size:11.5px;font-weight:700;color:var(--blue);letter-spacing:.02em}
.num{text-align:right;font-variant-numeric:tabular-nums;font-family:'Consolas',monospace}
.row-actions{display:flex;gap:5px;justify-content:flex-end}

/* Badge */
.bdg{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;letter-spacing:.02em}
.b-asset{background:var(--blue2);color:var(--blue)}
.b-lia{background:var(--amber2);color:var(--amber)}
.b-eq{background:var(--purple2);color:var(--purple)}
.b-rev{background:var(--green2);color:var(--green)}
.b-exp{background:var(--red2);color:var(--red)}

/* Setup progress */
.progress-card{background:linear-gradient(135deg,#fff,#fafbff);border:1px solid var(--border);border-radius:14px;padding:22px 26px;margin-bottom:20px}
.pg-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:14px}
.pg-head .pg-icon{width:48px;height:48px;border-radius:12px;background:var(--blue2);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.pg-head h2{font-size:18px;font-weight:800;margin-bottom:3px}
.pg-head p{font-size:12.5px;color:var(--t2)}
.pb-wrap{height:8px;background:var(--s3);border-radius:4px;overflow:hidden;margin-bottom:8px}
.pb-fill{height:100%;background:linear-gradient(90deg,#1849a9,#6b21a8);transition:width .4s ease;border-radius:4px}
.pg-meta{display:flex;justify-content:space-between;font-size:11.5px;font-weight:600}
.pg-meta .pg-pct{color:var(--blue);font-weight:800}
.pg-meta .pg-step{color:var(--t2)}

/* Checklist on dashboard */
.checklist{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.cl-item{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px;position:relative;text-decoration:none;color:inherit;display:block;transition:all .15s}
.cl-item:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 10px 20px rgba(13,45,110,.08)}
.cl-item.done{background:#fafffe;border-color:#bbf7d0}
.cl-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cl-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.cl-item.done .cl-check{background:var(--green);border-color:var(--green);color:#fff}
.cl-item h4{font-size:13.5px;font-weight:800;color:var(--text)}
.cl-item p{font-size:11.5px;color:var(--t2);line-height:1.5;margin-bottom:10px;min-height:32px}
.cl-status{display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;color:var(--blue);padding-top:10px;border-top:1px dashed var(--border)}
.cl-item.done .cl-status{color:var(--green)}

/* Industry template picker */
.tmpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.tmpl{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;text-align:center}
.tmpl:hover{border-color:var(--blue);background:var(--blue2);transform:translateY(-2px)}
.tmpl.selected{border-color:var(--blue);background:var(--blue2);box-shadow:0 4px 12px rgba(24,73,169,.15)}
.tmpl .t-ic{font-size:30px;margin-bottom:8px}
.tmpl h5{font-size:12.5px;font-weight:800;margin-bottom:3px}
.tmpl p{font-size:10.5px;color:var(--t2);line-height:1.4}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(13,45,110,.55);z-index:200;align-items:flex-start;justify-content:center;padding:50px 20px;overflow-y:auto}
.modal-bg.on{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:640px;box-shadow:0 30px 80px rgba(0,0,0,.3);overflow:hidden}
.modal.wide{max-width:880px}
.m-head{padding:16px 22px;border-bottom:1px solid var(--border);background:var(--s2);display:flex;align-items:center;justify-content:space-between}
.m-tt{font-size:15px;font-weight:800}
.m-sb{font-size:11.5px;color:var(--t2);margin-top:2px}
.m-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t2);padding:0 4px}
.m-close:hover{color:var(--text)}
.m-body{padding:22px;max-height:70vh;overflow-y:auto}
.m-foot{padding:14px 22px;border-top:1px solid var(--border);background:var(--s2);display:flex;justify-content:flex-end;gap:8px}

/* Empty */
.empty{padding:50px 20px;text-align:center;color:var(--t2)}
.empty-ic{font-size:42px;opacity:.4;margin-bottom:12px}
.empty-tt{font-size:14px;font-weight:800;color:var(--text);margin-bottom:5px}
.empty-sb{font-size:12px;color:var(--t3);margin-bottom:14px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--green);color:#fff;padding:10px 18px;border-radius:10px;font-size:12.5px;font-weight:600;opacity:0;transition:all .3s;z-index:300;box-shadow:0 10px 30px rgba(0,0,0,.2)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}

@media (max-width:900px){
  .app-body{grid-template-columns:1fr}
  .sidebar{display:none}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="/app" class="brand">
    <div class="brand-mark">Y</div>
    <span>YenuERP</span>
    <span class="brand-sub">Setup</span>
  </a>
  <div class="co-pill" id="coPill">—</div>
  <div class="spacer"></div>
  <a href="/app" class="tb-btn">← Modules</a>
  <div class="user-pill">
    <div class="user-av" id="userAv">—</div>
    <span id="userName">—</span>
  </div>
</div>

<div class="app-body">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

<!-- Modals mount -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div id="modalMount"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   COMPANY SETUP — Tenant-isolated configuration module
   ═══════════════════════════════════════════════════════════════════ */

const ME_KEY = 'psms_session';
const TENANTS_KEY = 'yenuerp_tenants';

/* ── Session ── */
let session = null;
try { session = JSON.parse(localStorage.getItem(ME_KEY) || 'null'); } catch(e){}
if (!session) { location.replace('/'); }

const TENANT = session?.tenant || 'default';
const T_PREFIX = 'tenant:' + TENANT + ':setup:';

/* ── Tenant-scoped storage ── */
const tstore = {
  get(key, fallback = null) {
    try {
      const v = localStorage.getItem(T_PREFIX + key);
      return v ? JSON.parse(v) : fallback;
    } catch(e) { return fallback; }
  },
  set(key, value) {
    try { localStorage.setItem(T_PREFIX + key, JSON.stringify(value)); } catch(e){}
  }
};

/* ── Toast ── */
function toast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  t.classList.toggle('err', !!isErr);
  setTimeout(() => t.classList.remove('on'), 2400);
}

/* ── Modal helpers ── */
function showModal(html, wide) {
  document.getElementById('modalMount').innerHTML = `<div class="modal ${wide?'wide':''}">${html}</div>`;
  document.getElementById('modalBg').classList.add('on');
}
function closeModal() { document.getElementById('modalBg').classList.remove('on'); }

function esc(s){ return String(s||'').replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function uid(){ return Math.random().toString(36).slice(2, 10); }
function fmt(n){ return (n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

/* ── Navigation ── */
const NAV = [
  { sec: 'Overview', items: [
    { key: 'dashboard', label: 'Setup Dashboard', ic: '📊' }
  ]},
  { sec: 'Company Profile', items: [
    { key: 'company',   label: 'Company Info',     ic: '🏢' },
    { key: 'branding',  label: 'Branding & Logo',  ic: '🎨' },
    { key: 'tax',       label: 'Tax Settings',     ic: '🧾' }
  ]},
  { sec: 'Master Data', items: [
    { key: 'coa',       label: 'Chart of Accounts',ic: '📒' },
    { key: 'items',     label: 'Products / Items', ic: '📦' },
    { key: 'customers', label: 'Customers',        ic: '👥' },
    { key: 'vendors',   label: 'Vendors',          ic: '🚚' }
  ]},
  { sec: 'Team & Data', items: [
    { key: 'users',     label: 'Users & Roles',    ic: '👤' },
    { key: 'data',      label: 'Import / Export',  ic: '📥' }
  ]}
];

let CUR_VIEW = 'dashboard';

function renderSidebar() {
  const html = NAV.map(s => `
    <div class="nav-sec">${s.sec}</div>
    ${s.items.map(it => {
      const status = setupStatus(it.key);
      const badge = status === 'done' ? '<span class="badge">✓</span>'
                  : status === 'partial' ? '<span class="badge warn">!</span>'
                  : status === 'todo' ? '<span class="badge todo">•</span>' : '';
      return `<div class="ni ${CUR_VIEW===it.key?'active':''}" onclick="goto('${it.key}')">
        <span class="ic">${it.ic}</span>${it.label}${badge}
      </div>`;
    }).join('')}
  `).join('');
  document.getElementById('sidebar').innerHTML = html;
}

function setupStatus(key) {
  // Returns 'done' | 'partial' | 'todo' | ''
  switch(key) {
    case 'company': return tstore.get('company')?.name ? 'done' : 'todo';
    case 'coa':     return (tstore.get('coa')||[]).length > 0 ? 'done' : 'todo';
    case 'items':   return (tstore.get('items')||[]).length > 0 ? 'done' : '';
    case 'customers': return (tstore.get('customers')||[]).length > 0 ? 'done' : '';
    case 'vendors': return (tstore.get('vendors')||[]).length > 0 ? 'done' : '';
    case 'tax':     return tstore.get('tax')?.gstEnabled !== undefined ? 'done' : 'todo';
    case 'branding': return tstore.get('branding')?.primaryColor ? 'done' : '';
    case 'users':   return (tstore.get('users')||[]).length > 0 ? 'done' : '';
    default: return '';
  }
}

function goto(view) {
  CUR_VIEW = view;
  renderSidebar();
  const fn = 'view_' + view;
  if (window[fn]) window[fn]();
  else document.getElementById('main').innerHTML = '<div class="empty"><div class="empty-tt">Coming soon</div></div>';
  document.getElementById('main').scrollTop = 0;
}

/* ─────────────────────────────────────────────
   INDUSTRY-BASED CHART OF ACCOUNTS TEMPLATES
   ───────────────────────────────────────────── */
const COA_TEMPLATES = {
  retail: {
    label: '🏪 Retail / Shop',
    desc: 'Cash retail, shops, kiosks',
    accounts: [
      { code:'1000', name:'Cash on Hand',                   type:'ast', class:'ca', normal:'dr' },
      { code:'1010', name:'Petty Cash',                     type:'ast', class:'ca', normal:'dr' },
      { code:'1100', name:'Bank Account',                   type:'ast', class:'ca', normal:'dr' },
      { code:'1200', name:'Accounts Receivable',            type:'ast', class:'ca', normal:'dr' },
      { code:'1300', name:'Inventory — Merchandise',        type:'ast', class:'ca', normal:'dr' },
      { code:'1500', name:'Shop Fittings & Furniture',      type:'ast', class:'fa', normal:'dr' },
      { code:'1510', name:'POS Equipment',                  type:'ast', class:'fa', normal:'dr' },
      { code:'1600', name:'Accumulated Depreciation',       type:'ast', class:'fa', normal:'cr' },
      { code:'2000', name:'Accounts Payable',               type:'lia', class:'cl', normal:'cr' },
      { code:'2200', name:'GST Payable',                    type:'lia', class:'cl', normal:'cr' },
      { code:'2110', name:'Wages Payable',                  type:'lia', class:'cl', normal:'cr' },
      { code:'3000', name:"Owner's Capital",                type:'eq',  class:'eq', normal:'cr' },
      { code:'3200', name:'Retained Earnings',              type:'eq',  class:'eq', normal:'cr' },
      { code:'4000', name:'Sales Revenue',                  type:'rev', class:'rev',normal:'cr' },
      { code:'4090', name:'Sales Returns',                  type:'rev', class:'rev',normal:'dr' },
      { code:'5000', name:'Cost of Goods Sold',             type:'exp', class:'cogs',normal:'dr'},
      { code:'5200', name:'Inventory Adjustments',          type:'exp', class:'cogs',normal:'dr'},
      { code:'6000', name:'Salaries & Wages',               type:'exp', class:'opex',normal:'dr'},
      { code:'6100', name:'Rent Expense',                   type:'exp', class:'opex',normal:'dr'},
      { code:'6200', name:'Utilities',                      type:'exp', class:'opex',normal:'dr'},
      { code:'6300', name:'Marketing',                      type:'exp', class:'opex',normal:'dr'},
      { code:'6400', name:'Bank Charges',                   type:'exp', class:'opex',normal:'dr'},
      { code:'6500', name:'Depreciation Expense',           type:'exp', class:'opex',normal:'dr'},
      { code:'6990', name:'Other Expenses',                 type:'exp', class:'opex',normal:'dr'}
    ]
  },
  trading: {
    label: '📦 Trading / Distribution',
    desc: 'Wholesale, import/export',
    accounts: [
      { code:'1000', name:'Cash on Hand',                type:'ast',class:'ca',normal:'dr'},
      { code:'1100', name:'Bank — MVR',                  type:'ast',class:'ca',normal:'dr'},
      { code:'1101', name:'Bank — USD',                  type:'ast',class:'ca',normal:'dr'},
      { code:'1200', name:'Accounts Receivable — Trade', type:'ast',class:'ca',normal:'dr'},
      { code:'1205', name:'Allowance for Doubtful Debts',type:'ast',class:'ca',normal:'cr'},
      { code:'1300', name:'Inventory — Goods',           type:'ast',class:'ca',normal:'dr'},
      { code:'1305', name:'Goods in Transit',            type:'ast',class:'ca',normal:'dr'},
      { code:'1400', name:'Prepaid Expenses',            type:'ast',class:'ca',normal:'dr'},
      { code:'1410', name:'Input GST Receivable',        type:'ast',class:'ca',normal:'dr'},

function init() {
  // Show user info
  const av = document.getElementById('userAv');
  av.textContent = session.short || (session.name||'U')[0];
  av.style.background = session.color || '#1849a9';
  document.getElementById('userName').textContent = (session.name||'').split(' ')[0];
  document.getElementById('coPill').textContent = session.coName || 'Workspace';

  // Migrate tenant data from old keys if any
  ensureDefaults();

  // First-run check — if no company info, jump to company tab
  if (!tstore.get('company')?.name) {
    CUR_VIEW = 'dashboard';
  }
  renderSidebar();
  goto(CUR_VIEW);
}

function ensureDefaults() {
  // Pre-fill company info from signup data
  if (!tstore.get('company')) {
    const tenants = JSON.parse(localStorage.getItem(TENANTS_KEY) || '{}');
    const tn = tenants[TENANT];
    if (tn) {
      tstore.set('company', {
        name: tn.coName,
        slug: tn.slug,
        industry: tn.industry,
        country: tn.country || 'MV',
        currency: tn.currency || 'MVR',
        size: tn.size,
        fiscalYearStart: '01-01',
        regNumber: '',
        tin: '',
        address: '',
        phone: tn.owner?.phone || '',
        email: tn.email,
        website: ''
      });
    }
  }
  if (!tstore.get('tax')) {
    tstore.set('tax', { gstEnabled: false, gstRate: 8, tgstRate: 12, bptEnabled: false, bptRate: 15 });
  }
}

init();

function classOptionsFor(type, selected) {
  const opts = {
    ast: [['ca','Current Asset'],['fa','Fixed Asset']],
    lia: [['cl','Current Liability'],['ncl','Non-current Liability']],
    eq:  [['eq','Equity']],
    rev: [['rev','Operating Revenue'],['oi','Other Income']],
    exp: [['cogs','COGS'],['opex','Operating Expense'],['oe','Other Expense'],['fc','Finance Cost'],['tx','Tax']]
  }[type] || [];
  return opts.map(([k,l]) => `<option value="${k}" ${selected===k?'selected':''}>${l}</option>`).join('');
}
function updateClassOptions(type) {
  document.getElementById('classSelect').innerHTML = classOptionsFor(type);
}
function saveAccount(isNew, oldCode) {
  const f = document.getElementById('accForm');
  const data = {};
  for (const el of f.elements) if (el.name) data[el.name] = el.value;
  const coa = tstore.get('coa') || [];
  if (isNew) {
    if (coa.find(a => a.code === data.code)) { toast('Code already exists', true); return; }
    coa.push(data);
  } else {
    const idx = coa.findIndex(a => a.code === oldCode);
    if (idx >= 0) coa[idx] = data;
  }
  tstore.set('coa', coa);
  closeModal();
  toast('Account saved ✓');
  view_coa();
  renderSidebar();
}
function deleteAccount(code) {
  if (!confirm(`Delete account ${code}?`)) return;
  const coa = (tstore.get('coa') || []).filter(a => a.code !== code);

  toast('Account deleted');
  view_coa();
  renderSidebar();
}
function showCoaTemplatePicker() {
  showModal(`
    <div class="m-head">

      <button class="m-close" onclick="closeModal()">×</button>

      <div class="tmpl-grid">
        ${Object.entries(COA_TEMPLATES).map(([k,t]) => `
          <div class="tmpl" onclick="loadTemplate('${k}')">
            <div class="t-ic">${t.label.split(' ')[0]}</div>
            <h5>${esc(t.label.substring(t.label.indexOf(' ')+1))}</h5>
            <p>${esc(t.desc)}</p>
            <div style="margin-top:6px;font-size:10px;color:var(--blue);font-weight:700">${t.accounts.length} accounts</div>
          </div>
        `).join('')}
      </div>
    </div>
  `, true);
}
function loadTemplate(key) {
  const tmpl = COA_TEMPLATES[key];
  if (!tmpl) return;
  const existing = tstore.get('coa') || [];
  const existingCodes = new Set(existing.map(a => a.code));
  let added = 0;
  tmpl.accounts.forEach(a => {
    if (!existingCodes.has(a.code)) { existing.push(a); added++; }
  });
  tstore.set('coa', existing);
  closeModal();
  toast(`Added ${added} accounts ✓`);
  view_coa();
  renderSidebar();
}

  reader.onload = e => {

    b.logoData = e.target.result;
    tstore.set('branding', b);
    toast('Logo uploaded ✓');
    view_branding();
    renderSidebar();
  };
  reader.readAsDataURL(f);

function exportCsv(kind) {
  const data = tstore.get(kind) || [];
  if (data.length === 0) { toast('Nothing to export', true); return; }
  const keys = Object.keys(data[0]);
  const csv = [
    keys.join(','),
    ...data.map(row => keys.map(k => `"${String(row[k]||'').replace(/"/g,'""')}"`).join(','))
  ].join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${TENANT}-${kind}-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast(`Exported ${data.length} rows ✓`);
}
function exportFullBackup() {
  const backup = {
    tenant: TENANT,
    exportedAt: new Date().toISOString(),
    company: tstore.get('company'),
    branding: tstore.get('branding'),
    tax: tstore.get('tax'),
    coa: tstore.get('coa'),
    items: tstore.get('items'),
    customers: tstore.get('customers'),
    vendors: tstore.get('vendors'),
    users: tstore.get('users')
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${TENANT}-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('Backup downloaded ✓');
}
function importBackup() {
  document.getElementById('importFile').click();
}
function processBackupFile(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!confirm(`Restore backup from ${data.exportedAt}? This will OVERWRITE all current data.`)) return;
      ['company','branding','tax','coa','items','customers','vendors','users'].forEach(k => {
        if (data[k] !== undefined) tstore.set(k, data[k]);
      });
      toast('Backup restored ✓');
      goto('dashboard');
    } catch (err) {
      toast('Invalid backup file', true);
    }
  };
  reader.readAsText(file);
}
function showCsvImport(kind) {
  const samples = {
    coa: 'code,name,type,class,normal\n1000,Cash,ast,ca,dr\n4000,Sales Revenue,rev,rev,cr',

    customers: 'name,segment,email,phone,creditLimit,currency,tin\nABC Trading,b2b,abc@example.com,+960-1234567,50000,MVR,1234567-GST',
    vendors: 'name,category,email,phone,currency,terms\nXYZ Supplies,Raw materials,xyz@example.com,+960-7654321,MVR,Net 30'
  };
  showModal(`
    <div class="m-head">
      <div><div class="m-tt">Import ${kind} from CSV</div></div>
      <button class="m-close" onclick="closeModal()">×</button>
    </div>
    <div class="m-body">
      <p style="font-size:12.5px;color:var(--t2);margin-bottom:12px">CSV must have these columns (case-sensitive):</p>
      <pre style="background:#0d1117;color:#e6edf3;padding:12px;border-radius:8px;font-size:11px;font-family:Consolas;overflow-x:auto">${samples[kind]}</pre>
      <div class="fg" style="margin-top:14px">
        <label class="fl">Paste CSV here or upload</label>
        <textarea class="fta" id="csvData" rows="8" placeholder="${samples[kind].replace(/\n/g,'\\n')}"></textarea>
      </div>
      <input type="file" id="csvFile" accept=".csv,text/csv" onchange="loadCsvFile(this)">
    </div>
    <div class="m-foot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="doImport('${kind}')">Import</button>
    </div>
  `);
}
function loadCsvFile(input) {
  const f = input.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = e => { document.getElementById('csvData').value = e.target.result; };
  reader.readAsText(f);
}
function doImport(kind) {
  const csv = document.getElementById('csvData').value.trim();
  if (!csv) { toast('No data to import', true); return; }
  const lines = csv.split('\n').filter(l => l.trim());
  const headers = lines.shift().split(',').map(h => h.trim());
  const existing = tstore.get(kind) || [];
  let added = 0;
  for (const line of lines) {
    const cells = parseCsvLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = cells[i] || ''; });
    if (kind === 'coa') {
      if (existing.find(a => a.code === obj.code)) continue;
      existing.push(obj);
    } else {
      obj.id = uid();
      existing.push(obj);
    }
    added++;
  }
  tstore.set(kind, existing);
  closeModal();
  toast(`Imported ${added} rows ✓`);
  goto(kind);
}
function parseCsvLine(line) {
  const result = []; let inQuote = false; let current = '';
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"' && line[i+1] === '"') { current += '"'; i++; }
    else if (c === '"') { inQuote = !inQuote; }
    else if (c === ',' && !inQuote) { result.push(current); current = ''; }
    else current += c;
  }
  result.push(current);
  return result;
}
function wipeAll() {
  if (!confirm('Permanently delete ALL setup data?')) return;
  if (!confirm('Are you absolutely sure? This cannot be undone.')) return;
  ['company','branding','tax','coa','items','customers','vendors','users'].forEach(k => {
    localStorage.removeItem(T_PREFIX + k);
  });
  toast('All data wiped');
  ensureDefaults();
  goto('dashboard');
}
</script>
