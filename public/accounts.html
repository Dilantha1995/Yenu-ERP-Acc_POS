function SalesRegister({journals, customers, items, postJournal, coa, activeCo, showToast, pageTitle, period, setPeriod, companies, setVoucherPreview}){
  const [show, setShow] = useState(false);
  const all = journals.filter(j=>j.company===activeCo && (j.source==='AR-INV' || j.source==='POS')).reverse();
  const totalSales = all.reduce((s,j)=>s + j.lines.filter(l=>['4110','4120','4130','4140'].includes(l.acct)).reduce((a,l)=>a+l.credit,0), 0);
  const co = companies.find(c=>c.id===activeCo);

  const buildRows = () => all.map(j => {
    const p = j.lines.find(l=>l.partner)?.partner;
    const c = customers.find(x=>x.id===p);
    const rev = j.lines.filter(l=>['4110','4120','4130','4140'].includes(l.acct)).reduce((a,l)=>a+l.credit,0);
    const gst = j.lines.filter(l=>l.acct==='2230').reduce((a,l)=>a+l.credit,0);
    return { id:j.id, date:j.date, src:j.source, ref:j.refDoc||j.ref, customer:c?.name||(j.source==='POS'?'POS Daily':'—'), rev, gst, total:rev+gst };
  });

  const exportExcel = () => {
    const rows = buildRows();
    exportToExcel(`Sales-Register-${activeCo}-${today()}.xlsx`, [{
      name:'Sales Register', title:'Sales Register', subtitle:`${co?.name} · Period: ${period.from} to ${period.to}`,
      meta:[['Generated', new Date().toISOString().slice(0,16).replace('T',' ')],['Total invoices', rows.length]],
      header:['JE No.','Date','Source','Doc Ref','Customer','Revenue','GST','Total'],
      rows: rows.map(r => [r.id, r.date, r.src, r.ref, r.customer, r.rev, r.gst, r.total]),
      totals:[['','','','','TOTAL', rows.reduce((s,r)=>s+r.rev,0), rows.reduce((s,r)=>s+r.gst,0), rows.reduce((s,r)=>s+r.total,0)]],
      colWidths:[16,12,12,18,30,14,12,14],
    }]);
    showToast('Sales register exported to Excel', 'ok');
  };
  const exportPDF = () => {
    const rows = buildRows();
    exportToPDF(`Sales-Register-${activeCo}-${today()}.pdf`, {
      title:'Sales Register', subtitle:`Period: ${period.from} to ${period.to}`, company:co?.name, orientation:'landscape',
      sections:[{ header:['JE No.','Date','Source','Doc Ref','Customer','Revenue','GST','Total'],
        rows: rows.map(r => [r.id, r.date, r.src, r.ref, r.customer, fmt(r.rev), fmt(r.gst), fmt(r.total)]),
        totals:[['','','','','TOTAL', fmt(rows.reduce((s,r)=>s+r.rev,0)), fmt(rows.reduce((s,r)=>s+r.gst,0)), fmt(rows.reduce((s,r)=>s+r.total,0))]],
        columnStyles:{5:{halign:'right'},6:{halign:'right'},7:{halign:'right'}},
      }],
    });
    showToast('Sales register exported to PDF', 'ok');
  };

  return (
    <div>
      <PageHeader title={pageTitle} sub="Sales invoices + POS Z-reports" period={period} setPeriod={setPeriod}>
        <div className="export-group">
          <button className="btn btn-x btn-sm" onClick={exportExcel}>📊 Excel</button>
          <button className="btn btn-pdf btn-sm" onClick={exportPDF}>📄 PDF</button>
        </div>
        <button className="btn btn-p btn-sm" onClick={()=>setShow(true)}>+ Sales Invoice</button>
      </PageHeader>

      <div className="sgrid" style={{gridTemplateColumns:'repeat(4, 1fr)'}}>
        <StatCard tone="bl" label="Period Sales" value={fmt(totalSales)} sub="MVR" />
        <StatCard tone="gr" label="Invoices" value={all.length} sub="Count" />
        <StatCard tone="am" label="Avg Invoice" value={fmt(all.length?totalSales/all.length:0)} sub="MVR" />
        <StatCard tone="te" label="Active Customers" value={new Set(all.flatMap(j=>j.lines.map(l=>l.partner).filter(Boolean))).size} />
      </div>

      <div className="card">
        <div className="ch"><div className="ct">Sales Register</div><div className="cs">Click any row to preview voucher</div></div>
        <div className="tw">
          <table>
            <thead><tr><th>JE No.</th><th>Date</th><th>Source</th><th>Doc Ref</th><th>Customer</th><th className="num-h">Revenue</th><th className="num-h">GST</th><th className="num-h">Total</th><th></th></tr></thead>
            <tbody>
              {all.map(j => {
                const p = j.lines.find(l=>l.partner)?.partner;
                const c = customers.find(x=>x.id===p);
                const rev = j.lines.filter(l=>['4110','4120','4130','4140'].includes(l.acct)).reduce((a,l)=>a+l.credit,0);
                const gst = j.lines.filter(l=>l.acct==='2230').reduce((a,l)=>a+l.credit,0);
                return (
                  <tr key={j.id}>
                    <td><span className="mono">{j.id}</span></td><td>{j.date}</td>
                    <td><span className="bdg b-info"><span className="bd"></span>{j.source}</span></td>
                    <td>{j.refDoc || j.ref}</td>
                    <td>{c?.name || (j.source==='POS' ? 'POS Daily' : '—')}</td>
                    <td className="num">{fmt(rev)}</td>

function SalesInvoiceModal({customers, items, coa, activeCo, postJournal, onClose}){
  const [c, setC] = useState(customers[0]?.id);
  const [date, setDate] = useState(today());
  const [ref, setRef] = useState(`SO-INV/${new Date().getFullYear()}/${String(Math.floor(Math.random()*1000)).padStart(3,'0')}`);
  const [rows, setRows] = useState([{itemId:items[0]?.id, qty:1, price:items[0]?.sellPrice||0}]);
  const [gstPct, setGstPct] = useState(5);
  const enriched = rows.map(r => {
    const it = items.find(i=>i.id===r.itemId);
    return {...r, item:it, lineAmt:r.qty*r.price, lineCost:r.qty*(it?.costAvg||0)};
  });
  const sub = enriched.reduce((s,l)=>s+l.lineAmt,0);
  const cogs = enriched.reduce((s,l)=>s+l.lineCost,0);
  const gst = sub * gstPct / 100;
  const total = sub + gst;

  const post = () => {
    if (!sub) return;
    const cust = customers.find(x=>x.id===c);
    const lines = [
      {acct:'1220', desc:ref, debit:total, credit:0, partner:c},
      ...enriched.map(r => ({acct:r.item?.glRev||'4110', desc:r.item?.name, debit:0, credit:r.lineAmt})),
      ...(gst>0 ? [{acct:'2230', desc:`GST ${gstPct}%`, debit:0, credit:gst}] : []),
      ...enriched.map(r => ({acct:r.item?.glCogs||'5110', desc:`COGS ${r.item?.sku}`, debit:r.lineCost, credit:0})),
      {acct:'1216', desc:'Inv reduction', debit:0, credit:cogs}
    ];
    postJournal({date, ref, narration:`Sales — ${cust?.name||''}`, source:'AR-INV', company:activeCo, refDoc:ref, lines});
    onClose();
  };
  return (
    <div className="mbg" onClick={onClose}>
      <div className="modal lg" onClick={e=>e.stopPropagation()}>
        <div className="mh"><div><div className="mt">Sales Invoice (Inventory-linked)</div><div className="ms">Auto-posts Revenue + GST + AR + COGS + Inventory credit</div></div><button className="mx" onClick={onClose}>✕</button></div>
        <div className="mc">
          <div className="fg4">
            <div className="fg"><label className="fl">Customer <span className="req">*</span></label>
              <select className="fs" value={c} onChange={e=>setC(e.target.value)}>{customers.map(x=><option key={x.id} value={x.id}>{x.name}</option>)}</select>
            </div>
            <div className="fg"><label className="fl">Date</label><input className="fi" type="date" value={date} onChange={e=>setDate(e.target.value)} /></div>
            <div className="fg"><label className="fl">Doc Ref</label><input className="fi" value={ref} onChange={e=>setRef(e.target.value)} /></div>
            <div className="fg"><label className="fl">GST %</label><input className="fi" type="number" value={gstPct} onChange={e=>setGstPct(+e.target.value)} /></div>
          </div>
          <div className="tw je-tbl" style={{border:'1px solid var(--border)', borderRadius:'var(--r)'}}>
            <table>
              <thead><tr><th>Item</th><th style={{width:70}}>Qty</th><th className="num-h" style={{width:100}}>Price</th><th className="num-h" style={{width:100}}>Cost</th><th className="num-h" style={{width:120}}>Amount</th></tr></thead>
              <tbody>
                {enriched.map((r,i) => (
                  <tr key={i}>
                    <td>
                      <select value={r.itemId} onChange={e=>{const x=[...rows]; const it=items.find(y=>y.id===e.target.value); x[i]={...x[i], itemId:e.target.value, price:it?.sellPrice||0}; setRows(x);}}>
                        {items.map(it=><option key={it.id} value={it.id}>{it.sku} · {it.name}</option>)}
                      </select>
                    </td>
                    <td className="num-cell"><input type="number" value={r.qty} onChange={e=>{const x=[...rows]; x[i]={...x[i],qty:+e.target.value}; setRows(x);}} /></td>
                    <td className="num-cell"><input type="number" step="0.01" value={r.price} onChange={e=>{const x=[...rows]; x[i]={...x[i],price:+e.target.value}; setRows(x);}} /></td>
                    <td className="num" style={{color:'var(--t2)', padding:'5px 8px'}}>{fmt(r.item?.costAvg||0)}</td>
                    <td className="num" style={{padding:'5px 8px'}}>{fmt(r.lineAmt)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <button className="btn btn-sm" style={{marginTop:8}} onClick={()=>setRows([...rows,{itemId:items[0]?.id,qty:1,price:items[0]?.sellPrice||0}])}>+ Add line</button>
          <div style={{marginTop:14, padding:'12px 16px', background:'var(--s2)', borderRadius:'var(--r)'}}>
            <div style={{display:'flex', justifyContent:'space-between', padding:'4px 0'}}><span>Subtotal</span><span style={{fontFamily:"'Courier New',monospace"}}>{fmt(sub)}</span></div>
            <div style={{display:'flex', justifyContent:'space-between', padding:'4px 0'}}><span>GST {gstPct}%</span><span style={{fontFamily:"'Courier New',monospace"}}>{fmt(gst)}</span></div>
            <div style={{display:'flex', justifyContent:'space-between', padding:'4px 0', color:'var(--t2)'}}><span>COGS (auto)</span><span style={{fontFamily:"'Courier New',monospace"}}>{fmt(cogs)}</span></div>
            <div style={{display:'flex', justifyContent:'space-between', padding:'4px 0', color:'var(--green)'}}><span>Gross Margin</span><span style={{fontFamily:"'Courier New',monospace"}}>{fmt(sub-cogs)} ({sub>0?((sub-cogs)/sub*100).toFixed(1):0}%)</span></div>
            <div style={{display:'flex', justifyContent:'space-between', padding:'8px 0 4px', borderTop:'1px solid var(--border)', fontWeight:700, fontSize:14}}><span>Total Invoice</span><span style={{fontFamily:"'Courier New',monospace"}}>{fmt(total)}</span></div>
          </div>
        </div>
        <div className="mf"><button className="btn" onClick={onClose}>Cancel</button><button className="btn btn-p" onClick={post}>Post Invoice + COGS</button></div>
      </div>
    </div>
  );
}

// ════════════ BANK RECONCILIATION ════════════
function BankReconciliation({coa, journals, period, activeCo, postJournal, showToast, pageTitle, setPeriod}){
  const bankAccts = coa.filter(a => a.isBank);
  const [account, setAccount] = useState(bankAccts[0]?.code || '1242');
  const [prevClosing, setPrevClosing] = useState(1850000);
  const [stmt, setStmt] = useState([]);
  const [opGateAccepted, setOpGateAccepted] = useState(false);
  const [selBank, setSelBank] = useState(null);
  const [selLedger, setSelLedger] = useState(null);
  const [uploadedFilename, setUploadedFilename] = useState(null);
  const fileInputRef = useRef(null);

  useEffect(() => {
    setStmt((SEED_BANK_STMT[account] || []).map(s => ({...s, matched:false, matchTo:null})));
    setOpGateAccepted(false);
    setSelBank(null); setSelLedger(null);
    setUploadedFilename(null);
  }, [account]);

  // Ledger entries are AUTOMATICALLY fetched from posted journals - no upload needed
  const ledger = useMemo(() => {
    const out = [];
    journals.filter(j=>j.posted && j.company===activeCo).forEach(je => {
      je.lines.forEach(l => {
        if (l.acct === account && (l.debit || l.credit)) {
          out.push({id:`${je.id}__${l.desc}__${l.debit}__${l.credit}`, date:je.date, je:je.id, ref:je.ref, desc:l.desc,
            debit:l.debit||0, credit:l.credit||0, matched:false, matchTo:null});
        }
      });
    });
    return out.sort((a,b)=>a.date.localeCompare(b.date));
  }, [account, journals, activeCo]);

  const [ledgerState, setLedgerState] = useState([]);
  useEffect(() => { setLedgerState(ledger); }, [ledger]);

  const qbOpening = useMemo(() => acctBalance(account, journals, {to:period.from, company:activeCo}).net, [account, journals, period, activeCo]);
  const stmtOpening = stmt.length ? (stmt[0].balance ?? 0) : 0;
  const opDiff = prevClosing - qbOpening;
  const opOK = Math.abs(opDiff) < 0.01;

  const handleFileUpload = (file) => {
    if (!file) return;
    setUploadedFilename(file.name);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, { type:'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header:1, raw:false });
        // Try to detect headers
        let headerIdx = rows.findIndex(r => r.some(c => /date/i.test(c)) && r.some(c => /debit|withdraw/i.test(c) || /credit|deposit/i.test(c)));
        if (headerIdx < 0) headerIdx = 0;
        const headers = rows[headerIdx].map(h => String(h||'').toLowerCase().trim());
        const dateIdx = headers.findIndex(h => /date/.test(h));
        const descIdx = headers.findIndex(h => /desc|narrat|particular|details/.test(h));
        const drIdx = headers.findIndex(h => /debit|withdraw|paid out/.test(h));
        const crIdx = headers.findIndex(h => /credit|deposit|paid in/.test(h));
        const balIdx = headers.findIndex(h => /balance/.test(h));
        const parsed = [];
        let lastBal = stmtOpening;
        for (let i = headerIdx + 1; i < rows.length; i++) {
          const r = rows[i];
          if (!r || !r[dateIdx]) continue;
          const debit = parseFloat(String(r[drIdx]||'').replace(/,/g,'')) || 0;
          const credit = parseFloat(String(r[crIdx]||'').replace(/,/g,'')) || 0;
          if (!debit && !credit) continue;
          const balance = balIdx >= 0 ? (parseFloat(String(r[balIdx]||'').replace(/,/g,'')) || lastBal + credit - debit) : (lastBal + credit - debit);
          lastBal = balance;
          parsed.push({
            id:`U${i}`, date: r[dateIdx], desc: String(r[descIdx]||'').trim(),
            debit, credit, balance, matched:false, matchTo:null
          });
        }
        if (parsed.length === 0) {
          showToast('Could not parse rows — check column headers (Date, Description, Debit, Credit, Balance)', 'bad');
        } else {
          setStmt(parsed);
          showToast(`Imported ${parsed.length} statement lines from ${file.name}`, 'ok');
        }
      } catch (err) {
        showToast('Failed to read file — must be Excel/CSV', 'bad');
      }
    };
    reader.readAsArrayBuffer(file);
  };

  const matchPair = () => {
    if (!selBank || !selLedger) { showToast('Select one bank line AND one ledger line', 'bad'); return; }
    setStmt(prev => prev.map(s => s.id===selBank ? {...s, matched:true, matchTo:selLedger} : s));
    setLedgerState(prev => prev.map(l => l.id===selLedger ? {...l, matched:true, matchTo:selBank} : l));
    setSelBank(null); setSelLedger(null);
    showToast('Matched ✓', 'ok');
  };
  const unmatchAll = () => {
    setStmt(prev => prev.map(x => ({...x, matched:false, matchTo:null})));
    setLedgerState(prev => prev.map(x => ({...x, matched:false, matchTo:null})));
    showToast('All unmatched', 'info');
  };
  const autoMatch = () => {
    let s = [...stmt], l = [...ledgerState], count = 0;
    for (let i=0; i<s.length; i++) {
      if (s[i].matched) continue;
      const sAmt = s[i].credit - s[i].debit;
      for (let j=0; j<l.length; j++) {
        if (l[j].matched) continue;
        const lAmt = l[j].debit - l[j].credit;
        if (Math.abs(sAmt - lAmt) < 0.01) {
          const days = Math.abs((new Date(s[i].date) - new Date(l[j].date))/(1000*60*60*24));
          if (days <= 5) {
            s[i] = {...s[i], matched:true, matchTo:l[j].id};
            l[j] = {...l[j], matched:true, matchTo:s[i].id};
            count++;
            break;
          }
        }
      }
    }
    setStmt(s); setLedgerState(l);
    showToast(`Auto-matched ${count} pair${count===1?'':'s'}`, count>0?'ok':'info');
  };

  const stmtCr = stmt.filter(s=>!s.matched).reduce((s,x)=>s+x.credit,0);
  const stmtDr = stmt.filter(s=>!s.matched).reduce((s,x)=>s+x.debit,0);
  const ledDr = ledgerState.filter(l=>!l.matched).reduce((s,x)=>s+x.debit,0);
  const ledCr = ledgerState.filter(l=>!l.matched).reduce((s,x)=>s+x.credit,0);
  const unrecBank = stmtCr - stmtDr;
  const unrecLedger = ledDr - ledCr;
  const netDiff = unrecBank - unrecLedger;
  const reconciled = Math.abs(netDiff) < 0.01;

  return (
    <div>
      <PageHeader title={pageTitle} sub="QB ledger auto-fetched · Upload bank statement to match" period={period} setPeriod={setPeriod} />

      <div className="card">
        <div className="ch">
          <div style={{display:'flex', gap:14, alignItems:'flex-end', flexWrap:'wrap'}}>
            <div className="fg" style={{margin:0, minWidth:240}}>
              <label className="fl">Bank Account</label>
              <select className="fs" value={account} onChange={e=>setAccount(e.target.value)}>
                {bankAccts.map(b=><option key={b.code} value={b.code}>{b.code} — {b.name}</option>)}
              </select>
            </div>
            <div className="fg" style={{margin:0, minWidth:200}}>
              <label className="fl">Prev Month Closing (Bank)</label>
              <input className="fi" type="number" step="0.01" value={prevClosing} onChange={e=>setPrevClosing(+e.target.value)} />
            </div>
          </div>
          <div style={{display:'flex', gap:6}}>
            <button className="btn btn-sm" onClick={autoMatch}>⟳ Auto-match</button>
            <button className="btn btn-sm" onClick={unmatchAll}>Unmatch all</button>
          </div>
        </div>
      </div>

      {/* Upload bank statement */}
      <div className="card">
        <div className="ch"><div><div className="ct">Step 0 · Upload bank statement</div><div className="cs">Excel or CSV — accepts columns: Date, Description, Debit, Credit, Balance</div></div></div>
        <div className="cb">
          <input ref={fileInputRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={e=>handleFileUpload(e.target.files[0])} />
          <div className="dropzone" onClick={()=>fileInputRef.current?.click()} onDragOver={e=>{e.preventDefault(); e.currentTarget.classList.add('dragging');}} onDragLeave={e=>e.currentTarget.classList.remove('dragging')} onDrop={e=>{e.preventDefault(); e.currentTarget.classList.remove('dragging'); handleFileUpload(e.dataTransfer.files[0]);}}>
            {uploadedFilename ? (
              <div>📄 <b>{uploadedFilename}</b><div style={{fontSize:11, marginTop:4}}>{stmt.length} lines loaded · click to re-upload</div></div>
            ) : (
              <div>📂 Click or drag &amp; drop bank statement file<div style={{fontSize:11, marginTop:6}}>Supports .xlsx · .xls · .csv (loaded with seed data by default)</div></div>
            )}
          </div>
          <div className="al al-i" style={{marginTop:12, marginBottom:0}}>
            <b>How automation works:</b> Your QB Ledger entries on the right are automatically fetched from posted journals — you never need to upload those. Only the bank statement comes from outside, so only that needs uploading.
          </div>
        </div>
      </div>

// ════════════ GENERAL LEDGER ════════════
function GeneralLedger({coa, journals, period, activeCo, pageTitle, setPeriod}){
  const [acct, setAcct] = useState('1242');
  const postable = coa.filter(a=>!a.isGroup);
  const opening = acctBalance(acct, journals, {to:period.from, company:activeCo}).net;
  const entries = [];
  journals.filter(j=>j.posted && j.company===activeCo).forEach(je => {
    if (je.date < period.from || je.date > period.to) return;
    je.lines.forEach(l => { if (l.acct === acct) entries.push({date:je.date, je:je.id, ref:je.ref, desc:l.desc, debit:l.debit, credit:l.credit, source:je.source}); });
  });
  entries.sort((a,b)=>a.date.localeCompare(b.date) || a.je.localeCompare(b.je));
  let running = opening;
  const rows = entries.map(e => { running += (e.debit||0)-(e.credit||0); return {...e, balance:running}; });
  const totalDr = entries.reduce((s,e)=>s+(e.debit||0),0);
  const totalCr = entries.reduce((s,e)=>s+(e.credit||0),0);
  return (
    <div>
      <PageHeader title={pageTitle} sub="Account ledger with running balance" period={period} setPeriod={setPeriod} />
      <div className="card">
        <div className="ch">
          <div className="fg" style={{margin:0, flex:1, maxWidth:480}}>
            <label className="fl">Account</label>
            <select className="fs" value={acct} onChange={e=>setAcct(e.target.value)}>
              {postable.map(a=><option key={a.code} value={a.code}>{a.code} — {a.name}</option>)}
            </select>
          </div>
        </div>
      </div>
      <div className="sgrid" style={{gridTemplateColumns:'repeat(4, 1fr)'}}>
        <StatCard tone="bl" label="Opening Balance" value={fmt(opening)} />
        <StatCard tone="gr" label="Period Debits" value={fmt(totalDr)} />
        <StatCard tone="rd" label="Period Credits" value={fmt(totalCr)} />
        <StatCard tone="te" label="Closing Balance" value={fmt(opening+totalDr-totalCr)} />
      </div>
      <div className="card">
        <div className="ch"><div className="ct">Ledger entries</div></div>
        <div className="tw swrap">
          <table>
            <thead><tr><th>Date</th><th>JE</th><th>Ref</th><th>Source</th><th>Description</th><th className="num-h">Debit</th><th className="num-h">Credit</th><th className="num-h">Balance</th></tr></thead>
            <tbody>
              <tr className="tt-row-sub"><td colSpan={7}>Opening balance brought forward</td><td className="num">{fmt(opening)}</td></tr>
              {rows.map((r,i) => (
                <tr key={i}>
                  <td>{r.date}</td>
                  <td><span className="mono">{r.je}</span></td>
                  <td>{r.ref}</td>
                  <td><span className="bdg b-info"><span className="bd"></span>{r.source}</span></td>
                  <td>{r.desc}</td>
                  <td className="num">{r.debit?fmt(r.debit):''}</td>
                  <td className="num">{r.credit?fmt(r.credit):''}</td>
                  <td className="num">{fmt(r.balance)}</td>
                </tr>
              ))}
              <tr className="tt-row-tot">
                <td colSpan={5}>Closing</td>
                <td className="num">{fmt(totalDr)}</td>
                <td className="num">{fmt(totalCr)}</td>
                <td className="num">{fmt(opening+totalDr-totalCr)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ════════════ TRIAL BALANCE ════════════
function TrialBalance({coa, journals, period, activeCo, pageTitle, setPeriod}){
  const [showComparative, setShowComparative] = useState(true);
  const [compareMode, setCompareMode] = useState('prior_year');
  const compPeriod = compareMode === 'prior_year' ? priorYear(period) : priorPeriod(period);

  const buildRow = (a, opts) => {
    const {debit, credit} = acctBalance(a.code, journals, opts);
    const isDrNat = a.type==='ASSET' || a.type==='EXPENSE';
    let dr = 0, cr = 0;
    const net = debit - credit;
    if (a.contra) { if (net >= 0) cr = net; else dr = -net; }
    else if (isDrNat) { if (net >= 0) dr = net; else cr = -net; }
    else { if (net <= 0) cr = -net; else dr = net; }
    return {dr, cr};
  };

  const rows = coa.filter(a=>!a.isGroup).map(a => {
    const cur = buildRow(a, {...period, company:activeCo});
    const prev = buildRow(a, {...compPeriod, company:activeCo});
    return {...a, dr:cur.dr, cr:cur.cr, prevDr:prev.dr, prevCr:prev.cr};
  }).filter(r => r.dr > 0.01 || r.cr > 0.01 || r.prevDr > 0.01 || r.prevCr > 0.01);

  const totals = {dr:rows.reduce((s,r)=>s+r.dr,0), cr:rows.reduce((s,r)=>s+r.cr,0),
                  prevDr:rows.reduce((s,r)=>s+r.prevDr,0), prevCr:rows.reduce((s,r)=>s+r.prevCr,0)};

  return (
    <div>
      <PageHeader title={pageTitle} sub={`As at ${period.to}`} period={period} setPeriod={setPeriod}>
        <label style={{fontSize:11, color:'var(--t2)', display:'flex', alignItems:'center', gap:6}}>
          <input type="checkbox" checked={showComparative} onChange={e=>setShowComparative(e.target.checked)} /> Comparative
        </label>
        {showComparative && (
          <select className="fs" style={{width:160, padding:'5px 10px'}} value={compareMode} onChange={e=>setCompareMode(e.target.value)}>
            <option value="prior_year">vs Prior Year</option>
            <option value="prior_period">vs Prior Period</option>
          </select>
        )}
      </PageHeader>

      <div className="card">
        <div className="ch"><div className="ct">Trial Balance</div><div className="cs">{showComparative ? `Current vs ${compareMode==='prior_year'?'prior year':'prior period'} (${compPeriod.from} to ${compPeriod.to})` : 'Single period'}</div></div>
        <div className="tw swrap">
          <table>
            <thead>
              <tr>
                <th>Code</th><th>Account</th><th>Type</th>
                <th className="num-h" colSpan={2}>Current ({period.to.slice(0,4)})</th>
                {showComparative && <th className="num-h" colSpan={2} style={{borderLeft:'1px solid var(--border)'}}>Prior ({compPeriod.to.slice(0,4)})</th>}
              </tr>
              <tr>
                <th></th><th></th><th></th>
                <th className="num-h">Debit</th><th className="num-h">Credit</th>
                {showComparative && <Fragment><th className="num-h" style={{borderLeft:'1px solid var(--border)'}}>Debit</th><th className="num-h">Credit</th></Fragment>}
              </tr>
            </thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.code}>
                  <td><span className="mono">{r.code}</span></td>
                  <td>{r.name}</td>
                  <td><span className="bdg b-draft"><span className="bd"></span>{r.type}</span></td>
                  <td className="num">{r.dr?fmt(r.dr):''}</td>
                  <td className="num">{r.cr?fmt(r.cr):''}</td>
                  {showComparative && <Fragment>
                    <td className="num" style={{color:'var(--t2)', borderLeft:'1px solid var(--border)'}}>{r.prevDr?fmt(r.prevDr):''}</td>
                    <td className="num" style={{color:'var(--t2)'}}>{r.prevCr?fmt(r.prevCr):''}</td>
                  </Fragment>}
                </tr>
              ))}
              <tr className="tt-row-grand">
                <td colSpan={3}>TOTAL</td>
                <td className="num">{fmt(totals.dr)}</td>
                <td className="num">{fmt(totals.cr)}</td>
                {showComparative && <Fragment>
                  <td className="num" style={{borderLeft:'1px solid var(--blue)'}}>{fmt(totals.prevDr)}</td>
                  <td className="num">{fmt(totals.prevCr)}</td>
                </Fragment>}
              </tr>
              <tr>
                <td colSpan={3}>Difference (Dr − Cr)</td>
                <td colSpan={2} className="num" style={{fontWeight:700, color: Math.abs(totals.dr-totals.cr)<0.01?'var(--green)':'var(--red)'}}>
                  {Math.abs(totals.dr-totals.cr)<0.01 ? '0.00 — Balanced ✓' : fmt(totals.dr-totals.cr)}
                </td>
                {showComparative && <td colSpan={2} className="num" style={{fontWeight:700, color: Math.abs(totals.prevDr-totals.prevCr)<0.01?'var(--green)':'var(--red)', borderLeft:'1px solid var(--border)'}}>
                  {Math.abs(totals.prevDr-totals.prevCr)<0.01 ? '0.00 ✓' : fmt(totals.prevDr-totals.prevCr)}
                </td>}
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ════════════ PROFIT & LOSS — flexible periods + comparatives ════════════
function ProfitLoss({coa, journals, period, activeCo, pageTitle, setPeriod}){
  const [view, setView] = useState('summary'); // summary | monthly | quarterly | yearly
  const [compare, setCompare] = useState('none'); // none | prior_period | prior_year

  // Build column list based on view
  const columns = useMemo(() => {
    let curCols = [];
    if (view === 'summary') curCols = [{label: 'Current', from: period.from, to: period.to}];
    else if (view === 'monthly') curCols = buildMonthlyColumns(period);
    else if (view === 'quarterly') curCols = buildQuarterlyColumns(period);
    else if (view === 'yearly') curCols = buildYearlyColumns(period);

    if (compare === 'none') return curCols.map(c => ({...c, prior:null}));
    if (compare === 'prior_period') return curCols.map(c => ({...c, prior: priorPeriod(c)}));
    if (compare === 'prior_year') return curCols.map(c => ({...c, prior: priorYear(c)}));
    return curCols;
  }, [view, compare, period]);

  // Account groups
  const v = (parent, opts) => coa.filter(a => !a.isGroup && a.parent===parent)
                                  .map(a => ({...a, val: natureBalance(a, journals, opts)}));
  const groupVals = (parent, opts) => {
    const items = v(parent, opts);
    return { items, total: items.reduce((s,a)=>s+a.val, 0) };
  };

  // For each column, compute the financial statement
  const buildStatement = (col) => {
    const opts = {from: col.from, to: col.to, company: activeCo};
    const rev = groupVals('4100', opts);
    const oth = groupVals('4200', opts);
    const cogs = groupVals('5100', opts);
    const opex = groupVals('5200', opts);
    const admin = groupVals('5300', opts);
    const fin = groupVals('5400', opts);
    const taxAcct = coa.find(a => a.code==='5500');
    const tax = taxAcct ? natureBalance(taxAcct, journals, opts) : 0;
    const grossProfit = rev.total - cogs.total;
    const operProfit = grossProfit + oth.total - opex.total - admin.total;
    const profitBeforeTax = operProfit - fin.total;
    const netProfit = profitBeforeTax - tax;
    return { rev, oth, cogs, opex, admin, fin, tax, grossProfit, operProfit, profitBeforeTax, netProfit };
  };

  // For comparative single-cell rendering: show current AND prior + variance
  const allCols = useMemo(() => {
    const out = [];
    columns.forEach(c => {
      out.push({...c, kind:'current', stmt: buildStatement(c)});
      if (c.prior) out.push({...c.prior, label: `${c.label} (PY)`, kind:'prior', stmt: buildStatement(c.prior), parentLabel: c.label});
    });
    return out;
  }, [columns, journals, coa, activeCo]);

  // Get value for any account code in a column statement
  const getVal = (stmt, type, code) => {
    if (type === 'acct') {
      for (const grp of [stmt.rev, stmt.oth, stmt.cogs, stmt.opex, stmt.admin, stmt.fin]) {
        const found = grp.items.find(i => i.code === code);
        if (found) return found.val;
      }
      if (code === '5500') return stmt.tax;
      return 0;
    }
    if (type === 'total') return stmt[code] || 0;
    return 0;
  };

  // Build unified list of accounts used
  const buildAcctList = (parent) => coa.filter(a => !a.isGroup && a.parent===parent);

  const sectionRow = (label, total) => null; // unused
  const isCompact = allCols.length > 3;

  // Get all unique values for variance pills
  const showVariance = compare !== 'none' && view === 'summary';

  return (
    <div>
      <PageHeader title={pageTitle} sub={`Statement of Profit or Loss · ${period.from} to ${period.to}`} period={period} setPeriod={setPeriod}>
        <button className="btn btn-sm">⬇ Export</button>
      </PageHeader>

      <div className="card">
        <div className="ch">
          <div className="ct">View options</div>
        </div>
        <div className="cb">
          <div style={{display:'flex', gap:14, alignItems:'flex-end', flexWrap:'wrap'}}>
            <div>
              <label className="fl">Period view</label>
              <div className="ebar">
                {[{v:'summary',l:'Summary'},{v:'monthly',l:'Monthly'},{v:'quarterly',l:'Quarterly'},{v:'yearly',l:'Yearly'}].map(o => (
                  <div key={o.v} className={`ebt ${view===o.v?'on':''}`} onClick={()=>setView(o.v)}>{o.l}</div>
                ))}
              </div>
            </div>
            <div>
              <label className="fl">Compare with</label>
              <div className="ebar">
                {[{v:'none',l:'None'},{v:'prior_period',l:'Prior Period'},{v:'prior_year',l:'Prior Year'}].map(o => (
                  <div key={o.v} className={`ebt ${compare===o.v?'on':''}`} onClick={()=>setCompare(o.v)}>{o.l}</div>
                ))}
              </div>
            </div>
            <div style={{flex:1}}></div>
            <div style={{fontSize:11, color:'var(--t2)'}}>{allCols.length} column{allCols.length>1?'s':''} · custom period range supported</div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="ch"><div className="ct">Profit or Loss Statement</div><div className="cs">{activeCo} · IFRS structure</div></div>
        <div className="tw">
          <table style={{minWidth: 600 + (allCols.length * 130)}}>
            <thead>
              <tr>
                <th style={{minWidth:280, background:'var(--s3)'}}>Account</th>
                {allCols.map((c,i) => (
                  <th key={i} className="num-h" style={{minWidth:130, background: c.kind==='prior'?'var(--s3)':'var(--s2)', color: c.kind==='prior'?'var(--t2)':'var(--blue3)'}}>{c.label}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {/* Revenue */}
              <tr className="tt-row-section"><td colSpan={1+allCols.length}>REVENUE</td></tr>
              {buildAcctList('4100').map(a => (
                <tr key={a.code}>
                  <td className="indent-1"><span className="mono" style={{fontSize:10, color:'var(--t3)'}}>{a.code}</span> {a.name}</td>
                  {allCols.map((c,i) => <td key={i} className="num" style={{color:c.kind==='prior'?'var(--t2)':'var(--text)'}}>{fmt(getVal(c.stmt, 'acct', a.code))}</td>)}
                </tr>
              ))}
              <tr className="tt-row-tot">
                <td>Total Revenue</td>
                {allCols.map((c,i) => <td key={i} className="num">{fmt(c.stmt.rev.total)}</td>)}
              </tr>

              {/* Cost of Sales */}
              <tr className="tt-row-section"><td colSpan={1+allCols.length}>COST OF SALES</td></tr>
              {buildAcctList('5100').map(a => (
                <tr key={a.code}>
                  <td className="indent-1"><span className="mono" style={{fontSize:10, color:'var(--t3)'}}>{a.code}</span> {a.name}</td>
                  {allCols.map((c,i) => <td key={i} className="num" style={{color:c.kind==='prior'?'var(--t2)':'var(--text)'}}>{fmt(getVal(c.stmt, 'acct', a.code))}</td>)}
                </tr>
              ))}
              <tr className="tt-row-tot">
                <td>Total Cost of Sales</td>
                {allCols.map((c,i) => <td key={i} className="num">{fmt(c.stmt.cogs.total)}</td>)}
              </tr>
              <tr className="tt-row-grand">
                <td>GROSS PROFIT</td>
                {allCols.map((c,i) => <td key={i} className="num">{fmt(c.stmt.grossProfit)}</td>)}
              </tr>

              {/* Other Income */}
              <tr className="tt-row-section"><td colSpan={1+allCols.length}>OTHER INCOME</td></tr>
              {buildAcctList('4200').map(a => (
                <tr key={a.code}>
                  <td className="indent-1"><span className="mono" style={{fontSize:10, color:'var(--t3)'}}>{a.code}</span> {a.name}</td>
                  {allCols.map((c,i) => <td key={i} className="num" style={{color:c.kind==='prior'?'var(--t2)':'var(--text)'}}>{fmt(getVal(c.stmt, 'acct', a.code))}</td>)}
                </tr>
              ))}
              <tr className="tt-row-tot">
                <td>Total Other Income</td>
                {allCols.map((c,i) => <td key={i} className="num">{fmt(c.stmt.oth.total)}</td>)}
              </tr>

              {/* Operating Expenses */}
              <tr className="tt-row-section"><td colSpan={1+allCols.length}>OPERATING EXPENSES</td></tr>
              {buildAcctList('5200').map(a => (
                <tr key={a.code}>

// ════════════ FINANCIAL POSITION — with comparative ════════════
function FinancialPosition({coa, journals, period, activeCo, pageTitle, setPeriod}){
  const [showComp, setShowComp] = useState(true);
  const [compMode, setCompMode] = useState('prior_year');
  const compPeriod = compMode === 'prior_year' ? priorYear(period) : priorPeriod(period);

  const opts = {...period, company:activeCo};
  const compOpts = {...compPeriod, company:activeCo};
  const profit = typeBalance('INCOME', coa, journals, opts) - typeBalance('EXPENSE', coa, journals, opts);
  const compProfit = typeBalance('INCOME', coa, journals, compOpts) - typeBalance('EXPENSE', coa, journals, compOpts);

  const Row = ({code, name, ind=1, bold=false, type='acct'}) => {
    let cur=0, prev=0;
    if (type === 'group') {
      cur = groupBalance(code, coa, journals, opts);
      prev = groupBalance(code, coa, journals, compOpts);
    } else if (type === 'acct') {
      const a = coa.find(x=>x.code===code);
      cur = a ? natureBalance(a, journals, opts) : 0;
      prev = a ? natureBalance(a, journals, compOpts) : 0;
    }
    if (Math.abs(cur) < 0.01 && Math.abs(prev) < 0.01 && !bold) return null;
    return (
      <tr style={bold?{fontWeight:700, background:'var(--s2)'}:{}}>
        <td className={`indent-${ind}`}>{type==='acct' && <span className="mono" style={{fontSize:10, color:'var(--t3)'}}>{code} </span>}{name}</td>
        <td className="num">{fmt(cur)}</td>
        {showComp && <td className="num" style={{color:'var(--t2)'}}>{fmt(prev)}</td>}
      </tr>
    );
  };

  const renderGroup = (groupCode) => {
    const group = coa.find(a => a.code === groupCode);
    if (!group) return null;
    const children = coa.filter(a => a.parent === groupCode);
    const total = groupBalance(groupCode, coa, journals, opts);
    const prevTotal = groupBalance(groupCode, coa, journals, compOpts);
    return (
      <Fragment key={groupCode}>
        <tr className="tt-row-section"><td colSpan={showComp?3:2}>{group.name}</td></tr>
        {children.map(c => {
          if (c.isGroup) {
            const subItems = coa.filter(a => a.parent === c.code);
            const subTotal = groupBalance(c.code, coa, journals, opts);
            const subPrev = groupBalance(c.code, coa, journals, compOpts);
            return (
              <Fragment key={c.code}>
                <tr><td className="indent-1" style={{fontWeight:600}}>{c.name}</td><td></td>{showComp && <td></td>}</tr>
                {subItems.map(s => {
                  const v = natureBalance(s, journals, opts);
                  const pv = natureBalance(s, journals, compOpts);
                  if (Math.abs(v) < 0.01 && Math.abs(pv) < 0.01) return null;
                  return (
                    <tr key={s.code}>
                      <td className="indent-2"><span className="mono" style={{fontSize:10, color:'var(--t3)'}}>{s.code}</span> {s.name}</td>
                      <td className="num">{fmt(v)}</td>
                      {showComp && <td className="num" style={{color:'var(--t2)'}}>{fmt(pv)}</td>}
                    </tr>
                  );
                })}
                <tr className="tt-row-sub">
                  <td className="indent-1">Total {c.name}</td>
                  <td className="num">{fmt(subTotal)}</td>
                  {showComp && <td className="num" style={{color:'var(--t2)'}}>{fmt(subPrev)}</td>}
                </tr>
              </Fragment>
            );
          } else {
            const v = natureBalance(c, journals, opts);
            const pv = natureBalance(c, journals, compOpts);
            if (Math.abs(v) < 0.01 && Math.abs(pv) < 0.01) return null;
            return (
              <tr key={c.code}>
                <td className="indent-1"><span className="mono" style={{fontSize:10, color:'var(--t3)'}}>{c.code}</span> {c.name}</td>
                <td className="num">{fmt(v)}</td>
                {showComp && <td className="num" style={{color:'var(--t2)'}}>{fmt(pv)}</td>}
              </tr>
            );
          }
        })}
        <tr className="tt-row-grand">
          <td>TOTAL {group.name}</td>
          <td className="num">{fmt(total)}</td>
          {showComp && <td className="num">{fmt(prevTotal)}</td>}
        </tr>
      </Fragment>
    );
  };

  const totalA = groupBalance('1000', coa, journals, opts);
  const totalL = groupBalance('2000', coa, journals, opts);
  const totalEqBase = groupBalance('3000', coa, journals, opts);
  const totalE = totalEqBase + profit;
  const balanced = Math.abs(totalA - (totalL + totalE)) < 1;

  const compTotalA = groupBalance('1000', coa, journals, compOpts);
  const compTotalL = groupBalance('2000', coa, journals, compOpts);
  const compTotalEqBase = groupBalance('3000', coa, journals, compOpts);
  const compTotalE = compTotalEqBase + compProfit;

  return (
    <div>
      <PageHeader title={pageTitle} sub={`Statement of Financial Position · As at ${period.to}`} period={period} setPeriod={setPeriod}>
        <label style={{fontSize:11, color:'var(--t2)', display:'flex', alignItems:'center', gap:6}}>
          <input type="checkbox" checked={showComp} onChange={e=>setShowComp(e.target.checked)} /> Comparative
        </label>
        {showComp && (
          <select className="fs" style={{width:160, padding:'5px 10px'}} value={compMode} onChange={e=>setCompMode(e.target.value)}>
            <option value="prior_year">vs Prior Year</option>
            <option value="prior_period">vs Prior Period</option>
          </select>
        )}
      </PageHeader>

      <div className="card">
        <div className="ch"><div className="ct">{coa.find(a=>a.code==='1000') ? '' : ''}Financial Position</div><div className="cs">{activeCo} · IFRS</div></div>
        <div className="tw">
          <table>
            <thead><tr>
              <th>Account</th>
              <th className="num-h">As at {period.to}</th>
              {showComp && <th className="num-h" style={{color:'var(--t2)'}}>As at {compPeriod.to}</th>}
            </tr></thead>
            <tbody>
              {renderGroup('1000')}
              {renderGroup('2000')}
              {renderGroup('3000')}
              <tr>
                <td className="indent-1">Current Year Profit / (Loss)</td>
                <td className="num" style={{color: profit>=0?'var(--green)':'var(--red)'}}>{fmt(profit)}</td>
                {showComp && <td className="num" style={{color:'var(--t2)'}}>{fmt(compProfit)}</td>}
              </tr>
              <tr className="tt-row-grand">
                <td>TOTAL EQUITY (incl. current P&L)</td>
                <td className="num">{fmt(totalE)}</td>
                {showComp && <td className="num">{fmt(compTotalE)}</td>}
              </tr>
              <tr className="tt-row-grand" style={{background: balanced?'var(--green)':'var(--red)', color:'#fff'}}>
                <td>Equation check: Assets = Liabilities + Equity</td>
                <td className="num">{fmt(totalA)} = {fmt(totalL+totalE)} {balanced?'✓':`(diff ${fmt(totalA-totalL-totalE)})`}</td>
                {showComp && <td className="num">{fmt(compTotalA)} = {fmt(compTotalL+compTotalE)}</td>}
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ════════════ CHANGES IN EQUITY — with comparative ════════════
function ChangesInEquity({coa, journals, period, activeCo, pageTitle, setPeriod}){
  const [showComp, setShowComp] = useState(true);
  const [compMode, setCompMode] = useState('prior_year');
  const compPeriod = compMode === 'prior_year' ? priorYear(period) : priorPeriod(period);

  const buildEquityTable = (per) => {
    const opts = {...per, company:activeCo};
    const profit = typeBalance('INCOME', coa, journals, opts) - typeBalance('EXPENSE', coa, journals, opts);
    const open = (code) => -acctBalance(code, journals, {to:per.from, company:activeCo}).net;
    const allMove = (code) => -acctBalance(code, journals, {company:activeCo, to:per.to}).net;
    const movement = (code) => allMove(code) - open(code);
    const close = (code) => open(code) + movement(code);
    return {profit, open, movement, close};
  };

  const cur = buildEquityTable(period);
  const prev = buildEquityTable(compPeriod);

  const equityCodes = ['3100','3200','3300','3400','3500','3600'];
  const eqCols = equityCodes.map(c => coa.find(a => a.code===c)).filter(Boolean);
  const totalOpen = eqCols.reduce((s,a)=>s+cur.open(a.code), 0);
  const totalOtherMov = eqCols.filter(a=>a.code!=='3500').reduce((s,a)=>s+cur.movement(a.code), 0);
  const totalClose = totalOpen + cur.profit + totalOtherMov;

  const prevTotalOpen = eqCols.reduce((s,a)=>s+prev.open(a.code), 0);
  const prevTotalOtherMov = eqCols.filter(a=>a.code!=='3500').reduce((s,a)=>s+prev.movement(a.code), 0);
  const prevTotalClose = prevTotalOpen + prev.profit + prevTotalOtherMov;

  const renderTable = (data, per) => (
    <div className="tw">
      <table>
        <thead><tr>
          <th>Component</th>
          {eqCols.map(a => <th key={a.code} className="num-h" style={{fontSize:9.5}}>{a.name}</th>)}
          <th className="num-h" style={{background:'var(--blue2)', color:'var(--blue3)'}}>Total</th>
        </tr></thead>
        <tbody>
          <tr>
            <td style={{fontWeight:600}}>Balance at {per.from}</td>
            {eqCols.map(a => <td key={a.code} className="num">{fmt(data.open(a.code))}</td>)}
            <td className="num" style={{fontWeight:700}}>{fmt(eqCols.reduce((s,a)=>s+data.open(a.code), 0))}</td>
          </tr>
          <tr>
            <td>Profit for the period</td>
            {eqCols.map(a => <td key={a.code} className="num">{a.code==='3500' ? fmt(data.profit) : '—'}</td>)}
            <td className="num" style={{color:'var(--green)', fontWeight:700}}>{fmt(data.profit)}</td>
          </tr>
          <tr>
            <td>Dividends / issues / transfers</td>
            {eqCols.map(a => <td key={a.code} className="num">{a.code==='3500' ? '—' : fmt(data.movement(a.code))}</td>)}
            <td className="num">{fmt(eqCols.filter(a=>a.code!=='3500').reduce((s,a)=>s+data.movement(a.code), 0))}</td>
          </tr>
          <tr className="tt-row-grand">
            <td>Balance at {per.to}</td>
            {eqCols.map(a => <td key={a.code} className="num">{fmt(a.code==='3500' ? data.profit : data.close(a.code))}</td>)}
            <td className="num">{fmt(eqCols.reduce((s,a)=>s+data.open(a.code),0) + data.profit + eqCols.filter(a=>a.code!=='3500').reduce((s,a)=>s+data.movement(a.code),0))}</td>
          </tr>
        </tbody>
      </table>
    </div>
  );

  return (
    <div>
      <PageHeader title={pageTitle} sub={`Statement of Changes in Equity · ${period.from} to ${period.to}`} period={period} setPeriod={setPeriod}>
        <label style={{fontSize:11, color:'var(--t2)', display:'flex', alignItems:'center', gap:6}}>
          <input type="checkbox" checked={showComp} onChange={e=>setShowComp(e.target.checked)} /> Comparative
        </label>
        {showComp && (
          <select className="fs" style={{width:160, padding:'5px 10px'}} value={compMode} onChange={e=>setCompMode(e.target.value)}>
            <option value="prior_year">vs Prior Year</option>
            <option value="prior_period">vs Prior Period</option>
          </select>
        )}
      </PageHeader>

      <div className="card">
        <div className="ch"><div className="ct">Current Period</div><div className="cs">{period.from} to {period.to}</div></div>
        {renderTable(cur, period)}
      </div>

      {showComp && (
        <div className="card">
          <div className="ch"><div className="ct">Comparative Period</div><div className="cs">{compPeriod.from} to {compPeriod.to}</div></div>
          {renderTable(prev, compPeriod)}
        </div>
      )}
    </div>
  );
}

// ════════════ CASH FLOW — with comparative ════════════
function CashFlow({coa, journals, period, activeCo, pageTitle, setPeriod}){
  const [showComp, setShowComp] = useState(true);
  const [compMode, setCompMode] = useState('prior_year');
  const compPeriod = compMode === 'prior_year' ? priorYear(period) : priorPeriod(period);

  const buildCF = (per) => {
    const opts = {...per, company:activeCo};
    const get = (code) => coa.find(a => a.code===code);
    const bal = (code) => get(code) ? natureBalance(get(code), journals, opts) : 0;
    const profit = typeBalance('INCOME', coa, journals, opts) - typeBalance('EXPENSE', coa, journals, opts);
    const depr = bal('5310'), amort = bal('5320'), fxLossU = bal('5430'), fxGainU = bal('4230'),
          badDebt = bal('5360'), interestExp = bal('5410'), interestInc = bal('4210'), taxExp = bal('5500');
    const periodDelta = (code) => {
      const o = acctBalance(code, journals, {to: per.from, company:activeCo}).net;
      const c = acctBalance(code, journals, {to: per.to, company:activeCo}).net;
      return c - o;
    };
    const dAR = periodDelta('1220');
    const dInv = ['1211','1212','1213','1215','1216'].reduce((s,c)=>s+periodDelta(c), 0);
    const dPrep = periodDelta('1230');
    const dAP = periodDelta('2210');
    const dAccr = periodDelta('2220');
    const dGSTOut = periodDelta('2230');
    const dGSTIn = periodDelta('1250');
    const dSalPay = periodDelta('2260');
    const operAdj = depr + amort + fxLossU - fxGainU + badDebt + interestExp;
    const wcMove = -dAR - dInv - dPrep + dAP + dAccr + dGSTOut - dGSTIn + dSalPay;
    const cashFromOps = profit + operAdj + wcMove;
    const dPPE = ['1111','1112','1113','1114'].reduce((s,c)=>s+periodDelta(c), 0);
    const dIntang = periodDelta('1120');
    const dInvest = periodDelta('1130');
    const investingCash = -(dPPE + dIntang + dInvest) + interestInc;
    const dLongLoan = periodDelta('2110');
    const dShortLoan = periodDelta('2280');
    const dShareCap = periodDelta('3100');
    const dSharePrem = periodDelta('3200');
    const financingCash = dLongLoan + dShortLoan + dShareCap + dSharePrem - interestExp;
    const cashAccts = ['1241','1242','1243','1244'];
    const openingCash = cashAccts.reduce((s,c) => s + acctBalance(c, journals, {to:per.from, company:activeCo}).net, 0);
    const netCash = cashFromOps - interestExp - taxExp + investingCash + financingCash;
    const closingCash = openingCash + netCash;
    return { profit, profitBT: profit+taxExp, depr, amort, fxLossU, fxGainU, badDebt, interestExp, interestInc, taxExp,
             dAR, dInv, dPrep, dAP, dAccr, dGSTOut, dGSTIn, dSalPay,
             cashFromOps, investingCash, financingCash, dPPE, dIntang, dInvest, dLongLoan, dShortLoan, dShareCap, dSharePrem,
             openingCash, closingCash, netCash };
  };

  const cur = buildCF(period);
  const prev = buildCF(compPeriod);

  const Row = ({label, ind, getVal, bold, section, grand}) => (
    <tr className={section?'tt-row-section':grand?'tt-row-grand':bold?'tt-row-tot':''}>
      <td className={ind?`indent-${ind}`:''}>{label}</td>
      <td className="num">{section?'':fmt(getVal(cur))}</td>
      {showComp && <td className="num" style={{color:section?'inherit':'var(--t2)'}}>{section?'':fmt(getVal(prev))}</td>}
    </tr>
  );

  return (
    <div>
      <PageHeader title={pageTitle} sub={`Statement of Cash Flows · Indirect method · ${period.from} to ${period.to}`} period={period} setPeriod={setPeriod}>
        <label style={{fontSize:11, color:'var(--t2)', display:'flex', alignItems:'center', gap:6}}>
          <input type="checkbox" checked={showComp} onChange={e=>setShowComp(e.target.checked)} /> Comparative
        </label>
        {showComp && (
          <select className="fs" style={{width:160, padding:'5px 10px'}} value={compMode} onChange={e=>setCompMode(e.target.value)}>
            <option value="prior_year">vs Prior Year</option>
            <option value="prior_period">vs Prior Period</option>
          </select>
        )}
      </PageHeader>

      <div className="card">
        <div className="ch"><div className="ct">Cash Flow Statement</div></div>
        <div className="tw">
          <table>
            <thead><tr><th>Line item</th><th className="num-h">Current</th>{showComp && <th className="num-h" style={{color:'var(--t2)'}}>Comparative</th>}</tr></thead>
            <tbody>
              <Row label="A. Cash flow from Operating Activities" section />
              <Row label="Profit before tax" getVal={d => d.profitBT} />
              <Row label="Adjustments for non-cash items:" ind={1} getVal={() => null} />
              <Row label="Depreciation" ind={2} getVal={d => d.depr} />
              <Row label="Amortization" ind={2} getVal={d => d.amort} />
              <Row label="Unrealized FX (loss)/gain" ind={2} getVal={d => d.fxLossU - d.fxGainU} />
              <Row label="Bad debt expense" ind={2} getVal={d => d.badDebt} />
              <Row label="Interest expense" ind={2} getVal={d => d.interestExp} />
              <Row label="Working capital changes:" ind={1} getVal={() => null} />
              <Row label="(Increase) / Decrease in Trade Receivables" ind={2} getVal={d => -d.dAR} />
              <Row label="(Increase) / Decrease in Inventory" ind={2} getVal={d => -d.dInv} />
              <Row label="(Increase) / Decrease in Prepayments" ind={2} getVal={d => -d.dPrep} />
              <Row label="Increase / (Decrease) in Trade Payables" ind={2} getVal={d => d.dAP} />

// ════════════ POLICIES EDITOR — accountant can edit ════════════
function PoliciesEditor({policies, setPolicies, showToast, pageTitle, period, setPeriod}){
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState({code:'', title:'', body:'', enabled:true});

  const startNew = () => {
    setDraft({code:`3.${policies.length+1}`, title:'', body:'', enabled:true});
    setEditingId('new');
  };
  const startEdit = (p) => {
    setDraft({...p});
    setEditingId(p.id);
  };
  const save = () => {
    if (!draft.title || !draft.body) { showToast('Title and body are required', 'bad'); return; }
    if (editingId === 'new') {
      setPolicies(prev => [...prev, {...draft, id: uid('P')}]);
      showToast('Policy added', 'ok');
    } else {
      setPolicies(prev => prev.map(p => p.id === editingId ? draft : p));
      showToast('Policy updated', 'ok');
    }
    setEditingId(null);
  };
  const remove = (id) => {
    if (!confirm('Delete this policy? This action cannot be undone.')) return;
    setPolicies(prev => prev.filter(p => p.id !== id));
    showToast('Policy deleted', 'ok');
  };
  const toggle = (id) => {
    setPolicies(prev => prev.map(p => p.id===id ? {...p, enabled: !p.enabled} : p));
  };
  const moveUp = (i) => {
    if (i === 0) return;
    const arr = [...policies];
    [arr[i-1], arr[i]] = [arr[i], arr[i-1]];
    setPolicies(arr);
  };
  const moveDown = (i) => {
    if (i === policies.length - 1) return;
    const arr = [...policies];
    [arr[i+1], arr[i]] = [arr[i], arr[i+1]];
    setPolicies(arr);
  };
  const resetDefaults = () => {
    if (!confirm('Reset all policies to factory defaults? Your customisations will be lost.')) return;
    setPolicies(DEFAULT_POLICIES);
    showToast('Reset to defaults', 'ok');
  };

  return (
    <div>
      <PageHeader title={pageTitle} sub="Manage accounting policies disclosed in the financial statements" period={period} setPeriod={setPeriod} showPeriod={false}>
        <button className="btn btn-sm" onClick={resetDefaults}>Reset Defaults</button>
        <button className="btn btn-p btn-sm" onClick={startNew}>+ New Policy</button>
      </PageHeader>

      <div className="al al-i">
        <b>Accountant control:</b> Policies on this page appear automatically in <b>Reports → Notes</b>. Disable a policy to hide it from the notes without deleting. Use the up/down arrows to reorder how policies appear in the financial statements.
      </div>

      {policies.map((p, i) => (
        <div key={p.id} className="card" style={{opacity: p.enabled ? 1 : 0.55}}>
          <div className="ch">
            <div style={{display:'flex', alignItems:'center', gap:10, flex:1}}>
              <span className="mono">{p.code}</span>
              <div>
                <div className="ct">{p.title}</div>
                <div className="cs">{p.enabled ? 'Enabled — appears in notes' : 'Disabled — hidden from notes'}</div>
              </div>
            </div>
            <div style={{display:'flex', gap:6}}>
              <button className="btn btn-xs" onClick={()=>moveUp(i)} disabled={i===0} title="Move up">↑</button>
              <button className="btn btn-xs" onClick={()=>moveDown(i)} disabled={i===policies.length-1} title="Move down">↓</button>
              <button className="btn btn-sm" onClick={()=>toggle(p.id)}>{p.enabled ? 'Disable' : 'Enable'}</button>
              <button className="btn btn-sm" onClick={()=>startEdit(p)}>✎ Edit</button>
              <button className="btn btn-sm btn-r" onClick={()=>remove(p.id)}>Delete</button>
            </div>
          </div>
          <div className="cb" style={{fontSize:12.5, lineHeight:1.7, color:'var(--text)'}}>
            {p.body}
          </div>
        </div>
      ))}

      {editingId !== null && (
        <div className="mbg" onClick={()=>setEditingId(null)}>
          <div className="modal lg" onClick={e=>e.stopPropagation()}>
            <div className="mh"><div><div className="mt">{editingId === 'new' ? 'New' : 'Edit'} Policy</div><div className="ms">Changes apply to all generated financial statements</div></div><button className="mx" onClick={()=>setEditingId(null)}>✕</button></div>
            <div className="mc">
              <div className="fg2">
                <div className="fg"><label className="fl">Reference code <span className="req">*</span></label><input className="fi" value={draft.code} onChange={e=>setDraft({...draft, code:e.target.value})} placeholder="e.g. 3.11" /></div>
                <div className="fg"><label className="fl">Status</label>
                  <select className="fs" value={draft.enabled?'yes':'no'} onChange={e=>setDraft({...draft, enabled: e.target.value==='yes'})}>
                    <option value="yes">Enabled — visible in notes</option>
                    <option value="no">Disabled — hidden</option>
                  </select>
                </div>
              </div>
              <div className="fg"><label className="fl">Title <span className="req">*</span></label><input className="fi" value={draft.title} onChange={e=>setDraft({...draft, title:e.target.value})} placeholder="e.g. Leases (IFRS 16)" /></div>
              <div className="fg"><label className="fl">Body / disclosure text <span className="req">*</span></label>
                <textarea className="fta" rows={8} value={draft.body} onChange={e=>setDraft({...draft, body:e.target.value})} placeholder="Full disclosure text as it will appear in the notes…" />
              </div>
            </div>
            <div className="mf"><button className="btn" onClick={()=>setEditingId(null)}>Cancel</button><button className="btn btn-p" onClick={save}>Save Policy</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ════════════ TAX COMPLIANCE ════════════
function TaxCompliance({coa, journals, period, activeCo, pageTitle, setPeriod, companies}){
  const co = companies.find(c=>c.id===activeCo);
  const country = co?.country || 'MV';
  const cfg = COUNTRY_TAX_CONFIG[country];

  const opts = {...period, company:activeCo};
  const gstOut = natureBalance(coa.find(a=>a.code==='2230'), journals, opts);
  const gstIn = natureBalance(coa.find(a=>a.code==='1250'), journals, opts);
  const gstNet = gstOut - gstIn;
  const wht = natureBalance(coa.find(a=>a.code==='2250'), journals, opts);
  const taxExp = natureBalance(coa.find(a=>a.code==='5500'), journals, opts);
  const revenue = typeBalance('INCOME', coa, journals, opts);
  const expense = typeBalance('EXPENSE', coa, journals, opts);
  const profitBT = revenue - expense + taxExp;
  const disallowedDonations = natureBalance(coa.find(a=>a.code==='5370'), journals, opts);
  const accDepr = natureBalance(coa.find(a=>a.code==='5310'), journals, opts);
  const capAllowance = accDepr * 0.85;
  const taxableProfit = profitBT + disallowedDonations + accDepr - capAllowance;
  const profitTaxRate = country === 'MV' ? 0.15 : 0.30;
  const profitTaxLiability = Math.max(0, taxableProfit) * profitTaxRate;

  return (
    <div>
      <PageHeader title={pageTitle} sub={`Tax computations and filings · ${cfg.name} (${cfg.authority})`} period={period} setPeriod={setPeriod} />

      <div className="al al-i">
        Tax rules and filings are <b>auto-selected based on the active company's country</b>. Currently: <b>{cfg.name}</b> ({cfg.authority}). Switch company in the top bar to view tax for another jurisdiction.
      </div>

      <div className="sgrid" style={{gridTemplateColumns:'repeat(4, 1fr)'}}>
        <StatCard tone="bl" label={country==='MV'?'GST Output':'VAT Output'} value={fmt(gstOut)} sub={`Collected, payable to ${cfg.authority}`} />
        <StatCard tone="gr" label={country==='MV'?'GST Input':'VAT Input'} value={fmt(gstIn)} sub="Paid, recoverable" />
        <StatCard tone="am" label={country==='MV'?'Net GST Payable':'Net VAT Payable'} value={fmt(gstNet)} />
        <StatCard tone="or" label="WHT Payable" value={fmt(wht)} sub="To remit" />
      </div>

      <div className="card">
        <div className="ch"><div className="ct">Applicable Taxes — {cfg.name}</div><div className="cs">All taxes & withholdings for this jurisdiction</div></div>
        <div className="tw">
          <table>
            <thead><tr><th>Code</th><th>Tax</th><th className="num-h">Rate</th><th>Type</th><th>Notes</th></tr></thead>
            <tbody>
              {cfg.taxes.map(t => (
                <tr key={t.code}>
                  <td><span className="mono">{t.code}</span></td>
                  <td>{t.name}</td>
                  <td className="num">{t.rate}%</td>
                  <td><span className="bdg b-info"><span className="bd"></span>{t.type}</span></td>
                  <td style={{fontSize:11, color:'var(--t2)'}}>{t.threshold ? `Threshold: ${fmt(t.threshold)}` : ''}{t.appliesTo ? ` Applies to: ${t.appliesTo}` : ''}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div className="card">
        <div className="ch"><div className="ct">{country==='MV'?'Business Profit Tax (BPT)':'Corporate Income Tax (CIT)'} Computation</div><div className="cs">{country==='MV'?'Maldives Income Tax Act (Law 25/2019)':'Sri Lanka Inland Revenue Act'} · Rate {(profitTaxRate*100).toFixed(0)}%</div></div>
        <div className="cb" style={{padding:0}}>
          <div className="tw">
            <table>
              <tbody>
                <tr><td>Profit before tax (per books)</td><td className="num" style={{fontWeight:600}}>{fmt(profitBT)}</td></tr>
                <tr><td className="indent-1">Add: Donations (disallowed)</td><td className="num">{fmt(disallowedDonations)}</td></tr>
                <tr><td className="indent-1">Add: Accounting depreciation</td><td className="num">{fmt(accDepr)}</td></tr>
                <tr><td className="indent-1">Less: Capital allowance ({country==='MV'?'per ITA':'per IRA'})</td><td className="num" style={{color:'var(--red)'}}>({fmt(capAllowance)})</td></tr>
                <tr className="tt-row-tot"><td>Taxable profit</td><td className="num">{fmt(taxableProfit)}</td></tr>
                <tr><td>{country==='MV'?'BPT':'CIT'} @ {(profitTaxRate*100).toFixed(0)}%</td><td className="num">{fmt(profitTaxLiability)}</td></tr>
                <tr className="tt-row-grand"><td>Tax liability for the period</td><td className="num">{fmt(profitTaxLiability)}</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="ch"><div className="ct">Disallowed expenses (for tax)</div><div className="cs">Items added back when computing taxable profit</div></div>
        <div className="cb" style={{padding:18}}>
          <ul style={{margin:0, paddingLeft:20, lineHeight:1.8, fontSize:12.5}}>
            {cfg.disallowed.map((d,i) => <li key={i}>{d}</li>)}
          </ul>
        </div>
      </div>

      <div className="card">
        <div className="ch"><div className="ct">Filing Calendar — {cfg.name}</div></div>
        <div className="tw">
          <table>
            <thead><tr><th>Return</th><th>Frequency</th><th>Due Date</th><th>Authority</th></tr></thead>
            <tbody>
              {cfg.filings.map((f, i) => (
                <tr key={i}>
                  <td>{f.name}</td>
                  <td><span className="bdg b-info"><span className="bd"></span>{f.freq}</span></td>
                  <td>{f.due}</td>
                  <td>{cfg.authority}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ════════════ CUSTOMER PROFILE DRAWER ════════════
function CustomerProfileDrawer({customer, journals, activeCo, onClose, companies, showToast}){
  const [tab, setTab] = useState('overview');
  if (!customer) return null;

  // Transactions involving this customer
  const txns = [];
  journals.filter(j => j.posted && j.company === activeCo).forEach(je => {
    je.lines.forEach(l => {
      if (l.partner === customer.id) txns.push({...l, je: je.id, date: je.date, ref: je.ref, narration: je.narration, source: je.source});
    });
  });
  txns.sort((a,b) => b.date.localeCompare(a.date));

  const totalDr = txns.reduce((s,t) => s + (t.debit || 0), 0);
  const totalCr = txns.reduce((s,t) => s + (t.credit || 0), 0);
  const balance = totalDr - totalCr;

  // Top 5 items sold (estimated by AR-INV narrations)
  const invoices = journals.filter(j => j.company === activeCo && j.source === 'AR-INV' && j.lines.some(l => l.partner === customer.id));
  const totalSales = invoices.reduce((s, j) => s + j.lines.filter(l => l.acct.startsWith('41')).reduce((a, l) => a + l.credit, 0), 0);

  const co = companies.find(c => c.id === activeCo);

  const exportStatement = () => {
    exportToPDF(`Customer-Statement-${customer.code}.pdf`, {
      title:`Customer Statement — ${customer.name}`, subtitle:`Tax ID: ${customer.taxId}`, company:co?.name,
      orientation:'landscape',
      sections:[{ header:['Date','JE','Ref','Source','Description','Debit','Credit'],
        rows: txns.map(t => [t.date, t.je, t.ref, t.source, t.desc || t.narration, t.debit?fmt(t.debit):'', t.credit?fmt(t.credit):'']),
        totals:[['','','','','TOTAL', fmt(totalDr), fmt(totalCr)],['','','','','BALANCE', fmt(balance), '']],
        columnStyles:{5:{halign:'right'},6:{halign:'right'}},
      }],
    });
    showToast('Statement exported', 'ok');
  };

  return (
    <div className="drawer-bg" onClick={onClose}>
      <div className="drawer" onClick={e=>e.stopPropagation()}>
        <div className="drawer-h">
          <div>
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <span className="mono" style={{fontSize:13, color:'var(--blue)', fontWeight:700}}>{customer.code}</span>
              <span className="bdg b-info"><span className="bd"></span>Customer</span>
            </div>
            <div style={{fontSize:20, fontWeight:700, marginTop:6, color:'var(--blue3)'}}>{customer.name}</div>
            <div style={{fontSize:11, color:'var(--t2)', marginTop:3}}>Tax ID: {customer.taxId} · {customer.currency} · {customer.terms} day terms</div>
          </div>
          <div style={{display:'flex', gap:6}}>
            <button className="btn btn-sm" onClick={exportStatement}>📄 Statement</button>
            <button className="mx" onClick={onClose}>✕</button>
          </div>
        </div>

        <div className="drawer-tabs">
          <div className="tabs" style={{marginBottom:0, borderBottom:'none'}}>
            <div className={`tab ${tab==='overview'?'on':''}`} onClick={()=>setTab('overview')}>Overview</div>
            <div className={`tab ${tab==='txns'?'on':''}`} onClick={()=>setTab('txns')}>Transactions ({txns.length})</div>
            <div className={`tab ${tab==='invoices'?'on':''}`} onClick={()=>setTab('invoices')}>Invoices ({invoices.length})</div>
          </div>
        </div>

        <div className="drawer-c">
          {tab==='overview' && (

function VendorProfileDrawer({vendor, journals, activeCo, expenseRequests, onClose, companies, showToast}){
  const [tab, setTab] = useState('overview');
  if (!vendor) return null;

  const txns = [];
  journals.filter(j => j.posted && j.company === activeCo).forEach(je => {
    je.lines.forEach(l => {
      if (l.partner === vendor.id) txns.push({...l, je: je.id, date: je.date, ref: je.ref, narration: je.narration, source: je.source});
    });
  });
  txns.sort((a,b) => b.date.localeCompare(a.date));

  const totalDr = txns.reduce((s,t) => s + (t.debit || 0), 0);
  const totalCr = txns.reduce((s,t) => s + (t.credit || 0), 0);
  const balance = totalCr - totalDr; // payable to vendor

  const bills = journals.filter(j => j.company === activeCo && j.source === 'AP-BILL' && j.lines.some(l => l.partner === vendor.id));
  const payments = journals.filter(j => j.company === activeCo && j.source === 'AP-PMT' && j.lines.some(l => l.partner === vendor.id));
  const totalPurchases = bills.reduce((s, j) => s + sumLines(j.lines, 'debit'), 0);
  const co = companies.find(c => c.id === activeCo);

  const exportStatement = () => {

// ════════════ ITEM PROFILE DRAWER ════════════
function ItemProfileDrawer({item, journals, activeCo, coa, onClose, showToast}){
  const [tab, setTab] = useState('overview');
  if (!item) return null;

  // Stock movements (proxy from journals touching this item's inventory account)
  const moves = [];
  journals.filter(j => j.posted && j.company === activeCo).forEach(je => {
    je.lines.forEach(l => {
      if (l.acct === item.glInv) {
        moves.push({date: je.date, je: je.id, ref: je.ref, narration: je.narration, source: je.source,
          desc: l.desc, inflow: l.debit || 0, outflow: l.credit || 0});
      }
    });
  });
  moves.sort((a,b) => b.date.localeCompare(a.date));

  const stockValue = item.stock * item.costAvg;
  const reorderQty = Math.max(0, item.reorderLvl - item.stock);
  const margin = item.sellPrice > 0 ? ((item.sellPrice - item.costAvg) / item.sellPrice * 100) : 0;

  return (
    <div className="drawer-bg" onClick={onClose}>
      <div className="drawer" onClick={e=>e.stopPropagation()}>
        <div className="drawer-h">
          <div>
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <span className="mono" style={{fontSize:13, color:'var(--blue)', fontWeight:700}}>{item.sku}</span>
              <span className="bdg b-info"><span className="bd"></span>{item.cat}</span>
              {item.stock <= item.reorderLvl && <span className="bdg b-rej"><span className="bd"></span>Low stock</span>}
            </div>
            <div style={{fontSize:20, fontWeight:700, marginTop:6, color:'var(--blue3)'}}>{item.name}</div>
            <div style={{fontSize:11, color:'var(--t2)', marginTop:3}}>UoM: {item.uom} · Reorder at {item.reorderLvl}</div>
          </div>
          <button className="mx" onClick={onClose}>✕</button>
        </div>

        <div className="drawer-tabs">
          <div className="tabs" style={{marginBottom:0, borderBottom:'none'}}>
            <div className={`tab ${tab==='overview'?'on':''}`} onClick={()=>setTab('overview')}>Overview</div>
            <div className={`tab ${tab==='movements'?'on':''}`} onClick={()=>setTab('movements')}>Stock Movements ({moves.length})</div>
            <div className={`tab ${tab==='pricing'?'on':''}`} onClick={()=>setTab('pricing')}>Pricing & GL</div>
          </div>
        </div>

        <div className="drawer-c">
          {tab==='overview' && (
            <Fragment>
              <div className="sgrid" style={{gridTemplateColumns:'repeat(4, 1fr)'}}>
                <StatCard tone="bl" label="Stock on Hand" value={item.stock} sub={item.uom} />
                <StatCard tone="gr" label="Stock Value" value={fmt(stockValue)} sub="MVR at avg cost" />
                <StatCard tone={item.stock<=item.reorderLvl?'rd':'te'} label="Reorder Need" value={reorderQty} sub={item.stock<=item.reorderLvl?'Below threshold':'OK'} />
                <StatCard tone="am" label="Gross Margin" value={`${margin.toFixed(1)}%`} sub="(Sell − Cost) / Sell" />
              </div>
              <div className="card">
                <div className="ch"><div className="ct">Item Profile</div></div>
                <div className="tw">
                  <table>
                    <tbody>
                      <tr><td style={{color:'var(--t2)', width:200}}>SKU</td><td><span className="mono">{item.sku}</span></td></tr>
                      <tr><td style={{color:'var(--t2)'}}>Name</td><td>{item.name}</td></tr>
                      <tr><td style={{color:'var(--t2)'}}>Category</td><td>{item.cat}</td></tr>
                      <tr><td style={{color:'var(--t2)'}}>Unit of Measure</td><td>{item.uom}</td></tr>
                      <tr><td style={{color:'var(--t2)'}}>Avg Cost</td><td className="num">{fmt(item.costAvg)} MVR</td></tr>
                      <tr><td style={{color:'var(--t2)'}}>Sell Price</td><td className="num">{fmt(item.sellPrice)} MVR</td></tr>
                      <tr><td style={{color:'var(--t2)'}}>Current Stock</td><td className="num">{item.stock} {item.uom}</td></tr>

                </div>
              </div>

          )}
          {tab==='movements' && (

              <div className="ch"><div className="ct">GL-driven stock movements</div><div className="cs">Sourced from journal entries touching {item.glInv}</div></div>
              <div className="tw">
                <table>
                  <thead><tr><th>Date</th><th>JE</th><th>Source</th><th>Description</th><th className="num-h">Inflow</th><th className="num-h">Outflow</th></tr></thead>
                  <tbody>{moves.map((m,i) => (
                    <tr key={i}>
                      <td>{m.date}</td><td><span className="mono">{m.je}</span></td>
                      <td><span className="bdg b-info"><span className="bd"></span>{m.source}</span></td>
                      <td>{m.desc || m.narration}</td>
                      <td className="num" style={{color:'var(--green)'}}>{m.inflow?fmt(m.inflow):''}</td>

                  <tbody>
                    <tr><td style={{color:'var(--t2)', width:240}}>Average Cost</td><td className="num">{fmt(item.costAvg)} MVR</td></tr>
                    <tr><td style={{color:'var(--t2)'}}>Sell Price</td><td className="num">{fmt(item.sellPrice)} MVR</td></tr>
                    <tr><td style={{color:'var(--t2)'}}>Gross Margin</td><td className="num">{fmt(item.sellPrice - item.costAvg)} MVR ({margin.toFixed(1)}%)</td></tr>
