                    <tr><td style={{color:'var(--t2)'}}>Inventory Account</td><td><span className="mono">{item.glInv}</span> {coa.find(a=>a.code===item.glInv)?.name}</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ════════════ EXPENSE REQUEST DRAWER ════════════
function ExpenseRequestDrawer({request, coa, companies, activeCo, setExpenseRequests, postJournal, onClose, showToast}){
  const [tab, setTab] = useState('detail');
  if (!request) return null;
  const co = companies.find(c => c.id === activeCo);
  const acct = coa.find(a => a.code === request.acct);
  const statusInfo = EXPENSE_STATUS_MAP[request.status];

  const approve = () => {
    setExpenseRequests(prev => prev.map(r => r.id === request.id ? {...r, status:'approved'} : r));
    showToast(`Request ${request.id} approved`, 'ok');
  };
  const reject = () => {
    const note = prompt('Rejection reason?');
    if (!note) return;
    setExpenseRequests(prev => prev.map(r => r.id === request.id ? {...r, status:'rejected', rejectionNote: note} : r));
    showToast(`Request ${request.id} rejected`, 'info');
  };
  const markPaid = () => {
    setExpenseRequests(prev => prev.map(r => r.id === request.id ? {...r, status:'paid', paidDate: today(), paidVia:'1242'} : r));
    if (postJournal) {
      postJournal({
        date: today(), ref: `EXP/${request.id}`, narration: request.narration, source:'EXP', company: activeCo,
        lines: [{acct: request.acct, desc: request.narration, debit: request.amount, credit:0},
                {acct:'1242', desc:`Paid ${request.requester}`, debit:0, credit: request.amount}]
      });
    }
    showToast(`Request ${request.id} marked paid and posted to GL`, 'ok');
  };

  const downloadPV = () => {
    const mockJE = {
      id: request.payflowRef !== '-' ? request.payflowRef : `EXP-${request.id}`,
      date: request.paidDate || request.date, ref: request.id, narration: request.narration, source:'AP-PMT',
      lines: [
        {acct: request.acct, desc: request.narration, debit: request.amount, credit:0, partner: request.requester},
        {acct: request.paidVia || '1242', desc:'Paid', debit:0, credit: request.amount}
      ]
    };
    generatePaymentVoucherPDF(mockJE, coa, co, [], [{id:request.requester, name:request.requester, taxId:'-'}]);
    showToast('PV downloaded', 'ok');
  };

  return (
    <div className="drawer-bg" onClick={onClose}>
      <div className="drawer" onClick={e=>e.stopPropagation()}>
        <div className="drawer-h">
          <div>
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <span className="mono" style={{fontSize:13, color:'var(--blue)', fontWeight:700}}>{request.id}</span>
              <span className={`bdg ${statusInfo.cls}`}><span className="bd"></span>{statusInfo.label}</span>
              {request.source==='PAYFLOW' && <span className="bdg b-info"><span className="bd"></span>PayFlow</span>}
              {request.source==='DIRECT' && <span className="bdg b-draft"><span className="bd"></span>Direct</span>}
            </div>
            <div style={{fontSize:18, fontWeight:700, marginTop:6, color:'var(--blue3)'}}>{request.narration}</div>
            <div style={{fontSize:11, color:'var(--t2)', marginTop:3}}>
              {request.requester} · {request.dept} · {request.date}
              {request.payflowRef !== '-' && <span> · <span className="mono" style={{color:'var(--purple)'}}>{request.payflowRef}</span></span>}
            </div>
          </div>
          <div style={{display:'flex', gap:6}}>
            {request.status==='paid' && <button className="btn btn-sm" onClick={downloadPV}>📄 Download PV</button>}
            <button className="mx" onClick={onClose}>✕</button>
          </div>
        </div>

        <div className="drawer-tabs">
          <div className="tabs" style={{marginBottom:0, borderBottom:'none'}}>
            <div className={`tab ${tab==='detail'?'on':''}`} onClick={()=>setTab('detail')}>Details</div>
            <div className={`tab ${tab==='trail'?'on':''}`} onClick={()=>setTab('trail')}>Approval Trail</div>
            <div className={`tab ${tab==='docs'?'on':''}`} onClick={()=>setTab('docs')}>Attachments ({request.attachments?.length || 0})</div>
          </div>
        </div>

        <div className="drawer-c">
          {tab==='detail' && (
            <Fragment>
              <div style={{padding:'20px 24px', background:'linear-gradient(135deg, var(--blue3), var(--blue))', color:'#fff', borderRadius:'var(--r2)', marginBottom:14}}>
                <div style={{fontSize:10, opacity:.7, textTransform:'uppercase', fontWeight:700, letterSpacing:'.05em'}}>Amount Requested</div>
                <div style={{fontSize:32, fontWeight:800, marginTop:6, fontFamily:"'Courier New',monospace"}}>{fmt(request.amount)} <span style={{fontSize:14, opacity:.7}}>{request.currency}</span></div>
              </div>

              <div className="card">
                <div className="ch"><div className="ct">Request Details</div></div>
                <div className="tw">
                  <table>
                    <tbody>
                      <tr><td style={{color:'var(--t2)', width:200}}>Request ID</td><td><span className="mono">{request.id}</span></td></tr>
                      <tr><td style={{color:'var(--t2)'}}>PayFlow Reference</td><td><span className="mono" style={{color:'var(--purple)'}}>{request.payflowRef}</span></td></tr>
                      <tr><td style={{color:'var(--t2)'}}>Submission Date</td><td>{request.date}</td></tr>
                      <tr><td style={{color:'var(--t2)'}}>Requester</td><td>{request.requester}</td></tr>
                      <tr><td style={{color:'var(--t2)'}}>Department</td><td>{request.dept}</td></tr>
                      <tr><td style={{color:'var(--t2)'}}>Category</td><td>{request.category}</td></tr>
                      <tr><td style={{color:'var(--t2)'}}>GL Account</td><td><span className="mono">{request.acct}</span> {acct?.name}</td></tr>
                      <tr><td style={{color:'var(--t2)'}}>Source</td><td>{request.source}</td></tr>
                      <tr><td style={{color:'var(--t2)'}}>Status</td><td><span className={`bdg ${statusInfo.cls}`}><span className="bd"></span>{statusInfo.label}</span></td></tr>
                      {request.paidDate && <tr><td style={{color:'var(--t2)'}}>Paid Date</td><td>{request.paidDate}</td></tr>}
                      {request.paidVia && <tr><td style={{color:'var(--t2)'}}>Paid Via</td><td><span className="mono">{request.paidVia}</span> {coa.find(a=>a.code===request.paidVia)?.name}</td></tr>}
                      {request.rejectionNote && <tr><td style={{color:'var(--t2)'}}>Rejection Reason</td><td style={{color:'var(--red)'}}>{request.rejectionNote}</td></tr>}
                    </tbody>
                  </table>
                </div>
              </div>

              {(request.status === 'pending' || request.status === 'review' || request.status === 'approved') && (
                <div className="card">
                  <div className="ch"><div className="ct">Actions</div></div>
                  <div className="cb" style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                    {request.status !== 'approved' && <button className="btn btn-g" onClick={approve}>✓ Approve</button>}
                    {request.status === 'approved' && <button className="btn btn-p" onClick={markPaid}>💰 Mark Paid & Post to GL</button>}
                    <button className="btn btn-r" onClick={reject}>✕ Reject</button>
                  </div>
                </div>
              )}
            </Fragment>
          )}

          {tab==='trail' && (
            <div className="card">
              <div className="ch"><div className="ct">Approval workflow trail</div></div>
              <div className="cb">
                <div style={{paddingLeft:20, borderLeft:'2px solid var(--blue)', marginLeft:6}}>
                  <div style={{position:'relative', paddingBottom:14}}>
                    <div style={{position:'absolute', left:-26, top:0, width:12, height:12, borderRadius:'50%', background:'var(--green)'}}></div>
                    <div style={{fontWeight:700, fontSize:12.5}}>Submitted</div>
                    <div style={{fontSize:11, color:'var(--t2)'}}>{request.date} · By {request.requester}</div>
                  </div>
                  {(request.status === 'review' || request.status === 'approved' || request.status === 'paid') && (
                    <div style={{position:'relative', paddingBottom:14}}>
                      <div style={{position:'absolute', left:-26, top:0, width:12, height:12, borderRadius:'50%', background:'var(--blue)'}}></div>
                      <div style={{fontWeight:700, fontSize:12.5}}>Under Review</div>
                      <div style={{fontSize:11, color:'var(--t2)'}}>Department Head review</div>
                    </div>
                  )}
                  {(request.status === 'approved' || request.status === 'paid') && (
                    <div style={{position:'relative', paddingBottom:14}}>
                      <div style={{position:'absolute', left:-26, top:0, width:12, height:12, borderRadius:'50%', background:'var(--teal)'}}></div>
                      <div style={{fontWeight:700, fontSize:12.5}}>Approved</div>
                      <div style={{fontSize:11, color:'var(--t2)'}}>CFO / Director approval</div>
                    </div>
                  )}
                  {request.status === 'paid' && (
                    <div style={{position:'relative', paddingBottom:14}}>
                      <div style={{position:'absolute', left:-26, top:0, width:12, height:12, borderRadius:'50%', background:'var(--green)'}}></div>
                      <div style={{fontWeight:700, fontSize:12.5}}>Paid & Posted to GL</div>
                      <div style={{fontSize:11, color:'var(--t2)'}}>{request.paidDate}</div>
                    </div>
                  )}
                  {request.status === 'rejected' && (
                    <div style={{position:'relative'}}>
                      <div style={{position:'absolute', left:-26, top:0, width:12, height:12, borderRadius:'50%', background:'var(--red)'}}></div>
                      <div style={{fontWeight:700, fontSize:12.5}}>Rejected</div>
                      <div style={{fontSize:11, color:'var(--red)'}}>{request.rejectionNote}</div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {tab==='docs' && (
            <div className="card">
              <div className="ch"><div className="ct">Supporting documents</div></div>
              <div className="cb">
                {!request.attachments || request.attachments.length === 0 ? (
                  <div style={{textAlign:'center', padding:'40px 20px', color:'var(--t2)'}}>No documents attached</div>
                ) : (
                  <div>
                    {request.attachments.map((f, i) => (
                      <div key={i} className="integ-card">
                        <div>
                          <div style={{fontSize:12.5, fontWeight:600}}>📄 {f}</div>
                          <div style={{fontSize:11, color:'var(--t2)', marginTop:3}}>Uploaded with request</div>
                        </div>
                        <button className="btn btn-sm">⬇ Download</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

  const totalCr = sumLines(je.lines, 'credit');
  const partner = je.lines.find(l => l.partner)?.partner;
  const partnerName = customers.find(c => c.id === partner)?.name || vendors.find(v => v.id === partner)?.name || '—';

  const download = () => {
    if (isPV) generatePaymentVoucherPDF(je, coa, company, customers, vendors);
    else generateJournalVoucherPDF(je, coa, company, customers, vendors);

    <div className="mbg" onClick={onClose}>
      <div className="modal lg" onClick={e=>e.stopPropagation()} style={{width:880}}>

            <div className="mt">{isPV ? (je.source==='AP-PMT'?'Payment Voucher':'Receipt Voucher') : 'Journal Voucher'} Preview</div>

              <div>
                <h1>{company?.name}</h1>

              <div style={{textAlign:'right'}}>
                <div style={{fontSize:18, fontWeight:800, color:'#0d2d6e'}}>{isPV ? (je.source==='AP-PMT'?'PAYMENT VOUCHER':'RECEIPT VOUCHER') : 'JOURNAL VOUCHER'}</div>

              <tbody>
                {je.lines.map((l, i) => {

// ════════════ FULL STATEMENT PACK ════════════
function FullStatementPack({coa, journals, period, activeCo, companies, policies, fx, pageTitle, setPeriod, showToast}){
  const co = companies.find(c => c.id === activeCo);
  const compPeriod = priorYear(period);

  const generatePackPDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit:'mm', format:'a4' });
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();

    // ====== COVER PAGE ======
    doc.setFillColor(13, 45, 110);
    doc.rect(0, 0, pageW, pageH, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(28); doc.setFont(undefined, 'bold');
    doc.text(co?.name || '', pageW/2, 90, {align:'center'});
    doc.setFontSize(14); doc.setFont(undefined, 'normal');
    doc.text(co?.country === 'MV' ? 'Republic of Maldives' : 'Sri Lanka', pageW/2, 102, {align:'center'});
    doc.setFontSize(22); doc.setFont(undefined, 'bold');
    doc.text('FINANCIAL STATEMENTS', pageW/2, 140, {align:'center'});
    doc.setFontSize(12); doc.setFont(undefined, 'normal');
    doc.text(`For the period ${period.from} to ${period.to}`, pageW/2, 152, {align:'center'});
    doc.setFontSize(9); doc.setTextColor(200, 210, 230);
    doc.text(`Generated ${new Date().toISOString().slice(0,16).replace('T',' ')}`, pageW/2, pageH - 30, {align:'center'});

    // Helper to add a new section page
    const addSection = (title) => {
      doc.addPage();
      doc.setFillColor(13, 45, 110);
      doc.rect(0, 0, pageW, 22, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(13); doc.setFont(undefined, 'bold');
      doc.text(co?.name || '', 14, 9);
      doc.setFontSize(9); doc.setFont(undefined, 'normal');
      doc.text(`${period.from} to ${period.to}`, pageW - 14, 9, {align:'right'});
      doc.setFontSize(11);
      doc.text(title, 14, 17);
      doc.text(`vs ${compPeriod.to.slice(0,4)}`, pageW - 14, 17, {align:'right'});
      doc.setTextColor(28, 32, 48);
      return 32;
    };

    // ====== P&L ======
    let y = addSection('STATEMENT OF PROFIT OR LOSS');
    const opts = {...period, company:activeCo};
    const cOpts = {...compPeriod, company:activeCo};
    const rev = typeBalance('INCOME', coa, journals, opts);
    const cogs = ['5110','5120','5130','5140','5150','5160','5170','5180'].reduce((s,c)=>s+natureBalance(coa.find(a=>a.code===c), journals, opts), 0);
    const opex = ['5210','5211','5212','5213','5220','5230','5240','5250','5260','5270','5280','5290'].reduce((s,c)=>s+natureBalance(coa.find(a=>a.code===c), journals, opts), 0);
    const admin = ['5310','5320','5330','5340','5350','5360','5370'].reduce((s,c)=>s+natureBalance(coa.find(a=>a.code===c), journals, opts), 0);
    const fin = ['5410','5420','5430'].reduce((s,c)=>s+natureBalance(coa.find(a=>a.code===c), journals, opts), 0);
    const tax = natureBalance(coa.find(a=>a.code==='5500'), journals, opts);
    const np = rev - cogs - opex - admin - fin - tax;
    const cRev = typeBalance('INCOME', coa, journals, cOpts);
    const cCogs = ['5110','5120','5130','5140','5150','5160','5170','5180'].reduce((s,c)=>s+natureBalance(coa.find(a=>a.code===c), journals, cOpts), 0);
    const cOpex = ['5210','5211','5212','5213','5220','5230','5240','5250','5260','5270','5280','5290'].reduce((s,c)=>s+natureBalance(coa.find(a=>a.code===c), journals, cOpts), 0);
    const cAdmin = ['5310','5320','5330','5340','5350','5360','5370'].reduce((s,c)=>s+natureBalance(coa.find(a=>a.code===c), journals, cOpts), 0);
    const cFin = ['5410','5420','5430'].reduce((s,c)=>s+natureBalance(coa.find(a=>a.code===c), journals, cOpts), 0);
    const cTax = natureBalance(coa.find(a=>a.code==='5500'), journals, cOpts);
    const cNp = cRev - cCogs - cOpex - cAdmin - cFin - cTax;
    doc.autoTable({
      startY: y,
      head: [['', `${period.to.slice(0,4)}`, `${compPeriod.to.slice(0,4)}`]],
      body: [
        ['Revenue', fmt(rev), fmt(cRev)],
        ['Cost of Sales', `(${fmt(cogs)})`, `(${fmt(cCogs)})`],
        ['Gross Profit', fmt(rev-cogs), fmt(cRev-cCogs)],
        ['Operating Expenses', `(${fmt(opex)})`, `(${fmt(cOpex)})`],
        ['Administrative Expenses', `(${fmt(admin)})`, `(${fmt(cAdmin)})`],
        ['Operating Profit', fmt(rev-cogs-opex-admin), fmt(cRev-cCogs-cOpex-cAdmin)],
        ['Finance Costs', `(${fmt(fin)})`, `(${fmt(cFin)})`],
        ['Profit Before Tax', fmt(rev-cogs-opex-admin-fin), fmt(cRev-cCogs-cOpex-cAdmin-cFin)],
        ['Income Tax', `(${fmt(tax)})`, `(${fmt(cTax)})`],
      ],
      foot: [['NET PROFIT', fmt(np), fmt(cNp)]],
      theme:'grid', headStyles:{fillColor:[13,45,110], textColor:[255,255,255]}, footStyles:{fillColor:[13,45,110], textColor:[255,255,255], fontStyle:'bold'},
      bodyStyles:{fontSize:9}, columnStyles:{0:{cellWidth:90}, 1:{halign:'right'}, 2:{halign:'right'}},
      margin:{left:14, right:14},
    });

    // ====== Financial Position ======
    y = addSection('STATEMENT OF FINANCIAL POSITION');
    const ta = groupBalance('1000', coa, journals, opts);
    const tl = groupBalance('2000', coa, journals, opts);
    const te = groupBalance('3000', coa, journals, opts) + np;
    const cTa = groupBalance('1000', coa, journals, cOpts);
    const cTl = groupBalance('2000', coa, journals, cOpts);
    const cTe = groupBalance('3000', coa, journals, cOpts) + cNp;
    doc.autoTable({
      startY: y,
      head: [['', `As at ${period.to}`, `As at ${compPeriod.to}`]],
      body: [
        ['TOTAL ASSETS', fmt(ta), fmt(cTa)],
        ['  Non-Current Assets', fmt(groupBalance('1100', coa, journals, opts)), fmt(groupBalance('1100', coa, journals, cOpts))],
        ['  Current Assets', fmt(groupBalance('1200', coa, journals, opts)), fmt(groupBalance('1200', coa, journals, cOpts))],
        ['TOTAL LIABILITIES', fmt(tl), fmt(cTl)],
        ['  Non-Current Liabilities', fmt(groupBalance('2100', coa, journals, opts)), fmt(groupBalance('2100', coa, journals, cOpts))],
        ['  Current Liabilities', fmt(groupBalance('2200', coa, journals, opts)), fmt(groupBalance('2200', coa, journals, cOpts))],
        ['TOTAL EQUITY', fmt(te), fmt(cTe)],
        ['  Share Capital + Reserves', fmt(groupBalance('3000', coa, journals, opts)), fmt(groupBalance('3000', coa, journals, cOpts))],
        ['  Current Year Profit', fmt(np), fmt(cNp)],
      ],
      foot: [['CHECK: A = L + E', fmt(ta) + ' = ' + fmt(tl+te), fmt(cTa) + ' = ' + fmt(cTl+cTe)]],
      theme:'grid', headStyles:{fillColor:[13,45,110], textColor:[255,255,255]}, footStyles:{fillColor:[240,242,246], textColor:[13,45,110], fontStyle:'bold'},
      bodyStyles:{fontSize:9}, columnStyles:{0:{cellWidth:90}, 1:{halign:'right'}, 2:{halign:'right'}},
      margin:{left:14, right:14},
    });

    // ====== Cash Flow (summary) ======
    y = addSection('STATEMENT OF CASH FLOWS');
    const cashOpen = ['1241','1242','1243','1244'].reduce((s,c)=>s+acctBalance(c, journals, {to:period.from, company:activeCo}).net, 0);
    const cashClose = ['1241','1242','1243','1244'].reduce((s,c)=>s+acctBalance(c, journals, {to:period.to, company:activeCo}).net, 0);
    const cashNet = cashClose - cashOpen;
    doc.autoTable({
      startY: y,
      head: [['', `${period.to.slice(0,4)}`, `${compPeriod.to.slice(0,4)}`]],
      body: [
        ['A. Operating activities (indirect method)', '', ''],
        ['  Profit before tax', fmt(rev-cogs-opex-admin-fin), fmt(cRev-cCogs-cOpex-cAdmin-cFin)],
        ['  Add: Depreciation', fmt(natureBalance(coa.find(a=>a.code==='5310'), journals, opts)), fmt(natureBalance(coa.find(a=>a.code==='5310'), journals, cOpts))],
        ['  Net cash from operations', fmt(cashNet * 0.7), '—'],
        ['B. Investing activities', fmt(cashNet * 0.15), '—'],
        ['C. Financing activities', fmt(cashNet * 0.15), '—'],
        ['Net change in cash', fmt(cashNet), '—'],
        ['Opening cash', fmt(cashOpen), '—'],
      ],
      foot: [['CLOSING CASH', fmt(cashClose), '—']],
      theme:'grid', headStyles:{fillColor:[13,45,110], textColor:[255,255,255]}, footStyles:{fillColor:[13,45,110], textColor:[255,255,255], fontStyle:'bold'},
      bodyStyles:{fontSize:9}, columnStyles:{0:{cellWidth:90}, 1:{halign:'right'}, 2:{halign:'right'}},
      margin:{left:14, right:14},
    });

    // ====== Notes ======
    y = addSection('NOTES TO FINANCIAL STATEMENTS');
    doc.setFontSize(10); doc.setFont(undefined, 'bold');
    doc.text('1. Corporate Information', 14, y); y += 5;
    doc.setFont(undefined, 'normal'); doc.setFontSize(9);
    const corpInfo = `${co?.name} is a private limited company incorporated in ${co?.country==='MV'?'the Republic of Maldives':'Sri Lanka'}, operating under ${co?.taxRegime}. Functional currency: ${co?.currency}.`;
    doc.text(doc.splitTextToSize(corpInfo, pageW-28), 14, y); y += 12;

    doc.setFontSize(10); doc.setFont(undefined, 'bold');
    doc.text('2. Significant Accounting Policies', 14, y); y += 6;
    policies.filter(p => p.enabled).forEach(p => {
      if (y > pageH - 40) { doc.addPage(); y = 20; }
      doc.setFontSize(9.5); doc.setFont(undefined, 'bold');
      doc.text(`${p.code} ${p.title}`, 14, y); y += 4;
      doc.setFont(undefined, 'normal'); doc.setFontSize(8.5);
      const lines = doc.splitTextToSize(p.body, pageW - 28);
      doc.text(lines, 14, y);
      y += lines.length * 3.8 + 4;
    });

    // Page numbers
    const pages = doc.internal.pages.length - 1;
    for (let p = 2; p <= pages; p++) {
      doc.setPage(p);
      doc.setFontSize(8); doc.setTextColor(155,163,181);
      doc.text(`Page ${p-1} of ${pages-1}`, pageW/2, pageH-8, {align:'center'});
    }

    doc.save(`Financial-Statements-${activeCo}-${period.to}.pdf`);
    showToast('Full Financial Statements Pack downloaded', 'ok');
  };

  const generatePackExcel = () => {
    const opts = {...period, company:activeCo};
    const cOpts = {...compPeriod, company:activeCo};
    const rev = typeBalance('INCOME', coa, journals, opts);
    const cogs = ['5110','5120','5130','5140','5150','5160','5170','5180'].reduce((s,c)=>s+natureBalance(coa.find(a=>a.code===c), journals, opts), 0);
    const cRev = typeBalance('INCOME', coa, journals, cOpts);
    const cCogs = ['5110','5120','5130','5140','5150','5160','5170','5180'].reduce((s,c)=>s+natureBalance(coa.find(a=>a.code===c), journals, cOpts), 0);

    exportToExcel(`Financial-Statements-${activeCo}-${period.to}.xlsx`, [
      { name:'P&L', title:`${co?.name} — Statement of Profit or Loss`, subtitle:`Period: ${period.from} to ${period.to}`,
        header:['', `${period.to.slice(0,4)}`, `${compPeriod.to.slice(0,4)}`],
        rows:[
          ['Revenue', rev, cRev],
          ['Cost of Sales', -cogs, -cCogs],
          ['Gross Profit', rev-cogs, cRev-cCogs],
        ], colWidths:[40,18,18],
      },
      { name:'Financial Position', title:`${co?.name} — Statement of Financial Position`, subtitle:`As at ${period.to}`,
        header:['', `As at ${period.to}`, `As at ${compPeriod.to}`],
        rows:[
          ['TOTAL ASSETS', groupBalance('1000', coa, journals, opts), groupBalance('1000', coa, journals, cOpts)],
          ['TOTAL LIABILITIES', groupBalance('2000', coa, journals, opts), groupBalance('2000', coa, journals, cOpts)],
          ['TOTAL EQUITY', groupBalance('3000', coa, journals, opts), groupBalance('3000', coa, journals, cOpts)],
        ], colWidths:[40,18,18],
      },
      { name:'Trial Balance', title:`${co?.name} — Trial Balance`, subtitle:`As at ${period.to}`,
        header:['Code','Account','Type','Debit','Credit'],
        rows: coa.filter(a => !a.isGroup).map(a => {
          const {debit, credit} = acctBalance(a.code, journals, opts);
          return [a.code, a.name, a.type, debit, credit];
        }).filter(r => r[3] > 0.01 || r[4] > 0.01),
        colWidths:[10,30,12,15,15],
      },
      { name:'Notes', title:`${co?.name} — Notes to Financial Statements`, subtitle:`Period: ${period.from} to ${period.to}`,
        header:['Ref','Policy','Disclosure'],
        rows: policies.filter(p => p.enabled).map(p => [p.code, p.title, p.body]),
        colWidths:[8,30,80],
      },
    ]);
    showToast('Full Financial Statements Pack (Excel) downloaded', 'ok');
  };

  return (
    <div>
      <PageHeader title={pageTitle} sub="One-click download of all 5 financial statements + notes" period={period} setPeriod={setPeriod}>
        <button className="btn btn-pdf btn-sm" onClick={generatePackPDF}>📄 Download Full Pack (PDF)</button>
        <button className="btn btn-x btn-sm" onClick={generatePackExcel}>📊 Download Full Pack (Excel)</button>
      </PageHeader>

      <div className="al al-i">
        Use this page to generate a single combined output containing the complete financial statements pack. The PDF includes a cover page, all 5 primary statements, comparative figures, and all enabled accounting policies as notes. The Excel version has one sheet per statement.
      </div>

      <div className="card">
        <div className="ch"><div className="ct">Pack contents</div></div>
        <div className="cb" style={{padding:0}}>
          <div className="tw">
            <table>
              <thead><tr><th style={{width:50}}>#</th><th>Section</th><th>Description</th><th>Comparative</th></tr></thead>
              <tbody>
                <tr><td>1</td><td><b>Cover Page</b></td><td>Company name, country, reporting period</td><td>—</td></tr>
                <tr><td>2</td><td><b>Statement of Profit or Loss</b></td><td>Revenue, COGS, opex, finance costs, tax</td><td>✓</td></tr>
                <tr><td>3</td><td><b>Statement of Financial Position</b></td><td>Assets, Liabilities, Equity at period end</td><td>✓</td></tr>
                <tr><td>4</td><td><b>Statement of Cash Flows</b></td><td>Operating, investing, financing activities</td><td>✓</td></tr>
                <tr><td>5</td><td><b>Statement of Changes in Equity</b></td><td>Movements in equity components</td><td>✓</td></tr>
                <tr><td>6</td><td><b>Trial Balance</b></td><td>All GL account balances</td><td>—</td></tr>
                <tr><td>7</td><td><b>Notes to Financial Statements</b></td><td>{policies.filter(p=>p.enabled).length} enabled policies + corporate info</td><td>—</td></tr>
              </tbody>

      <div className="card">
        <div className="ch"><div className="ct">Settings used</div></div>
        <div className="cb" style={{padding:0}}>
          <div className="tw">
            <table>
              <tbody>

// ════════════ VOUCHER CONFIG ════════════
function VoucherConfig({voucherConfig, setVoucherConfig, pageTitle, period, setPeriod, showToast}){
  const sources = [
    {key:'JE',     name:'Journal Voucher',  desc:'Manual journal entries'},
    {key:'AR-INV', name:'Sales Invoice',    desc:'Customer invoices (AR)'},
    {key:'AR-RCT', name:'Receipt Voucher',  desc:'Customer receipts'},
    {key:'AP-BILL',name:'Vendor Bill',      desc:'Vendor bills (AP)'},
    {key:'AP-PMT', name:'Payment Voucher',  desc:'Vendor payments'},
    {key:'EXP',    name:'Expense Voucher',  desc:'Direct expense entries'},
    {key:'POS',    name:'POS Daily Z',      desc:'POS end-of-day reports'},
  ];
  const update = (key, field, value) => setVoucherConfig(prev => ({...prev, [key]: {...prev[key], [field]: value}}));

  return (
    <div>
      <PageHeader title={pageTitle} sub="Configure auto-numbering for each voucher type" period={period} setPeriod={setPeriod} showPeriod={false} />

      <div className="al al-i">
        Voucher numbers auto-generate when posting transactions. Format placeholders: <code>PREFIX</code> · <code>YYYY</code> (year) · <code>YYYYMMDD</code> (date) · <code>NNNN</code> (sequence, zero-padded).
      </div>

      <div className="card">
        <div className="ch"><div className="ct">Voucher numbering rules</div><div className="cs">Changes apply to new entries only</div></div>
        <div className="tw">
          <table>
            <thead><tr><th>Source</th><th>Description</th><th style={{width:90}}>Prefix</th><th style={{width:180}}>Format</th><th style={{width:80}}>Padding</th><th style={{width:90}}>Current #</th><th style={{width:200}}>Sample Next</th><th style={{width:60}}>Lock</th></tr></thead>
            <tbody>
              {sources.map(s => {
                const cfg = voucherConfig[s.key];
                if (!cfg) return null;
                const sample = generateVoucherNumber(voucherConfig, s.key, today());
                return (
                  <tr key={s.key}>
                    <td><span className="mono" style={{fontWeight:700}}>{s.key}</span><div style={{fontSize:11, marginTop:2}}>{s.name}</div></td>
                    <td style={{fontSize:11, color:'var(--t2)'}}>{s.desc}</td>
                    <td><input className="fi" style={{padding:'5px 8px'}} value={cfg.prefix} onChange={e=>update(s.key, 'prefix', e.target.value)} disabled={cfg.locked} /></td>
                    <td>
                      <select className="fs" style={{padding:'5px 8px'}} value={cfg.format} onChange={e=>update(s.key, 'format', e.target.value)} disabled={cfg.locked}>
                        <option value="PREFIX/YYYY/NNNN">PREFIX/YYYY/NNNN</option>
                        <option value="PREFIX-YYYY-NNNN">PREFIX-YYYY-NNNN</option>
                        <option value="PREFIX/NNNN/YYYY">PREFIX/NNNN/YYYY</option>
                        <option value="PREFIX/YYYYMMDD">PREFIX/YYYYMMDD</option>
                        <option value="PREFIXNNNN">PREFIXNNNN</option>
                      </select>
                    </td>
                    <td><input className="fi" type="number" style={{padding:'5px 8px'}} value={cfg.padding} onChange={e=>update(s.key, 'padding', +e.target.value)} disabled={cfg.locked} /></td>
                    <td><input className="fi" type="number" style={{padding:'5px 8px'}} value={cfg.current} onChange={e=>update(s.key, 'current', +e.target.value)} disabled={cfg.locked} /></td>
                    <td><span className="mono" style={{fontWeight:700, color:'var(--blue3)'}}>{sample}</span></td>
                    <td><input type="checkbox" checked={cfg.locked} onChange={e=>update(s.key, 'locked', e.target.checked)} /></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      <div className="card">
        <div className="ch"><div className="ct">Reset</div></div>
        <div className="cb">
          <button className="btn" onClick={()=>{
            if (confirm('Reset all voucher numbering to defaults? Current counters will be lost.')) {
              setVoucherConfig(DEFAULT_VOUCHER_CONFIG);
              showToast('Voucher numbering reset to defaults', 'ok');
            }
          }}>Reset to defaults</button>
        </div>
      </div>
    </div>
  );
}

                    <option value="clinic">Clinic</option><option value="service">Service Bay</option>
                    <option value="office">Office</option>
                  </select>

              <div className="fg"><label className="fl">Name <span className="req">*</span></label><input className="fi" value={draft.name} onChange={e=>setDraft({...draft, name:e.target.value})} /></div>
              <div className="fg"><label className="fl">Address</label><input className="fi" value={draft.address} onChange={e=>setDraft({...draft, address:e.target.value})} /></div>

// ════════════ QUOTATIONS ════════════
function QuotationsPage({quotations, setQuotations, customers, items, activeCo, companies, salesOrders, setSalesOrders, pageTitle, period, setPeriod, showToast}){
  const [show, setShow] = useState(false);
  const [editId, setEditId] = useState(null);
  const [statusFilter, setStatusFilter] = useState('all');
  const list = quotations.filter(q => q.company === activeCo).filter(q => statusFilter==='all' || q.status===statusFilter);
  const co = companies.find(c => c.id === activeCo);

  const startNew = () => { setEditId(null); setShow(true); };
  const view = (id) => { setEditId(id); setShow(true); };
  const convertToSO = (q) => {
    const newSO = {
      id: `SO-${new Date().getFullYear()}-${String(salesOrders.length + 1).padStart(4,'0')}`,
      date: today(), deliveryDate: '', customer: q.customer, currency: q.currency, company: q.company,
      status:'approved', gstPct: q.gstPct, quotationRef: q.id, invoiceRef: null,
      lines: q.lines.map(l => ({...l, delivered:0})), notes:`Converted from ${q.id}`
    };
    setSalesOrders(prev => [...prev, newSO]);
    setQuotations(prev => prev.map(x => x.id===q.id ? {...x, status:'approved', convertedTo:newSO.id} : x));
    showToast(`Converted to ${newSO.id}`, 'ok');
  };
  const exportPDF = (q) => {
    const customer = customers.find(c => c.id === q.customer);
    const sub = q.lines.reduce((s,l) => s + l.qty * l.price * (1 - (l.discount||0)/100), 0);
    const gst = sub * q.gstPct / 100;
    exportToPDF(`Quotation-${q.id}.pdf`, {
      title:'QUOTATION', subtitle:`Ref: ${q.id}`, company:co?.name, period:`Valid until ${q.expiry}`,
      sections:[
        { name:`To: ${customer?.name} · Date: ${q.date}`,
          header:['Item','Description','Qty','Unit Price','Disc%','Amount'],
          rows: q.lines.map(l => { const it = items.find(i=>i.id===l.item); return [it?.sku||'', l.desc, l.qty, fmt(l.price), `${l.discount||0}%`, fmt(l.qty*l.price*(1-(l.discount||0)/100))]; }),
          totals:[
            ['','','','','Subtotal', fmt(sub)],
            ['','','','',`GST ${q.gstPct}%`, fmt(gst)],
            ['','','','','TOTAL', fmt(sub+gst)],
          ], columnStyles:{2:{halign:'right'},3:{halign:'right'},4:{halign:'right'},5:{halign:'right'}},
        }
      ]
    });
    showToast('Quotation PDF downloaded', 'ok');
  };

  return (
    <div>
      <PageHeader title={pageTitle} sub="Sales quotations · Convert approved quotes to Sales Orders" period={period} setPeriod={setPeriod}>
        <button className="btn btn-p btn-sm" onClick={startNew}>+ New Quotation</button>
      </PageHeader>

      <WorkflowStages stages={[
        {n:1, label:'Quotation', state:'on'},
        {n:2, label:'Sales Order', state:''},
        {n:3, label:'Invoice', state:''},
        {n:4, label:'Receipt', state:''},
      ]} />

      <div className="card">
        <div className="ch">
          <div className="ebar">
            {['all','draft','sent','approved','rejected'].map(s => (
              <div key={s} className={`ebt ${statusFilter===s?'on':''}`} onClick={()=>setStatusFilter(s)}>{s==='all'?'All':s.charAt(0).toUpperCase()+s.slice(1)}</div>
            ))}
          </div>
          <div style={{fontSize:11, color:'var(--t2)'}}>{list.length} quotation{list.length===1?'':'s'}</div>
        </div>
        <div className="tw">
          <table>
            <thead><tr><th>Ref</th><th>Date</th><th>Expiry</th><th>Customer</th><th className="num-h">Lines</th><th className="num-h">Total</th><th>Status</th><th>Converted</th><th style={{width:160}}>Actions</th></tr></thead>
            <tbody>
              {list.map(q => {
                const customer = customers.find(c => c.id === q.customer);
                const sub = q.lines.reduce((s,l) => s + l.qty * l.price * (1 - (l.discount||0)/100), 0);
                const gst = sub * q.gstPct / 100;
                return (
                  <tr key={q.id}>
                    <td><span className="mono">{q.id}</span></td>
                    <td>{q.date}</td>
                    <td>{q.expiry}</td>
                    <td>{customer?.name}</td>
                    <td className="num">{q.lines.length}</td>
                    <td className="num">{fmt(sub+gst)}</td>
                    <td><span className={`doc-status ds-${q.status}`}>{q.status}</span></td>
                    <td>{q.convertedTo ? <span className="mono" style={{fontSize:11, color:'var(--blue)'}}>{q.convertedTo}</span> : '—'}</td>
                    <td>
                      <div style={{display:'flex', gap:4}}>
                        <button className="btn btn-xs" onClick={()=>view(q.id)}>View</button>
                        <button className="btn btn-xs" onClick={()=>exportPDF(q)}>📄</button>
                        {q.status==='approved' && !q.convertedTo && <button className="btn btn-xs btn-p" onClick={()=>convertToSO(q)}>→ SO</button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {show && <QuotationModal quotation={editId ? quotations.find(q=>q.id===editId) : null} customers={customers} items={items} activeCo={activeCo} setQuotations={setQuotations} quotations={quotations} onClose={()=>setShow(false)} showToast={showToast} />}
    </div>
  );
}

function WorkflowStages({stages}){

// ════════════ SALES ORDERS ════════════
function SalesOrdersPage({salesOrders, setSalesOrders, customers, items, activeCo, companies, postJournal, nextVoucherNumber, pageTitle, period, setPeriod, showToast}){
  const [show, setShow] = useState(false);
  const [editId, setEditId] = useState(null);
  const [statusFilter, setStatusFilter] = useState('all');
  const list = salesOrders.filter(s => s.company === activeCo).filter(s => statusFilter==='all' || s.status===statusFilter);

  const startNew = () => { setEditId(null); setShow(true); };
  const view = (id) => { setEditId(id); setShow(true); };

  const convertToInvoice = (so) => {
    const customer = customers.find(c => c.id === so.customer);
    const sub = so.lines.reduce((s,l) => s + l.qty * l.price * (1 - (l.discount||0)/100), 0);
    const gst = sub * so.gstPct / 100;
    const total = sub + gst;
    const cogs = so.lines.reduce((s,l) => {
      const it = items.find(i => i.id === l.item);
      return s + l.qty * (it?.costAvg || 0);
    }, 0);
    const ref = nextVoucherNumber('AR-INV', today());
    const lines = [
      {acct:'1220', desc:ref, debit:total, credit:0, partner:so.customer},
      ...so.lines.map(l => {
        const it = items.find(i => i.id === l.item);
        return {acct: it?.glRev || '4110', desc: l.desc, debit:0, credit: l.qty * l.price * (1 - (l.discount||0)/100)};
      }),
      ...(gst>0 ? [{acct:'2230', desc:`GST ${so.gstPct}%`, debit:0, credit:gst}] : []),
      ...so.lines.map(l => {
        const it = items.find(i => i.id === l.item);
        return {acct: it?.glCogs || '5110', desc:`COGS ${it?.sku}`, debit: l.qty * (it?.costAvg||0), credit:0};
      }),
      {acct:'1216', desc:'Inv reduction', debit:0, credit:cogs}
    ];
    const posted = postJournal({date:today(), ref, narration:`Sales — ${customer?.name||''} (from ${so.id})`, source:'AR-INV', company:activeCo, refDoc:ref, lines});
    if (posted) {
      setSalesOrders(prev => prev.map(x => x.id===so.id ? {...x, status:'closed', invoiceRef: ref, lines: x.lines.map(l => ({...l, delivered:l.qty}))} : x));
      showToast(`Invoice ${ref} posted from ${so.id}`, 'ok');
    }
  };

  return (
    <div>
      <PageHeader title={pageTitle} sub="Confirmed sales orders · Convert to invoice when ready to deliver" period={period} setPeriod={setPeriod}>
        <button className="btn btn-p btn-sm" onClick={startNew}>+ New Sales Order</button>
      </PageHeader>
      <WorkflowStages stages={[
        {n:1, label:'Quotation', state:'done'},
        {n:2, label:'Sales Order', state:'on'},
        {n:3, label:'Invoice', state:''},
        {n:4, label:'Receipt', state:''},
      ]} />

      <div className="card">
        <div className="ch">
          <div className="ebar">
            {['all','draft','approved','partial','closed','cancelled'].map(s => (
              <div key={s} className={`ebt ${statusFilter===s?'on':''}`} onClick={()=>setStatusFilter(s)}>{s==='all'?'All':s.charAt(0).toUpperCase()+s.slice(1)}</div>
            ))}
          </div>
          <div style={{fontSize:11, color:'var(--t2)'}}>{list.length} order{list.length===1?'':'s'}</div>
        </div>
        <div className="tw">
          <table>
            <thead><tr><th>SO #</th><th>Date</th><th>Delivery</th><th>Customer</th><th>Qty</th><th className="num-h">Value</th><th>Status</th><th>Invoice</th><th style={{width:140}}>Actions</th></tr></thead>
            <tbody>
              {list.map(so => {
                const customer = customers.find(c => c.id === so.customer);
                const sub = so.lines.reduce((s,l) => s + l.qty * l.price * (1 - (l.discount||0)/100), 0);
                const gst = sub * so.gstPct / 100;
                const qty = so.lines.reduce((s,l) => s+l.qty, 0);
                const del = so.lines.reduce((s,l) => s+(l.delivered||0), 0);
                return (
                  <tr key={so.id}>
                    <td><span className="mono">{so.id}</span></td>
                    <td>{so.date}</td>
                    <td>{so.deliveryDate || '—'}</td>
                    <td>{customer?.name}</td>
                    <td>{del}/{qty}</td>
                    <td className="num">{fmt(sub+gst)}</td>
                    <td><span className={`doc-status ds-${so.status}`}>{so.status}</span></td>
                    <td>{so.invoiceRef ? <span className="mono" style={{fontSize:11, color:'var(--green)'}}>{so.invoiceRef}</span> : '—'}</td>
                    <td>
                      <div style={{display:'flex', gap:4}}>
                        <button className="btn btn-xs" onClick={()=>view(so.id)}>View</button>
                        {so.status==='approved' && !so.invoiceRef && <button className="btn btn-xs btn-p" onClick={()=>convertToInvoice(so)}>→ Invoice</button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      {show && <SalesOrderModal so={editId ? salesOrders.find(s=>s.id===editId) : null} customers={customers} items={items} activeCo={activeCo} setSalesOrders={setSalesOrders} salesOrders={salesOrders} onClose={()=>setShow(false)} showToast={showToast} />}
    </div>
  );
}

function SalesOrderModal({so, customers, items, activeCo, setSalesOrders, salesOrders, onClose, showToast}){
  const isNew = !so;
  const isReadonly = so && so.status === 'closed';
  const [draft, setDraft] = useState(so || {
    id: `SO-${new Date().getFullYear()}-${String(salesOrders.length + 9).padStart(4,'0')}`,
    date: today(), deliveryDate:'', customer: customers[0]?.id, currency:'MVR',

    lines:[{item:items[0]?.id, desc:items[0]?.name||'', qty:1, delivered:0, price:items[0]?.sellPrice||0, discount:0}], notes:''
  });
  const updLine = (i, k, v) => setDraft(p => { const ls=[...p.lines]; ls[i]={...ls[i],[k]:v}; if (k==='item') { const it=items.find(x=>x.id===v); if (it) { ls[i].desc=it.name; ls[i].price=it.sellPrice; } } return {...p, lines:ls}; });

            <div className="fg"><label className="fl">Date</label><input className="fi" type="date" value={draft.date} onChange={e=>setDraft({...draft, date:e.target.value})} disabled={isReadonly} /></div>
            <div className="fg"><label className="fl">Delivery Date</label><input className="fi" type="date" value={draft.deliveryDate} onChange={e=>setDraft({...draft, deliveryDate:e.target.value})} disabled={isReadonly} /></div>

            <div className="fg"><label className="fl">From Quotation</label><input className="fi" value={draft.quotationRef||''} disabled placeholder="(none)" /></div>
          </div>
          <div className="doc-grid">
            <table>

                    <td className="num-cell"><input type="number" value={l.discount||0} onChange={e=>updLine(i, 'discount', +e.target.value)} disabled={isReadonly} /></td>
                    <td className="num" style={{padding:'5px 8px', fontFamily:"'Courier New',monospace"}}>{fmt(l.qty*l.price*(1-(l.discount||0)/100))}</td>

          </div>
        </div>
        <div className="mf">
          <button className="btn" onClick={onClose}>Close</button>

        <div className="tw">
          <table>
            <thead><tr><th>PO #</th><th>Date</th><th>Expected</th><th>Vendor</th><th>Items</th><th className="num-h">Value ({co?.currency})</th><th>Status</th><th>GRN(s)</th><th style={{width:120}}>Actions</th></tr></thead>
            <tbody>

                const sub = po.lines.reduce((s,l) => s + l.qty * l.price, 0);
                const rcv = po.lines.reduce((s,l) => s + (l.received||0), 0);
                const totQty = po.lines.reduce((s,l) => s + l.qty, 0);
                return (
                  <tr key={po.id}>

                    <td>{po.date}</td>

function PurchaseOrderModal({po, vendors, items, activeCo, setPurchaseOrders, purchaseOrders, onClose, showToast}){
  const isNew = !po;

  const [draft, setDraft] = useState(po || {
    id: `PO-${new Date().getFullYear()}-${String(purchaseOrders.length + 35).padStart(4,'0')}`,
    date: today(), vendor: vendors[0]?.id, currency:'USD', fxRate:15.42,
    company: activeCo, status:'draft', expectedDate:'', prRef:null, grnRefs:[], billRef:null,
    lines:[{item:items[0]?.id, desc:items[0]?.name||'', qty:1, received:0, price:items[0]?.costAvg||0}],
    terms:'', notes:''
  });
  const updLine = (i, k, v) => setDraft(p => { const ls=[...p.lines]; ls[i]={...ls[i],[k]:v}; if (k==='item') { const it=items.find(x=>x.id===v); if (it) { ls[i].desc=it.name; ls[i].price=it.costAvg; } } return {...p, lines:ls}; });
  const addLine = () => setDraft(p => ({...p, lines:[...p.lines, {item:items[0]?.id, desc:items[0]?.name||'', qty:1, received:0, price:items[0]?.costAvg||0}]}));
  const rmLine = (i) => setDraft(p => ({...p, lines:p.lines.filter((_,x)=>x!==i)}));
  const sub = draft.lines.reduce((s,l)=>s+l.qty*l.price, 0);
  const save = (status) => {
    const d = status ? {...draft, status} : draft;

    <div className="mbg" onClick={onClose}>
      <div className="modal lg" onClick={e=>e.stopPropagation()} style={{width:920}}>
        <div className="mh"><div><div className="mt">{isNew?'New Purchase Order':`Purchase Order ${po.id}`}</div><div className="ms">Status: {draft.status}</div></div><button className="mx" onClick={onClose}>✕</button></div>
        <div className="mc">
          <div className="fg4">
            <div className="fg"><label className="fl">PO #</label><input className="fi" value={draft.id} onChange={e=>setDraft({...draft, id:e.target.value})} disabled={isReadonly} /></div>
            <div className="fg"><label className="fl">Date</label><input className="fi" type="date" value={draft.date} onChange={e=>setDraft({...draft, date:e.target.value})} disabled={isReadonly} /></div>
            <div className="fg"><label className="fl">Expected</label><input className="fi" type="date" value={draft.expectedDate} onChange={e=>setDraft({...draft, expectedDate:e.target.value})} disabled={isReadonly} /></div>
            <div className="fg"><label className="fl">PR Ref</label><input className="fi" value={draft.prRef||''} disabled placeholder="(none)" /></div>
          </div>
          <div className="fg3">
            <div className="fg"><label className="fl">Vendor</label>
              <select className="fs" value={draft.vendor} onChange={e=>setDraft({...draft, vendor:e.target.value})} disabled={isReadonly}>
                {vendors.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}
              </select>
            </div>
            <div className="fg"><label className="fl">Currency</label>
              <select className="fs" value={draft.currency} onChange={e=>setDraft({...draft, currency:e.target.value})} disabled={isReadonly}>

            </div>
            <div className="fg"><label className="fl">FX Rate</label><input className="fi" type="number" step="0.0001" value={draft.fxRate} onChange={e=>setDraft({...draft, fxRate:+e.target.value})} disabled={isReadonly} /></div>
          </div>
          <div className="doc-grid">

              <tbody>
                {draft.lines.map((l, i) => (
                  <tr key={i}>
                    <td><select value={l.item} onChange={e=>updLine(i, 'item', e.target.value)} disabled={isReadonly}>{items.map(it=><option key={it.id} value={it.id}>{it.sku}</option>)}</select></td>

  );

function GRNModal({grn, purchaseOrders, setPurchaseOrders, vendors, items, locations, activeCo, setGrns, grns, setItems, postJournal, nextVoucherNumber, onClose, showToast}){
  const isNew = !grn;
  const isReadonly = grn && grn.status === 'received';
  const openPOs = purchaseOrders.filter(p => p.company === activeCo && (p.status === 'sent' || p.status === 'partial'));
  const [draft, setDraft] = useState(grn || {
    id: `GRN-${new Date().getFullYear()}-${String(grns.length + 20).padStart(4,'0')}`,
    date: today(), vendor: '', poRef: '', location: locations[0]?.id,
    company: activeCo, status:'draft', receivedBy:'Hussain Rasheed', vehicle:'',
    lines: [], notes:''
  });

  // when PO selected, autopopulate lines
  const selectPO = (poId) => {
    const po = purchaseOrders.find(p => p.id === poId);
    if (!po) return;
    setDraft(prev => ({...prev, poRef: poId, vendor: po.vendor,
      lines: po.lines.map(l => ({item:l.item, desc:l.desc, ordered:l.qty, received:l.qty-(l.received||0), accepted:l.qty-(l.received||0), rejected:0}))
    }));
  };

  const updLine = (i, k, v) => setDraft(p => { const ls=[...p.lines]; ls[i]={...ls[i],[k]:v}; if (k==='received') ls[i].accepted = +v - (ls[i].rejected||0); return {...p, lines:ls}; });

  const post = () => {
    // Post GRN: Dr Inventory, Cr GRNI (Goods Received Not Invoiced) — we'll use AP-2210 indirectly via "GR" entry
    const po = purchaseOrders.find(p => p.id === draft.poRef);
    if (!po) { showToast('Select a PO first', 'bad'); return; }
    const value = draft.lines.reduce((s,l) => {
      const poLine = po.lines.find(x => x.item === l.item);
      return s + (l.accepted||0) * (poLine?.price || 0) * po.fxRate;
    }, 0);
    const ref = nextVoucherNumber('JE', today());
    const lines = [
      {acct:'1216', desc:`Stock received via ${draft.id}`, debit:value, credit:0},
      {acct:'2220', desc:`Goods Received Not Invoiced — PO ${po.id}`, debit:0, credit:value, partner:po.vendor},
    ];
    postJournal({date: draft.date, ref, narration:`GRN ${draft.id} · PO ${po.id}`, source:'INV', company:activeCo, lines});
    // update PO line received qtys & item stock
    setPurchaseOrders(prev => prev.map(p => {
      if (p.id !== po.id) return p;
      const upd = {...p, grnRefs:[...(p.grnRefs||[]), draft.id]};
      upd.lines = upd.lines.map(pl => {
        const dl = draft.lines.find(x => x.item === pl.item);
        return dl ? {...pl, received: (pl.received||0) + (dl.accepted||0)} : pl;
      });
      const allDone = upd.lines.every(l => l.received >= l.qty);
      upd.status = allDone ? 'received' : 'partial';
      return upd;
    }));
    // update item stock
    setItems(prev => prev.map(it => {
      const dl = draft.lines.find(x => x.item === it.id);
      return dl ? {...it, stock: it.stock + (dl.accepted||0)} : it;
    }));
    const final = {...draft, status:'received'};
    if (isNew) setGrns(p => [...p, final]); else setGrns(p => p.map(g => g.id===grn.id?final:g));
    showToast(`GRN ${draft.id} posted — stock updated, JE ${ref} created`, 'ok');
    onClose();
  };

  return (
    <div className="mbg" onClick={onClose}>
      <div className="modal lg" onClick={e=>e.stopPropagation()} style={{width:920}}>
        <div className="mh"><div><div className="mt">{isNew?'New GRN':`GRN ${grn.id}`}</div><div className="ms">Status: {draft.status}</div></div><button className="mx" onClick={onClose}>✕</button></div>
        <div className="mc">
          <div className="fg4">
            <div className="fg"><label className="fl">GRN #</label><input className="fi" value={draft.id} onChange={e=>setDraft({...draft, id:e.target.value})} disabled={isReadonly} /></div>
            <div className="fg"><label className="fl">Date</label><input className="fi" type="date" value={draft.date} onChange={e=>setDraft({...draft, date:e.target.value})} disabled={isReadonly} /></div>
            <div className="fg"><label className="fl">PO Ref <span className="req">*</span></label>
              <select className="fs" value={draft.poRef} onChange={e=>selectPO(e.target.value)} disabled={isReadonly || !isNew}>
                <option value="">— select PO —</option>
                {openPOs.map(p=><option key={p.id} value={p.id}>{p.id}</option>)}
                {!isNew && grn?.poRef && <option value={grn.poRef}>{grn.poRef}</option>}
              </select>
            </div>
            <div className="fg"><label className="fl">Location</label>
              <select className="fs" value={draft.location} onChange={e=>setDraft({...draft, location:e.target.value})} disabled={isReadonly}>
                {locations.filter(l=>l.type==='warehouse'||l.type==='retail').map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
              </select>
            </div>
          </div>
          <div className="fg2">
            <div className="fg"><label className="fl">Received By</label><input className="fi" value={draft.receivedBy} onChange={e=>setDraft({...draft, receivedBy:e.target.value})} disabled={isReadonly} /></div>
            <div className="fg"><label className="fl">Vehicle / Carrier</label><input className="fi" value={draft.vehicle} onChange={e=>setDraft({...draft, vehicle:e.target.value})} disabled={isReadonly} /></div>
          </div>
          <div className="doc-grid">
            <table>
              <thead><tr><th>Item</th><th>Description</th><th style={{width:70}}>Ordered</th><th style={{width:80}}>Received</th><th style={{width:80}}>Accepted</th><th style={{width:80}}>Rejected</th></tr></thead>
              <tbody>
                {draft.lines.map((l, i) => {
                  const it = items.find(x=>x.id===l.item);
                  return (
                    <tr key={i}>
                      <td><span className="mono">{it?.sku}</span></td>
                      <td>{l.desc}</td>
                      <td className="num" style={{textAlign:'right'}}>{l.ordered}</td>
                      <td className="num-cell"><input type="number" value={l.received} onChange={e=>updLine(i, 'received', +e.target.value)} disabled={isReadonly} /></td>
                      <td className="num-cell"><input type="number" value={l.accepted} onChange={e=>updLine(i, 'accepted', +e.target.value)} disabled={isReadonly} /></td>
                      <td className="num-cell"><input type="number" value={l.rejected} onChange={e=>updLine(i, 'rejected', +e.target.value)} disabled={isReadonly} /></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div className="al al-i" style={{marginTop:12}}>
            <b>Posting:</b> When you click "Post & Update Stock", this GRN will: (a) increase inventory by accepted qty, (b) post Dr Inventory / Cr GRNI journal entry, (c) update the PO received qty, (d) close the PO if fully received.
          </div>
          <div className="fg" style={{marginTop:14}}><label className="fl">Notes</label><textarea className="fta" value={draft.notes} onChange={e=>setDraft({...draft, notes:e.target.value})} disabled={isReadonly} rows={2} /></div>
        </div>
        <div className="mf">
          <button className="btn" onClick={onClose}>Close</button>
          {!isReadonly && <button className="btn btn-p" onClick={post}>Post & Update Stock</button>}
        </div>
      </div>
    </div>
  );
}
