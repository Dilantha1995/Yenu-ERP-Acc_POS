function StockTransferModal({transfer, items, locations, activeCo, setStockTransfers, stockTransfers, onClose, showToast}){
  const isNew = !transfer;
  const isReadonly = transfer && transfer.status === 'completed';
  const [draft, setDraft] = useState(transfer || {
    id: `STO-${new Date().getFullYear()}-${String(stockTransfers.length + 10).padStart(4,'0')}`,
    date: today(), fromLoc: locations[0]?.id, toLoc: locations[1]?.id,
    company: activeCo, status:'draft', issuedBy:'Mohamed Ali', receivedBy:'',
    lines:[{item:items[0]?.id, desc:items[0]?.name||'', qty:1}], notes:''
  });
  const updLine = (i, k, v) => setDraft(p => { const ls=[...p.lines]; ls[i]={...ls[i],[k]:v}; if (k==='item') { const it=items.find(x=>x.id===v); if (it) ls[i].desc=it.name; } return {...p, lines:ls}; });
  const addLine = () => setDraft(p => ({...p, lines:[...p.lines, {item:items[0]?.id, desc:items[0]?.name||'', qty:1}]}));
  const rmLine = (i) => setDraft(p => ({...p, lines:p.lines.filter((_,x)=>x!==i)}));
  const save = (status) => {
    if (draft.fromLoc === draft.toLoc) { showToast('From and To location must differ', 'bad'); return; }
    const d = status ? {...draft, status} : draft;
    if (isNew) setStockTransfers(prev => [...prev, d]);
    else setStockTransfers(prev => prev.map(t => t.id===transfer.id ? d : t));
    showToast(`Transfer ${d.id} ${status||'saved'}`, 'ok');
    onClose();
  };
  return (
    <div className="mbg" onClick={onClose}>
      <div className="modal lg" onClick={e=>e.stopPropagation()} style={{width:880}}>
        <div className="mh"><div><div className="mt">{isNew?'New Stock Transfer':`Transfer ${transfer.id}`}</div><div className="ms">Status: {draft.status}</div></div><button className="mx" onClick={onClose}>✕</button></div>
        <div className="mc">
          <div className="fg4">
            <div className="fg"><label className="fl">STO #</label><input className="fi" value={draft.id} onChange={e=>setDraft({...draft, id:e.target.value})} disabled={isReadonly} /></div>
            <div className="fg"><label className="fl">Date</label><input className="fi" type="date" value={draft.date} onChange={e=>setDraft({...draft, date:e.target.value})} disabled={isReadonly} /></div>
            <div className="fg"><label className="fl">From Location</label>
              <select className="fs" value={draft.fromLoc} onChange={e=>setDraft({...draft, fromLoc:e.target.value})} disabled={isReadonly}>
                {locations.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
              </select>
            </div>
            <div className="fg"><label className="fl">To Location</label>
              <select className="fs" value={draft.toLoc} onChange={e=>setDraft({...draft, toLoc:e.target.value})} disabled={isReadonly}>
                {locations.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
              </select>
            </div>
          </div>
          <div className="fg2">
            <div className="fg"><label className="fl">Issued By</label><input className="fi" value={draft.issuedBy} onChange={e=>setDraft({...draft, issuedBy:e.target.value})} disabled={isReadonly} /></div>
            <div className="fg"><label className="fl">Received By</label><input className="fi" value={draft.receivedBy} onChange={e=>setDraft({...draft, receivedBy:e.target.value})} disabled={isReadonly} placeholder="(to be filled on receipt)" /></div>
          </div>
          <div className="doc-grid">
            <table>
              <thead><tr><th>Item</th><th>Description</th><th style={{width:80}}>Qty</th><th style={{width:30}}></th></tr></thead>
              <tbody>
                {draft.lines.map((l, i) => (
                  <tr key={i}>
                    <td><select value={l.item} onChange={e=>updLine(i, 'item', e.target.value)} disabled={isReadonly}>{items.map(it=><option key={it.id} value={it.id}>{it.sku}</option>)}</select></td>
                    <td><input value={l.desc} onChange={e=>updLine(i, 'desc', e.target.value)} disabled={isReadonly} /></td>
                    <td className="num-cell"><input type="number" value={l.qty} onChange={e=>updLine(i, 'qty', +e.target.value)} disabled={isReadonly} /></td>
                    <td>{!isReadonly && <button className="btn-link" style={{color:'var(--red)'}} onClick={()=>rmLine(i)}>✕</button>}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {!isReadonly && <button className="btn btn-sm" style={{marginTop:8}} onClick={addLine}>+ Add line</button>}
          <div className="al al-i" style={{marginTop:12}}>
            Inter-location transfers don't affect total inventory value — only the location split. No GL impact required unless valuation differs by location.
          </div>
        </div>
        <div className="mf">
          <button className="btn" onClick={onClose}>Close</button>
          {!isReadonly && <Fragment>
            <button className="btn" onClick={()=>save('draft')}>Save Draft</button>
            <button className="btn btn-p" onClick={()=>save('in-transit')}>Issue (In Transit)</button>
            <button className="btn btn-g" onClick={()=>save('completed')}>Mark Received</button>
          </Fragment>}
        </div>
      </div>
    </div>
  );
}

// ════════════ STOCK ADJUSTMENTS ════════════
function StockAdjustmentsPage({stockAdjustments, setStockAdjustments, items, setItems, locations, activeCo, postJournal, nextVoucherNumber, pageTitle, period, setPeriod, showToast}){
  const [show, setShow] = useState(false);
  const [editId, setEditId] = useState(null);
  const list = stockAdjustments.filter(a => a.company === activeCo);

  const post = (adj) => {
    // Post adjustment: variance * cost → Dr/Cr Inventory Adjustment Expense (5160) / Inventory (1215 or 1216)
    const value = adj.lines.reduce((s,l) => s + l.variance * l.costAvg, 0);
    const ref = nextVoucherNumber('JE', adj.date);
    const lines = value < 0 ? [
      {acct:'5160', desc:`Adjustment ${adj.id} · ${adj.reason}`, debit: -value, credit:0},
      {acct:'1216', desc:`Stock write-off · ${adj.adjType}`, debit:0, credit: -value},
    ] : [
      {acct:'1216', desc:`Stock found · ${adj.adjType}`, debit: value, credit:0},
      {acct:'5160', desc:`Adjustment ${adj.id}`, debit:0, credit: value},
    ];
    if (value === 0) { showToast('No variance — nothing to post', 'info'); return; }
    postJournal({date: adj.date, ref, narration:`Stock adjustment ${adj.id} · ${adj.reason}`, source:'INV', company:activeCo, lines});
    // update item stock
    setItems(prev => prev.map(it => {
      const al = adj.lines.find(x => x.item === it.id);
      return al ? {...it, stock: al.actualQty} : it;
    }));
    setStockAdjustments(prev => prev.map(x => x.id===adj.id ? {...x, status:'posted'} : x));
    showToast(`Posted ${ref} · Stock & GL updated`, 'ok');
  };

  return (
    <div>
      <PageHeader title={pageTitle} sub="Stock counts, write-offs, expiry, damage — adjusts stock and posts to GL" period={period} setPeriod={setPeriod}>
        <button className="btn btn-p btn-sm" onClick={()=>{setEditId(null); setShow(true);}}>+ New Adjustment</button>
      </PageHeader>
      <div className="card">
        <div className="ch"><div className="ct">{list.length} adjustment{list.length===1?'':'s'}</div></div>
        <div className="tw">
          <table>
            <thead><tr><th>ADJ #</th><th>Date</th><th>Type</th><th>Location</th><th>Reason</th><th className="num-h">Net Variance</th><th>Status</th><th style={{width:120}}>Actions</th></tr></thead>
            <tbody>
              {list.map(a => {
                const loc = locations.find(l => l.id === a.location);
                const netVar = a.lines.reduce((s,l) => s + l.variance * l.costAvg, 0);
                return (
                  <tr key={a.id}>
                    <td><span className="mono">{a.id}</span></td>
                    <td>{a.date}</td>
                    <td><span className="bdg b-info"><span className="bd"></span>{a.adjType}</span></td>
                    <td>{loc?.name}</td>
                    <td>{a.reason}</td>
                    <td className="num" style={{color: netVar<0?'var(--red)':'var(--green)'}}>{fmt(netVar)}</td>
                    <td><span className={`doc-status ${a.status==='posted'?'ds-converted':'ds-draft'}`}>{a.status}</span></td>
                    <td>
                      <div style={{display:'flex', gap:4}}>
                        <button className="btn btn-xs" onClick={()=>{setEditId(a.id); setShow(true);}}>View</button>
                        {a.status==='draft' && <button className="btn btn-xs btn-p" onClick={()=>post(a)}>Post</button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      {show && <StockAdjustmentModal adj={editId ? stockAdjustments.find(a=>a.id===editId) : null} items={items} locations={locations} activeCo={activeCo} setStockAdjustments={setStockAdjustments} stockAdjustments={stockAdjustments} onClose={()=>setShow(false)} showToast={showToast} />}
    </div>
  );
}

function StockAdjustmentModal({adj, items, locations, activeCo, setStockAdjustments, stockAdjustments, onClose, showToast}){
  const isNew = !adj;
  const isReadonly = adj && adj.status === 'posted';
  const [draft, setDraft] = useState(adj || {
    id: `ADJ-${new Date().getFullYear()}-${String(stockAdjustments.length + 7).padStart(4,'0')}`,
    date: today(), location: locations[0]?.id, adjType:'count', reason:'',
    company: activeCo, status:'draft', approvedBy:'',
    lines:[{item:items[0]?.id, desc:items[0]?.name||'', sysQty:items[0]?.stock||0, actualQty:items[0]?.stock||0, variance:0, costAvg:items[0]?.costAvg||0}], notes:''
  });
  const updLine = (i, k, v) => setDraft(p => {
    const ls=[...p.lines];
    ls[i]={...ls[i],[k]:v};
    if (k==='item') {
      const it=items.find(x=>x.id===v);
      if (it) { ls[i].desc=it.name; ls[i].sysQty=it.stock; ls[i].actualQty=it.stock; ls[i].variance=0; ls[i].costAvg=it.costAvg; }
    }
    if (k==='actualQty') ls[i].variance = +v - ls[i].sysQty;
    return {...p, lines:ls};
  });
  const addLine = () => setDraft(p => ({...p, lines:[...p.lines, {item:items[0]?.id, desc:items[0]?.name||'', sysQty:items[0]?.stock||0, actualQty:items[0]?.stock||0, variance:0, costAvg:items[0]?.costAvg||0}]}));
  const rmLine = (i) => setDraft(p => ({...p, lines:p.lines.filter((_,x)=>x!==i)}));
  const netVar = draft.lines.reduce((s,l) => s + l.variance * l.costAvg, 0);
  const save = () => {
    if (isNew) setStockAdjustments(prev => [...prev, draft]);
    else setStockAdjustments(prev => prev.map(a => a.id===adj.id ? draft : a));
    showToast(`Adjustment ${draft.id} saved as draft`, 'ok');
    onClose();
  };
  return (
    <div className="mbg" onClick={onClose}>
      <div className="modal lg" onClick={e=>e.stopPropagation()} style={{width:920}}>
        <div className="mh"><div><div className="mt">{isNew?'New Stock Adjustment':`Adjustment ${adj.id}`}</div><div className="ms">Status: {draft.status}</div></div><button className="mx" onClick={onClose}>✕</button></div>
        <div className="mc">
          <div className="fg4">
            <div className="fg"><label className="fl">ADJ #</label><input className="fi" value={draft.id} onChange={e=>setDraft({...draft, id:e.target.value})} disabled={isReadonly} /></div>
            <div className="fg"><label className="fl">Date</label><input className="fi" type="date" value={draft.date} onChange={e=>setDraft({...draft, date:e.target.value})} disabled={isReadonly} /></div>
            <div className="fg"><label className="fl">Type</label>
              <select className="fs" value={draft.adjType} onChange={e=>setDraft({...draft, adjType:e.target.value})} disabled={isReadonly}>
                <option value="count">Stock count variance</option>
                <option value="expiry">Expiry write-off</option>
                <option value="damage">Damage write-off</option>
                <option value="theft">Theft / Loss</option>
                <option value="found">Stock found (positive)</option>
                <option value="reval">Revaluation</option>
              </select>
            </div>
            <div className="fg"><label className="fl">Location</label>
              <select className="fs" value={draft.location} onChange={e=>setDraft({...draft, location:e.target.value})} disabled={isReadonly}>
                {locations.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
              </select>
            </div>
          </div>
          <div className="fg2">
            <div className="fg"><label className="fl">Reason</label><input className="fi" value={draft.reason} onChange={e=>setDraft({...draft, reason:e.target.value})} disabled={isReadonly} /></div>
            <div className="fg"><label className="fl">Approved By</label><input className="fi" value={draft.approvedBy} onChange={e=>setDraft({...draft, approvedBy:e.target.value})} disabled={isReadonly} /></div>
          </div>
          <div className="doc-grid">
            <table>
              <thead><tr><th>Item</th><th>Description</th><th style={{width:80}}>System Qty</th><th style={{width:80}}>Actual Qty</th><th style={{width:80}}>Variance</th><th className="num-h" style={{width:100}}>Avg Cost</th><th className="num-h" style={{width:110}}>Value</th><th style={{width:30}}></th></tr></thead>
              <tbody>
                {draft.lines.map((l, i) => (
                  <tr key={i}>
                    <td><select value={l.item} onChange={e=>updLine(i, 'item', e.target.value)} disabled={isReadonly}>{items.map(it=><option key={it.id} value={it.id}>{it.sku}</option>)}</select></td>
                    <td><input value={l.desc} onChange={e=>updLine(i, 'desc', e.target.value)} disabled={isReadonly} /></td>
                    <td className="num" style={{textAlign:'right'}}>{l.sysQty}</td>
                    <td className="num-cell"><input type="number" value={l.actualQty} onChange={e=>updLine(i, 'actualQty', +e.target.value)} disabled={isReadonly} /></td>
                    <td className="num" style={{textAlign:'right', color: l.variance<0?'var(--red)':l.variance>0?'var(--green)':'var(--text)'}}>{l.variance>0?'+':''}{l.variance}</td>
                    <td className="num" style={{textAlign:'right'}}>{fmt(l.costAvg)}</td>
                    <td className="num" style={{textAlign:'right', fontFamily:"'Courier New',monospace", color: l.variance<0?'var(--red)':'var(--green)'}}>{fmt(l.variance*l.costAvg)}</td>
                    <td>{!isReadonly && <button className="btn-link" style={{color:'var(--red)'}} onClick={()=>rmLine(i)}>✕</button>}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {!isReadonly && <button className="btn btn-sm" style={{marginTop:8}} onClick={addLine}>+ Add line</button>}
          <div className="doc-totals">
            <div className="doc-totals-row grand"><span>Net Variance (MVR)</span><span className="num" style={{color:netVar<0?'var(--red)':'var(--green)'}}>{netVar>=0?'+':''}{fmt(netVar)}</span></div>
          </div>
          <div className="fg" style={{marginTop:14}}><label className="fl">Notes</label><textarea className="fta" value={draft.notes} onChange={e=>setDraft({...draft, notes:e.target.value})} disabled={isReadonly} rows={2} /></div>
        </div>
        <div className="mf">
          <button className="btn" onClick={onClose}>Close</button>
          {!isReadonly && <button className="btn btn-p" onClick={save}>Save Draft</button>}
        </div>
      </div>
    </div>
  );
}

// ════════════ LABEL PRINTING ════════════
function LabelPrintPage({items, companies, activeCo, pageTitle, period, setPeriod, showToast}){
  const [selectedIds, setSelectedIds] = useState([]);
  const [labelType, setLabelType] = useState('shelf');
  const [showBarcode, setShowBarcode] = useState(true);
  const [showQR, setShowQR] = useState(false);
  const [showPrice, setShowPrice] = useState(true);
  const [showCat, setShowCat] = useState(true);
  const [copies, setCopies] = useState(1);
  const previewRef = useRef(null);
  const co = companies.find(c => c.id === activeCo);

  const toggleAll = () => {
    if (selectedIds.length === items.length) setSelectedIds([]);
    else setSelectedIds(items.map(i => i.id));
  };
  const toggle = (id) => setSelectedIds(p => p.includes(id) ? p.filter(x => x!==id) : [...p, id]);

  const labelsToShow = [];
  selectedIds.forEach(id => {
    const it = items.find(i => i.id === id);
    if (it) for (let i = 0; i < copies; i++) labelsToShow.push({...it, _copy: i});
  });

  // Render barcodes when labels change
  useEffect(() => {
    setTimeout(() => {
      if (!previewRef.current) return;
      previewRef.current.querySelectorAll('svg.barcode').forEach(svg => {
        const code = svg.getAttribute('data-code');
        if (code) {
          try {
            JsBarcode(svg, code, { format: 'CODE128', width:1.4, height:30, fontSize:10, margin:0 });
          } catch (e) {}
        }
      });
    }, 50);
  }, [selectedIds, copies, showBarcode, labelType]);

  const printLabels = () => {
    if (selectedIds.length === 0) { showToast('Select at least one item', 'bad'); return; }
    const printContent = previewRef.current.innerHTML;
    const win = window.open('', '', 'width=800,height=600');
    win.document.write(`<!DOCTYPE html><html><head><title>Item Labels — ${co?.name}</title>
      <style>
        body { font-family: 'Segoe UI', sans-serif; margin:0; padding:10px; }
        .label-sheet { display:grid; gap:4px; }
        .label-sheet.size-30up { grid-template-columns:repeat(3, 1fr); }
        .label-sheet.size-24up { grid-template-columns:repeat(3, 1fr); }
        .label-sheet.size-12up { grid-template-columns:repeat(2, 1fr); }
        .label-sheet.size-shelf { grid-template-columns:repeat(2, 1fr); }
        .label-item { border:1px dashed #999; padding:8px; text-align:center; page-break-inside:avoid; }
        .l-name { font-size:11px; font-weight:700; }
        .l-sku { font-family:monospace; font-size:9px; color:#555; }
        .l-price { font-size:14px; font-weight:800; color:#0d2d6e; }
        .l-cat { font-size:8px; color:#999; }
        .label-item.size-shelf { padding:14px; }
        .label-item.size-shelf .l-name { font-size:13px; }
        .label-item.size-shelf .l-price { font-size:20px; }
        @media print { body { margin:0; } @page { margin:10mm; } }
      </style></head><body>${printContent}<scr` + `ipt>setTimeout(()=>{window.print(); window.close();}, 500);</scr` + `ipt></body></html>`);
    win.document.close();
  };

  return (
    <div>
      <PageHeader title={pageTitle} sub="Print shelf labels, barcode tags, and price tickets for items" period={period} setPeriod={setPeriod} showPeriod={false}>
        <button className="btn btn-sm" onClick={toggleAll}>{selectedIds.length === items.length ? 'Deselect all' : 'Select all'}</button>
        <button className="btn btn-pdf btn-sm" onClick={printLabels} disabled={!selectedIds.length}>🖨 Print Labels ({selectedIds.length})</button>
      </PageHeader>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
        <div className="card">
          <div className="ch"><div className="ct">Select items</div><div className="cs">{selectedIds.length} selected</div></div>
          <div className="tw" style={{maxHeight:520, overflow:'auto'}}>
            <table>
              <thead><tr><th style={{width:30}}></th><th>SKU</th><th>Name</th><th>Category</th><th className="num-h">Price</th><th className="num-h">Stock</th></tr></thead>
              <tbody>
                {items.map(i => (
                  <tr key={i.id} onClick={()=>toggle(i.id)} style={{cursor:'pointer', background:selectedIds.includes(i.id)?'var(--blue2)':''}}>
                    <td><input type="checkbox" checked={selectedIds.includes(i.id)} onChange={()=>toggle(i.id)} /></td>
                    <td><span className="mono">{i.sku}</span></td>
                    <td>{i.name}</td>
                    <td><span className="bdg b-draft"><span className="bd"></span>{i.cat}</span></td>
                    <td className="num">{fmt(i.sellPrice)}</td>
                    <td className="num">{i.stock}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        <div>
          <div className="card">
            <div className="ch"><div className="ct">Label settings</div></div>
            <div className="cb">
              <div className="fg"><label className="fl">Label size / layout</label>
                <select className="fs" value={labelType} onChange={e=>setLabelType(e.target.value)}>
                  <option value="shelf">Shelf label — 2 per row (larger)</option>
                  <option value="size-30up">30-up Avery — 3 per row</option>
                  <option value="size-24up">24-up — 3 per row</option>
                  <option value="size-12up">12-up — 2 per row</option>
                </select>
              </div>
              <div className="fg"><label className="fl">Copies per item</label><input className="fi" type="number" min={1} max={50} value={copies} onChange={e=>setCopies(+e.target.value)} /></div>
              <div className="fg" style={{margin:'10px 0'}}>
                <label style={{display:'flex', gap:6, alignItems:'center', fontSize:12, marginBottom:6}}>
                  <input type="checkbox" checked={showBarcode} onChange={e=>setShowBarcode(e.target.checked)} /> Show barcode (CODE128 from SKU)
                </label>
                <label style={{display:'flex', gap:6, alignItems:'center', fontSize:12, marginBottom:6}}>
                  <input type="checkbox" checked={showPrice} onChange={e=>setShowPrice(e.target.checked)} /> Show price
                </label>
                <label style={{display:'flex', gap:6, alignItems:'center', fontSize:12, marginBottom:6}}>
                  <input type="checkbox" checked={showCat} onChange={e=>setShowCat(e.target.checked)} /> Show category
                </label>
              </div>
              <div className="al al-i" style={{marginBottom:0}}>
                <b>Tip:</b> For shelf labels, use the "Shelf" layout (larger price/name). For inventory tagging on physical stock, use 30-up Avery sheets.
              </div>
            </div>
          </div>

          <div className="card">
            <div className="ch"><div className="ct">Preview</div><div className="cs">{labelsToShow.length} label{labelsToShow.length===1?'':'s'} ready to print</div></div>
            <div ref={previewRef} className="cb" style={{maxHeight:380, overflow:'auto', background:'var(--s2)'}}>
              {labelsToShow.length === 0 ? (
                <div style={{textAlign:'center', padding:'40px 20px', color:'var(--t2)'}}>Select items to preview labels</div>
              ) : (
                <div className={`label-sheet ${labelType==='shelf'?'size-shelf':labelType}`}>
                  {labelsToShow.map((it, idx) => (
                    <div key={idx} className={`label-item ${labelType==='shelf'?'size-shelf':''}`}>
                      {showCat && <div className="l-cat">{it.cat}</div>}
                      <div className="l-name">{it.name}</div>
                      <div className="l-sku">{it.sku}</div>
                      {showBarcode && <svg className="barcode" data-code={it.sku}></svg>}
                      {showPrice && <div className="l-price">MVR {fmt(it.sellPrice)}</div>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}
