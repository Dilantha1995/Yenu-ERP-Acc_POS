<!DOCTYPE html>
<html lang="en">
<head>
<script src="/erp-bridge.js"></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Accounts — ERP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f4f6f9; --surface:#fff; --s2:#f0f2f6; --s3:#e8ebf0;
  --border:#dde1e8; --border2:#c8cdd8;
  --text:#1c2030; --t2:#5c6478; --t3:#9ba3b5;
  --blue:#1849a9; --blue2:#eef2fc; --blue3:#0d2d6e;
  --green:#166534; --green2:#f0fdf4; --green3:#dcfce7;
  --amber:#92400e; --amber2:#fffbeb;
  --red:#991b1b; --red2:#fef2f2; --red3:#fee2e2;
  --teal:#115e59; --teal2:#f0fdfa;
  --orange:#c2410c; --orange2:#fff7ed;
  --purple:#6b21a8; --purple2:#faf5ff;
  --r:8px; --r2:12px;
}
html, body { font-family:'Segoe UI', system-ui, sans-serif; background:var(--bg); color:var(--text); font-size:13px; line-height:1.5; }

/* TOPBAR */
.topbar { height:50px; background:var(--blue3); color:#fff; padding:0 22px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:60; box-shadow:0 2px 8px rgba(0,0,0,.18); }
.topbar .logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:14px; }
.topbar .logo-box { width:30px; height:30px; background:#fff; color:var(--blue3); border-radius:7px; font-size:11px; font-weight:900; display:flex; align-items:center; justify-content:center; }
.topbar .logo-text { font-size:14px; font-weight:700; line-height:1.1; }
.topbar .logo-sub { font-size:10px; opacity:.7; }
.topbar-right { display:flex; align-items:center; gap:10px; }
.topbar-right .co-sel { background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.18); color:#fff; padding:5px 10px; border-radius:6px; font-size:11.5px; outline:none; }
.topbar-right .co-sel option { color:var(--text); }
.topbar-right .pkg { background:rgba(255,255,255,.10); padding:4px 10px; border-radius:20px; font-size:11px; }
.topbar-right .user { background:rgba(255,255,255,.12); padding:4px 12px; border-radius:20px; font-size:11px; font-weight:600; }

/* SHELL */
.app-body { display:grid; grid-template-columns:215px 1fr; min-height:calc(100vh - 50px); }
.sidebar { background:var(--surface); border-right:1px solid var(--border); padding:6px 0; overflow-y:auto; max-height:calc(100vh - 50px); position:sticky; top:50px; }
.main { padding:22px; background:var(--bg); }

/* NAV */
.nav-sec { font-size:9px; font-weight:800; color:var(--t3); padding:14px 15px 4px; text-transform:uppercase; letter-spacing:.09em; }
.ni { display:flex; align-items:center; gap:9px; padding:8px 15px; font-size:12.5px; color:var(--t2); cursor:pointer; border-left:3px solid transparent; transition:all .12s; }
.ni:hover { background:var(--s2); color:var(--text); }
.ni.active { background:var(--blue2); color:var(--blue); border-left-color:var(--blue); font-weight:600; }
.ni .ic { font-size:14px; width:18px; text-align:center; }

/* PAGE HEADER */
.ph { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:18px; gap:12px; flex-wrap:wrap; }
.pt { font-size:19px; font-weight:700; color:var(--text); }
.ps { font-size:12px; color:var(--t2); margin-top:3px; }
.brow { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; gap:6px; padding:7px 15px; border-radius:var(--r); border:1px solid var(--border2); background:var(--surface); color:var(--text); font-size:12px; cursor:pointer; font-weight:500; transition:all .12s; white-space:nowrap; line-height:1.4; font-family:inherit; }
.btn:hover { background:var(--s2); }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-p { background:var(--blue); color:#fff; border-color:var(--blue); }
.btn-p:hover { background:var(--blue3); }
.btn-g { background:var(--green); color:#fff; border-color:var(--green); }
.btn-r { background:var(--red); color:#fff; border-color:var(--red); }
.btn-o { background:var(--orange); color:#fff; border-color:var(--orange); }
.btn-sm { padding:5px 12px; font-size:11px; }
.btn-xs { padding:3px 8px; font-size:10px; border-radius:6px; }
.btn-link { background:transparent; border:none; color:var(--blue); padding:3px 4px; font-size:11px; cursor:pointer; }
.btn-link:hover { text-decoration:underline; }

/* BADGES */
.bdg { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; white-space:nowrap; text-transform:uppercase; letter-spacing:.04em; }
.bd { width:5px; height:5px; border-radius:50%; background:currentColor; }
.b-draft { background:var(--s3); color:var(--t2); }
.b-sub   { background:#dbeafe; color:#1e40af; }
.b-chk   { background:#e0e7ff; color:#3730a3; }
.b-pap   { background:#fef3c7; color:#92400e; }
.b-app   { background:var(--teal2); color:var(--teal); }
.b-paid  { background:var(--green3); color:var(--green); }
.b-rej   { background:var(--red3); color:var(--red); }
.b-urg   { background:var(--orange2); color:var(--orange); border:1px solid #fed7aa; }
.b-info  { background:var(--blue2); color:var(--blue); }

/* CARDS */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r2); overflow:hidden; margin-bottom:16px; }
.ch { padding:13px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
.ct { font-size:13px; font-weight:700; color:var(--text); }
.cs { font-size:11px; color:var(--t2); margin-top:2px; }
.cb { padding:18px; }
.cb-flush { padding:0; }

/* STAT CARDS */
.sgrid { display:grid; grid-template-columns:repeat(5, 1fr); gap:12px; margin-bottom:16px; }
.sc { background:var(--surface); border:1px solid var(--border); border-radius:var(--r2); padding:14px 16px; position:relative; overflow:hidden; }
.sc::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.sc.bl::before { background:var(--blue); }
.sc.gr::before { background:var(--green); }
.sc.am::before { background:#d97706; }
.sc.te::before { background:var(--teal); }
.sc.or::before { background:var(--orange); }
.sc.rd::before { background:var(--red); }
.sc.pu::before { background:var(--purple); }
.sl { font-size:10px; font-weight:600; color:var(--t2); margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em; }
.sv { font-size:22px; font-weight:800; color:var(--text); line-height:1; font-variant-numeric:tabular-nums; }
.ss { font-size:10px; color:var(--t3); margin-top:5px; }

/* ALERTS */
.al { border-radius:var(--r); padding:11px 15px; font-size:12px; margin-bottom:12px; border-left:3px solid; line-height:1.6; }
.al-i { background:var(--blue2); color:var(--blue); border-color:var(--blue); }
.al-s { background:var(--green2); color:var(--green); border-color:var(--green); }
.al-w { background:var(--amber2); color:var(--amber); border-color:#d97706; }
.al-r { background:var(--red2); color:var(--red); border-color:var(--red); }
.al-o { background:var(--orange2); color:var(--orange); border-color:var(--orange); }

/* FORMS */
.fg { margin-bottom:13px; }
.fl { display:block; font-size:11px; font-weight:700; color:var(--t2); margin-bottom:5px; }
.req { color:var(--red); margin-left:2px; }
.fi, .fs, .fta { width:100%; font-size:12px; padding:8px 11px; border-radius:var(--r); border:1px solid var(--border2); background:var(--surface); color:var(--text); outline:none; transition:border-color .12s; font-family:inherit; }
.fi:focus, .fs:focus, .fta:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(24,73,169,.08); }
.fta { resize:vertical; min-height:64px; }
.fg2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.fg3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.fg4 { display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; }

/* TABLES */
.tw { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
th { text-align:left; font-size:10px; font-weight:700; color:var(--t3); padding:9px 13px; border-bottom:1px solid var(--border); text-transform:uppercase; letter-spacing:.06em; white-space:nowrap; background:var(--s2); }
td { padding:10px 13px; border-bottom:1px solid var(--border); font-size:12px; color:var(--text); vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:var(--s2); }
.mono { font-family:'Courier New', monospace; font-size:11px; font-weight:700; letter-spacing:.02em; color:var(--blue3); }
.num { font-variant-numeric:tabular-nums; text-align:right; font-family:'Courier New', monospace; }
.num-h { text-align:right !important; }
.tt-row-tot td { background:var(--s2); font-weight:700; border-top:2px solid var(--border2); }
.tt-row-grand td { background:var(--blue2); color:var(--blue3); font-weight:800; border-top:2px solid var(--blue); border-bottom:2px solid var(--blue); }
.tt-row-section td { background:var(--s3); font-weight:700; color:var(--blue3); font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
.tt-row-sub td { background:var(--s2); font-weight:600; }
.indent-1 { padding-left:28px !important; }
.indent-2 { padding-left:48px !important; color:var(--t2); }

/* TABS */
.tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:18px; overflow-x:auto; }
.tab { padding:10px 18px; font-size:12px; font-weight:500; color:var(--t2); border-bottom:2px solid transparent; cursor:pointer; margin-bottom:-1px; white-space:nowrap; transition:all .12s; }
.tab:hover { color:var(--text); }
.tab.on { color:var(--blue); border-bottom-color:var(--blue); font-weight:700; }

/* PILL FILTERS */
.ebar { display:flex; gap:6px; flex-wrap:wrap; }
.ebt { padding:5px 13px; border-radius:20px; font-size:11px; font-weight:600; border:1px solid var(--border); background:var(--surface); color:var(--t2); cursor:pointer; transition:all .12s; }
.ebt:hover { border-color:var(--blue); color:var(--blue); }
.ebt.on { background:var(--blue); color:#fff; border-color:var(--blue); }

/* MODAL */
.mbg { position:fixed; inset:0; background:rgba(15,20,40,.55); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px; }
.modal { background:var(--surface); border-radius:var(--r2); width:720px; max-width:100%; max-height:90vh; overflow:auto; border:1px solid var(--border); }
.modal.lg { width:920px; }
.mh { padding:16px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:var(--surface); z-index:1; }
.mt { font-size:15px; font-weight:800; color:var(--blue3); }
.ms { font-size:11px; color:var(--t2); margin-top:2px; }
.mc { padding:22px; }
.mf { padding:14px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; background:var(--s2); position:sticky; bottom:0; }
.mx { background:none; border:none; font-size:18px; color:var(--t2); cursor:pointer; padding:4px 8px; border-radius:6px; }
.mx:hover { background:var(--s2); color:var(--text); }

/* JE GRID */
.je-tbl input, .je-tbl select { width:100%; border:1px solid transparent; background:transparent; padding:5px 8px; font-size:12px; border-radius:6px; }
.je-tbl input:hover, .je-tbl select:hover { border-color:var(--border); background:var(--surface); }
.je-tbl input:focus, .je-tbl select:focus { border-color:var(--blue); background:var(--surface); box-shadow:0 0 0 2px rgba(24,73,169,.10); outline:none; }
.je-tbl .num-cell input { text-align:right; font-family:'Courier New', monospace; }
.je-tbl td { padding:5px 8px; }

/* SEARCH */
.search { position:relative; min-width:240px; }
.search input { padding-left:32px; }
.search::before { content:"🔍"; position:absolute; left:9px; top:50%; transform:translateY(-50%); font-size:11px; opacity:.5; }

/* TOAST */
.toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--border); padding:12px 18px; border-radius:var(--r); z-index:300; box-shadow:0 4px 18px rgba(15,20,40,.15); font-size:13px; display:flex; align-items:center; gap:10px; max-width:380px; }
.toast.ok { border-left:3px solid var(--green); }
.toast.bad { border-left:3px solid var(--red); }
.toast.info { border-left:3px solid var(--blue); }

/* SCROLL WRAP */
.swrap { max-height:560px; overflow-y:auto; }
.swrap thead th { position:sticky; top:0; z-index:1; }

/* SPARK */
.spark { display:inline-block; width:80px; height:6px; background:var(--s3); border-radius:3px; overflow:hidden; vertical-align:middle; }
.spark > div { height:100%; background:var(--blue); }

/* DETAILS */
.acc { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); margin-bottom:8px; }
.acc summary { padding:11px 16px; cursor:pointer; font-weight:600; font-size:12.5px; color:var(--blue3); list-style:none; display:flex; justify-content:space-between; align-items:center; }
.acc summary::after { content:"▾"; font-size:11px; color:var(--t2); transition:transform .15s; }
.acc[open] summary::after { transform:rotate(180deg); }
.acc summary::-webkit-details-marker { display:none; }
.acc .acc-b { padding:0 16px 14px 16px; font-size:12.5px; line-height:1.7; color:var(--text); }

/* INTEGRATION CARD */
.integ-card { padding:12px 14px; border:1px solid var(--border); border-radius:var(--r); background:var(--surface); display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:8px; }

/* STATUS DOT */
.sd { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:6px; }
.sd.ok { background:var(--green); }
.sd.warn { background:#d97706; }
.sd.bad { background:var(--red); }

/* STATEMENT ROWS */
.stmt-row { display:grid; grid-template-columns:1fr 140px 140px 100px; gap:18px; padding:7px 13px; font-size:12.5px; border-bottom:1px solid var(--s3); }
.stmt-row.has-vs { grid-template-columns:1fr 130px 130px 100px; }
.stmt-row.single { grid-template-columns:1fr 160px; }
.stmt-row:hover { background:var(--s2); }
.stmt-row .lbl { color:var(--text); }
.stmt-row .lbl.ind-1 { padding-left:22px; color:var(--t2); }
.stmt-row .lbl.ind-2 { padding-left:42px; color:var(--t2); font-size:12px; }
.stmt-row .num { font-variant-numeric:tabular-nums; font-family:'Courier New', monospace; font-weight:600; }
.stmt-row.section { background:var(--blue2); color:var(--blue3); font-weight:800; padding:9px 13px; text-transform:uppercase; font-size:11px; letter-spacing:.05em; }
.stmt-row.section .num { color:var(--blue3); }
.stmt-row.total { background:var(--s2); font-weight:700; border-top:2px solid var(--border2); }
.stmt-row.grand { background:var(--blue3); color:#fff; font-weight:800; padding:11px 13px; }
.stmt-row.grand .num, .stmt-row.grand .lbl { color:#fff; }

.help { font-size:11.5px; color:var(--t2); margin-top:8px; line-height:1.6; }

@media (max-width: 900px) {
  .app-body { grid-template-columns:1fr; }
  .sidebar { display:none; }
  .sgrid { grid-template-columns:repeat(2, 1fr); }
  .fg2, .fg3, .fg4 { grid-template-columns:1fr; }
}

/* DRAWER (side panel for profile views) */
.drawer-bg { position:fixed; inset:0; background:rgba(15,20,40,.45); display:flex; justify-content:flex-end; z-index:200; }
.drawer { background:var(--surface); width:760px; max-width:100%; height:100%; overflow:auto; box-shadow:-8px 0 30px rgba(0,0,0,.15); display:flex; flex-direction:column; }
.drawer-h { padding:18px 22px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--surface); z-index:2; display:flex; justify-content:space-between; align-items:flex-start; }
.drawer-c { padding:20px 22px; flex:1; }
.drawer-tabs { padding:0 22px; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:73px; z-index:1; }

/* DOCUMENT PREVIEW (voucher / PV) */
.doc-preview { background:#fff; padding:40px 50px; max-width:780px; margin:0 auto; font-family:'Segoe UI', sans-serif; color:#000; font-size:11px; line-height:1.5; box-shadow:0 4px 20px rgba(0,0,0,.10); }
.doc-preview h1 { font-size:18px; color:#0d2d6e; margin-bottom:4px; }
.doc-preview h2 { font-size:14px; color:#0d2d6e; margin-top:18px; margin-bottom:8px; border-bottom:1px solid #0d2d6e; padding-bottom:4px; }
.doc-preview table { width:100%; border-collapse:collapse; font-size:10.5px; }
.doc-preview th { background:#f0f2f6; padding:6px 8px; text-align:left; font-size:9.5px; font-weight:700; color:#5c6478; border:1px solid #dde1e8; text-transform:uppercase; }
.doc-preview td { padding:6px 8px; border:1px solid #dde1e8; font-size:10.5px; }
.doc-preview .doc-meta { display:grid; grid-template-columns:1fr 1fr; gap:8px 18px; margin:14px 0; }
.doc-preview .doc-meta-k { font-weight:700; color:#5c6478; font-size:10px; text-transform:uppercase; }
.doc-preview .doc-totals { display:flex; justify-content:flex-end; margin-top:12px; }
.doc-preview .doc-totals table { width:300px; }
.doc-preview .doc-sig { margin-top:36px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px; font-size:10px; }
.doc-preview .doc-sig-line { border-top:1px solid #000; padding-top:4px; }
.doc-preview .doc-footer { margin-top:24px; font-size:9px; color:#9ba3b5; text-align:center; }
.doc-watermark { position:absolute; opacity:.06; font-size:90px; font-weight:900; transform:rotate(-30deg); color:#0d2d6e; pointer-events:none; }

/* EXPORT BUTTON GROUP */
.export-group { display:inline-flex; gap:4px; }
.export-group .btn { padding-left:10px; padding-right:10px; }
.btn-x { background:#16a085; color:#fff; border-color:#16a085; }
.btn-x:hover { background:#0e7058; }
.btn-pdf { background:#c0392b; color:#fff; border-color:#c0392b; }
.btn-pdf:hover { background:#922b21; }

/* CLICKABLE ROW */
.clickable td { cursor:pointer; }
.clickable:hover td { background:var(--blue2); }

/* STATUS GAP */
.status-grp { display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; margin-bottom:14px; }
.status-grp .sb { padding:14px 16px; border:1px solid var(--border); border-radius:var(--r); background:var(--surface); }
.status-grp .sb-l { font-size:10px; color:var(--t2); text-transform:uppercase; font-weight:700; }
.status-grp .sb-v { font-size:22px; font-weight:800; margin-top:4px; }

/* DROPZONE */
.dropzone { border:2px dashed var(--border2); border-radius:var(--r); padding:30px; text-align:center; color:var(--t2); background:var(--s2); cursor:pointer; transition:all .15s; }
.dropzone:hover { border-color:var(--blue); background:var(--blue2); }
.dropzone.dragging { border-color:var(--blue); background:var(--blue2); }

/* REPORT HUB */
.report-hub { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:14px; }
.report-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r2); padding:16px; transition:all .15s; cursor:pointer; }
.report-card:hover { border-color:var(--blue); box-shadow:0 4px 12px rgba(24,73,169,.08); }
.report-card .rc-icon { font-size:22px; margin-bottom:8px; }
.report-card .rc-title { font-size:13px; font-weight:700; color:var(--blue3); margin-bottom:4px; }
.report-card .rc-desc { font-size:11.5px; color:var(--t2); line-height:1.5; }
.report-card .rc-meta { margin-top:10px; padding-top:10px; border-top:1px solid var(--s3); font-size:10px; color:var(--t3); text-transform:uppercase; letter-spacing:.05em; }

/* WORKFLOW STAGES */
.wf-stages { display:flex; gap:0; margin-bottom:18px; }
.wf-stage { flex:1; padding:10px 14px; background:var(--s2); border:1px solid var(--border); font-size:11px; font-weight:600; position:relative; clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%, 14px 50%); margin-right:-12px; text-align:center; color:var(--t2); }
.wf-stage:first-child { clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%); }
.wf-stage:last-child { clip-path:polygon(0 0, 100% 0, 100% 100%, 0 100%, 14px 50%); }
.wf-stage.on { background:var(--blue); color:#fff; border-color:var(--blue); }

// ────────── HELPERS ──────────
const fmt = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
};
const today = () => new Date().toISOString().slice(0,10);
const uid = (p) => `${p}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2,5)}`;
const sumLines = (lines, k) => lines.reduce((s,l)=>s+(parseFloat(l[k])||0), 0);
const isBalanced = (lines) => Math.abs(sumLines(lines,'debit') - sumLines(lines,'credit')) < 0.01;

function acctBalance(code, journals, opts={}) {
  const { from, to, company } = opts;
  let dr = 0, cr = 0;
  for (const je of journals) {
    if (!je.posted) continue;
    if (company && je.company !== company) continue;
    if (from && je.date < from) continue;
    if (to && je.date > to) continue;
    for (const l of je.lines) if (l.acct === code) { dr += +l.debit||0; cr += +l.credit||0; }
  }
  return { debit:dr, credit:cr, net:dr - cr };
}
function natureBalance(acct, journals, opts={}) {
  if (!acct) return 0;
  const { net } = acctBalance(acct.code, journals, opts);
  if (acct.type === 'ASSET' || acct.type === 'EXPENSE') return acct.contra ? -net : net;
  return acct.contra ? net : -net;
}
function groupBalance(parentCode, coa, journals, opts={}) {
  const node = coa.find(a => a.code === parentCode);
  if (!node) return 0;
  if (!node.isGroup) return natureBalance(node, journals, opts);
  let t = 0;
  for (const c of coa.filter(a => a.parent === parentCode)) t += groupBalance(c.code, coa, journals, opts);
  return t;
}
function typeBalance(type, coa, journals, opts={}) {
  let t = 0;
  for (const a of coa.filter(x => x.type === type && !x.isGroup)) t += natureBalance(a, journals, opts);
  return t;
}

// Period helpers — for comparatives
function priorPeriod(period) {
  const from = new Date(period.from), to = new Date(period.to);
  const days = Math.round((to - from) / (1000*60*60*24));
  const pTo = new Date(from); pTo.setDate(pTo.getDate() - 1);
  const pFrom = new Date(pTo); pFrom.setDate(pFrom.getDate() - days);
  return { from: pFrom.toISOString().slice(0,10), to: pTo.toISOString().slice(0,10) };
}
function priorYear(period) {
  const from = new Date(period.from), to = new Date(period.to);
  from.setFullYear(from.getFullYear() - 1);
  to.setFullYear(to.getFullYear() - 1);
  return { from: from.toISOString().slice(0,10), to: to.toISOString().slice(0,10) };
}
function variance(curr, prior) {
  const diff = curr - prior;
  const pct = prior === 0 ? (curr === 0 ? 0 : null) : (diff / Math.abs(prior)) * 100;
  return { diff, pct };
}

// Period builders for P&L flexible
function buildMonthlyColumns(period) {
  // monthly columns within [from, to]
  const cols = [];
  let d = new Date(period.from);
  d.setDate(1);
  const end = new Date(period.to);
  while (d <= end) {
    const yr = d.getFullYear(), mo = d.getMonth();
    const colFrom = new Date(yr, mo, 1);
    const colTo = new Date(yr, mo+1, 0);
    cols.push({
      label: colFrom.toLocaleDateString('en-US', {month:'short', year:'2-digit'}),
      from: colFrom.toISOString().slice(0,10),
      to: colTo.toISOString().slice(0,10),
    });
    d.setMonth(d.getMonth() + 1);
  }
  return cols;
}
function buildQuarterlyColumns(period) {
  const cols = [];
  let d = new Date(period.from); d.setDate(1);
  const qStart = Math.floor(d.getMonth() / 3) * 3;
  d.setMonth(qStart);
  const end = new Date(period.to);
  while (d <= end) {
    const yr = d.getFullYear(), mo = d.getMonth();
    const colFrom = new Date(yr, mo, 1);
    const colTo = new Date(yr, mo+3, 0);
    cols.push({
      label: `Q${Math.floor(mo/3)+1} ${String(yr).slice(2)}`,
      from: colFrom.toISOString().slice(0,10),
      to: colTo.toISOString().slice(0,10),
    });
    d.setMonth(d.getMonth() + 3);
  }
  return cols;
}
function buildYearlyColumns(period) {
  const cols = [];
  let y = new Date(period.from).getFullYear();
  const endY = new Date(period.to).getFullYear();
  while (y <= endY) {
    cols.push({ label:`${y}`, from:`${y}-01-01`, to:`${y}-12-31` });
    y++;
  }
  return cols;
}

// ──────────────── EXPORT UTILITIES ────────────────
function exportToExcel(filename, sections) {
  // sections: [{ name, header, rows, meta }]
  const wb = XLSX.utils.book_new();
  sections.forEach((s, idx) => {
    const data = [];
    // Meta header rows
    if (s.title) data.push([s.title]);
    if (s.subtitle) data.push([s.subtitle]);
    if (s.meta) {
      s.meta.forEach(m => data.push(m));
    }
    if (s.title || s.subtitle || s.meta) data.push([]); // blank
    // Column headers
    if (s.header) data.push(s.header);
    // Rows
    (s.rows || []).forEach(r => data.push(r));
    if (s.totals) {
      data.push([]);
      s.totals.forEach(t => data.push(t));
    }
    const ws = XLSX.utils.aoa_to_sheet(data);
    // Style: column widths
    if (s.colWidths) ws['!cols'] = s.colWidths.map(w => ({wch: w}));
    // Style: merge title row
    if (s.title && s.header) {
      ws['!merges'] = [{ s: {r:0, c:0}, e: {r:0, c: s.header.length-1} }];
      if (s.subtitle) ws['!merges'].push({ s:{r:1,c:0}, e:{r:1,c:s.header.length-1} });
    }
    XLSX.utils.book_append_sheet(wb, ws, (s.name || `Sheet${idx+1}`).slice(0,31));
  });
  XLSX.writeFile(wb, filename);
}

function exportToPDF(filename, options) {
  // options: { title, subtitle, company, period, sections: [{ name, header, rows, totals, meta }] }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: options.orientation || 'portrait', unit:'mm', format:'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  let y = 14;

  // Header
  doc.setFontSize(15); doc.setTextColor(13, 45, 110); doc.setFont(undefined, 'bold');
  doc.text(options.title || filename, pageW/2, y, {align:'center'});
  y += 6;
  if (options.subtitle) {
    doc.setFontSize(10); doc.setTextColor(92, 100, 120); doc.setFont(undefined, 'normal');
    doc.text(options.subtitle, pageW/2, y, {align:'center'});
    y += 5;
  }
  if (options.company) {
    doc.setFontSize(9); doc.setTextColor(155, 163, 181);
    doc.text(options.company, pageW/2, y, {align:'center'});
    y += 4;
  }
  if (options.period) {
    doc.setFontSize(9); doc.setTextColor(155, 163, 181);
    doc.text(`Period: ${options.period}`, pageW/2, y, {align:'center'});
    y += 6;
  } else y += 2;

  // Sections
  (options.sections || []).forEach((s, i) => {
    if (i > 0) y = doc.lastAutoTable.finalY + 8;
    if (y > 250) { doc.addPage(); y = 14; }
    if (s.name) {
      doc.setFontSize(11); doc.setTextColor(13, 45, 110); doc.setFont(undefined, 'bold');
      doc.text(s.name, 14, y);
      y += 4;
    }
    if (s.meta) {
      doc.setFontSize(8); doc.setTextColor(92, 100, 120); doc.setFont(undefined, 'normal');
      s.meta.forEach(m => { doc.text(m.join(' : '), 14, y); y += 3.5; });
      y += 1;
    }
    doc.autoTable({
      startY: y,
      head: [s.header || []],
      body: s.rows || [],
      foot: s.totals || [],
      theme: 'grid',
      headStyles: { fillColor: [13, 45, 110], textColor: [255,255,255], fontSize: 8, fontStyle:'bold' },
      footStyles: { fillColor: [240, 242, 246], textColor: [13, 45, 110], fontSize: 9, fontStyle:'bold' },
      bodyStyles: { fontSize: 8.5, textColor: [28, 32, 48] },
      alternateRowStyles: { fillColor: [248, 250, 252] },
      columnStyles: s.columnStyles || {},
      margin: { left: 14, right: 14 },
    });
  });

  // Footer on each page
  const pages = doc.internal.pages.length - 1;
  for (let p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFontSize(8); doc.setTextColor(155, 163, 181);
    const ftr = `Generated ${new Date().toISOString().slice(0,10)} · Accounts Module · Page ${p} of ${pages}`;
    doc.text(ftr, pageW/2, doc.internal.pageSize.getHeight() - 8, {align:'center'});
  }

  doc.save(filename);
}

// ──────────────── VOUCHER NUMBERING ────────────────
const DEFAULT_VOUCHER_CONFIG = {
  'JE':   { prefix:'JV',   format:'PREFIX/YYYY/NNNN', padding:4, current:120, locked:false },
  'AR-INV': { prefix:'INV',  format:'PREFIX/YYYY/NNNN', padding:4, current:42, locked:false },
  'AR-RCT': { prefix:'RCT',  format:'PREFIX/YYYY/NNNN', padding:4, current:18, locked:false },
  'AP-BILL':{ prefix:'BILL', format:'PREFIX/YYYY/NNNN', padding:4, current:65, locked:false },
  'AP-PMT': { prefix:'PV',   format:'PREFIX/YYYY/NNNN', padding:4, current:33, locked:false },
  'EXP':    { prefix:'EXP',  format:'PREFIX/YYYY/NNNN', padding:4, current:28, locked:false },
  'POS':    { prefix:'POS',  format:'PREFIX/YYYYMMDD',  padding:0, current:0,  locked:false },
};

function generateVoucherNumber(config, source, date) {
  const c = config[source] || config['JE'];
  const d = new Date(date || today());
  const yr = d.getFullYear();
  const mo = String(d.getMonth()+1).padStart(2,'0');
  const dy = String(d.getDate()).padStart(2,'0');
  const next = c.current + 1;
  const num = String(next).padStart(c.padding || 4, '0');
  return c.format
    .replace('PREFIX', c.prefix)
    .replace('YYYY', yr)
    .replace('YYYYMMDD', `${yr}${mo}${dy}`)
    .replace('NNNN', num)
    .replace('NNN', num);
}

    case 'fs-pack': return <FullStatementPack {...p} pageTitle={pageTitle} />;
    case 'ledger': return <GeneralLedger {...p} pageTitle={pageTitle} />;
    case 'trial': return <TrialBalance {...p} pageTitle={pageTitle} />;
    case 'pl': return <ProfitLoss {...p} pageTitle={pageTitle} />;
    case 'sofp': return <FinancialPosition {...p} pageTitle={pageTitle} />;
    case 'equity': return <ChangesInEquity {...p} pageTitle={pageTitle} />;
    case 'cashflow': return <CashFlow {...p} pageTitle={pageTitle} />;
    case 'notes': return <PoliciesAndNotes {...p} pageTitle={pageTitle} />;
    case 'policies': return <PoliciesEditor {...p} pageTitle={pageTitle} />;
    case 'tax': return <TaxCompliance {...p} pageTitle={pageTitle} />;
    case 'voucherconfig': return <VoucherConfig {...p} pageTitle={pageTitle} />;
    case 'settings': return <Settings {...p} pageTitle={pageTitle} />;
    default: return <div>Page not found</div>;
  }
}

// ════════════ DASHBOARD ════════════
function Dashboard({coa, journals, activeCo, period, integrations, setPage, companies, pageTitle, setPeriod}){
  const opts = {...period, company:activeCo};
  const rev = typeBalance('INCOME', coa, journals, opts);
  const exp = typeBalance('EXPENSE', coa, journals, opts);
  const profit = rev - exp;
  const assets = typeBalance('ASSET', coa, journals, opts);
  const liab = typeBalance('LIABILITY', coa, journals, opts);
  const equity = typeBalance('EQUITY', coa, journals, opts) + profit;
  const ar = groupBalance('1220', coa, journals, opts);
  const ap = groupBalance('2210', coa, journals, opts);
  const cash = ['1241','1242','1243','1244'].reduce((s,c)=>s+natureBalance(coa.find(a=>a.code===c), journals, opts), 0);
  const recent = journals.filter(j=>j.company===activeCo).slice(-6).reverse();
  const margin = rev > 0 ? (profit/rev*100).toFixed(1) : 0;

  return (
    <div>
      <PageHeader title={pageTitle} sub={`${companies.find(c=>c.id===activeCo)?.name} · Period: ${period.from} to ${period.to}`} period={period} setPeriod={setPeriod}>
        <button className="btn btn-sm">⬇ Export</button>
        <button className="btn btn-p btn-sm" onClick={()=>setPage('journal')}>+ New Journal Entry</button>
      </PageHeader>

      <div className="sgrid">
        <StatCard tone="bl" label="Revenue" value={fmt(rev)} sub={`MVR · ${period.from.slice(0,7)}`} />
        <StatCard tone="gr" label="Net Profit" value={fmt(profit)} sub={`Margin ${margin}%`} />
        <StatCard tone="am" label="Cash on Hand" value={fmt(cash)} sub="All bank + petty" />
        <StatCard tone="te" label="Total AR" value={fmt(ar)} sub="Receivables" />
        <StatCard tone="or" label="Total AP" value={fmt(ap)} sub="Payables" />
      </div>

      <div className="sgrid" style={{gridTemplateColumns:'repeat(4, 1fr)'}}>
        <StatCard tone="bl" label="Total Assets" value={fmt(assets)} />
        <StatCard tone="rd" label="Total Liabilities" value={fmt(liab)} />
        <StatCard tone="gr" label="Total Equity" value={fmt(equity)} sub="incl. current year P&L" />
        <StatCard tone="pu" label="Working Capital" value={fmt(assets - liab)} sub="A − L" />
      </div>

      <div className="al al-i" style={{marginTop:6}}>
        <b>Tip:</b> All reports below support <b>comparative columns</b> (prior period or prior year). The P&L can be sliced by month, quarter, year or custom range.
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1.5fr 1fr', gap:14}}>
        <div className="card">
          <div className="ch">
            <div>
              <div className="ct">Recent Journal Entries</div>
              <div className="cs">Last postings across all sources</div>
            </div>
            <button className="btn btn-sm" onClick={()=>setPage('journal')}>View all →</button>
          </div>
          <div className="tw">
            <table>
              <thead><tr><th>JE No.</th><th>Date</th><th>Source</th><th>Narration</th><th className="num-h">Amount</th><th>Status</th></tr></thead>
              <tbody>
                {recent.map(j => {
                  const amt = sumLines(j.lines,'debit');
                  return (
                    <tr key={j.id}>
                      <td><span className="mono">{j.id}</span></td>
                      <td>{j.date}</td>
                      <td><span className="bdg b-info"><span className="bd"></span>{j.source}</span></td>
                      <td>{j.narration}</td>
                      <td className="num">{fmt(amt)}</td>
                      <td>{j.locked ? <span className="bdg b-app"><span className="bd"></span>Locked</span> : <span className="bdg b-paid"><span className="bd"></span>Posted</span>}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>

        <div className="card">
          <div className="ch">
            <div className="ct">Module Health</div>
          </div>
          <div className="cb" style={{padding:'8px 14px'}}>
            {integrations.slice(0,7).map(i => (
              <div key={i.id} style={{display:'flex', justifyContent:'space-between', padding:'7px 0', borderBottom:'1px solid var(--s3)'}}>
                <div style={{fontSize:12}}><span className={`sd ${i.status}`}></span>{i.name}</div>
                <span className={`bdg ${i.status==='ok'?'b-paid':i.status==='warn'?'b-pap':'b-rej'}`}><span className="bd"></span>{i.status==='ok'?'OK':i.status==='warn'?'sync':'down'}</span>
              </div>
            ))}
            <div style={{marginTop:10}}>
              <button className="btn btn-sm" style={{width:'100%'}} onClick={()=>setPage('integrations')}>View all integrations →</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ════════════ CHART OF ACCOUNTS ════════════
function ChartOfAccounts({coa, setCoa, journals, period, activeCo, pageTitle, setPeriod}){
  const [search, setSearch] = useState('');
  const [ft, setFt] = useState('ALL');
  const [show, setShow] = useState(false);
  const [draft, setDraft] = useState({code:'', name:'', type:'ASSET', parent:'', isGroup:false});

  const filtered = coa.filter(a => {
    if (ft !== 'ALL' && a.type !== ft) return false;
    if (search && !`${a.code} ${a.name}`.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const add = () => {
    if (!draft.code || !draft.name) return;
    if (coa.find(a=>a.code===draft.code)) return alert('Code already exists');
    setCoa(prev => [...prev, {...draft}]);
    setShow(false);
    setDraft({code:'', name:'', type:'ASSET', parent:'', isGroup:false});
  };

  return (
    <div>
      <PageHeader title={pageTitle} sub="Hierarchical IFRS-aligned chart" period={period} setPeriod={setPeriod}>
        <button className="btn btn-p btn-sm" onClick={()=>setShow(true)}>+ New Account</button>
      </PageHeader>

      <div className="card">
        <div className="ch">
          <div style={{display:'flex', gap:10, alignItems:'center', flex:1, flexWrap:'wrap'}}>
            <div className="search" style={{flex:1}}>
              <input className="fi" placeholder="Search code or name…" value={search} onChange={e=>setSearch(e.target.value)} />
            </div>
            <div className="ebar">
              {['ALL','ASSET','LIABILITY','EQUITY','INCOME','EXPENSE'].map(t => (
                <div key={t} className={`ebt ${ft===t?'on':''}`} onClick={()=>setFt(t)}>{t}</div>
              ))}
            </div>
          </div>
        </div>
        <div className="tw">
          <table>
            <thead><tr><th>Code</th><th>Account name</th><th>Type</th><th>Parent</th><th>Flags</th><th className="num-h">Period Balance</th></tr></thead>
            <tbody>
              {filtered.map(a => {
                const bal = a.isGroup
                  ? groupBalance(a.code, coa, journals, {...period, company:activeCo})
                  : natureBalance(a, journals, {...period, company:activeCo});
                const indent = a.isGroup ? 0 : (a.parent ? 18 : 0);
                return (
                  <tr key={a.code}>
                    <td><span className="mono">{a.code}</span></td>
                    <td style={{paddingLeft: 13+indent, fontWeight: a.isGroup?700:400}}>{a.name}</td>
                    <td><span className="bdg b-draft"><span className="bd"></span>{a.type}</span></td>
                    <td><span className="mono" style={{color:'var(--t3)'}}>{a.parent || '—'}</span></td>
                    <td>
                      {a.isGroup && <span className="bdg b-info" style={{marginRight:3}}><span className="bd"></span>group</span>}
                      {a.contra && <span className="bdg b-pap" style={{marginRight:3}}><span className="bd"></span>contra</span>}
                      {a.isBank && <span className="bdg b-paid" style={{marginRight:3}}><span className="bd"></span>bank</span>}
                      {a.isControl && <span className="bdg b-info" style={{marginRight:3}}><span className="bd"></span>control</span>}
                    </td>
                    <td className="num" style={{fontWeight: a.isGroup?700:400}}>{fmt(bal)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {show && (
        <div className="mbg" onClick={()=>setShow(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="mh"><div><div className="mt">New Account</div><div className="ms">Add a GL account to the chart</div></div><button className="mx" onClick={()=>setShow(false)}>✕</button></div>
            <div className="mc">
              <div className="fg2">
                <div className="fg"><label className="fl">Code <span className="req">*</span></label><input className="fi" value={draft.code} onChange={e=>setDraft({...draft, code:e.target.value})} placeholder="e.g. 5295" /></div>
                <div className="fg"><label className="fl">Type <span className="req">*</span></label>
                  <select className="fs" value={draft.type} onChange={e=>setDraft({...draft, type:e.target.value})}>
                    <option>ASSET</option><option>LIABILITY</option><option>EQUITY</option><option>INCOME</option><option>EXPENSE</option>
                  </select>
                </div>
              </div>
              <div className="fg"><label className="fl">Name <span className="req">*</span></label><input className="fi" value={draft.name} onChange={e=>setDraft({...draft, name:e.target.value})} placeholder="e.g. Cleaning Expenses" /></div>
              <div className="fg2">
                <div className="fg"><label className="fl">Parent (optional)</label>
                  <select className="fs" value={draft.parent} onChange={e=>setDraft({...draft, parent:e.target.value})}>
                    <option value="">— none —</option>
                    {coa.filter(a=>a.isGroup && a.type===draft.type).map(p=><option key={p.code} value={p.code}>{p.code} — {p.name}</option>)}
                  </select>
                </div>
                <div className="fg"><label className="fl">Is Group?</label>
                  <select className="fs" value={draft.isGroup?'yes':'no'} onChange={e=>setDraft({...draft, isGroup:e.target.value==='yes'})}>
                    <option value="no">No (postable)</option><option value="yes">Yes (header)</option>
                  </select>
                </div>
              </div>
            </div>
            <div className="mf"><button className="btn" onClick={()=>setShow(false)}>Cancel</button><button className="btn btn-p" onClick={add}>Add Account</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ════════════ CUSTOMERS ════════════
function CustomersPage({customers, setCustomers, journals, activeCo, pageTitle, period, setPeriod, setProfileDrawer}){
  const [show, setShow] = useState(false);
  const [draft, setDraft] = useState({code:'', name:'', currency:'MVR', creditLimit:0, terms:30, taxId:''});

  const balances = useMemo(()=> {
    const m = {};
    customers.forEach(c => m[c.id] = 0);
    journals.filter(j=>j.posted && j.company===activeCo).forEach(je => {
      je.lines.forEach(l => { if (l.partner && m[l.partner] !== undefined) m[l.partner] += (+l.debit||0) - (+l.credit||0); });
    });
    return m;
  }, [customers, journals, activeCo]);

  const add = () => {
    if (!draft.name) return;
    setCustomers(p => [...p, {...draft, id: uid('C'), code: draft.code || `CUS-${(p.length+1).toString().padStart(3,'0')}`}]);
    setShow(false);
    setDraft({code:'', name:'', currency:'MVR', creditLimit:0, terms:30, taxId:''});
  };

  return (
    <div>
      <PageHeader title={pageTitle} sub="AR sub-ledger master records" period={period} setPeriod={setPeriod}>
        <button className="btn btn-p btn-sm" onClick={()=>setShow(true)}>+ New Customer</button>
      </PageHeader>
      <div className="card">
        <div className="tw">
          <table>
            <thead><tr><th>Code</th><th>Name</th><th>Curr</th><th>Tax ID</th><th>Terms</th><th className="num-h">Credit Limit</th><th className="num-h">Balance</th><th>Utilisation</th></tr></thead>
            <tbody>
              {customers.map(c => {
                const bal = balances[c.id] || 0;
                const util = c.creditLimit > 0 ? (bal/c.creditLimit)*100 : 0;
                return (
                  <tr key={c.id} className="clickable" onClick={()=>setProfileDrawer({kind:'customer', id:c.id})}>
                    <td><span className="mono">{c.code}</span></td>
                    <td>{c.name}</td>
                    <td>{c.currency}</td>
                    <td style={{color:'var(--t2)', fontSize:11}}>{c.taxId}</td>
                    <td>{c.terms}d</td>
                    <td className="num">{fmt(c.creditLimit)}</td>
                    <td className="num">{fmt(bal)}</td>
                    <td>{c.creditLimit>0 ?
                      <Fragment><span className="spark"><div style={{width:`${Math.min(100,util)}%`, background: util>90?'var(--red)':util>70?'#d97706':'var(--blue)'}}></div></span>
                      <span style={{marginLeft:8, color:'var(--t2)', fontSize:11}}>{util.toFixed(0)}%</span></Fragment>
                      : '—'}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {show && (
        <div className="mbg" onClick={()=>setShow(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="mh"><div><div className="mt">New Customer</div><div className="ms">Master record for AR</div></div><button className="mx" onClick={()=>setShow(false)}>✕</button></div>
            <div className="mc">
              <div className="fg2">
                <div className="fg"><label className="fl">Code</label><input className="fi" value={draft.code} onChange={e=>setDraft({...draft, code:e.target.value})} placeholder="CUS-XXX" /></div>
                <div className="fg"><label className="fl">Name <span className="req">*</span></label><input className="fi" value={draft.name} onChange={e=>setDraft({...draft, name:e.target.value})} /></div>
              </div>
              <div className="fg3">
                <div className="fg"><label className="fl">Currency</label>
                  <select className="fs" value={draft.currency} onChange={e=>setDraft({...draft, currency:e.target.value})}>
                    <option>MVR</option><option>USD</option><option>LKR</option><option>EUR</option>
                  </select>
                </div>
                <div className="fg"><label className="fl">Terms (days)</label><input className="fi" type="number" value={draft.terms} onChange={e=>setDraft({...draft, terms:+e.target.value})} /></div>
                <div className="fg"><label className="fl">Credit Limit</label><input className="fi" type="number" value={draft.creditLimit} onChange={e=>setDraft({...draft, creditLimit:+e.target.value})} /></div>
              </div>
              <div className="fg"><label className="fl">Tax ID</label><input className="fi" value={draft.taxId} onChange={e=>setDraft({...draft, taxId:e.target.value})} /></div>
            </div>
            <div className="mf"><button className="btn" onClick={()=>setShow(false)}>Cancel</button><button className="btn btn-p" onClick={add}>Add</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

                    <option>MVR</option><option>USD</option><option>LKR</option><option>EUR</option>
                  </select>
                </div>
                <div className="fg"><label className="fl">Terms (days)</label><input className="fi" type="number" value={draft.terms} onChange={e=>setDraft({...draft, terms:+e.target.value})} /></div>
              </div>
              <div className="fg"><label className="fl">Tax ID</label><input className="fi" value={draft.taxId} onChange={e=>setDraft({...draft, taxId:e.target.value})} /></div>
            </div>
            <div className="mf"><button className="btn" onClick={()=>setShow(false)}>Cancel</button><button className="btn btn-p" onClick={add}>Add</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ════════════ ITEMS (with Add/Edit/Delete) ════════════
function ItemsPage({items, setItems, coa, pageTitle, period, setPeriod, setProfileDrawer, showToast}){
  const [show, setShow] = useState(false);
  const [editId, setEditId] = useState(null);
  const [search, setSearch] = useState('');
  const [catFilter, setCatFilter] = useState('all');

  const cats = ['all', ...new Set(items.map(i => i.cat))];
  const filtered = items.filter(i => {
    if (catFilter !== 'all' && i.cat !== catFilter) return false;
    if (search && !`${i.sku} ${i.name}`.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const remove = (id) => {
    if (!confirm('Delete this item? This cannot be undone.')) return;
    setItems(prev => prev.filter(i => i.id !== id));
    showToast('Item deleted', 'ok');
  };

  return (
    <div>
      <PageHeader title={pageTitle} sub="Item master · Click row to view profile · Add/edit/delete items" period={period} setPeriod={setPeriod}>
        <button className="btn btn-p btn-sm" onClick={()=>{setEditId(null); setShow(true);}}>+ New Item</button>
      </PageHeader>

      <div className="card">
        <div className="ch">
          <div style={{display:'flex', gap:10, alignItems:'center', flex:1, flexWrap:'wrap'}}>
            <div className="search" style={{flex:1, maxWidth:320}}>
              <input className="fi" placeholder="Search SKU or name…" value={search} onChange={e=>setSearch(e.target.value)} />
            </div>
            <div className="ebar">
              {cats.map(c => <div key={c} className={`ebt ${catFilter===c?'on':''}`} onClick={()=>setCatFilter(c)}>{c==='all'?'All':c}</div>)}
            </div>
          </div>
          <div style={{fontSize:11, color:'var(--t2)'}}>{filtered.length} of {items.length}</div>
        </div>
        <div className="tw">
          <table>
            <thead><tr><th>SKU</th><th>Name</th><th>Category</th><th>UoM</th><th className="num-h">Avg Cost</th><th className="num-h">Sell Price</th><th className="num-h">Margin</th><th className="num-h">Stock</th><th className="num-h">Reorder</th><th style={{width:120}}>Actions</th></tr></thead>
            <tbody>
              {filtered.map(i => {
                const margin = i.sellPrice > 0 ? ((i.sellPrice - i.costAvg)/i.sellPrice*100) : 0;
                return (
                  <tr key={i.id}>
                    <td onClick={()=>setProfileDrawer({kind:'item', id:i.id})} style={{cursor:'pointer'}}><span className="mono">{i.sku}</span></td>
                    <td onClick={()=>setProfileDrawer({kind:'item', id:i.id})} style={{cursor:'pointer'}}>{i.name}</td>
                    <td><span className="bdg b-draft"><span className="bd"></span>{i.cat}</span></td>
                    <td>{i.uom}</td>
                    <td className="num">{fmt(i.costAvg)}</td>
                    <td className="num">{fmt(i.sellPrice)}</td>
                    <td className="num" style={{color:margin>30?'var(--green)':margin>15?'var(--text)':'var(--orange)'}}>{margin.toFixed(1)}%</td>
                    <td className="num">{i.stock <= i.reorderLvl ? <span className="bdg b-rej"><span className="bd"></span>{i.stock}</span> : i.stock}</td>
                    <td className="num">{i.reorderLvl}</td>
                    <td>
                      <div style={{display:'flex', gap:4}}>
                        <button className="btn btn-xs" onClick={()=>{setEditId(i.id); setShow(true);}}>✎</button>
                        <button className="btn btn-xs" style={{color:'var(--red)'}} onClick={()=>remove(i.id)}>✕</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {show && <ItemEditModal item={editId ? items.find(i=>i.id===editId) : null} setItems={setItems} coa={coa} onClose={()=>setShow(false)} showToast={showToast} />}
    </div>
  );
}

function ItemEditModal({item, setItems, coa, onClose, showToast}){
  const isNew = !item;
  const [draft, setDraft] = useState(item || {
    sku:'', name:'', cat:'Medical Equipment', uom:'PCS',
    costAvg:0, sellPrice:0, stock:0, reorderLvl:0,
    glRev:'4110', glCogs:'5110', glInv:'1216'
  });
  const revAccts = coa.filter(a => !a.isGroup && a.type==='INCOME');
  const cogsAccts = coa.filter(a => !a.isGroup && a.code.startsWith('51'));
  const invAccts = coa.filter(a => !a.isGroup && a.code.startsWith('121'));
  const margin = draft.sellPrice > 0 ? ((draft.sellPrice - draft.costAvg)/draft.sellPrice*100) : 0;

  const save = () => {
    if (!draft.sku || !draft.name) { showToast('SKU and name are required', 'bad'); return; }
    if (isNew) {
      setItems(prev => [...prev, {...draft, id: uid('I')}]);

      setItems(prev => prev.map(i => i.id===item.id ? {...draft} : i));

  return (
    <div className="mbg" onClick={onClose}>
      <div className="modal lg" onClick={e=>e.stopPropagation()}>
        <div className="mh"><div><div className="mt">{isNew?'New':'Edit'} Item</div><div className="ms">Item master with GL account mapping</div></div><button className="mx" onClick={onClose}>✕</button></div>
        <div className="mc">
          <div className="fg2">
            <div className="fg"><label className="fl">SKU <span className="req">*</span></label><input className="fi" value={draft.sku} onChange={e=>setDraft({...draft, sku:e.target.value})} placeholder="e.g. QDO-OB-001" /></div>
            <div className="fg"><label className="fl">Category</label>
              <select className="fs" value={draft.cat} onChange={e=>setDraft({...draft, cat:e.target.value})}>
                <option>Medical Equipment</option><option>Pharmacy</option><option>Consumables</option>
                <option>Equipment Spares</option><option>Service Parts</option><option>Other</option>
              </select>
            </div>
          </div>
          <div className="fg"><label className="fl">Item Name <span className="req">*</span></label><input className="fi" value={draft.name} onChange={e=>setDraft({...draft, name:e.target.value})} /></div>
          <div className="fg3">
            <div className="fg"><label className="fl">Unit of Measure</label>
              <select className="fs" value={draft.uom} onChange={e=>setDraft({...draft, uom:e.target.value})}>
                <option>PCS</option><option>BOX</option><option>KIT</option><option>BTL</option><option>VIAL</option>
                <option>PACK</option><option>SET</option><option>KG</option><option>LTR</option><option>MTR</option>
              </select>
            </div>
            <div className="fg"><label className="fl">Reorder Level</label><input className="fi" type="number" value={draft.reorderLvl} onChange={e=>setDraft({...draft, reorderLvl:+e.target.value})} /></div>
            <div className="fg"><label className="fl">Current Stock</label><input className="fi" type="number" value={draft.stock} onChange={e=>setDraft({...draft, stock:+e.target.value})} disabled={!isNew} /></div>
          </div>
          <div className="fg2">
            <div className="fg"><label className="fl">Avg Cost (MVR)</label><input className="fi" type="number" step="0.01" value={draft.costAvg} onChange={e=>setDraft({...draft, costAvg:+e.target.value})} /></div>
            <div className="fg"><label className="fl">Sell Price (MVR)</label><input className="fi" type="number" step="0.01" value={draft.sellPrice} onChange={e=>setDraft({...draft, sellPrice:+e.target.value})} /></div>
          </div>
          {draft.sellPrice > 0 && (
            <div className="al al-i" style={{marginTop:0}}>
              Gross Margin: <b>{fmt(draft.sellPrice - draft.costAvg)} MVR ({margin.toFixed(1)}%)</b>
            </div>
          )}
          <div style={{padding:'12px 14px', background:'var(--s2)', borderRadius:'var(--r)', marginTop:6}}>
            <div style={{fontSize:11, fontWeight:700, color:'var(--blue3)', marginBottom:8, textTransform:'uppercase', letterSpacing:'.04em'}}>GL Account Mapping</div>
            <div className="fg3">
              <div className="fg" style={{margin:0}}><label className="fl">Revenue A/c</label>
                <select className="fs" value={draft.glRev} onChange={e=>setDraft({...draft, glRev:e.target.value})}>
                  {revAccts.map(a=><option key={a.code} value={a.code}>{a.code} · {a.name}</option>)}
                </select>
              </div>
              <div className="fg" style={{margin:0}}><label className="fl">COGS A/c</label>
                <select className="fs" value={draft.glCogs} onChange={e=>setDraft({...draft, glCogs:e.target.value})}>
                  {cogsAccts.map(a=><option key={a.code} value={a.code}>{a.code} · {a.name}</option>)}
                </select>
              </div>
              <div className="fg" style={{margin:0}}><label className="fl">Inventory A/c</label>
                <select className="fs" value={draft.glInv} onChange={e=>setDraft({...draft, glInv:e.target.value})}>
                  {invAccts.map(a=><option key={a.code} value={a.code}>{a.code} · {a.name}</option>)}
                </select>

        <div className="mf"><button className="btn" onClick={onClose}>Cancel</button><button className="btn btn-p" onClick={save}>{isNew?'Create Item':'Save Changes'}</button></div>

// ════════════ JOURNAL ENTRY ════════════
function JournalEntry({coa, journals, postJournal, activeCo, customers, vendors, pageTitle, period, setPeriod, nextVoucherNumber, setVoucherPreview, voucherConfig}){
  const blank = () => ({ date: today(), ref: nextVoucherNumber('JE', today()), narration:'', source:'MANUAL',
    lines:[{acct:'',desc:'',debit:0,credit:0,partner:''},{acct:'',desc:'',debit:0,credit:0,partner:''}]});
  const [je, setJe] = useState(blank());
  const [autoNumber, setAutoNumber] = useState(true);
  const postable = coa.filter(a => !a.isGroup);

  // When source changes, regenerate ref
  useEffect(() => {
    if (autoNumber) {
      setJe(prev => ({...prev, ref: nextVoucherNumber(prev.source === 'MANUAL' ? 'JE' : prev.source, prev.date)}));
    }
  }, [je.source, je.date, autoNumber]);

  const upd = (i, k, v) => setJe(p => { const ls=[...p.lines]; ls[i]={...ls[i],[k]:v}; return {...p, lines:ls};});
  const addLine = () => setJe(p => ({...p, lines:[...p.lines,{acct:'',desc:'',debit:0,credit:0,partner:''}]}));
  const rm = (i) => setJe(p => ({...p, lines: p.lines.filter((_,x)=>x!==i)}));

  const totalDr = sumLines(je.lines,'debit');
  const totalCr = sumLines(je.lines,'credit');
  const diff = totalDr - totalCr;
  const balanced = Math.abs(diff) < 0.01 && totalDr > 0;

  const submit = () => {
    if (!balanced) return;
    const posted = postJournal({...je, company:activeCo});
    if (posted) {
      setVoucherPreview(posted);
      setJe(blank());
    }
  };

  const cfg = voucherConfig[je.source==='MANUAL'?'JE':je.source];

  return (
    <div>
      <PageHeader title={pageTitle} sub="Manual & system-source journal entries with auto-numbering" period={period} setPeriod={setPeriod} />

      <div className="card">
        <div className="ch">
          <div><div className="ct">New journal entry</div><div className="cs">Debits must equal credits before posting. Voucher PDF auto-generated on post.</div></div>
          <label style={{fontSize:11, color:'var(--t2)', display:'flex', alignItems:'center', gap:6}}>
            <input type="checkbox" checked={autoNumber} onChange={e=>setAutoNumber(e.target.checked)} /> Auto voucher #
          </label>
        </div>
        <div className="cb">
          <div className="fg4">
            <div className="fg"><label className="fl">Date <span className="req">*</span></label><input className="fi" type="date" value={je.date} onChange={e=>setJe({...je, date:e.target.value})} /></div>
            <div className="fg">
              <label className="fl">Voucher # {autoNumber && cfg && <span style={{color:'var(--blue)', fontSize:10}}>· Format: {cfg.format}</span>}</label>
              <input className="fi" value={je.ref} onChange={e=>{setJe({...je, ref:e.target.value}); setAutoNumber(false);}} placeholder="auto" />
            </div>
            <div className="fg"><label className="fl">Source</label>
              <select className="fs" value={je.source} onChange={e=>setJe({...je, source:e.target.value})}>
                <option>MANUAL</option><option>AR-INV</option><option>AR-RCT</option><option>AP-BILL</option><option>AP-PMT</option>
                <option>POS</option><option>HR-PAYR</option><option>INV</option><option>PROD</option><option>FAM-DEPR</option><option>EXP</option>
              </select>
            </div>
            <div className="fg"><label className="fl">Status</label><div style={{paddingTop:6}}>{balanced ? <span className="bdg b-paid"><span className="bd"></span>Balanced</span> : <span className="bdg b-rej"><span className="bd"></span>Diff {fmt(Math.abs(diff))}</span>}</div></div>
          </div>
          <div className="fg"><label className="fl">Narration</label><input className="fi" value={je.narration} onChange={e=>setJe({...je, narration:e.target.value})} placeholder="e.g. Sales invoice — STO Maldives" /></div>
        </div>

        <div className="tw je-tbl">
          <table>
            <thead><tr><th style={{width:30}}>#</th><th style={{width:240}}>Account</th><th>Description</th><th style={{width:140}}>Partner</th><th className="num-h" style={{width:140}}>Debit</th><th className="num-h" style={{width:140}}>Credit</th><th style={{width:40}}></th></tr></thead>
            <tbody>
              {je.lines.map((l,i) => (
                <tr key={i}>
                  <td style={{color:'var(--t3)', fontSize:11}}>{i+1}</td>
                  <td>
                    <select value={l.acct} onChange={e=>upd(i,'acct',e.target.value)}>
                      <option value="">— select —</option>
                      {postable.map(a => <option key={a.code} value={a.code}>{a.code} · {a.name}</option>)}
                    </select>
                  </td>
                  <td><input value={l.desc} onChange={e=>upd(i,'desc',e.target.value)} placeholder="line description" /></td>
                  <td>
                    <select value={l.partner||''} onChange={e=>upd(i,'partner',e.target.value)}>
                      <option value="">—</option>
                      <optgroup label="Customers">{customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</optgroup>
                      <optgroup label="Vendors">{vendors.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}</optgroup>
                    </select>
                  </td>
                  <td className="num-cell"><input type="number" step="0.01" value={l.debit||''} onChange={e=>upd(i,'debit',+e.target.value)} /></td>
                  <td className="num-cell"><input type="number" step="0.01" value={l.credit||''} onChange={e=>upd(i,'credit',+e.target.value)} /></td>
                  <td><button className="btn-link" style={{color:'var(--red)'}} onClick={()=>rm(i)}>✕</button></td>
                </tr>
              ))}
              <tr className="tt-row-tot">
                <td colSpan={4}><button className="btn btn-xs" onClick={addLine}>+ Add Line</button></td>
                <td className="num">{fmt(totalDr)}</td>
                <td className="num">{fmt(totalCr)}</td>
                <td></td>
              </tr>
            </tbody>
          </table>
        </div>

        <div className="mf">
          <button className="btn" onClick={()=>setJe(blank())}>Reset</button>
          <button className="btn btn-p" disabled={!balanced} onClick={submit}>Post Journal & Print Voucher</button>
        </div>
      </div>

      <div className="card">
        <div className="ch"><div className="ct">Recent journal entries</div><div className="cs">Click any row to preview voucher</div></div>
        <div className="tw swrap">
          <table>
            <thead><tr><th>JE No.</th><th>Date</th><th>Ref</th><th>Source</th><th>Narration</th><th className="num-h">Amount</th><th>Status</th><th></th></tr></thead>
            <tbody>
              {[...journals].filter(j=>j.company===activeCo).reverse().map(j => (
                <tr key={j.id}>
                  <td><span className="mono">{j.id}</span></td>
                  <td>{j.date}</td>
                  <td>{j.ref}</td>
                  <td><span className="bdg b-info"><span className="bd"></span>{j.source}</span></td>
                  <td>{j.narration}</td>
                  <td className="num">{fmt(sumLines(j.lines,'debit'))}</td>
                  <td>{j.locked ? <span className="bdg b-app"><span className="bd"></span>Locked</span> : <span className="bdg b-paid"><span className="bd"></span>Posted</span>}</td>
                  <td><button className="btn btn-xs" onClick={()=>setVoucherPreview(j)}>📄 Voucher</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ════════════ AR PAGE ════════════
function ARPage({customers, journals, postJournal, coa, activeCo, showToast, pageTitle, period, setPeriod, companies, setVoucherPreview}){
  const [tab, setTab] = useState('invoices');
  const [show, setShow] = useState(null);
  const invoices = journals.filter(j => j.company===activeCo && j.source==='AR-INV').reverse();
  const receipts = journals.filter(j => j.company===activeCo && j.source==='AR-RCT').reverse();

  const today_ = new Date(today());
  const aging = customers.map(c => {
    const b = {current:0,'1-30':0,'31-60':0,'61-90':0,'90+':0,total:0};
    journals.forEach(je => {
      if (je.company !== activeCo) return;
      const dr = je.lines.filter(l => l.acct==='1220' && l.partner===c.id).reduce((s,l)=>s+l.debit,0);
      const cr = je.lines.filter(l => l.acct==='1220' && l.partner===c.id).reduce((s,l)=>s+l.credit,0);
      const net = dr - cr;
      if (Math.abs(net) < 0.01) return;
      const days = Math.floor((today_ - new Date(je.date))/(1000*60*60*24));
      if (days <= 0) b.current += net;
      else if (days <= 30) b['1-30'] += net;
      else if (days <= 60) b['31-60'] += net;
      else if (days <= 90) b['61-90'] += net;
      else b['90+'] += net;
      b.total += net;
    });
    return {customer:c, ...b};
  }).filter(a => Math.abs(a.total) > 0.01);

  const co = companies.find(c=>c.id===activeCo);

  const exportInvoicesExcel = () => {
    exportToExcel(`AR-Invoices-${activeCo}-${today()}.xlsx`, [{
      name: 'AR Invoices',
      title: `Accounts Receivable — Invoices Register`,
      subtitle: `${co?.name} · Period: ${period.from} to ${period.to}`,
      meta: [['Generated', new Date().toISOString().slice(0,16).replace('T',' ')]],
      header: ['JE No.','Date','Doc Ref','Customer','Narration','Amount'],
      rows: invoices.map(j => {
        const p = j.lines.find(l=>l.partner)?.partner;
        const c = customers.find(x=>x.id===p);
        return [j.id, j.date, j.refDoc||j.ref, c?.name || '—', j.narration, sumLines(j.lines,'debit')];
      }),
      totals: [['','','','','TOTAL', invoices.reduce((s,j)=>s+sumLines(j.lines,'debit'), 0)]],
      colWidths: [16,12,18,30,40,14],
    }]);
    showToast('Invoices exported to Excel', 'ok');
  };
  const exportInvoicesPDF = () => {
    exportToPDF(`AR-Invoices-${activeCo}-${today()}.pdf`, {
      title: 'AR Invoices Register', subtitle: `Period: ${period.from} to ${period.to}`, company: co?.name,
      orientation:'landscape',
      sections: [{
        header: ['JE No.','Date','Doc Ref','Customer','Narration','Amount'],
        rows: invoices.map(j => {
          const p = j.lines.find(l=>l.partner)?.partner;
          const c = customers.find(x=>x.id===p);
          return [j.id, j.date, j.refDoc||j.ref, c?.name || '—', j.narration, fmt(sumLines(j.lines,'debit'))];
        }),
        totals: [['','','','','TOTAL', fmt(invoices.reduce((s,j)=>s+sumLines(j.lines,'debit'),0))]],
        columnStyles: {5: {halign:'right'}},
      }],
    });
    showToast('Invoices exported to PDF', 'ok');
  };
  const exportAgingExcel = () => {
    exportToExcel(`AR-Aging-${activeCo}-${today()}.xlsx`, [{
      name: 'AR Aging',
      title: 'Accounts Receivable — Aging Analysis',
      subtitle: `${co?.name} · As at ${period.to}`,
      header: ['Customer','Current','1–30','31–60','61–90','90+','Total'],
      rows: aging.map(a => [a.customer.name, a.current, a['1-30'], a['31-60'], a['61-90'], a['90+'], a.total]),
      totals: [['TOTAL', ...['current','1-30','31-60','61-90','90+','total'].map(k=>aging.reduce((s,a)=>s+a[k],0))]],
      colWidths: [30,14,14,14,14,14,16],
    }]);
    showToast('Aging exported to Excel', 'ok');
  };
  const exportAgingPDF = () => {
    exportToPDF(`AR-Aging-${activeCo}-${today()}.pdf`, {
      title: 'AR Aging Analysis', subtitle: `As at ${period.to}`, company: co?.name, orientation:'landscape',
      sections: [{
        header: ['Customer','Current','1–30','31–60','61–90','90+','Total'],
        rows: aging.map(a => [a.customer.name, fmt(a.current), fmt(a['1-30']), fmt(a['31-60']), fmt(a['61-90']), fmt(a['90+']), fmt(a.total)]),
        totals: [['TOTAL', ...['current','1-30','31-60','61-90','90+','total'].map(k=>fmt(aging.reduce((s,a)=>s+a[k],0)))]],
        columnStyles: {1:{halign:'right'},2:{halign:'right'},3:{halign:'right'},4:{halign:'right'},5:{halign:'right'},6:{halign:'right'}},
      }],
    });
    showToast('Aging exported to PDF', 'ok');
  };

  return (
    <div>
      <PageHeader title={pageTitle} sub="Customer invoices, receipts and aging" period={period} setPeriod={setPeriod}>
        <div className="export-group">
          <button className="btn btn-x btn-sm" onClick={tab==='aging' ? exportAgingExcel : exportInvoicesExcel}>📊 Excel</button>
          <button className="btn btn-pdf btn-sm" onClick={tab==='aging' ? exportAgingPDF : exportInvoicesPDF}>📄 PDF</button>
        </div>
      </PageHeader>
      <div className="tabs">
        <div className={`tab ${tab==='invoices'?'on':''}`} onClick={()=>setTab('invoices')}>Invoices</div>
        <div className={`tab ${tab==='receipts'?'on':''}`} onClick={()=>setTab('receipts')}>Receipts</div>
        <div className={`tab ${tab==='aging'?'on':''}`} onClick={()=>setTab('aging')}>Aging Analysis</div>
      </div>

      {tab==='invoices' && (

function InvoiceModal({customers, coa, activeCo, onClose, postJournal}){
  const [c, setC] = useState(customers[0]?.id);
  const [date, setDate] = useState(today());
  const [ref, setRef] = useState(`INV/${new Date().getFullYear()}/${String(Math.floor(Math.random()*1000)).padStart(3,'0')}`);
  const [lines, setLines] = useState([{desc:'', qty:1, price:0, acct:'4110'}]);
  const [gstPct, setGstPct] = useState(5);
  const sub = lines.reduce((s,l)=>s+(l.qty*l.price), 0);
  const gst = sub * gstPct / 100;
  const total = sub + gst;
  const post = () => {
    const cust = customers.find(x=>x.id===c);
    postJournal({date, ref, narration:`Invoice — ${cust?.name||''}`, source:'AR-INV', company:activeCo, refDoc:ref,
      lines:[
        {acct:'1220', desc: ref, debit: total, credit:0, partner: c},
        ...lines.map(l=>({acct:l.acct, desc:l.desc, debit:0, credit:l.qty*l.price})),
        ...(gst>0 ? [{acct:'2230', desc:`GST ${gstPct}%`, debit:0, credit:gst}] : [])
      ]
    });
    onClose();
  };
  return (
    <div className="mbg" onClick={onClose}>
      <div className="modal lg" onClick={e=>e.stopPropagation()}>
        <div className="mh"><div><div className="mt">New Sales Invoice</div><div className="ms">Auto-generates balanced journal entry</div></div><button className="mx" onClick={onClose}>✕</button></div>

            <div className="fg"><label className="fl">Doc Ref</label><input className="fi" value={ref} onChange={e=>setRef(e.target.value)} /></div>
            <div className="fg"><label className="fl">GST %</label><input className="fi" type="number" value={gstPct} onChange={e=>setGstPct(+e.target.value)} /></div>
          </div>
          <div className="tw je-tbl" style={{border:'1px solid var(--border)', borderRadius:'var(--r)'}}>
            <table>
              <thead><tr><th>Description</th><th style={{width:80}}>Qty</th><th className="num-h" style={{width:120}}>Price</th><th style={{width:200}}>Revenue A/c</th><th className="num-h" style={{width:120}}>Amount</th></tr></thead>
              <tbody>
                {lines.map((l,i) => (
                  <tr key={i}>
                    <td><input value={l.desc} onChange={e=>{const x=[...lines]; x[i]={...x[i],desc:e.target.value}; setLines(x);}} placeholder="Description" /></td>
                    <td className="num-cell"><input type="number" value={l.qty} onChange={e=>{const x=[...lines]; x[i]={...x[i],qty:+e.target.value}; setLines(x);}} /></td>
                    <td className="num-cell"><input type="number" step="0.01" value={l.price} onChange={e=>{const x=[...lines]; x[i]={...x[i],price:+e.target.value}; setLines(x);}} /></td>
                    <td>
                      <select value={l.acct} onChange={e=>{const x=[...lines]; x[i]={...x[i],acct:e.target.value}; setLines(x);}}>
                        {coa.filter(a=>!a.isGroup && a.type==='INCOME').map(a=><option key={a.code} value={a.code}>{a.code} · {a.name}</option>)}
                      </select>
                    </td>

function APPage({vendors, journals, postJournal, coa, activeCo, showToast, pageTitle, period, setPeriod, companies, setVoucherPreview}){
  const [tab, setTab] = useState('bills');
  const [show, setShow] = useState(null);
  const bills = journals.filter(j=>j.company===activeCo && j.source==='AP-BILL').reverse();
  const payments = journals.filter(j=>j.company===activeCo && j.source==='AP-PMT').reverse();

  const today_ = new Date(today());
  const aging = vendors.map(v => {
    const b = {current:0,'1-30':0,'31-60':0,'61-90':0,'90+':0,total:0};
    journals.forEach(je => {
      if (je.company !== activeCo) return;
      const dr = je.lines.filter(l => l.acct==='2210' && l.partner===v.id).reduce((s,l)=>s+l.debit,0);
      const cr = je.lines.filter(l => l.acct==='2210' && l.partner===v.id).reduce((s,l)=>s+l.credit,0);
      const net = cr - dr;
      if (Math.abs(net) < 0.01) return;
      const days = Math.floor((today_ - new Date(je.date))/(1000*60*60*24));
      if (days <= 0) b.current += net;
      else if (days <= 30) b['1-30'] += net;
      else if (days <= 60) b['31-60'] += net;
      else if (days <= 90) b['61-90'] += net;
      else b['90+'] += net;
      b.total += net;
    });
    return {vendor:v, ...b};
  }).filter(a => Math.abs(a.total) > 0.01);

  const co = companies.find(c=>c.id===activeCo);
  const exportExcel = () => {
    if (tab==='aging') {
      exportToExcel(`AP-Aging-${activeCo}-${today()}.xlsx`, [{
        name:'AP Aging', title:'Accounts Payable — Aging', subtitle:`${co?.name} · As at ${period.to}`,
        header:['Vendor','Current','1–30','31–60','61–90','90+','Total'],
        rows: aging.map(a => [a.vendor.name, a.current, a['1-30'], a['31-60'], a['61-90'], a['90+'], a.total]),
        totals:[['TOTAL', ...['current','1-30','31-60','61-90','90+','total'].map(k=>aging.reduce((s,a)=>s+a[k],0))]],
        colWidths:[30,14,14,14,14,14,16],
      }]);
    } else {
      const data = tab==='bills' ? bills : payments;
      exportToExcel(`AP-${tab}-${activeCo}-${today()}.xlsx`, [{
        name: tab==='bills'?'AP Bills':'AP Payments',
        title: tab==='bills'?'Accounts Payable — Bills':'Accounts Payable — Payments',
        subtitle:`${co?.name} · Period: ${period.from} to ${period.to}`,
        header:['JE No.','Date','Ref','Vendor','Narration','Amount'],
        rows: data.map(j => {
          const p = j.lines.find(l=>l.partner)?.partner;
          const v = vendors.find(x=>x.id===p);
          return [j.id, j.date, j.refDoc||j.ref, v?.name||'—', j.narration, sumLines(j.lines,'debit')];
        }),
        totals:[['','','','','TOTAL', data.reduce((s,j)=>s+sumLines(j.lines,'debit'),0)]],
        colWidths:[16,12,18,30,40,14],
      }]);
    }
    showToast('Exported to Excel', 'ok');
  };
  const exportPDF = () => {
    if (tab==='aging') {
      exportToPDF(`AP-Aging-${activeCo}-${today()}.pdf`, {
        title:'AP Aging Analysis', subtitle:`As at ${period.to}`, company:co?.name, orientation:'landscape',
        sections:[{ header:['Vendor','Current','1–30','31–60','61–90','90+','Total'],
          rows: aging.map(a => [a.vendor.name, fmt(a.current), fmt(a['1-30']), fmt(a['31-60']), fmt(a['61-90']), fmt(a['90+']), fmt(a.total)]),
          totals:[['TOTAL', ...['current','1-30','31-60','61-90','90+','total'].map(k=>fmt(aging.reduce((s,a)=>s+a[k],0)))]],
          columnStyles:{1:{halign:'right'},2:{halign:'right'},3:{halign:'right'},4:{halign:'right'},5:{halign:'right'},6:{halign:'right'}},
        }],
      });
    } else {
      const data = tab==='bills' ? bills : payments;
      exportToPDF(`AP-${tab}-${activeCo}-${today()}.pdf`, {
        title: tab==='bills'?'AP Bills Register':'AP Payments Register', subtitle:`Period: ${period.from} to ${period.to}`, company:co?.name, orientation:'landscape',
        sections:[{ header:['JE No.','Date','Ref','Vendor','Narration','Amount'],
          rows: data.map(j => {
            const p = j.lines.find(l=>l.partner)?.partner;
            const v = vendors.find(x=>x.id===p);
            return [j.id, j.date, j.refDoc||j.ref, v?.name||'—', j.narration, fmt(sumLines(j.lines,'debit'))];
          }),
          totals:[['','','','','TOTAL', fmt(data.reduce((s,j)=>s+sumLines(j.lines,'debit'),0))]],
          columnStyles:{5:{halign:'right'}},
        }],
      });
    }
    showToast('Exported to PDF', 'ok');
  };

  return (
    <div>
      <PageHeader title={pageTitle} sub="Vendor bills, payments and aging" period={period} setPeriod={setPeriod}>
        <div className="export-group">
          <button className="btn btn-x btn-sm" onClick={exportExcel}>📊 Excel</button>
          <button className="btn btn-pdf btn-sm" onClick={exportPDF}>📄 PDF</button>
        </div>
      </PageHeader>
      <div className="tabs">
        <div className={`tab ${tab==='bills'?'on':''}`} onClick={()=>setTab('bills')}>Bills</div>
        <div className={`tab ${tab==='payments'?'on':''}`} onClick={()=>setTab('payments')}>Payments</div>
        <div className={`tab ${tab==='aging'?'on':''}`} onClick={()=>setTab('aging')}>Aging Analysis</div>
      </div>

      {tab==='bills' && (
        <div className="card">
          <div className="ch">
            <div><div className="ct">Vendor Bills</div><div className="cs">{bills.length} bills</div></div>
            <button className="btn btn-p btn-sm" onClick={()=>setShow('bill')}>+ New Bill</button>
          </div>
          <div className="tw"><table>
            <thead><tr><th>JE No.</th><th>Date</th><th>Ref</th><th>Vendor</th><th>Narration</th><th className="num-h">Amount</th><th></th></tr></thead>
            <tbody>{bills.map(j => {
              const p = j.lines.find(l=>l.partner)?.partner;
              const v = vendors.find(x=>x.id===p);
              return (<tr key={j.id}>
                <td><span className="mono">{j.id}</span></td><td>{j.date}</td><td>{j.refDoc||j.ref}</td>
                <td>{v?.name||'—'}</td><td>{j.narration}</td><td className="num">{fmt(sumLines(j.lines,'debit'))}</td>
                <td><button className="btn btn-xs" onClick={()=>setVoucherPreview(j)}>📄 Voucher</button></td>
              </tr>);
            })}</tbody></table></div>
        </div>
      )}

      {tab==='payments' && (
        <div className="card">
          <div className="ch">
            <div><div className="ct">Vendor Payments</div><div className="cs">Triggered by Payment Workflow approvals</div></div>
            <button className="btn btn-p btn-sm" onClick={()=>setShow('pmt')}>+ Record Payment</button>
          </div>
          <div className="tw"><table>
            <thead><tr><th>JE No.</th><th>Date</th><th>Ref</th><th>Vendor</th><th>Narration</th><th className="num-h">Amount</th><th></th></tr></thead>
            <tbody>{payments.map(j => {
              const p = j.lines.find(l=>l.partner)?.partner;
              const v = vendors.find(x=>x.id===p);
              return (<tr key={j.id}>
                <td><span className="mono">{j.id}</span></td><td>{j.date}</td><td>{j.ref}</td>

      {tab==='aging' && (
